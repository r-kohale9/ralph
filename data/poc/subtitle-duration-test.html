<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subtitle Duration Test</title>

  <script src="../../warehouse/packages/feedback-manager/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f5f5f5;
      color: #333;
      padding: 20px;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100dvh;
    }
    h1 { font-size: 18px; margin-bottom: 16px; }
    .test-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
      color: white;
    }
    .test-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-stream { background: #7C3AED; }
    .btn-cached { background: #2563eb; }
    .btn-sound { background: #219653; }
    #log {
      background: #1a1a2e;
      color: #0f0;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      padding: 12px;
      border-radius: 8px;
      height: 400px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      margin-top: 16px;
    }
    .log-info { color: #0f0; }
    .log-warn { color: #ff0; }
    .log-error { color: #f55; }
    .log-event { color: #0ff; }
  </style>
</head>
<body>

  <h1>Subtitle Duration vs Audio Duration Test</h1>

  <button class="test-btn btn-stream" id="btn-test-stream" onclick="testStreamingLong()">
    Test Streaming (Long Text ~15-20s)
  </button>

  <button class="test-btn btn-cached" id="btn-test-short" onclick="testStreamingShort()">
    Test Streaming (Short Text ~3s)
  </button>

  <button class="test-btn btn-sound" id="btn-test-sound" onclick="testStaticSound()">
    Test Static Sound (correct_tap + subtitle)
  </button>

  <button class="test-btn" style="background:#E35757;" id="btn-test-sequential" onclick="testSequentialAwait()">
    Test Sequential: await Long + await Short
  </button>

  <div id="log"></div>

  <script>
    var logEl = document.getElementById('log');
    var testStartTime = null;

    function log(msg, type) {
      type = type || 'info';
      var elapsed = testStartTime ? ((Date.now() - testStartTime) / 1000).toFixed(2) + 's' : '---';
      var line = document.createElement('div');
      line.className = 'log-' + type;
      line.textContent = '[' + elapsed + '] ' + msg;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
      console.log('[' + elapsed + '] ' + msg);
    }

    function clearLog() {
      logEl.innerHTML = '';
      testStartTime = Date.now();
    }

    // Monkey-patch SubtitleComponent.show to log duration
    var originalSubtitleShow = null;
    var originalSubtitleHide = null;

    function patchSubtitle() {
      if (typeof SubtitleComponent !== 'undefined' && !originalSubtitleShow) {
        originalSubtitleShow = SubtitleComponent.prototype.show || SubtitleComponent.show;
        originalSubtitleHide = SubtitleComponent.prototype.hide || SubtitleComponent.hide;

        // Try patching both static and prototype
        var target = SubtitleComponent;

        var origShow = target.show;
        if (typeof origShow === 'function') {
          target.show = function(opts) {
            log('SUBTITLE.show() called — duration: ' + (opts && opts.duration) + 'ms, text: "' + ((opts && (opts.text || opts.subtitle)) || '').substring(0, 60) + '..."', 'event');
            return origShow.apply(this, arguments);
          };
        }

        var origHide = target.hide;
        if (typeof origHide === 'function') {
          target.hide = function() {
            log('SUBTITLE.hide() called', 'event');
            return origHide.apply(this, arguments);
          };
        }

        log('SubtitleComponent patched for logging', 'warn');
      }
    }

    // Monkey-patch FeedbackManager internals
    function patchFeedbackManager() {
      if (typeof FeedbackManager === 'undefined') return;

      // Patch playDynamicFeedback
      var origPlayDynamic = FeedbackManager.playDynamicFeedback;
      if (origPlayDynamic) {
        FeedbackManager.playDynamicFeedback = async function(params) {
          log('playDynamicFeedback() CALLED — audio_content length: ' + (params.audio_content || '').length + ' chars', 'event');
          log('  subtitle: "' + ((params.subtitle || '').substring(0, 80)) + '..."', 'info');
          log('  sticker: ' + JSON.stringify(params.sticker || 'none'), 'info');

          var start = Date.now();
          try {
            var result = await origPlayDynamic.call(this, params);
            var elapsed = Date.now() - start;
            log('playDynamicFeedback() RESOLVED after ' + elapsed + 'ms — result: ' + JSON.stringify(result), 'event');
            return result;
          } catch (e) {
            var elapsed = Date.now() - start;
            log('playDynamicFeedback() THREW after ' + elapsed + 'ms — error: ' + e.message, 'error');
            throw e;
          }
        };
        log('FeedbackManager.playDynamicFeedback patched', 'warn');
      }

      // Patch sound.play
      if (FeedbackManager.sound && FeedbackManager.sound.play) {
        var origSoundPlay = FeedbackManager.sound.play.bind(FeedbackManager.sound);
        FeedbackManager.sound.play = async function(id, opts) {
          log('sound.play("' + id + '") CALLED — opts: ' + JSON.stringify(opts || {}), 'event');
          var start = Date.now();
          try {
            var result = await origSoundPlay(id, opts);
            log('sound.play("' + id + '") RESOLVED after ' + (Date.now() - start) + 'ms', 'event');
            return result;
          } catch (e) {
            log('sound.play("' + id + '") THREW after ' + (Date.now() - start) + 'ms — ' + e.message, 'error');
            throw e;
          }
        };
        log('FeedbackManager.sound.play patched', 'warn');
      }

      // Patch stream if accessible
      if (FeedbackManager._stream || FeedbackManager.stream) {
        var stream = FeedbackManager._stream || FeedbackManager.stream;
        if (stream.play) {
          var origStreamPlay = stream.play.bind(stream);
          stream.play = function(id, callbacks, opts) {
            log('stream.play("' + id + '") CALLED', 'event');
            log('  feedbackOptions: ' + JSON.stringify(opts || {}), 'info');

            // Wrap callbacks to log them
            var wrappedCallbacks = {};
            if (callbacks) {
              if (callbacks.onComplete) {
                var origOnComplete = callbacks.onComplete;
                wrappedCallbacks.onComplete = function() {
                  log('stream onComplete callback fired', 'event');
                  return origOnComplete.apply(this, arguments);
                };
              }
              if (callbacks.onPlay) {
                var origOnPlay = callbacks.onPlay;
                wrappedCallbacks.onPlay = function() {
                  log('stream onPlay callback fired (chunk finished)', 'info');
                  return origOnPlay.apply(this, arguments);
                };
              }
              if (callbacks.onError) {
                var origOnError = callbacks.onError;
                wrappedCallbacks.onError = function(err) {
                  log('stream onError callback fired: ' + (err && err.message), 'error');
                  return origOnError.apply(this, arguments);
                };
              }
              Object.keys(callbacks).forEach(function(k) {
                if (!wrappedCallbacks[k]) wrappedCallbacks[k] = callbacks[k];
              });
            }

            var result = origStreamPlay(id, wrappedCallbacks, opts);
            log('stream.play() returned: ' + result, 'info');
            return result;
          };
          log('stream.play patched', 'warn');
        }
      }
    }

    // Generate long text with Math.random() to bust cache
    function generateLongText() {
      var rand = Math.floor(Math.random() * 9999);
      return 'Great job number ' + rand + '! Your word problem perfectly captures the meaning of this math expression. ' +
        'You showed that five mangos combined with three apples gives a total of eight fruits, which is exactly what addition means. ' +
        'I really love how you used specific fruits to make the math come alive in a real world scenario. ' +
        'Keep up the amazing work! Remember, every math expression tells a story, and you are becoming an expert storyteller. ' +
        'The way you connected the numbers to everyday objects shows deep understanding of what addition truly represents. ' +
        'Next time, you could even try using different contexts like toys, books, or animals to make your stories even more creative and fun!';
    }

    function generateShortText() {
      var rand = Math.floor(Math.random() * 9999);
      return 'Nice work number ' + rand + '! That is correct.';
    }

    // === TEST FUNCTIONS ===

    async function testStreamingLong() {
      clearLog();
      log('=== TEST: Long streaming TTS (should be >10s audio) ===', 'warn');

      var text = generateLongText();
      log('Text length: ' + text.length + ' chars', 'info');
      log('Text: "' + text + '"', 'info');
      log('', 'info');

      // Observe subtitle visibility
      startSubtitleObserver();

      try {
        log('Calling playDynamicFeedback()...', 'info');
        var result = await FeedbackManager.playDynamicFeedback({
          audio_content: text,
          subtitle: text
        });
        log('playDynamicFeedback resolved. Checking if subtitle is still visible...', 'info');
      } catch (e) {
        log('ERROR: ' + e.message, 'error');
      }
    }

    async function testStreamingShort() {
      clearLog();
      log('=== TEST: Short streaming TTS (should be <5s audio) ===', 'warn');

      var text = generateShortText();
      log('Text length: ' + text.length + ' chars', 'info');
      log('Text: "' + text + '"', 'info');
      log('', 'info');

      startSubtitleObserver();

      try {
        log('Calling playDynamicFeedback()...', 'info');
        var result = await FeedbackManager.playDynamicFeedback({
          audio_content: text,
          subtitle: text
        });
        log('playDynamicFeedback resolved.', 'info');
      } catch (e) {
        log('ERROR: ' + e.message, 'error');
      }
    }

    async function testStaticSound() {
      clearLog();
      log('=== TEST: Static sound with subtitle ===', 'warn');

      startSubtitleObserver();

      try {
        log('Calling sound.play("correct_tap")...', 'info');
        await FeedbackManager.sound.play('correct_tap', {
          subtitle: { text: 'This is a static sound subtitle test' }
        });
        log('sound.play resolved.', 'info');
      } catch (e) {
        log('ERROR: ' + e.message, 'error');
      }
    }

    // === TEST: Sequential await — does await actually wait for stream to finish? ===
    async function testSequentialAwait() {
      clearLog();
      log('=== TEST: Sequential await — Long then Short ===', 'warn');
      log('This tests whether "await playDynamicFeedback()" actually waits for streaming audio to finish.', 'info');
      log('If await resolves early (stream fire-and-forget), the 2nd audio will START before the 1st FINISHES.', 'warn');
      log('If await waits properly, the 2nd audio will only start AFTER the 1st fully completes.', 'warn');
      log('', 'info');

      startSubtitleObserver();

      var longText = generateLongText();
      var shortText = generateShortText();

      // --- FIRST: Long audio ---
      log('▶▶▶ STEP 1: Calling await playDynamicFeedback(LONG)...', 'warn');
      log('  Text (' + longText.length + ' chars): "' + longText.substring(0, 80) + '..."', 'info');
      var step1Start = Date.now();

      try {
        var result1 = await FeedbackManager.playDynamicFeedback({
          audio_content: longText,
          subtitle: '🔵 FIRST (long): ' + longText.substring(0, 100) + '...'
        });
        var step1Elapsed = Date.now() - step1Start;
        log('✅ STEP 1 await RESOLVED after ' + step1Elapsed + 'ms (' + (step1Elapsed / 1000).toFixed(1) + 's)', 'event');
        log('  result: ' + JSON.stringify(result1), 'info');
      } catch (e) {
        var step1Elapsed = Date.now() - step1Start;
        log('❌ STEP 1 await THREW after ' + step1Elapsed + 'ms — ' + e.message, 'error');
      }

      log('', 'info');
      log('--- Gap between Step 1 resolve and Step 2 call ---', 'warn');
      log('If you still hear audio from Step 1, then await did NOT wait for the stream!', 'error');
      log('', 'info');

      // --- SECOND: Short audio ---
      log('▶▶▶ STEP 2: Calling await playDynamicFeedback(SHORT)...', 'warn');
      log('  Text (' + shortText.length + ' chars): "' + shortText + '"', 'info');
      var step2Start = Date.now();

      try {
        var result2 = await FeedbackManager.playDynamicFeedback({
          audio_content: "hello, hi there",
          subtitle: '🟢 SECOND (short): ' + shortText
        });
        var step2Elapsed = Date.now() - step2Start;
        log('✅ STEP 2 await RESOLVED after ' + step2Elapsed + 'ms (' + (step2Elapsed / 1000).toFixed(1) + 's)', 'event');
        log('  result: ' + JSON.stringify(result2), 'info');
      } catch (e) {
        var step2Elapsed = Date.now() - step2Start;
        log('❌ STEP 2 await THREW after ' + step2Elapsed + 'ms — ' + e.message, 'error');
      }

      log('', 'info');
      log('=== SUMMARY ===', 'warn');
      var totalElapsed = Date.now() - testStartTime;
      log('Total time: ' + (totalElapsed / 1000).toFixed(1) + 's', 'info');
      log('If Step 1 resolved in <3s and total is <8s, await did NOT wait for streaming audio.', 'error');
      log('If Step 1 resolved in >10s and total is >15s, await DID wait properly.', 'event');
    }

    // MutationObserver to track subtitle DOM visibility changes
    var subtitleObserver = null;
    function startSubtitleObserver() {
      if (subtitleObserver) subtitleObserver.disconnect();

      // Poll for subtitle element and observe it
      var checkCount = 0;
      var interval = setInterval(function() {
        checkCount++;
        // Look for common subtitle selectors
        var subtitleEl = document.querySelector('[class*="subtitle"]') ||
                         document.querySelector('[class*="Subtitle"]') ||
                         document.querySelector('#mathai-subtitle') ||
                         document.querySelector('[id*="subtitle"]');

        if (subtitleEl) {
          clearInterval(interval);
          log('OBSERVER: Found subtitle element: <' + subtitleEl.tagName + ' class="' + subtitleEl.className + '">', 'event');
          log('OBSERVER: Current visibility — display: ' + getComputedStyle(subtitleEl).display + ', opacity: ' + getComputedStyle(subtitleEl).opacity, 'info');

          subtitleObserver = new MutationObserver(function(mutations) {
            mutations.forEach(function(m) {
              if (m.type === 'attributes') {
                var el = m.target;
                var display = getComputedStyle(el).display;
                var opacity = getComputedStyle(el).opacity;
                var visibility = getComputedStyle(el).visibility;
                log('OBSERVER: Subtitle attr changed [' + m.attributeName + '] — display: ' + display + ', opacity: ' + opacity + ', visibility: ' + visibility, 'event');
              }
              if (m.type === 'childList') {
                log('OBSERVER: Subtitle childList changed — children: ' + m.target.children.length + ', text: "' + (m.target.textContent || '').substring(0, 60) + '"', 'event');
              }
            });
          });

          subtitleObserver.observe(subtitleEl, {
            attributes: true,
            childList: true,
            subtree: true,
            attributeFilter: ['style', 'class']
          });

          // Also observe parent for removal
          if (subtitleEl.parentElement) {
            subtitleObserver.observe(subtitleEl.parentElement, {
              childList: true
            });
          }
        }

        if (checkCount > 100) {
          clearInterval(interval);
          log('OBSERVER: Could not find subtitle element after 5s', 'warn');
        }
      }, 50);

      // Also poll subtitle visibility every second for 30s
      var pollCount = 0;
      var pollInterval = setInterval(function() {
        pollCount++;
        var el = document.querySelector('[class*="subtitle"]') ||
                 document.querySelector('[class*="Subtitle"]') ||
                 document.querySelector('#mathai-subtitle') ||
                 document.querySelector('[id*="subtitle"]');

        if (el) {
          var style = getComputedStyle(el);
          var visible = style.display !== 'none' && style.opacity !== '0' && style.visibility !== 'hidden';
          if (!visible) {
            log('POLL [' + pollCount + 's]: Subtitle NOT VISIBLE — display: ' + style.display + ', opacity: ' + style.opacity, 'warn');
          } else {
            log('POLL [' + pollCount + 's]: Subtitle visible ✓', 'info');
          }
        }

        if (pollCount >= 30) {
          clearInterval(pollInterval);
          log('POLL: Stopped polling after 30s', 'info');
        }
      }, 1000);
    }

    // === INIT ===
    window.addEventListener('DOMContentLoaded', async function() {
      log('Initializing...', 'info');

      try {
        // Wait for packages
        var timeout = 10000;
        var start = Date.now();
        while (typeof FeedbackManager === 'undefined') {
          if (Date.now() - start > timeout) throw new Error('Timeout waiting for FeedbackManager');
          await new Promise(function(r) { setTimeout(r, 50); });
        }
        log('FeedbackManager loaded', 'info');

        await FeedbackManager.init();
        log('FeedbackManager.init() done', 'info');

        // Register sounds
        await FeedbackManager.sound.register('correct_tap', 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757501597903.mp3');
        log('correct_tap registered', 'info');

        // Patch for logging
        patchSubtitle();
        patchFeedbackManager();

        log('', 'info');
        log('Ready! Click a test button above.', 'warn');
        log('Watch for subtitle disappearing while audio still plays.', 'warn');

      } catch (e) {
        log('INIT ERROR: ' + e.message, 'error');
        console.error(e);
      }
    });
  </script>
</body>
</html>
