name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: ci
    environment: production
    steps:
      - name: Deploy via SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          # ---------------------------------------------------------------
          # SSH Deploy Step
          #
          # Prerequisites — add these secrets in your GitHub repo settings
          # (Settings > Secrets and variables > Actions):
          #
          #   DEPLOY_HOST  — hostname or IP of the production server
          #   DEPLOY_USER  — SSH user on the production server
          #   DEPLOY_KEY   — private SSH key authorized on the server
          #
          # The environment "production" can be configured in
          # Settings > Environments to require manual approval.
          # ---------------------------------------------------------------

          # Write the SSH private key to a temporary file
          install -m 600 /dev/null ~/.ssh_deploy_key
          echo "$DEPLOY_KEY" > ~/.ssh_deploy_key

          # Run deployment commands on the remote server
          ssh -o StrictHostKeyChecking=no \
              -i ~/.ssh_deploy_key \
              "${DEPLOY_USER}@${DEPLOY_HOST}" << 'REMOTE'
            set -euo pipefail

            # Navigate to the application directory (update path as needed)
            cd /opt/ralph

            # Pull the latest code
            git pull origin main

            # Install production dependencies
            npm ci --production

            # Restart systemd services (update service names as needed)
            sudo systemctl restart ralph-server
            sudo systemctl restart ralph-worker
          REMOTE

          # Clean up the key
          rm -f ~/.ssh_deploy_key
