# ─────────────────────────────────────────────────────────────────────────────
# nginx.conf — Reverse proxy for Ralph pipeline
#
# Proxies HTTP traffic to the Ralph Express server (port 3000).
# Handles TLS termination, rate limiting, and security headers.
#
# Usage:
#   sudo cp nginx.conf /etc/nginx/sites-available/ralph
#   sudo ln -s /etc/nginx/sites-available/ralph /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=webhook:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

upstream ralph_backend {
    server 127.0.0.1:3000;
    keepalive 16;
}

server {
    listen 80;
    server_name ralph.example.com;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ralph.example.com;

    # ─── TLS (update paths for your certs) ────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/ralph.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ralph.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ─── Security headers ─────────────────────────────────────────────────
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── Logging ──────────────────────────────────────────────────────────
    access_log /var/log/nginx/ralph-access.log;
    error_log  /var/log/nginx/ralph-error.log;

    # ─── Request size limits ──────────────────────────────────────────────
    client_max_body_size 1m;

    # ─── Webhook endpoint (rate limited) ──────────────────────────────────
    location /webhook/ {
        limit_req zone=webhook burst=5 nodelay;

        proxy_pass http://ralph_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # GitHub webhooks can take a moment
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }

    # ─── API endpoints (rate limited) ─────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=10 nodelay;

        proxy_pass http://ralph_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_read_timeout 30s;
    }

    # ─── Health check (no rate limit) ─────────────────────────────────────
    location /health {
        proxy_pass http://ralph_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_read_timeout 5s;
    }

    # ─── Metrics (restrict to internal/monitoring) ────────────────────────
    location /metrics {
        # Restrict to localhost and monitoring IPs
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://ralph_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ─── Deny everything else ─────────────────────────────────────────────
    location / {
        return 404;
    }
}
