# /etc/logrotate.d/ralph
# Log rotation for Ralph pipeline logs
#
# Install: sudo cp systemd/ralph-logrotate.conf /etc/logrotate.d/ralph

/var/log/ralph/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0644 ralph ralph
    sharedscripts
    postrotate
        systemctl reload ralph-server 2>/dev/null || true
        systemctl reload ralph-worker 2>/dev/null || true
    endscript
}

# SQLite WAL files can grow large — rotate if needed
/opt/ralph/data/*.log {
    weekly
    rotate 4
    compress
    missingok
    notifempty
}
