<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Match Up!</title>
<style>
/* ===== PART-020: CSS Variables & Colors ===== */
:root {
  --color-primary: #6C63FF;
  --color-primary-dark: #5A52D5;
  --color-primary-light: #8B85FF;
  --color-secondary: #E5436A;
  --color-secondary-dark: #C4375A;
  --color-success: #4CAF50;
  --color-success-light: #81C784;
  --color-error: #F44336;
  --color-error-light: #EF9A9A;
  --color-warning: #FF9800;
  --color-warning-light: #FFB74D;
  --color-bg: #F0F0FF;
  --color-card: #FFFFFF;
  --color-card-alt: #F8F7FF;
  --color-text: #2D2D3F;
  --color-text-light: #6B6B80;
  --color-border: #E0E0F0;
  --color-shadow: rgba(108, 99, 255, 0.15);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.16);
  --font-main: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --transition-fast: 0.2s ease;
  --transition-normal: 0.3s ease;
  --transition-slow: 0.5s ease;
}

/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: var(--font-main);
  background: var(--color-bg);
  color: var(--color-text);
  -webkit-tap-highlight-color: transparent;
  -webkit-text-size-adjust: 100%;
  touch-action: manipulation;
}

/* ===== PART-021: Screen Layout CSS ===== */
#app {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
}

/* Progress Bar Area */
.progress-bar-container {
  padding: 8px 16px 4px;
  background: var(--color-card);
  border-bottom: 1px solid var(--color-border);
  flex-shrink: 0;
  z-index: 10;
}
.progress-row {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.progress-track {
  flex: 1; height: 10px;
  background: var(--color-border);
  border-radius: 5px; overflow: hidden;
}
.progress-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--color-primary), var(--color-primary-light));
  border-radius: 5px;
  transition: width var(--transition-normal);
}
.progress-text {
  font-size: 13px; font-weight: 600;
  color: var(--color-text-light);
  white-space: nowrap;
}
.lives-container {
  display: flex; gap: 2px;
}
.life-heart {
  font-size: 18px;
  transition: transform var(--transition-fast), opacity var(--transition-fast);
}
.life-heart.lost {
  opacity: 0.25;
  transform: scale(0.8);
}

/* Game Content Area */
#gameContent {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 12px 16px 20px;
  display: flex; flex-direction: column;
  -webkit-overflow-scrolling: touch;
}

/* ===== Game Screen ===== */
.game-block {
  display: flex; flex-direction: column;
  gap: 14px; width: 100%;
  animation: fadeSlideIn 0.35s ease;
}

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Stage Badge */
.stage-badge {
  align-self: center;
  padding: 5px 16px;
  border-radius: 20px;
  font-size: 13px; font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #fff;
}
.stage-badge.stage-1 { background: #2E7D32; }
.stage-badge.stage-2 { background: #E65100; }
.stage-badge.stage-3 { background: #C62828; }

/* Rule Card */
.rule-card {
  background: var(--color-card);
  border: 2px solid var(--color-primary);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  box-shadow: var(--shadow-sm);
  position: relative;
}
.rule-card::before {
  content: 'THE RULE';
  position: absolute; top: -10px; left: 16px;
  background: var(--color-primary);
  color: #fff; font-size: 11px; font-weight: 700;
  padding: 2px 10px; border-radius: 10px;
  letter-spacing: 0.8px;
}
.rule-text {
  font-size: 17px; line-height: 1.5;
  text-align: center; padding-top: 4px;
}
.rule-count, .comp-count {
  font-weight: 800; font-size: 22px;
  color: var(--color-primary);
  display: inline-block;
  min-width: 24px; text-align: center;
}

/* Comparison Card (Type A) */
.comparison-card {
  background: var(--color-card-alt);
  border: 2px dashed var(--color-secondary);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  box-shadow: var(--shadow-sm);
  position: relative;
  animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.comparison-card::before {
  content: 'COMPARE';
  position: absolute; top: -10px; left: 16px;
  background: var(--color-secondary);
  color: #fff; font-size: 11px; font-weight: 700;
  padding: 2px 10px; border-radius: 10px;
  letter-spacing: 0.8px;
}
.comparison-text {
  font-size: 17px; line-height: 1.5;
  text-align: center; padding-top: 4px;
}
.comp-count {
  color: var(--color-secondary);
}

@keyframes popIn {
  from { opacity: 0; transform: scale(0.85); }
  to { opacity: 1; transform: scale(1); }
}

/* Question Prompt */
.question-prompt {
  text-align: center;
  font-size: 16px; font-weight: 600;
  color: var(--color-text);
  margin: 2px 0;
}

/* Button Container */
.btn-container {
  display: flex; gap: 12px;
  justify-content: center;
  padding: 4px 0;
}

/* Game Buttons (PART-022) */
.game-btn {
  font-family: var(--font-main);
  font-size: 16px; font-weight: 700;
  border: none; border-radius: var(--radius-md);
  padding: 14px 24px;
  cursor: pointer;
  min-height: 48px; min-width: 48px;
  transition: transform var(--transition-fast), box-shadow var(--transition-fast), background var(--transition-fast);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  position: relative; overflow: hidden;
}
.game-btn:active:not(:disabled) {
  transform: scale(0.95);
}
.game-btn:disabled {
  opacity: 0.5; cursor: not-allowed;
}
.btn-primary {
  background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
  color: #fff;
  box-shadow: 0 4px 12px var(--color-shadow);
}
.btn-primary:active:not(:disabled) {
  box-shadow: 0 2px 6px var(--color-shadow);
}
.btn-secondary {
  background: linear-gradient(135deg, var(--color-secondary), var(--color-secondary-dark));
  color: #fff;
  box-shadow: 0 4px 12px rgba(255,101,132,0.25);
}
.btn-same { flex: 1; }
.btn-diff { flex: 1; }

/* Type B Area */
.multiplier-badge {
  align-self: center;
  background: linear-gradient(135deg, var(--color-warning), #FF6F00);
  color: #fff;
  font-size: 28px; font-weight: 900;
  width: 64px; height: 64px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(255,152,0,0.35);
  animation: pulseBadge 1.5s ease infinite;
}
@keyframes pulseBadge {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.06); }
}
.instruction-text {
  text-align: center;
  font-size: 18px; font-weight: 700;
  color: var(--color-text);
}

/* Input Row */
.input-row {
  display: flex; align-items: center;
  gap: 10px;
  background: var(--color-card);
  border: 2px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: 10px 14px;
  transition: border-color var(--transition-fast);
}
.input-row:focus-within {
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px rgba(108,99,255,0.1);
}
.ratio-input {
  width: 64px; height: 48px;
  border: 2px solid var(--color-border);
  border-radius: var(--radius-sm);
  font-size: 22px; font-weight: 700;
  text-align: center;
  color: var(--color-primary);
  background: var(--color-bg);
  outline: none;
  -moz-appearance: textfield;
  transition: border-color var(--transition-fast);
}
.ratio-input::-webkit-inner-spin-button,
.ratio-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
.ratio-input:focus {
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
}
.ratio-input.correct-field {
  border-color: var(--color-success);
  background: rgba(76,175,80,0.08);
}
.ratio-input.wrong-field {
  border-color: var(--color-error);
  background: rgba(244,67,54,0.08);
  animation: shake 0.4s ease;
}
.input-emoji {
  font-size: 24px;
}
.input-label {
  font-size: 15px; font-weight: 600;
  color: var(--color-text-light);
  flex: 1;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-6px); }
  40%, 80% { transform: translateX(6px); }
}

/* Type B container */
#type-b-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}
/* Type A container */
#type-a-area {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
/* Submit button for Type B */
#btn-submit {
  align-self: center;
  width: 80%;
  max-width: 280px;
}
/* Input rows full width in flex container */
#type-b-area .input-row {
  width: 100%;
}

/* Feedback Area */
.feedback-area {
  background: var(--color-card);
  border-radius: var(--radius-md);
  padding: 12px 16px;
  text-align: center;
  animation: fadeSlideIn 0.3s ease;
}
.feedback-text {
  font-size: 15px; font-weight: 600;
  color: var(--color-text);
  line-height: 1.4;
}
.feedback-text.partial {
  color: var(--color-warning);
}
.feedback-text.error {
  color: var(--color-error);
}

/* ===== Transition Screens (PART-024) ===== */
.transition-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, #6C63FF 0%, #8B85FF 50%, #FF6584 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 100;
  animation: fadeIn 0.3s ease;
  padding: 24px;
}
.transition-overlay.game-over-overlay {
  background: linear-gradient(135deg, #F44336 0%, #E91E63 50%, #FF5722 100%);
}
.transition-overlay.victory-overlay {
  background: linear-gradient(135deg, #4CAF50 0%, #66BB6A 50%, #81C784 100%);
}
.transition-overlay.stage-overlay {
  background: linear-gradient(135deg, #FF9800 0%, #FFB74D 50%, #FFC107 100%);
}
@keyframes fadeIn {
  from { opacity: 0; } to { opacity: 1; }
}
.transition-icon {
  font-size: 72px;
  margin-bottom: 16px;
  animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes bounceIn {
  from { transform: scale(0); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.transition-title {
  font-size: 32px; font-weight: 900;
  color: #fff; text-align: center;
  margin-bottom: 8px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.transition-subtitle {
  font-size: 18px; font-weight: 600;
  color: rgba(255,255,255,0.9);
  text-align: center;
  margin-bottom: 32px;
}
.transition-btn {
  font-family: var(--font-main);
  font-size: 18px; font-weight: 800;
  color: var(--color-primary);
  background: #fff;
  border: none;
  border-radius: var(--radius-xl);
  padding: 16px 48px;
  min-height: 56px;
  cursor: pointer;
  box-shadow: var(--shadow-md);
  transition: transform var(--transition-fast);
}
.transition-btn:active {
  transform: scale(0.95);
}

/* ===== Results Screen (PART-019) ===== */
.results-card {
  display: flex; flex-direction: column;
  align-items: center; gap: 20px;
  background: var(--color-card);
  border-radius: var(--radius-xl);
  padding: 28px 24px;
  box-shadow: var(--shadow-lg);
  animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  width: 100%;
}
.stars-display {
  display: flex; gap: 8px;
}
.star {
  font-size: 44px;
  transition: transform 0.3s ease;
}
.star.filled {
  color: #FFD700;
  text-shadow: 0 2px 8px rgba(255,215,0,0.4);
  animation: starPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
}
.star.filled:nth-child(1) { animation-delay: 0.1s; }
.star.filled:nth-child(2) { animation-delay: 0.25s; }
.star.filled:nth-child(3) { animation-delay: 0.4s; }
.star.empty {
  color: #D0D0D0;
}
@keyframes starPop {
  from { transform: scale(0) rotate(-30deg); opacity: 0; }
  to { transform: scale(1) rotate(0deg); opacity: 1; }
}
.results-title {
  font-size: 24px; font-weight: 800;
  color: var(--color-text);
}
.results-metrics {
  width: 100%;
  display: flex; flex-direction: column;
  gap: 10px;
}
.metric-row {
  display: flex; justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  background: var(--color-bg);
  border-radius: var(--radius-sm);
}
.metric-label {
  font-size: 15px; font-weight: 600;
  color: var(--color-text-light);
}
.metric-value {
  font-size: 18px; font-weight: 800;
  color: var(--color-primary);
}
#btn-restart {
  width: 100%;
  max-width: 280px;
  margin-top: 4px;
}
#results-screen {
  flex: 1;
  justify-content: center;
  align-items: center;
}

/* ===== Utility Animations ===== */
.hidden { display: none !important; }
.correct-flash {
  animation: correctFlash 0.5s ease;
}
@keyframes correctFlash {
  0% { background-color: rgba(76,175,80,0.2); }
  100% { background-color: transparent; }
}
.wrong-flash {
  animation: wrongFlash 0.5s ease;
}
@keyframes wrongFlash {
  0% { background-color: rgba(244,67,54,0.2); }
  100% { background-color: transparent; }
}

/* Confetti canvas */
#confetti-canvas {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 200;
}
</style>
</head>
<body>
<div id="app"></div>

<template id="game-template">
  <div id="game-screen" class="game-block">
    <!-- Stage Badge -->
    <div class="stage-badge stage-1" id="stage-badge">Stage 1: Easy</div>

    <!-- Rule Card -->
    <div class="rule-card" id="rule-card">
      <p class="rule-text">For every <span class="rule-count" id="rule-a"></span> <span id="rule-emoji-1"></span> <span id="rule-item1"></span>, there are <span class="rule-count" id="rule-b"></span> <span id="rule-emoji-2"></span> <span id="rule-item2"></span></p>
    </div>

    <!-- Type A: Comparison Card + Buttons -->
    <div id="type-a-area" style="display:none;">
      <div class="comparison-card" id="comparison-card">
        <p class="comparison-text">For every <span class="comp-count" id="comp-a"></span> <span id="comp-emoji-1"></span> <span id="comp-item1"></span>, there are <span class="comp-count" id="comp-b"></span> <span id="comp-emoji-2"></span> <span id="comp-item2"></span></p>
      </div>
      <p class="question-prompt">Are these the same ratio?</p>
      <div class="btn-container">
        <button class="game-btn btn-primary btn-same" id="btn-same-ratio" data-signal-id="btn-same">Same ratio!</button>
        <button class="game-btn btn-secondary btn-diff" id="btn-diff-ratio" data-signal-id="btn-different">Different ratio!</button>
      </div>
    </div>

    <!-- Type B: Multiplier Badge + Two Inputs -->
    <div id="type-b-area" style="display:none;">
      <div class="multiplier-badge" id="multiplier-badge">x<span id="multiplier-value"></span></div>
      <p class="instruction-text">Make it match!</p>
      <div class="input-row" id="input-row-a">
        <input type="number" id="input-a" class="ratio-input" inputmode="numeric" pattern="[0-9]*" min="1" max="45" data-signal-id="input-a" placeholder="?">
        <span id="input-emoji-1" class="input-emoji"></span>
        <span id="input-item1" class="input-label"></span>
      </div>
      <div class="input-row" id="input-row-b">
        <input type="number" id="input-b" class="ratio-input" inputmode="numeric" pattern="[0-9]*" min="1" max="45" data-signal-id="input-b" placeholder="?">
        <span id="input-emoji-2" class="input-emoji"></span>
        <span id="input-item2" class="input-label"></span>
      </div>
      <button class="game-btn btn-primary" id="btn-submit" data-signal-id="btn-submit">Submit</button>
    </div>

    <!-- Feedback -->
    <div class="feedback-area" id="feedback-area" style="display:none;">
      <p class="feedback-text" id="feedback-text"></p>
    </div>
  </div>

  <div id="results-screen" class="game-block" style="display:none;">
    <div class="results-card">
      <div id="stars-display" class="stars-display"></div>
      <h2 class="results-title">Game Complete!</h2>
      <div class="results-metrics">
        <div class="metric-row"><span class="metric-label">Score</span><span class="metric-value" id="result-score">0/10</span></div>
        <div class="metric-row"><span class="metric-label">Lives</span><span class="metric-value" id="result-lives">0</span></div>
        <div class="metric-row"><span class="metric-label">Accuracy</span><span class="metric-value" id="result-accuracy">0%</span></div>
      </div>
      <button class="game-btn btn-primary" id="btn-restart" data-signal-id="restart-button">Play Again</button>
    </div>
  </div>
</template>

<script>
/* ===== PART-003: waitForPackages ===== */
function waitForPackages(requiredPkgs, timeout) {
  timeout = timeout || 10000;
  return new Promise(function(resolve) {
    var start = Date.now();
    function check() {
      var allReady = requiredPkgs.every(function(pkg) {
        return typeof window[pkg] !== 'undefined';
      });
      if (allReady || (Date.now() - start > timeout)) {
        resolve();
      } else {
        setTimeout(check, 100);
      }
    }
    check();
  });
}

/* ===== PART-030: Sentry stub ===== */
window.Sentry = window.Sentry || {
  captureException: function(e) { console.error('[Sentry stub]', e); },
  captureMessage: function(m) { console.warn('[Sentry stub]', m); }
};

/* ===== PART-017: FeedbackManager stub ===== */
if (!window.FeedbackManager) {
  window.FeedbackManager = {
    init: function() { return Promise.resolve(); },
    sound: {
      _audioCache: {},
      _audioElements: [],
      preload: function(sounds) {
        var self = this;
        if (Array.isArray(sounds)) {
          sounds.forEach(function(s) {
            if (s.id && s.url) {
              self._audioCache[s.id] = s.url;
            }
          });
        }
        return Promise.resolve();
      },
      register: function(id, url) {
        this._audioCache[id] = url;
      },
      play: function(id, opts) {
        opts = opts || {};
        var self = this;
        var url = self._audioCache[id];
        if (url && typeof Audio !== 'undefined') {
          try {
            var audio = new Audio(url);
            self._audioElements.push(audio);
            audio.play().catch(function() {});
          } catch(e) {}
        }
        // Always resolve after a short delay for visual feedback timing
        return new Promise(function(resolve) { setTimeout(resolve, 150); });
      }
    },
    playDynamicFeedback: function(opts) {
      return new Promise(function(resolve) { setTimeout(resolve, 150); });
    }
  };
}

/* ===== PART-010: SignalCollector stub ===== */
if (!window.SignalCollector) {
  window.SignalCollector = function(cfg) {
    this.cfg = cfg; this.signals = []; this.sealed = false;
  };
  SignalCollector.prototype.track = function(evt) { if (!this.sealed) this.signals.push(evt); };
  SignalCollector.prototype.seal = function() { this.sealed = true; };
}

/* ===== PART-005: VisibilityTracker stub ===== */
if (!window.VisibilityTracker) {
  window.VisibilityTracker = function() {};
  VisibilityTracker.prototype.start = function() {};
}

/* ===== Fallback Content (PART-014) ===== */
var FALLBACK_CONTENT = {
  "rounds": [

    },

      "ruleRatio": { "a": 1, "b": 3 }, "multiplier": 2,

      "feedbackCorrect": "Right! The dogs doubled but the cats didn\u2019t triple correctly \u2014 2 to 5 is not the same as 1 to 3.",
      "feedbackWrong": "Check carefully \u2014 1 times 2 is 2, but 3 times 2 is 6, not 5. Only one side was scaled correctly."
    },
    {

      "ruleRatio": { "a": 2, "b": 1 }, "multiplier": 2,

/* ===== PART-023: ProgressBar Component ===== */
function ProgressBar(cfg) {
  this.totalRounds = cfg.totalRounds || 10;
  this.totalLives = cfg.totalLives || 3;
  this.el = null;
}
ProgressBar.prototype.render = function(container) {
  var html = '<div class="progress-bar-container" id="progress-bar">';
  html += '<div class="progress-row">';
  html += '<div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>';
  html += '<div class="progress-text" id="progress-text">0/' + this.totalRounds + '</div>';
  html += '<div class="lives-container" id="lives-container">';
  for (var i = 0; i < this.totalLives; i++) {
    html += '<span class="life-heart" id="heart-' + i + '">\u2764\ufe0f</span>';
  }
  html += '</div></div></div>';
  container.insertAdjacentHTML('afterbegin', html);
  this.el = document.getElementById('progress-bar');
};
ProgressBar.prototype.update = function(completedRounds, livesLeft) {
  var pct = Math.round((completedRounds / this.totalRounds) * 100);
  var fill = document.getElementById('progress-fill');
  var text = document.getElementById('progress-text');
  if (fill) fill.style.width = pct + '%';
  if (text) text.textContent = completedRounds + '/' + this.totalRounds;
  for (var i = 0; i < this.totalLives; i++) {
    var h = document.getElementById('heart-' + i);
    if (h) {
      if (i < livesLeft) {
        h.classList.remove('lost');
      } else {
        h.classList.add('lost');
      }
    }
  }
};

/* ===== PART-024: TransitionScreen Component ===== */
function TransitionScreen() {
  this.overlay = null;
}
TransitionScreen.prototype.show = function(type, opts) {
  var self = this;
  this.hide();
  var icons = { 'start': '\ud83c\udfaf', 'stage-transition': '\ud83d\ude80', 'victory': '\ud83c\udfc6', 'game-over': '\ud83d\udca5' };
  var btnText = { 'start': "Let's Go!", 'stage-transition': 'Continue', 'victory': 'See Results', 'game-over': 'See Results' };
  var overlayClass = 'transition-overlay';
  if (type === 'game-over') overlayClass += ' game-over-overlay';
  else if (type === 'victory') overlayClass += ' victory-overlay';
  else if (type === 'stage-transition') overlayClass += ' stage-overlay';

  var div = document.createElement('div');
  div.className = overlayClass;
  div.innerHTML = '<div class="transition-icon">' + (icons[type] || '\ud83c\udfae') + '</div>'
    + '<h1 class="transition-title">' + (opts.title || '') + '</h1>'
    + '<p class="transition-subtitle">' + (opts.subtitle || '') + '</p>'
    + '<button class="transition-btn" id="transition-btn">' + (btnText[type] || 'Continue') + '</button>';
  document.body.appendChild(div);
  this.overlay = div;

  div.querySelector('#transition-btn').addEventListener('click', function() {
    self.hide();
    if (opts.callback) opts.callback();
  });
};
TransitionScreen.prototype.hide = function() {
  if (this.overlay && this.overlay.parentNode) {
    this.overlay.parentNode.removeChild(this.overlay);
    this.overlay = null;
  }
};

function setupRound() {
  var rd = gameState.content.rounds[gameState.currentRound];
  gameState.roundData = rd;
  gameState.currentStage = rd.stage;
  gameState.typeBRetry = false;

  // Stage badge
  var badge = document.getElementById('stage-badge');
  if (badge) {
    var stageNames = { 1: 'Easy', 2: 'Mixed', 3: 'Hard' };
    badge.textContent = 'Stage ' + rd.stage + ': ' + stageNames[rd.stage];
    badge.className = 'stage-badge stage-' + rd.stage;
  }

  // Rule card
  document.getElementById('rule-a').textContent = rd.ruleRatio.a;
  document.getElementById('rule-b').textContent = rd.ruleRatio.b;
  document.getElementById('rule-emoji-1').textContent = rd.context.item1Emoji;
  document.getElementById('rule-emoji-2').textContent = rd.context.item2Emoji;
  document.getElementById('rule-item1').textContent = rd.context.item1Name;
  document.getElementById('rule-item2').textContent = rd.context.item2Name;

  // Hide feedback
  document.getElementById('feedback-area').style.display = 'none';

  if (rd.roundType === 'typeA') {
    gameState.phase = 'playing-typeA';
    document.getElementById('type-a-area').style.display = '';
    document.getElementById('type-b-area').style.display = 'none';

    document.getElementById('comp-a').textContent = rd.comparisonRatio.a;
    document.getElementById('comp-b').textContent = rd.comparisonRatio.b;
    document.getElementById('comp-emoji-1').textContent = rd.context.item1Emoji;
    document.getElementById('comp-emoji-2').textContent = rd.context.item2Emoji;
    document.getElementById('comp-item1').textContent = rd.context.item1Name;
    document.getElementById('comp-item2').textContent = rd.context.item2Name;

    document.getElementById('btn-same-ratio').disabled = false;
    document.getElementById('btn-diff-ratio').disabled = false;

    // Re-animate comparison card
    var cc = document.getElementById('comparison-card');
    cc.style.animation = 'none';
    cc.offsetHeight; // reflow
    cc.style.animation = '';
  } else {
    gameState.phase = 'playing-typeB';
    document.getElementById('type-a-area').style.display = 'none';
    document.getElementById('type-b-area').style.display = '';

    document.getElementById('multiplier-value').textContent = rd.multiplier;
    document.getElementById('input-emoji-1').textContent = rd.context.item1Emoji;
    document.getElementById('input-emoji-2').textContent = rd.context.item2Emoji;
    document.getElementById('input-item1').textContent = rd.context.item1Name;
    document.getElementById('input-item2').textContent = rd.context.item2Name;

    var inpA = document.getElementById('input-a');
    var inpB = document.getElementById('input-b');
    inpA.value = '';
    inpB.value = '';
    inpA.className = 'ratio-input';
    inpB.className = 'ratio-input';
    document.getElementById('btn-submit').disabled = false;
  }

  progressBar.update(gameState.currentRound, gameState.lives);
}

async function handleTypeAAnswer(sameChosen) {
  if (gameState.isProcessing || gameState.gameEnded) return;
  gameState.isProcessing = true;

  var rd = gameState.roundData;
  var correct = (sameChosen === rd.isEquivalent);

  document.getElementById('btn-same-ratio').disabled = true;
  document.getElementById('btn-diff-ratio').disabled = true;

  // Highlight chosen button
  var chosenBtn = sameChosen ? document.getElementById('btn-same-ratio') : document.getElementById('btn-diff-ratio');
  chosenBtn.style.outline = correct ? '3px solid ' + getComputedStyle(document.documentElement).getPropertyValue('--color-success') : '3px solid ' + getComputedStyle(document.documentElement).getPropertyValue('--color-error');

  // Record attempt
  gameState.attempts.push({
    round: gameState.currentRound,
    roundType: 'typeA',
    userAnswer: sameChosen ? 'same' : 'different',
    correctAnswer: rd.isEquivalent ? 'same' : 'different',
    isCorrect: correct,
    timestamp: Date.now()
  });

  try {
    if (correct) {
      await FeedbackManager.sound.play('correct_tap', {
        subtitle: 'Correct!',
        sticker: CORRECT_STICKER_URL
      });
      await FeedbackManager.playDynamicFeedback({
        audio_content: rd.feedbackCorrect,
        subtitle: rd.feedbackCorrect
      });
      gameState.score++;
    } else {
      await FeedbackManager.sound.play('wrong_tap', {
        subtitle: 'Not quite!',
        sticker: INCORRECT_STICKER_URL
      });
      await FeedbackManager.playDynamicFeedback({
        audio_content: rd.feedbackWrong,
        subtitle: rd.feedbackWrong
      });
      gameState.lives--;
    }
  } catch(e) {
    console.error('Feedback error:', e);
  }

  // Track event
  gameState.events.push({ type: 'type_a_answer', round: gameState.currentRound, correct: correct, timestamp: Date.now() });
  if (signalCollector) signalCollector.track({ type: 'type_a_answer', round: gameState.currentRound, correct: correct });

  // Reset button outline
  chosenBtn.style.outline = '';

  if (gameState.lives <= 0) {
    gameState.isProcessing = false;
    await handleGameOver();
  } else {
    gameState.isProcessing = false;
    nextRound();
  }
}

async function handleTypeBSubmit() {
  if (gameState.isProcessing || gameState.gameEnded) return;
  gameState.isProcessing = true;

  var rd = gameState.roundData;
  var inpAEl = document.getElementById('input-a');
  var inpBEl = document.getElementById('input-b');
  var inputA = parseInt(inpAEl.value);
  var inputB = parseInt(inpBEl.value);

  // Reset field styles
  inpAEl.className = 'ratio-input';
  inpBEl.className = 'ratio-input';

  if (isNaN(inputA) || isNaN(inputB)) {
    document.getElementById('feedback-area').style.display = '';
    document.getElementById('feedback-text').textContent = 'Please fill in both fields.';
    document.getElementById('feedback-text').className = 'feedback-text error';
    gameState.isProcessing = false;
    return;
  }

  var aCorrect = (inputA === rd.correctAnswer.a);
  var bCorrect = (inputB === rd.correctAnswer.b);

  // Record attempt
  gameState.attempts.push({
    round: gameState.currentRound,
    roundType: 'typeB',
    userAnswer: { a: inputA, b: inputB },
    correctAnswer: rd.correctAnswer,
    aCorrect: aCorrect,
    bCorrect: bCorrect,
    isCorrect: aCorrect && bCorrect,
    timestamp: Date.now()
  });

  try {
    if (aCorrect && bCorrect) {
      // Both correct
      document.getElementById('btn-submit').disabled = true;
      inpAEl.className = 'ratio-input correct-field';
      inpBEl.className = 'ratio-input correct-field';

      await FeedbackManager.sound.play('correct_tap', {
        subtitle: 'Perfect!',
        sticker: CORRECT_STICKER_URL
      });
      await FeedbackManager.playDynamicFeedback({
        audio_content: rd.feedbackCorrect,
        subtitle: rd.feedbackCorrect
      });
      gameState.score++;
      gameState.events.push({ type: 'type_b_submit', round: gameState.currentRound, result: 'correct', timestamp: Date.now() });
      if (signalCollector) signalCollector.track({ type: 'type_b_submit', round: gameState.currentRound, result: 'correct' });
      gameState.isProcessing = false;
      nextRound();
    } else if (aCorrect || bCorrect) {
      // Partial
      inpAEl.className = aCorrect ? 'ratio-input correct-field' : 'ratio-input wrong-field';
      inpBEl.className = bCorrect ? 'ratio-input correct-field' : 'ratio-input wrong-field';

      var partialMsg = aCorrect
        ? 'First number correct! Check the second.'
        : 'Second number correct! Check the first.';

      await FeedbackManager.sound.play('partial_correct_attempt1', {
        subtitle: partialMsg,
        sticker: PARTIAL_CORRECT_STICKER_URL
      });

      gameState.events.push({ type: 'type_b_submit', round: gameState.currentRound, result: 'partial', timestamp: Date.now() });
      if (signalCollector) signalCollector.track({ type: 'type_b_submit', round: gameState.currentRound, result: 'partial' });

      // Clear the wrong field
      if (!aCorrect) { inpAEl.value = ''; inpAEl.focus(); }
      if (!bCorrect) { inpBEl.value = ''; inpBEl.focus(); }

      document.getElementById('feedback-area').style.display = '';
      document.getElementById('feedback-text').textContent = partialMsg;
      document.getElementById('feedback-text').className = 'feedback-text partial';

      // If this is a retry, it costs a life
      if (gameState.typeBRetry) {
        gameState.lives--;
        gameState.events.push({ type: 'type_b_retry_fail', round: gameState.currentRound, timestamp: Date.now() });
        if (gameState.lives <= 0) {
          gameState.isProcessing = false;
          await handleGameOver();
          return;
        }
        gameState.isProcessing = false;
        nextRound();
        return;
      }

      gameState.typeBRetry = true;
      gameState.isProcessing = false;
      return;
    } else {
      // Both wrong
      inpAEl.className = 'ratio-input wrong-field';
      inpBEl.className = 'ratio-input wrong-field';
      document.getElementById('btn-submit').disabled = true;

      await FeedbackManager.sound.play('wrong_tap', {
        subtitle: 'Not quite!',
        sticker: INCORRECT_STICKER_URL
      });
      await FeedbackManager.playDynamicFeedback({
        audio_content: rd.feedbackWrong,
        subtitle: rd.feedbackWrong
      });
      gameState.lives--;
      gameState.events.push({ type: 'type_b_submit', round: gameState.currentRound, result: 'incorrect', timestamp: Date.now() });
      if (signalCollector) signalCollector.track({ type: 'type_b_submit', round: gameState.currentRound, result: 'incorrect' });

      if (gameState.lives <= 0) {
        gameState.isProcessing = false;
        await handleGameOver();
      } else {
        gameState.isProcessing = false;
        nextRound();
      }
    }
  } catch(e) {
    console.error('Feedback error:', e);
    gameState.isProcessing = false;
  }
}

function nextRound() {
  gameState.currentRound++;
  progressBar.update(gameState.currentRound, gameState.lives);
  gameState.events.push({ type: 'round_complete', round: gameState.currentRound - 1, timestamp: Date.now() });

  if (gameState.currentRound >= gameState.totalRounds) {
    endGame();
    return;
  }

  var prevStage = gameState.content.rounds[gameState.currentRound - 1] ? gameState.content.rounds[gameState.currentRound - 1].stage : null;
  var nextStage = gameState.content.rounds[gameState.currentRound] ? gameState.content.rounds[gameState.currentRound].stage : null;

  if (prevStage && nextStage && prevStage !== nextStage) {
    var stageNames = { 1: 'Easy', 2: 'Mixed', 3: 'Hard' };
    transitionScreen.show('stage-transition', {
      title: 'Stage ' + nextStage + ': ' + stageNames[nextStage],
      subtitle: 'Get ready!',
      callback: function() { setupRound(); }
    });
  } else {
    setupRound();
  }
}

async function handleGameOver() {
  gameState.gameEnded = true;
  gameState.phase = 'gameover';

  try {
    await FeedbackManager.playDynamicFeedback({
      audio_content: 'Oh no! All lives lost!',
      subtitle: 'Game Over'
    });
  } catch(e) {}

  transitionScreen.show('game-over', {
    title: 'Game Over',
    subtitle: 'You scored ' + gameState.score + ' out of ' + gameState.totalRounds,
    callback: function() { showResults(); }
  });
}

async function endGame() {
  gameState.gameEnded = true;
  gameState.phase = 'results';

  var accuracy = gameState.score / gameState.totalRounds;
  var stars = 0;
  if (accuracy >= 0.8) stars = 3;
  else if (accuracy >= 0.5) stars = 2;
  else if (accuracy > 0) stars = 1;
  gameState.stars = stars;

  try {
    await FeedbackManager.playDynamicFeedback({
      audio_content: 'Great job! You scored ' + gameState.score + ' out of ' + gameState.totalRounds + '!',
      subtitle: 'Well done!',
      sticker: TROPHY_LOTTIE_URL
    });
  } catch(e) {}

  if (signalCollector) signalCollector.seal();

  transitionScreen.show('victory', {
    title: 'Victory!',
    subtitle: stars + ' Stars!',
    callback: function() { showResults(); }
  });

  // PART-008: postMessage
  try {
    window.parent.postMessage({
      type: 'GAME_COMPLETE',
      payload: {
        gameId: gameState.gameId,
        score: gameState.score,
        totalRounds: gameState.totalRounds,
        stars: stars,
        accuracy: Math.round(accuracy * 100),
        lives: gameState.lives,
        attempts: gameState.attempts,
        events: gameState.events,
        duration: Date.now() - gameState.startTime
      }
    }, '*');
  } catch(e) {}
}

function showResults() {
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('results-screen').style.display = '';

  var accuracy = Math.round((gameState.score / gameState.totalRounds) * 100);
  document.getElementById('result-score').textContent = gameState.score + '/' + gameState.totalRounds;
  document.getElementById('result-lives').textContent = gameState.lives + '/' + gameState.totalLives;
  document.getElementById('result-accuracy').textContent = accuracy + '%';

  var starsDisplay = document.getElementById('stars-display');
  starsDisplay.innerHTML = '';
  for (var i = 0; i < 3; i++) {
    var star = document.createElement('span');
    star.className = i < gameState.stars ? 'star filled' : 'star empty';
    star.textContent = i < gameState.stars ? '\u2605' : '\u2606';
    starsDisplay.appendChild(star);
  }
}

function startGame() {
  gameState.isActive = true;
  gameState.startTime = Date.now();
  gameState.duration_data.startTime = Date.now();
  document.getElementById('game-screen').style.display = '';
  document.getElementById('results-screen').style.display = 'none';
  setupRound();
}

function restartGame() {
  gameState.currentRound = 0;
  gameState.score = 0;
  gameState.lives = 3;
  gameState.attempts = [];
  gameState.events = [];
  gameState.gameEnded = false;
  gameState.isActive = false;
  gameState.isProcessing = false;
  gameState.phase = 'start';
  gameState.roundData = null;
  gameState.currentStage = 1;
  gameState.startTime = null;
  gameState.stars = 0;
  gameState.typeBRetry = false;

  // Recreate SignalCollector
  signalCollector = new SignalCollector({
    sessionId: (window.gameVariableState && window.gameVariableState.sessionId) || 'session_' + Date.now(),
    studentId: (window.gameVariableState && window.gameVariableState.studentId) || null,
    gameId: gameState.gameId || null,
    contentSetId: gameState.contentSetId || null
  });
  window.signalCollector = signalCollector;

  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = '';

  transitionScreen.show('start', {
    title: 'Match Up!',
    subtitle: 'Compare ratios and make them match!',
    callback: function() { startGame(); }
  });
}

  }
};
window.debugSetLives = function(n) {
  gameState.lives = n;
  progressBar.update(gameState.currentRound, gameState.lives);
};
window.debugEndGame = function() { endGame(); };
window.debugGetState = function() { return JSON.parse(JSON.stringify(gameState)); };

/* ===== PART-004: Initialization Block ===== */
document.addEventListener('DOMContentLoaded', async function() {
  try {
    // Wait for external packages (with timeout)
    await waitForPackages(['FeedbackManager', 'SignalCollector', 'VisibilityTracker'], 3000);

    // Init FeedbackManager
    try {
      await FeedbackManager.init();
    } catch(e) { console.warn('FeedbackManager init failed:', e); }

    // Preload audio
    try {
      FeedbackManager.sound.preload([
        { id: 'correct_tap', url: AUDIO_URLS.correct_tap },
        { id: 'wrong_tap', url: AUDIO_URLS.wrong_tap },
        { id: 'partial_correct_attempt1', url: AUDIO_URLS.partial_correct_attempt1 }
      ]);
    } catch(e) { console.warn('Audio preload failed:', e); }

    // SignalCollector
    signalCollector = new SignalCollector({
      sessionId: (window.gameVariableState && window.gameVariableState.sessionId) || 'session_' + Date.now(),
      studentId: (window.gameVariableState && window.gameVariableState.studentId) || null,
      gameId: gameState.gameId || null,
      contentSetId: gameState.contentSetId || null
    });
    window.signalCollector = signalCollector;

    // Inject layout
    ScreenLayout.inject('app');

    // Clone template into gameContent
    var template = document.getElementById('game-template');
    var clone = template.content.cloneNode(true);
    document.getElementById('gameContent').appendChild(clone);

    // Create ProgressBar
    progressBar = new ProgressBar({ totalRounds: 10, totalLives: 3 });
    progressBar.render(document.getElementById('app'));

    // Create TransitionScreen
    transitionScreen = new TransitionScreen();

    // VisibilityTracker
    visibilityTracker = new VisibilityTracker();
    visibilityTracker.start();

    // Wire up button event listeners
    document.getElementById('btn-same-ratio').addEventListener('click', function() { handleTypeAAnswer(true); });
    document.getElementById('btn-diff-ratio').addEventListener('click', function() { handleTypeAAnswer(false); });
    document.getElementById('btn-submit').addEventListener('click', function() { handleTypeBSubmit(); });
    document.getElementById('btn-restart').addEventListener('click', function() { restartGame(); });

    // Load content: use provided content or fallback
    gameState.content = (window.gameVariableState && window.gameVariableState.content) || FALLBACK_CONTENT;

    // Hide game screen initially
    var gs = document.getElementById('game-screen');
    if (gs) gs.style.display = 'none';

    // Show start screen
    transitionScreen.show('start', {
      title: 'Match Up!',
      subtitle: 'Compare ratios and make them match!',
      callback: function() { startGame(); }
    });

  } catch(e) {
    console.error('Initialization error:', e);
    if (window.Sentry) Sentry.captureException(e);
  }
});
</script>
</body>
