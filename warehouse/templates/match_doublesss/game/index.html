<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Matching Doubles</title>
<style>
/* === CSS Variables (PART-020) === */
:root {
  --mathai-green: #219653;
  --mathai-light-green: #eafbf1;
  --mathai-red: #e35757;
  --mathai-light-red: #fdecec;
  --mathai-blue: #2563eb;
  --mathai-light-blue: #ebf0ff;
  --mathai-gray: #828282;
  --mathai-light-gray: #f2f2f2;
  --mathai-white: #ffffff;
  --mathai-black: #1a1a2e;
  --mathai-text-primary: #000000;
  --mathai-font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --mathai-font-size-title: 24px;
  --mathai-font-size-body: 16px;
  --mathai-font-size-label: 14px;
  --mathai-font-size-small: 12px;
  --mathai-border-radius-card: 12px;
  --mathai-border-gray: #e0e0e0;
  --selected-bg: #fff9e0;
  --selected-border: #e8d98a;
}

/* === Reset === */
*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
html, body {
  width: 100%;
  height: 100dvh;
  overflow: hidden;
}
body {
  font-family: var(--mathai-font-family);
  background: var(--mathai-white);
  color: var(--mathai-text-primary, #000000);
  -webkit-font-smoothing: antialiased;
}

/* === ScreenLayout Overrides === */
.mathai-layout-root {
  max-width: 480px;
  margin: 0 auto;
}
.mathai-layout-playarea {
  flex-direction: column !important;
  align-items: center !important;
  padding: 8px 16px !important;
}
.mathai-ts-screen.active {
  flex: 1;
  align-items: center;
  justify-content: flex-start;
  padding-top: 16px;
}
.mathai-ts-card {
  min-height: 50dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* === Game Block === */
.game-block {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px;
  gap: 12px;
}

/* === Question Text Container === */
.question-text-container {
  width: 100%;
  max-width: 340px;
  margin: 0 auto;
  padding: 8px 16px;
  text-align: center;
}

.instruction-text {
  font-size: var(--mathai-font-size-body);
  color: var(--mathai-text-primary, #000000);
  line-height: 1.5;
  margin-bottom: 4px;
}

.instruction-text strong { font-weight: 700; }

.instruction-text-sub {
  font-size: var(--mathai-font-size-label);
  color: var(--mathai-gray);
  line-height: 1.4;
  margin-bottom: 4px;
}

/* === Matching Area === */
.matching-area {
  width: 100%;
  max-width: 320px;
  margin: 8px auto;
}

.column-headers {
  display: flex;
  justify-content: space-around;
  margin-bottom: 12px;
}

.column-header {
  font-size: var(--mathai-font-size-label);
  font-weight: 600;
  color: var(--mathai-gray);
  width: 45%;
  text-align: center;
}

/* === Matching Grid (rows of left-right pairs) === */
.matching-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.matching-row {
  display: flex;
  justify-content: space-around;
  align-items: center;
  gap: 16px;
}

/* === Number Cell (shared for left and right) === */
.number-cell {
  width: 70px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid var(--mathai-border-gray, #e0e0e0);
  border-radius: 10px;
  font-size: 20px;
  font-weight: 600;
  color: var(--mathai-text-primary, #000000);
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.15s ease;
  background: var(--mathai-white);
}

.number-cell:active:not(.matched):not(.disabled) {
  transform: scale(0.95);
}

/* Left column */
.number-cell.left-cell:hover:not(.matched):not(.disabled) {
  border-color: var(--selected-border);
  background: rgba(255, 249, 224, 0.5);
}

/* Right column — disabled until a left cell is selected */
.number-cell.right-cell.disabled {
  color: var(--mathai-gray);
  cursor: default;
  pointer-events: none;
  opacity: 0.6;
}

.number-cell.right-cell:not(.disabled):not(.matched):hover {
  border-color: var(--mathai-blue);
  background: var(--mathai-light-blue);
}

/* Selected state (left cell tapped — yellow/cream highlight) */
.number-cell.selected {
  border-color: var(--selected-border);
  background: var(--selected-bg);
}

/* Correct match — green */
.number-cell.matched {
  border-color: var(--mathai-green);
  background: var(--mathai-light-green);
  color: var(--mathai-green);
  cursor: default;
  pointer-events: none;
}

/* Wrong match — red flash */
.number-cell.wrong {
  border-color: var(--mathai-red);
  background: var(--mathai-light-red);
  color: var(--mathai-red);
}

/* === Buttons (PART-022) === */
.game-btn {
  padding: 12px 32px;
  border: none;
  border-radius: 12px;
  font-size: var(--mathai-font-size-body);
  font-weight: 600;
  font-family: var(--mathai-font-family);
  cursor: pointer;
  transition: all 0.2s ease;
  min-height: 44px;
  width: 100%;
  max-width: 340px;
}

.btn-primary {
  background: var(--mathai-green);
  color: var(--mathai-white);
}
.btn-primary:hover {
  filter: brightness(0.9);
}

/* === Results Metrics (shown via TransitionScreen content slot — PART-019) === */
.results-metrics {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin: 16px 0;
  width: 100%;
}

.metric-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--mathai-light-gray);
}

.metric-label {
  color: var(--mathai-gray);
  font-size: var(--mathai-font-size-label);
}

.metric-value {
  font-weight: 700;
  font-size: var(--mathai-font-size-body);
  color: var(--mathai-text-primary, #000000);
}
</style>
</head>
<body>
<div id="app"></div>

<!-- STEP 1: SentryConfig package -->
<script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/sentry/index.js"></script>

<!-- STEP 2: initSentry() function definition (PART-030) -->
<script>
function initSentry() {
  if (typeof Sentry === 'undefined' || typeof SentryConfig === 'undefined') return;
  if (!SentryConfig.enabled) return;

  Sentry.init({
    dsn: SentryConfig.dsn,
    environment: SentryConfig.environment,
    release: 'game_matching_doubles@1.0.0',
    tracesSampleRate: SentryConfig.tracesSampleRate,
    sampleRate: SentryConfig.sampleRate,
    maxBreadcrumbs: 50,
    ignoreErrors: [
      'ResizeObserver loop limit exceeded',
      'ResizeObserver loop completed with undelivered notifications',
      'Non-Error promise rejection captured',
      'Script error.',
      'Load failed',
      'Failed to fetch',
    ],
  });
}
</script>

<!-- STEP 3: Sentry SDK v10.23.0 (3 scripts, NO integrity attribute) -->
<script src="https://browser.sentry-cdn.com/10.23.0/bundle.tracing.replay.feedback.min.js" crossorigin="anonymous"></script>
<script src="https://browser.sentry-cdn.com/10.23.0/captureconsole.min.js" crossorigin="anonymous"></script>
<script src="https://browser.sentry-cdn.com/10.23.0/browserprofiling.min.js" crossorigin="anonymous"></script>

<!-- STEP 4: Initialize on load -->
<script>window.addEventListener('load', initSentry);</script>

<!-- STEP 5-7: Game packages (exact URLs, in this order) -->
<script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
<script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
<script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

<script>
/* ============================================================
   Global Error Handlers (PART-030)
   ============================================================ */
window.addEventListener('error', function(event) {
  if (typeof Sentry !== 'undefined') {
    Sentry.captureException(event.error || new Error(event.message), {
      tags: { errorType: 'unhandled', severity: 'critical' },
      contexts: {
        errorEvent: { message: event.message, filename: event.filename, lineno: event.lineno },
      },
    });
  }
});

window.addEventListener('unhandledrejection', function(event) {
  if (typeof Sentry !== 'undefined') {
    Sentry.captureException(event.reason || new Error('Unhandled promise rejection'), {
      tags: { errorType: 'unhandled-promise', severity: 'critical' },
    });
  }
});

/* ============================================================
   Game State (PART-007)
   ============================================================ */
window.gameState = {
  gameId: 'game_matching_doubles',
  contentSetId: null,
  signalConfig: null,
  currentRound: 0,
  totalRounds: 9,
  score: 0,
  attempts: [],
  events: [],
  startTime: null,
  isActive: false,
  gameEnded: false,
  isProcessing: false,
  phase: 'start',
  content: null,
  sessionHistory: [],
  duration_data: {
    startTime: null,
    preview: [],
    attempts: [],
    evaluations: [],
    inActiveTime: [],
    totalInactiveTime: 0,
    currentTime: null,
  },
  lives: 3,
  totalLives: 3,
  selectedLeftIndex: null,
  currentRoundData: null,
  matchedPairs: new Set(),
  wrongAttempts: 0,
  voGameStartPlayed: false,
  previewResult: null,
};

var timer = null;
var visibilityTracker = null;
var progressBar = null;
var transitionScreen = null;
var signalCollector = null;
var visibilityTrackerConfig = null;
var previewScreen = null;

/* ============================================================
   Fallback Content (PART-028)
   ============================================================ */
var fallbackContent = {
  previewInstruction: '<p>Match each number on the left with its <b>double</b> on the right!</p><p>You have <b>3 lives</b>. Complete all 9 rounds to win!</p>',
  rounds: [
    { numbers: [2, 5, 6], doubles: [10, 12, 4] },
    { numbers: [3, 7, 4], doubles: [14, 8, 6] },
    { numbers: [8, 1, 9], doubles: [2, 18, 16] },
    { numbers: [4, 8, 1, 6], doubles: [16, 2, 12, 8] },
    { numbers: [7, 3, 9, 5], doubles: [6, 18, 10, 14] },
    { numbers: [11, 2, 8, 15], doubles: [4, 30, 22, 16] },
    { numbers: [3, 9, 6, 12, 7], doubles: [18, 14, 24, 6, 12] },
    { numbers: [5, 11, 4, 8, 13], doubles: [22, 16, 26, 10, 8] },
    { numbers: [14, 2, 10, 6, 9], doubles: [4, 20, 18, 28, 12] },
  ],
};

/* ============================================================
   waitForPackages (PART-003) — inline
   ============================================================ */
async function waitForPackages() {
  var timeout = 10000;
  var interval = 50;
  var elapsed = 0;
  while (
    typeof ScreenLayout === 'undefined' ||
    typeof ProgressBarComponent === 'undefined' ||
    typeof TransitionScreenComponent === 'undefined' ||
    typeof TimerComponent === 'undefined' ||
    typeof FeedbackManager === 'undefined' ||
    typeof VisibilityTracker === 'undefined' ||
    typeof SignalCollector === 'undefined' ||
    typeof PreviewScreenComponent === 'undefined' ||
    typeof InteractionManager === 'undefined'
  ) {
    if (elapsed >= timeout) {
      throw new Error('Packages failed to load within 10s');
    }
    await new Promise(function(resolve) { setTimeout(resolve, interval); });
    elapsed += interval;
  }
  console.log('[matching-doubles] All packages loaded');
}

/* ============================================================
   Core Game Functions (Global Scope — RULE-001)
   ============================================================ */

function showPreviewScreen() {
  previewScreen.show({
    questionLabel: 'Matching Doubles',
    score: '0',
    showStar: false,
    instruction: gameState.content.previewInstruction || fallbackContent.previewInstruction,
    previewContent: null,
    onComplete: startGameAfterPreview,
  });
}

function startGameAfterPreview(previewData) {
  gameState.previewResult = previewData;
  gameState.duration_data.preview = gameState.duration_data.preview || [];
  gameState.duration_data.preview.push({ duration: previewData.duration });
  gameState.startTime = Date.now();
  gameState.isActive = true;
  gameState.duration_data.startTime = new Date().toISOString();
  progressBar.update(0, gameState.lives);
  trackEvent('game_start', 'game');
  if (signalCollector) {
    signalCollector.recordViewEvent('screen_transition', { from: 'preview', to: 'game' });
  }
  showLevelTransition();
}

function setupGame() {
  if (!gameState.content) {
    gameState.content = fallbackContent;
  }
  showPreviewScreen();
}

async function showLevelTransition() {
  var levelIndex = Math.floor(gameState.currentRound / 3);
  var levelNum = levelIndex + 1;
  var levelAudioIds = ['level_1', 'level_2', 'level_3'];
  var levelStickers = [
    { image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1743761988949-40.gif', type: 'IMAGE_GIF' },
    { image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1743761988949-40.gif', type: 'IMAGE_GIF' },
    { image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1743761988949-40.gif', type: 'IMAGE_GIF' },
  ];

  if (timer && timer.isRunning) timer.pause();

  transitionScreen.show({
    title: 'Level ' + levelNum,
    buttons: [{
      text: "I'm ready! \uD83D\uDCAA",
      type: 'primary',
      action: function() {
        try { FeedbackManager.sound.stopAll(); } catch(e) {}
        showRoundTransition();
      }
    }],
    persist: true,
  });

  if (!gameState.voGameStartPlayed) {
    gameState.voGameStartPlayed = true;
    try {
      await new Promise(function(resolve) {
        if (FeedbackManager.canPlayAudio()) return resolve();
        var check = setInterval(function() {
          if (FeedbackManager.canPlayAudio()) { clearInterval(check); resolve(); }
        }, 200);
        setTimeout(function() { clearInterval(check); resolve(); }, 15000);
      });
    } catch(e) {}
  }

  FeedbackManager.sound.play(levelAudioIds[levelIndex], {
    sticker: levelStickers[levelIndex],
    subtitle: 'Level ' + levelNum,
  }).catch(function(e) { console.error('Level audio error:', e.message); });
}

async function showRoundTransition() {
  var roundInLevel = (gameState.currentRound % 3);
  var roundAudioIds = ['round_1', 'round_2', 'round_3'];
  var roundStickers = [
    { image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1743761988949-44.gif', type: 'IMAGE_GIF' },
    { image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1743761988949-47.gif', type: 'IMAGE_GIF' },
    { image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1743761988949-52.gif', type: 'IMAGE_GIF' },
  ];

  transitionScreen.show({
    title: 'Round ' + (roundInLevel + 1),
    persist: true,
  });

  try {
    await FeedbackManager.sound.play('rounds_sound_effect', {
      sticker: roundStickers[roundInLevel],
      subtitle: 'Round ' + (roundInLevel + 1),
    });
  } catch(e) { console.error('Round SFX error:', e.message); }

  try {
    await FeedbackManager.sound.play(roundAudioIds[roundInLevel], {
      sticker: roundStickers[roundInLevel],
      subtitle: 'Round ' + (roundInLevel + 1),
    });
  } catch(e) { console.error('Round announcement error:', e.message); }

  try { transitionScreen.hide(); } catch(e) {}

  loadRound();
}

function loadRound() {
  var round = gameState.content.rounds[gameState.currentRound];
  gameState.currentRoundData = round;
  gameState.matchedPairs = new Set();
  gameState.selectedLeftIndex = null;
  renderGrid(round);

  if (gameState.currentRound === 0 && !timer.isRunning) {
    timer.start();
  } else if (timer.isPaused) {
    timer.resume();
  }

  FeedbackManager.sound.play('new_cards').catch(function(e) { console.error('new_cards audio error:', e.message); });
}

function renderGrid(round) {
  var grid = document.getElementById('matching-grid');
  grid.innerHTML = '';

  for (var i = 0; i < round.numbers.length; i++) {
    var row = document.createElement('div');
    row.className = 'matching-row';

    var leftCell = document.createElement('div');
    leftCell.className = 'number-cell left-cell';
    leftCell.dataset.leftIndex = i;
    leftCell.dataset.value = round.numbers[i];
    leftCell.dataset.signalId = 'left-cell-' + i;
    leftCell.textContent = round.numbers[i];
    (function(idx) {
      leftCell.onclick = function() { handleLeftClick(idx); };
    })(i);

    var rightCell = document.createElement('div');
    rightCell.className = 'number-cell right-cell disabled';
    rightCell.dataset.rightIndex = i;
    rightCell.dataset.value = round.doubles[i];
    rightCell.dataset.signalId = 'right-cell-' + i;
    rightCell.textContent = round.doubles[i];
    (function(idx) {
      rightCell.onclick = function() { handleRightClick(idx); };
    })(i);

    row.appendChild(leftCell);
    row.appendChild(rightCell);
    grid.appendChild(row);
  }

  if (signalCollector) {
    signalCollector.recordViewEvent('content_render', {
      screen: 'gameplay',
      content_snapshot: {
        question_text: 'Match ' + round.numbers.length + ' numbers with their doubles',
        numbers: round.numbers,
        doubles: round.doubles,
        round: gameState.currentRound + 1,
        trigger: 'round_start',
      },
      components: {
        timer: timer ? { value: timer.getCurrentTime(), state: timer.isRunning ? 'running' : 'paused' } : null,
        progress: { current: gameState.currentRound, total: gameState.totalRounds },
      },
    });
  }
}

function handleLeftClick(leftIndex) {
  if (!gameState.isActive) return;
  if (gameState.matchedPairs.has(leftIndex)) return;

  FeedbackManager.sound.play('tap_sound').catch(function(e) { console.error('tap audio error:', e.message); });

  document.querySelectorAll('.left-cell.selected').forEach(function(el) { el.classList.remove('selected'); });

  var leftEl = document.querySelector('.left-cell[data-left-index="' + leftIndex + '"]');
  leftEl.classList.add('selected');
  gameState.selectedLeftIndex = leftIndex;

  enableRightCells();

  trackEvent('select_number', 'left', { index: leftIndex, value: gameState.currentRoundData.numbers[leftIndex] });

  if (signalCollector) {
    signalCollector.recordViewEvent('visual_update', {
      screen: 'gameplay',
      content_snapshot: {
        type: 'number_selected',
        selected_index: leftIndex,
        selected_value: gameState.currentRoundData.numbers[leftIndex],
        matched_count: gameState.matchedPairs.size,
      },
    });
  }
}

function enableRightCells() {
  document.querySelectorAll('.right-cell').forEach(function(el) {
    if (!el.classList.contains('matched')) {
      el.classList.remove('disabled');
    }
  });
}

function disableRightCells() {
  document.querySelectorAll('.right-cell').forEach(function(el) {
    if (!el.classList.contains('matched')) {
      el.classList.add('disabled');
    }
  });
}

async function handleRightClick(rightIndex) {
  if (!gameState.isActive) return;
  if (gameState.isProcessing) return;
  if (gameState.selectedLeftIndex === null) return;

  var rightEl = document.querySelector('.right-cell[data-right-index="' + rightIndex + '"]');
  if (rightEl.classList.contains('matched')) return;
  if (rightEl.classList.contains('disabled')) return;

  gameState.isProcessing = true;

  var leftIndex = gameState.selectedLeftIndex;
  var leftEl = document.querySelector('.left-cell[data-left-index="' + leftIndex + '"]');
  var round = gameState.currentRoundData;
  var number = round.numbers[leftIndex];
  var double = round.doubles[rightIndex];
  var isCorrect = (double === number * 2);

  if (isCorrect) {
    leftEl.classList.remove('selected');
    leftEl.classList.add('matched');
    rightEl.classList.add('matched');
    gameState.matchedPairs.add(leftIndex);
    gameState.selectedLeftIndex = null;
    disableRightCells();

    FeedbackManager.sound.play('correct_sound_effect', {
      sticker: { image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1754587201419-20.gif', duration: 2, type: 'IMAGE_GIF' },
    }).catch(function(e) { console.error('Audio error:', e.message); });

    trackEvent('correct_match', 'grid', { leftIndex: leftIndex, rightIndex: rightIndex, number: number, double: double });

    recordAttempt({
      input_of_user: { action: 'match', number: number, selectedDouble: double },
      correct: true,
      metadata: {
        round: gameState.currentRound + 1,
        question: 'What is the double of ' + number + '?',
        correctAnswer: '' + (number * 2),
        validationType: 'function',
      },
    });

    if (signalCollector) {
      signalCollector.recordViewEvent('feedback_display', {
        screen: 'gameplay',
        content_snapshot: { feedback_type: 'correct', message: 'Correct match!', number: number, double: double },
      });
    }

    if (signalCollector) {
      signalCollector.recordViewEvent('visual_update', {
        screen: 'gameplay',
        content_snapshot: {
          type: 'pair_matched',
          left_index: leftIndex,
          right_index: rightIndex,
          number: number,
          double: double,
          matched_count: gameState.matchedPairs.size,
          total_pairs: round.numbers.length,
        },
      });
    }

    if (gameState.matchedPairs.size >= round.numbers.length) {
      await roundComplete();
      gameState.isProcessing = false;
    } else {
      gameState.isProcessing = false;
    }
  } else {
    rightEl.classList.add('wrong');
    gameState.lives--;
    gameState.wrongAttempts++;
    progressBar.update(gameState.currentRound, gameState.lives);

    FeedbackManager.sound.play('incorrect_sound_effect', {
      sticker: { image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1754587201419-28.gif', duration: 2, type: 'IMAGE_GIF' },
    }).catch(function(e) { console.error('Audio error:', e.message); });

    trackEvent('wrong_match', 'grid', {
      leftIndex: leftIndex,
      rightIndex: rightIndex,
      number: number,
      selectedDouble: double,
      correctDouble: number * 2,
    });
    trackEvent('life_lost', 'game', { livesRemaining: gameState.lives });

    recordAttempt({
      input_of_user: { action: 'match', number: number, selectedDouble: double },
      correct: false,
      metadata: {
        round: gameState.currentRound + 1,
        question: 'What is the double of ' + number + '?',
        correctAnswer: '' + (number * 2),
        validationType: 'function',
      },
    });

    if (signalCollector) {
      signalCollector.recordViewEvent('feedback_display', {
        screen: 'gameplay',
        content_snapshot: {
          feedback_type: 'incorrect',
          message: 'Try again!',
          number: number,
          selectedDouble: double,
          correctDouble: number * 2,
          lives_remaining: gameState.lives,
        },
      });
    }

    if (signalCollector) {
      signalCollector.recordViewEvent('visual_update', {
        screen: 'gameplay',
        content_snapshot: { type: 'wrong_flash', right_index: rightIndex, lives_remaining: gameState.lives },
      });
    }

    leftEl.classList.remove('selected');
    gameState.selectedLeftIndex = null;
    disableRightCells();
    gameState.isProcessing = false;

    setTimeout(function() { rightEl.classList.remove('wrong'); }, 600);

    if (gameState.lives <= 0) {
      if (signalCollector) {
        signalCollector.recordCustomEvent('round_solved', { correct: false, reason: 'lives_exhausted' });
      }
      endGame('game_over');
    }
  }
}

async function roundComplete() {
  try {
    await FeedbackManager.sound.play('all_correct', {
      sticker: { image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1754587201419-35.gif', duration: 2, type: 'IMAGE_GIF' },
      subtitle: 'Good job! All cards matched!',
    });
  } catch(e) { console.error('all_correct audio error:', e.message); }

  if (timer) timer.pause();

  gameState.currentRound++;
  gameState.score++;
  progressBar.update(gameState.currentRound, gameState.lives);

  trackEvent('round_complete', 'game', { round: gameState.currentRound, livesRemaining: gameState.lives });

  if (signalCollector) {
    signalCollector.recordCustomEvent('round_solved', { correct: true, round: gameState.currentRound });
  }

  if (gameState.currentRound >= gameState.totalRounds) {
    endGame('victory');
  } else if (gameState.currentRound % 3 === 0) {
    showLevelTransition();
  } else {
    showRoundTransition();
  }
}

async function endGame(reason) {
  if (gameState.gameEnded) return;
  gameState.gameEnded = true;
  gameState.isActive = false;
  if (timer) timer.pause();

  var totalTime = timer ? Math.round(timer.getCurrentTime()) : Math.round((Date.now() - gameState.startTime) / 1000);
  var correctAttempts = gameState.attempts.filter(function(a) { return a.correct; }).length;
  var totalAttempts = gameState.attempts.length;
  var accuracy = totalAttempts > 0 ? Math.round((correctAttempts / totalAttempts) * 100) : 0;

  var stars = 0;
  if (reason === 'victory') {
    stars = totalTime <= 60 ? 3 : totalTime <= 90 ? 2 : 1;
  } else {
    stars = 0;
  }

  var tries = computeTriesPerRound();

  var metrics = {
    accuracy: accuracy,
    time: totalTime,
    stars: stars,
    attempts: gameState.attempts,
    duration_data: Object.assign({}, gameState.duration_data, { currentTime: new Date().toISOString() }),
    totalLives: gameState.totalLives,
    tries: tries,
    sessionHistory: gameState.sessionHistory,
    roundsCompleted: gameState.currentRound,
    wrongAttempts: gameState.wrongAttempts,
    livesRemaining: gameState.lives,
    reason: reason,
  };

  console.log('Final Metrics:', JSON.stringify(metrics, null, 2));
  console.log('Attempt History:', JSON.stringify(gameState.attempts, null, 2));

  trackEvent('game_end', 'game', {
    reason: reason,
    roundsCompleted: gameState.currentRound,
    accuracy: accuracy,
    stars: stars,
    time: totalTime,
  });

  if (typeof Sentry !== 'undefined') {
    Sentry.addBreadcrumb({
      category: 'state',
      message: 'Game complete',
      level: 'info',
      data: { score: accuracy, stars: stars, reason: reason },
    });
  }

  if (signalCollector) {
    signalCollector.recordViewEvent('screen_transition', {
      screen: 'results',
      metadata: { transition_from: 'gameplay', reason: reason },
    });
  }

  var sealResult = null;
  if (signalCollector) {
    try { sealResult = signalCollector.seal(); } catch(e) { console.error('SignalCollector seal error:', e.message); }
  }

  if (sealResult) {
    metrics.signal_event_count = sealResult.eventCount || 0;
    metrics.signal_metadata = sealResult.metadata || {};
  } else {
    metrics.signal_event_count = 0;
    metrics.signal_metadata = {};
  }

  showResults(metrics, reason);

  if (reason === 'game_over') {
    try {
      await FeedbackManager.sound.play('game_over_sound_effect', {
        sticker: { image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1757430772002-95.gif', duration: 3, type: 'IMAGE_GIF' },
      });
    } catch(e) { console.error('game_over_sfx error:', e.message); }
    try {
      await FeedbackManager.sound.play('game_over');
    } catch(e) { console.error('game_over audio error:', e.message); }
  } else if (reason === 'victory') {
    if (stars === 3) {
      try {
        await FeedbackManager.sound.play('victory_sound_effect', {
          sticker: { image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1757430772002-98.gif', duration: 3, type: 'IMAGE_GIF' },
        });
      } catch(e) { console.error('victory_sfx error:', e.message); }
      try {
        await FeedbackManager.sound.play('victory');
      } catch(e) { console.error('victory audio error:', e.message); }
    } else if (stars === 2) {
      try {
        await FeedbackManager.sound.play('game_complete_sound_effect', {
          sticker: { image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1754587201419-25.gif', duration: 3, type: 'IMAGE_GIF' },
        });
      } catch(e) { console.error('complete_sfx error:', e.message); }
      try {
        await FeedbackManager.sound.play('game_complete_2_star');
      } catch(e) { console.error('2star audio error:', e.message); }
    } else {
      try {
        await FeedbackManager.sound.play('game_complete_sound_effect', {
          sticker: { image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1754587201419-25.gif', duration: 3, type: 'IMAGE_GIF' },
        });
      } catch(e) { console.error('complete_sfx error:', e.message); }
      try {
        await FeedbackManager.sound.play('game_complete_1_star');
      } catch(e) { console.error('1star audio error:', e.message); }
    }
  }

  window.parent.postMessage({
    type: 'game_complete',
    data: { metrics: metrics, attempts: gameState.attempts, completedAt: Date.now(), signal_event_count: metrics.signal_event_count, signal_metadata: metrics.signal_metadata },
  }, '*');

  if (gameState.gameEnded) {
    if (timer) { timer.destroy(); timer = null; }
    if (progressBar) { progressBar.destroy(); progressBar = null; }
    if (visibilityTracker) { visibilityTracker.destroy(); visibilityTracker = null; }
    try { FeedbackManager.sound.pause(); FeedbackManager.stream.pauseAll(); } catch(e) {}
  }
}

function showResults(metrics, reason) {
  var metricsHTML = '<div class="results-metrics">' +
    '<div class="metric-row"><span class="metric-label">Time</span><span class="metric-value">' + formatTime(metrics.time) + '</span></div>' +
    '<div class="metric-row"><span class="metric-label">Rounds Completed</span><span class="metric-value">' + gameState.currentRound + '/' + gameState.totalRounds + '</span></div>' +
    '<div class="metric-row"><span class="metric-label">Wrong Attempts</span><span class="metric-value">' + gameState.wrongAttempts + '</span></div>' +
    '<div class="metric-row"><span class="metric-label">Accuracy</span><span class="metric-value">' + metrics.accuracy + '%</span></div>' +
    '</div>';

  var buttonText;
  if (reason === 'victory' && metrics.stars >= 3) {
    buttonText = 'Play Again';
  } else if (reason === 'game_over') {
    buttonText = 'Try Again';
  } else {
    buttonText = 'Retry for more stars';
  }

  var title = reason === 'victory' ? 'Great Job!' : 'Game Over';

  transitionScreen.show({
    stars: metrics.stars,
    title: title,
    content: metricsHTML,
    buttons: [{
      text: buttonText,
      type: 'primary',
      action: function() {
        try { FeedbackManager.sound.stopAll(); FeedbackManager.stream.stopAll(); } catch(e) {}
        restartGame();
      },
    }],
    persist: true,
  });
}

function formatTime(seconds) {
  var mins = Math.floor(seconds / 60);
  var secs = seconds % 60;
  return mins + ':' + secs.toString().padStart(2, '0');
}

function restartGame() {
  try { FeedbackManager.sound.stopAll(); FeedbackManager.stream.stopAll(); } catch(e) {}

  FeedbackManager.sound.play('restart', {
    sticker: { image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1757430772002-102.gif', duration: 2, type: 'IMAGE_GIF' },
  }).catch(function(e) { console.error('restart audio error:', e.message); });

  gameState.sessionHistory.push({
    totalLives: gameState.totalLives,
    tries: computeTriesPerRound(),
  });

  var preserved = {
    content: gameState.content,
    contentSetId: gameState.contentSetId,
    signalConfig: gameState.signalConfig,
    sessionHistory: gameState.sessionHistory,
  };

  gameState.currentRound = 0;
  gameState.score = 0;
  gameState.lives = 3;
  gameState.wrongAttempts = 0;
  gameState.selectedLeftIndex = null;
  gameState.currentRoundData = null;
  gameState.matchedPairs = new Set();
  gameState.attempts = [];
  gameState.events = [];
  gameState.startTime = null;
  gameState.isActive = false;
  gameState.gameEnded = false;
  gameState.isProcessing = false;
  gameState.phase = 'start';
  gameState.previewResult = null;
  gameState.duration_data = {
    startTime: null,
    preview: [],
    attempts: [],
    evaluations: [],
    inActiveTime: [],
    totalInactiveTime: 0,
    currentTime: null,
  };

  gameState.content = preserved.content;
  gameState.contentSetId = preserved.contentSetId;
  gameState.signalConfig = preserved.signalConfig;
  gameState.sessionHistory = preserved.sessionHistory;

  signalCollector = new SignalCollector({
    gameId: gameState.gameId,
    contentSetId: gameState.contentSetId,
    flushUrl: gameState.signalConfig ? gameState.signalConfig.flushUrl : undefined,
    playId: gameState.signalConfig ? gameState.signalConfig.playId : undefined,
  });
  window.signalCollector = signalCollector;
  signalCollector.startFlushing();

  timer = new TimerComponent('timer-container', {
    timerType: 'increase',
    format: 'min',
    startTime: 0,
    endTime: 100000,
    autoStart: false,
  });

  createProgressBar();
  progressBar.update(0, gameState.lives);

  visibilityTracker = new VisibilityTracker(visibilityTrackerConfig);

  gameState.startTime = Date.now();
  gameState.isActive = true;
  gameState.duration_data.startTime = new Date().toISOString();
  trackEvent('game_start', 'game');
  if (signalCollector) {
    signalCollector.recordViewEvent('screen_transition', { from: 'restart', to: 'game' });
  }
  showLevelTransition();
}

function computeTriesPerRound() {
  var triesMap = {};
  gameState.attempts.forEach(function(a) {
    var round = (a.metadata && a.metadata.round) ? a.metadata.round : 1;
    triesMap[round] = (triesMap[round] || 0) + 1;
  });
  return Object.entries(triesMap).map(function(entry) {
    return { round: Number(entry[0]), triesCount: entry[1] };
  });
}

function createProgressBar() {
  progressBar = new ProgressBarComponent({
    autoInject: true,
    totalRounds: 9,
    totalLives: 3,
    slotId: 'mathai-progress-slot',
  });
}

function handlePostMessage(event) {
  if (!event.data || event.data.type !== 'game_init') return;
  try {
    var d = event.data.data;
    if (d.content) gameState.content = d.content;
    if (d.gameId) gameState.gameId = d.gameId;
    if (d.contentSetId) gameState.contentSetId = d.contentSetId;
    gameState.signalConfig = d.signalConfig || {};
    console.log('Content received:', JSON.stringify(gameState.content, null, 2));

    if (signalCollector && gameState.signalConfig.flushUrl) {
      signalCollector.flushUrl = gameState.signalConfig.flushUrl;
      signalCollector.playId = gameState.signalConfig.playId || null;
      signalCollector.gameId = gameState.signalConfig.gameId || signalCollector.gameId;
      signalCollector.sessionId = gameState.signalConfig.sessionId || signalCollector.sessionId;
      signalCollector.contentSetId = gameState.signalConfig.contentSetId || signalCollector.contentSetId;
      signalCollector.studentId = gameState.signalConfig.studentId || signalCollector.studentId;
      signalCollector.startFlushing();
    }

    if (d.previewInstruction && gameState.content) {
      gameState.content.previewInstruction = d.previewInstruction;
    }

    previewScreen.show({
      questionLabel: d.questionLabel || 'Matching Doubles',
      score: d.score || '0',
      showStar: d.showStar !== false,
      instruction: d.previewInstruction || (gameState.content && gameState.content.previewInstruction) || fallbackContent.previewInstruction,
      audioUrl: d.previewAudio || (gameState.content && gameState.content.previewAudio) || null,
      previewContent: d.previewContent || null,
      onComplete: startGameAfterPreview,
    });

    if (typeof Sentry !== 'undefined') {
      Sentry.addBreadcrumb({ category: 'postmessage', message: 'game_init received', level: 'info' });
    }
  } catch(e) {
    console.error('PostMessage error:', JSON.stringify({ error: e.message }, null, 2));
    if (typeof Sentry !== 'undefined') {
      Sentry.captureException(e, { tags: { phase: 'initialization', severity: 'high' } });
    }
  }
}

function recordAttempt(data) {
  var attempt = {
    attempt_timestamp: new Date().toISOString(),
    time_since_start_of_game: gameState.startTime ? (Date.now() - gameState.startTime) / 1000 : 0,
    input_of_user: data.input_of_user,
    attempt_number: gameState.attempts.length + 1,
    correct: data.correct,
    metadata: data.metadata,
  };
  gameState.attempts.push(attempt);
  gameState.duration_data.attempts.push({
    startTime: new Date().toISOString(),
    time_to_first_attempt: gameState.startTime ? (Date.now() - gameState.startTime) / 1000 : 0,
    duration: 0,
  });
  console.log('Attempt:', JSON.stringify(attempt, null, 2));
}

function trackEvent(type, target, data) {
  data = data || {};
  var event = Object.assign({ type: type, target: target, timestamp: Date.now() }, data);
  gameState.events.push(event);
  console.log('Event:', JSON.stringify(event, null, 2));
}

var _internalLoadRound = loadRound;
window.loadRound = function(n) {
  if (arguments.length === 0 || n === undefined) {
    return _internalLoadRound();
  }
  if (typeof n !== 'number' || isNaN(n) || n < 1 || n > gameState.totalRounds) {
    console.log('Invalid round: ' + n + '. Must be 1-' + gameState.totalRounds);
    return;
  }
  gameState.currentRound = n - 1;
  gameState.isActive = true;
  gameState.isProcessing = false;
  gameState.gameEnded = false;
  _internalLoadRound();
  console.log('Jumped to round ' + n);
};

    } catch(e) {
      console.error('Sound preload error:', JSON.stringify({ error: e.message }, null, 2));

        Sentry.captureException(e, {
          tags: { phase: 'audio-playback', component: 'FeedbackManager', severity: 'medium' },
        });
      }
    }

    // 13. Fallback content
    if (!gameState.content) {
      gameState.content = fallbackContent;
    }

    // 14. Listen for postMessage (PART-008)
    window.addEventListener('message', handlePostMessage);

    // 15. Signal parent harness that game is ready
    window.parent.postMessage({ type: 'game_ready' }, '*');

    // 16. Start game — shows preview screen first
    setupGame();
  } catch(e) {

    if (typeof Sentry !== 'undefined') {
      Sentry.captureException(e, { tags: { phase: 'initialization', severity: 'critical' } });
    }
  }
