<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Addition Grid</title>
<style>
/* PART-020: CSS Variables & Colors */
:root {
  --mathai-primary: #4a90d9;
  --mathai-primary-dark: #357abd;
  --mathai-primary-light: #e3f0ff;
  --mathai-green: #4caf50;
  --mathai-green-light: #e8f5e9;
  --mathai-red: #f44336;
  --mathai-red-light: #ffebee;
  --mathai-surface: #f0f4ff;
  --mathai-white: #fff;
  --mathai-text: #1a1a2e;
  --mathai-text-secondary: #666;
  --mathai-border: #d0d8e8;
  --mathai-font-size-xl: 1.25rem;
  --mathai-font-size-lg: 1.1rem;
  --mathai-font-size-title: 1.5rem;
  --mathai-font-size-sm: 0.85rem;
  --mathai-font-size-base: 1rem;
}

/* PART-021: Screen Layout CSS */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  width: 100%;
  height: 100dvh;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
  font-size: 16px;
  color: var(--mathai-text);
  background: var(--mathai-surface);
  -webkit-tap-highlight-color: transparent;
}

/* Grid layout */
.grid-container {
  display: grid;
  grid-template-columns: 1fr auto 1fr auto 1fr;
  gap: 8px;
  max-width: 420px;
  margin: 0 auto;
  padding: 16px;
}

.grid-cell {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 52px;
  border-radius: 8px;
  font-size: var(--mathai-font-size-xl);
  font-weight: 600;
  transition: background-color 0.2s ease, border-color 0.2s ease;
}

.grid-cell.static {
  background: var(--mathai-surface);
  color: var(--mathai-text);
  border: 2px solid var(--mathai-border);
}

.grid-cell.operator {
  background: transparent;
  color: var(--mathai-text-secondary);
  font-size: var(--mathai-font-size-lg);
  min-height: auto;
}

.grid-cell.answer {
  background: var(--mathai-white);
  border: 2px solid var(--mathai-primary);
  flex-direction: column;
}

.grid-cell.answer.correct {
  border-color: var(--mathai-green);
  background: var(--mathai-green-light);
}

.grid-cell.answer.incorrect {
  border-color: var(--mathai-red);
  background: var(--mathai-red-light);
}

.grid-cell.totals {
  border-style: dashed;
}

.cell-input {
  width: 100%;
  height: 100%;
  min-height: 44px;
  border: none;
  background: transparent;
  text-align: center;
  font-size: var(--mathai-font-size-xl);
  font-weight: 600;
  color: var(--mathai-text);
  outline: none;
  -moz-appearance: textfield;
}

.cell-input::-webkit-outer-spin-button,
.cell-input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

.cell-input:focus {
  outline: none;
}

.cell-input:disabled {
  opacity: 0.8;
  color: var(--mathai-text);
}

.grid-cell.answer:hover {
  border-color: var(--mathai-primary-dark);
}

.grid-cell.answer:focus-within {
  border-color: var(--mathai-primary-dark);
  box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.2);
}

.grid-cell.answer.empty {
  border-color: var(--mathai-red);
  animation: shake 0.3s ease;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}

/* Row 3 separator */
.grid-cell[data-row="3"] {
  margin-top: 8px;
}

/* Totals label */
.totals-label {
  text-align: center;
  font-size: var(--mathai-font-size-sm);
  color: var(--mathai-text-secondary);
  margin-top: -4px;
  margin-bottom: 16px;
}

/* Correct answer reveal */
.correct-value {
  font-size: 0.75rem;
  color: var(--mathai-green);
  margin-top: 2px;
  font-weight: 600;
}

/* Game header */
.game-header {
  text-align: center;
  padding: 16px 16px 8px;
}

.game-title {
  font-size: var(--mathai-font-size-title);
  color: var(--mathai-text);
  margin: 0 0 4px;
}

.game-instruction {
  font-size: var(--mathai-font-size-sm);
  color: var(--mathai-text-secondary);
  margin: 0;
  line-height: 1.4;
}

/* Button row */
.button-row {
  display: flex;
  gap: 12px;
  justify-content: center;
  padding: 16px;
}

/* PART-022: Game Buttons */
.game-btn {
  min-height: 48px;
  min-width: 120px;
  padding: 12px 24px;
  border: none;
  border-radius: 12px;
  font-size: var(--mathai-font-size-base);
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  touch-action: manipulation;
}

.btn-primary {
  background: var(--mathai-primary);
  color: var(--mathai-white);
}

.btn-primary:hover:not(:disabled) {
  background: var(--mathai-primary-dark);
}

.btn-primary:active:not(:disabled) {
  transform: scale(0.97);
}

.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.btn-secondary {
  background: var(--mathai-white);
  color: var(--mathai-text);
  border: 2px solid var(--mathai-border);
}

.btn-secondary:hover:not(:disabled) {
  background: var(--mathai-surface);
}

.btn-secondary:active:not(:disabled) {
  transform: scale(0.97);
}

/* Preview grid */
.preview-grid {
  border-collapse: collapse;
  margin: 12px auto;
  width: 100%;
  max-width: 320px;
}

.preview-cell {
  text-align: center;
  padding: 10px 8px;
  font-size: 1.15rem;
  font-weight: 600;
}

.preview-static {
  color: var(--mathai-text);
  background: var(--mathai-surface);
  border-radius: 6px;
}

.preview-op {
  color: var(--mathai-text-secondary);
  font-weight: 400;
}

.preview-answer {
  color: var(--mathai-primary);
  background: var(--mathai-white);
  border: 2px dashed var(--mathai-primary);
  border-radius: 6px;
}

.preview-totals-row .preview-cell {
  border-top: 2px solid var(--mathai-border);
  padding-top: 14px;
}

/* Results screen */
.results-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 16px;
  text-align: center;
  min-height: 100%;
}

.results-stars {
  font-size: 3rem;
  margin-bottom: 16px;
  line-height: 1;
}

.results-score {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--mathai-text);
  margin-bottom: 24px;
}

.results-metrics {
  width: 100%;
  max-width: 320px;
  background: var(--mathai-white);
  border-radius: 12px;
  padding: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.metric-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--mathai-surface);
}

.metric-row:last-child {
  border-bottom: none;
}

.metric-label {
  color: var(--mathai-text-secondary);
  font-size: var(--mathai-font-size-sm);
}

.metric-value {
  font-weight: 700;
  color: var(--mathai-text);
  font-size: var(--mathai-font-size-base);
}

/* Star colors */
.star-filled { color: #f5a623; }
.star-empty { color: #ddd; }

/* Hide utility */
.hidden { display: none !important; }
</style>
</head>

<!-- STEP 1: SentryConfig package -->

<!-- STEP 2: initSentry() function definition (PART-030) -->
<script>
function initSentry() {
  if (typeof SentryConfig === 'undefined' || !SentryConfig.enabled) return;
  if (typeof Sentry === 'undefined') return;
  Sentry.init({
    dsn: SentryConfig.dsn,
    environment: SentryConfig.environment,
    tracesSampleRate: SentryConfig.tracesSampleRate,
    sampleRate: SentryConfig.sampleRate,
    maxBreadcrumbs: 50,
    ignoreErrors: [
      "ResizeObserver loop limit exceeded",
      "ResizeObserver loop completed with undelivered notifications",
      "Non-Error promise rejection captured",
      "Script error.",
      "Load failed",
      "Failed to fetch"
    ]
  });
  window.addEventListener('error', function(e) {
    Sentry.captureException(e.error || new Error(e.message));
  });
  window.addEventListener('unhandledrejection', function(e) {
    Sentry.captureException(e.reason || new Error('Unhandled rejection'));
  });
  Sentry.addBreadcrumb({ message: 'Sentry initialized', level: 'info' });
}
</script>

<!-- STEP 3: Sentry SDK v10.23.0 -->
<script src="https://browser.sentry-cdn.com/10.23.0/bundle.tracing.replay.feedback.min.js" crossorigin="anonymous"></script>

<!-- STEP 4: Initialize on load -->

<!-- STEP 5-7: Game packages -->
<script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>

<script>
/* ========================================
   PART-003: waitForPackages
   ======================================== */
function waitForPackages() {
  return new Promise(function(resolve, reject) {
    var timeout = 10000;
    var start = Date.now();
    function check() {
      if (
        typeof FeedbackManager !== 'undefined' &&
        typeof VisibilityTracker !== 'undefined' &&
        typeof SignalCollector !== 'undefined' &&
        typeof ScreenLayout !== 'undefined' &&
        typeof PreviewScreenComponent !== 'undefined'
      ) {
        resolve();
      } else if (Date.now() - start > timeout) {
        reject(new Error('Package load timeout after ' + timeout + 'ms'));
      } else {
        setTimeout(check, 100);
      }
    }
    check();
  });
}

/* ========================================
   PART-007: Game State Object
   ======================================== */
window.gameState = {
  currentRound: 0,
  totalRounds: 1,
  score: 0,
  attempts: [],
  events: [],
  startTime: null,
  isActive: false,
  content: null,
  duration_data: {
    startTime: null,
    preview: [],
    attempts: [],
    evaluations: [],
    inActiveTime: [],
    totalInactiveTime: 0,
    currentTime: null
  },
  grid: [],
  userAnswers: {},
  cellStatus: {},
  totalAnswerCells: 6,
  correctCells: 0,
  allSubmitted: false
};
var gameState = window.gameState;

var timer = null;
var visibilityTracker = null;
var signalCollector = null;
var previewScreen = null;

/* ========================================
   PART-028: InputSchema & Fallback Content
   ======================================== */
var fallbackContent = {
  previewInstruction: '<p>Fill in the missing values. Each row: <b>a + b = c</b>. The last row shows <b>column totals</b>.</p>',
  equations: [
    { a: 12, b: 15 },
    { a: 23, b: 14 },
    { a: 31, b: 22 }
  ]
};

/* ========================================
   Content Sets (Easy, Medium, Hard)
   ======================================== */
var contentSets = [
  {
    difficulty: 'easy',
    equations: [
      { a: 3, b: 5 },
      { a: 6, b: 2 },
      { a: 4, b: 7 }
    ]
  },
  {
    difficulty: 'medium',
    equations: [
      { a: 24, b: 33 },
      { a: 18, b: 42 },
      { a: 35, b: 19 }
    ]
  },
  {
    difficulty: 'hard',
    equations: [
      { a: 187, b: 465 },
      { a: 329, b: 548 },
      { a: 714, b: 293 }
    ]
  }
];

/* ========================================
   Game HTML Templates
   ======================================== */
var gameScreenHTML = '' +
  '<div id="game-screen" style="display: none;">' +
    '<div class="game-header">' +
      '<h2 class="game-title">Addition Grid</h2>' +
      '<p class="game-instruction">Fill in the missing values. Each row is an equation: a + b = c. The last row shows column totals.</p>' +
    '</div>' +
    '<div class="grid-container" id="grid-container">' +
      '<div class="grid-cell static" data-row="0" data-col="0" id="cell-0-0"></div>' +
      '<div class="grid-cell operator" data-row="0" data-col="1">+</div>' +
      '<div class="grid-cell static" data-row="0" data-col="2" id="cell-0-2"></div>' +
      '<div class="grid-cell operator" data-row="0" data-col="3">=</div>' +
      '<div class="grid-cell answer" data-row="0" data-col="4" id="cell-0-4">' +
        '<input type="number" class="cell-input" data-row="0" data-col="4" id="input-0-4" inputmode="numeric" data-signal-id="input-0-4" />' +
      '</div>' +
      '<div class="grid-cell static" data-row="1" data-col="0" id="cell-1-0"></div>' +
      '<div class="grid-cell operator" data-row="1" data-col="1">+</div>' +
      '<div class="grid-cell static" data-row="1" data-col="2" id="cell-1-2"></div>' +
      '<div class="grid-cell operator" data-row="1" data-col="3">=</div>' +
      '<div class="grid-cell answer" data-row="1" data-col="4" id="cell-1-4">' +
        '<input type="number" class="cell-input" data-row="1" data-col="4" id="input-1-4" inputmode="numeric" data-signal-id="input-1-4" />' +
      '</div>' +
      '<div class="grid-cell static" data-row="2" data-col="0" id="cell-2-0"></div>' +
      '<div class="grid-cell operator" data-row="2" data-col="1">+</div>' +
      '<div class="grid-cell static" data-row="2" data-col="2" id="cell-2-2"></div>' +
      '<div class="grid-cell operator" data-row="2" data-col="3">=</div>' +
      '<div class="grid-cell answer" data-row="2" data-col="4" id="cell-2-4">' +
        '<input type="number" class="cell-input" data-row="2" data-col="4" id="input-2-4" inputmode="numeric" data-signal-id="input-2-4" />' +
      '</div>' +

        '<input type="number" class="cell-input" data-row="3" data-col="0" id="input-3-0" inputmode="numeric" data-signal-id="input-3-0" />' +
      '</div>' +
      '<div class="grid-cell operator totals" data-row="3" data-col="1">+</div>' +
      '<div class="grid-cell answer totals" data-row="3" data-col="2" id="cell-3-2">' +
        '<input type="number" class="cell-input" data-row="3" data-col="2" id="input-3-2" inputmode="numeric" data-signal-id="input-3-2" />' +
      '</div>' +
      '<div class="grid-cell operator totals" data-row="3" data-col="3">=</div>' +
      '<div class="grid-cell answer totals" data-row="3" data-col="4" id="cell-3-4">' +
        '<input type="number" class="cell-input" data-row="3" data-col="4" id="input-3-4" inputmode="numeric" data-signal-id="input-3-4" />' +
      '</div>' +
    '</div>' +
    '<div class="totals-label">Totals Row: Add each column</div>' +
    '<div class="button-row">' +
      '<button class="game-btn btn-primary" id="btn-submit" data-signal-id="submit-btn" onclick="handleSubmit()">Submit</button>' +
      '<button class="game-btn btn-secondary" id="btn-reset" data-signal-id="reset-btn" onclick="handleReset()">Reset</button>' +
    '</div>' +
  '</div>';

var resultsScreenHTML = '' +
  '<div id="results-screen" style="display: none;">' +
    '<div class="results-container">' +
      '<div class="results-stars" id="results-stars"></div>' +
      '<div class="results-score" id="results-score"></div>' +
      '<div class="results-metrics">' +
        '<div class="metric-row">' +
          '<span class="metric-label">Correct Cells</span>' +
          '<span class="metric-value" id="metric-correct-cells"></span>' +
        '</div>' +
        '<div class="metric-row">' +
          '<span class="metric-label">Total Cells</span>' +

        '</div>' +

        '</div>' +
        '<div class="metric-row">' +
          '<span class="metric-label">Time</span>' +
          '<span class="metric-value" id="metric-time"></span>' +
        '</div>' +
      '</div>' +
    '</div>' +
  '</div>';

/* ========================================
   PART-010: trackEvent
   ======================================== */
function trackEvent(type, target, data) {
  data = data || {};
  gameState.events.push({ type: type, target: target, timestamp: Date.now(), ...data });
}

/* ========================================
   PART-009: recordAttempt
   ======================================== */
function recordAttempt(params) {
  var attempt = {
    attempt_timestamp: new Date().toISOString(),
    time_since_start_of_game: (Date.now() - gameState.startTime) / 1000,
    input_of_user: params.userAnswer,
    attempt_number: gameState.attempts.length + 1,
    correct: params.correct,
    metadata: {
      round: gameState.currentRound,
      question: 'cell-' + params.row + '-' + params.col,
      correctAnswer: params.correctAnswer,
      validationType: 'fixed'
    }
  };
  gameState.attempts.push(attempt);
  gameState.duration_data.attempts.push({
    startTime: new Date().toISOString(),
    time_to_first_attempt: (Date.now() - gameState.startTime) / 1000,
    duration: 0
  });
  console.log('Attempt:', JSON.stringify(attempt, null, 2));
}

/* ========================================
   buildPreviewGridHtml
   ======================================== */
function buildPreviewGridHtml() {
  var eqs = gameState.content.equations;
  var rows = eqs.map(function(eq) {
    return '<tr>' +
      '<td class="preview-cell preview-static">' + eq.a + '</td>' +
      '<td class="preview-cell preview-op">+</td>' +
      '<td class="preview-cell preview-static">' + eq.b + '</td>' +
      '<td class="preview-cell preview-op">=</td>' +
      '<td class="preview-cell preview-answer">?</td>' +
    '</tr>';
  });
  rows.push(
    '<tr class="preview-totals-row">' +
      '<td class="preview-cell preview-answer">?</td>' +
      '<td class="preview-cell preview-op">+</td>' +
      '<td class="preview-cell preview-answer">?</td>' +
      '<td class="preview-cell preview-op">=</td>' +
      '<td class="preview-cell preview-answer">?</td>' +
    '</tr>'
  );
  return '<table class="preview-grid">' + rows.join('') + '</table>';
}

/* ========================================
   showPreviewScreen
   ======================================== */
function showPreviewScreen() {
  try {
    previewScreen.show({
      instruction: 'Fill in the missing values. Each row: a + b = c. The last row shows column totals.',
      previewContent: buildPreviewGridHtml(),
      onComplete: startGameAfterPreview
    });
  } catch (err) {
    console.error('Preview show error:', JSON.stringify(err.message));
    startGameAfterPreview({ duration: 0 });
  }
}

/* ========================================
   startGameAfterPreview
   ======================================== */
function startGameAfterPreview(previewData) {
  previewData = previewData || { duration: 0 };
  gameState.previewResult = previewData;
  gameState.duration_data.preview = gameState.duration_data.preview || [];
  gameState.duration_data.preview.push({ duration: previewData.duration });
  gameState.startTime = Date.now();
  gameState.isActive = true;
  gameState.duration_data.startTime = new Date().toISOString();
  trackEvent('game_start', 'game');
  if (signalCollector) {
    try { signalCollector.recordViewEvent('screen_transition', { from: 'preview', to: 'game' }); } catch(e) {}
  }
  var gameScreen = document.getElementById('game-screen');
  if (gameScreen) {
    gameScreen.style.display = 'block';
  }
  var firstInput = document.getElementById('input-0-4');
  if (firstInput) {
    firstInput.focus();
  }
}

/* ========================================
   buildCorrectAnswers
   ======================================== */
function buildCorrectAnswers() {
  var answers = {};
  for (var r = 0; r < 3; r++) {
    answers[r + '-4'] = gameState.grid[r].c;
  }
  answers['3-0'] = gameState.totals.sumA;
  answers['3-2'] = gameState.totals.sumB;
  answers['3-4'] = gameState.totals.sumC;
  return answers;
}

/* ========================================
   setupGame
   ======================================== */
function setupGame() {
  gameState.content = gameState.content || fallbackContent;

  var eqs = gameState.content.equations;
  gameState.grid = eqs.map(function(eq) {
    return { a: eq.a, b: eq.b, c: eq.a + eq.b };
  });
  gameState.totals = {
    sumA: eqs.reduce(function(s, eq) { return s + eq.a; }, 0),
    sumB: eqs.reduce(function(s, eq) { return s + eq.b; }, 0),
    sumC: eqs.reduce(function(s, eq) { return s + eq.a + eq.b; }, 0)
  };

  // Render static cells
  var cell00 = document.getElementById('cell-0-0');
  var cell02 = document.getElementById('cell-0-2');
  var cell10 = document.getElementById('cell-1-0');
  var cell12 = document.getElementById('cell-1-2');
  var cell20 = document.getElementById('cell-2-0');
  var cell22 = document.getElementById('cell-2-2');

  if (cell00) cell00.textContent = eqs[0].a;
  if (cell02) cell02.textContent = eqs[0].b;
  if (cell10) cell10.textContent = eqs[1].a;
  if (cell12) cell12.textContent = eqs[1].b;
  if (cell20) cell20.textContent = eqs[2].a;
  if (cell22) cell22.textContent = eqs[2].b;

  // Clear all inputs and reset state
  var inputIds = ['input-0-4', 'input-1-4', 'input-2-4', 'input-3-0', 'input-3-2', 'input-3-4'];
  inputIds.forEach(function(id) {
    var inp = document.getElementById(id);
    if (inp) {
      inp.value = '';
      inp.disabled = false;
    }
  });

  // Reset answer cell classes
  var answerCells = document.querySelectorAll('.grid-cell.answer');
  answerCells.forEach(function(cell) {
    cell.classList.remove('correct', 'incorrect', 'empty');
    var cv = cell.querySelector('.correct-value');
    if (cv) cv.remove();
  });

  gameState.userAnswers = {};
  gameState.cellStatus = {};
  gameState.correctCells = 0;
  gameState.allSubmitted = false;
  gameState.attempts = [];
  gameState.events = [];

  // Show submit/reset buttons
  var btnSubmit = document.getElementById('btn-submit');
  var btnReset = document.getElementById('btn-reset');
  if (btnSubmit) {
    btnSubmit.disabled = false;
    btnSubmit.style.display = '';
  }
  if (btnReset) {
    btnReset.style.display = '';
  }

  if (signalCollector) {
    try { signalCollector.recordViewEvent('content_render', { trigger: 'round_start', equations: 3 }); } catch(e) {}
  }

  // Do NOT set gameState.startTime here
  showPreviewScreen();
}

/* ========================================
   handleSubmit (RULE-001: global scope)
   ======================================== */
async function handleSubmit() {
  if (!gameState.isActive || gameState.allSubmitted) return;

  var inputIds = ['input-0-4', 'input-1-4', 'input-2-4', 'input-3-0', 'input-3-2', 'input-3-4'];
  var cellIds = ['cell-0-4', 'cell-1-4', 'cell-2-4', 'cell-3-0', 'cell-3-2', 'cell-3-4'];
  var cellKeys = ['0-4', '1-4', '2-4', '3-0', '3-2', '3-4'];

  // Check for empty inputs
  var hasEmpty = false;
  inputIds.forEach(function(id, i) {
    var inp = document.getElementById(id);
    var cell = document.getElementById(cellIds[i]);
    if (inp && inp.value.trim() === '') {
      hasEmpty = true;
      if (cell) {
        cell.classList.add('empty');
        setTimeout(function() { cell.classList.remove('empty'); }, 400);
      }
    }
  });

  if (hasEmpty) return;

  // Guard against double-submit: set immediately before async work
  gameState.allSubmitted = true;

  var correctAnswers = buildCorrectAnswers();
  var correctCount = 0;

  inputIds.forEach(function(id, i) {
    var inp = document.getElementById(id);
    var cell = document.getElementById(cellIds[i]);
    var key = cellKeys[i];
    var parts = key.split('-');
    var row = parseInt(parts[0], 10);
    var col = parseInt(parts[1], 10);

    var userVal = inp ? parseInt(inp.value, 10) : null;
    var correctVal = correctAnswers[key];
    var isCorrect = (userVal === correctVal);

    gameState.userAnswers[key] = userVal;

    if (cell) {
      cell.classList.remove('correct', 'incorrect', 'empty');
      if (isCorrect) {
        cell.classList.add('correct');
        correctCount++;
      } else {
        cell.classList.add('incorrect');
        // Show correct answer below input
        var existingCV = cell.querySelector('.correct-value');
        if (!existingCV) {
          var cv = document.createElement('div');
          cv.className = 'correct-value';
          cv.textContent = correctVal;
          cell.appendChild(cv);
        }
      }
    }

    gameState.cellStatus[key] = isCorrect ? 'correct' : 'incorrect';

    recordAttempt({
      row: row,
      col: col,
      userAnswer: userVal,
      correctAnswer: correctVal,
      correct: isCorrect
    });
  });

  gameState.correctCells = correctCount;
  gameState.score = correctCount;

  trackEvent('grid_complete', 'game', { correctCells: correctCount, totalCells: 6 });

  // Disable all inputs
  inputIds.forEach(function(id) {
    var inp = document.getElementById(id);
    if (inp) inp.disabled = true;
  });

  // Disable submit, hide reset
  var btnSubmit = document.getElementById('btn-submit');
  var btnReset = document.getElementById('btn-reset');
  if (btnSubmit) btnSubmit.disabled = true;
  if (btnReset) btnReset.style.display = 'none';

  if (signalCollector) {
    try { signalCollector.recordViewEvent('feedback_display', { correctCells: correctCount, totalCells: 6 }); } catch(e) {}
  }

  // Play feedback audio
  try {
    if (correctCount === 6) {
      await FeedbackManager.sound.play('celebration');
    } else {
      await FeedbackManager.sound.play('encouragement');
    }
  } catch (err) {
    console.error('Audio play error:', JSON.stringify(err.message));
  }

  // End game after delay for visual feedback
  setTimeout(function() {
    endGame();
  }, 500);
}

/* ========================================
   handleReset (RULE-001: global scope)
   ======================================== */
function handleReset() {
  var inputIds = ['input-0-4', 'input-1-4', 'input-2-4', 'input-3-0', 'input-3-2', 'input-3-4'];

  inputIds.forEach(function(id) {
    var inp = document.getElementById(id);
    if (inp) inp.value = '';
  });

  // Remove all status classes
  var answerCells = document.querySelectorAll('.grid-cell.answer');
  answerCells.forEach(function(cell) {
    cell.classList.remove('correct', 'incorrect', 'empty');
    var cv = cell.querySelector('.correct-value');
    if (cv) cv.remove();
  });

  gameState.userAnswers = {};
  gameState.cellStatus = {};

  var firstInput = document.getElementById('input-0-4');
  if (firstInput) firstInput.focus();
}

/* ========================================
   computeTriesPerRound (PART-011)
   ======================================== */
function computeTriesPerRound(attempts) {
  return [{ round: 0, triesCount: attempts.length }];
}

/* ========================================
   endGame (PART-011)
   ======================================== */
function endGame() {
  if (!gameState.isActive) return;
  gameState.isActive = false;
  gameState.duration_data.currentTime = new Date().toISOString();

  var stars = gameState.correctCells === 6 ? 3
    : gameState.correctCells >= 4 ? 2
    : gameState.correctCells >= 1 ? 1 : 0;

  var accuracy = Math.round((gameState.correctCells / 6) * 100);
  var time = (Date.now() - gameState.startTime) / 1000;

  var metrics = {
    accuracy: accuracy,
    time: parseFloat(time.toFixed(1)),
    stars: stars,
    score: gameState.correctCells,
    attempts: gameState.attempts,
    duration_data: gameState.duration_data,
    totalLives: 1,
    tries: computeTriesPerRound(gameState.attempts),
    correctCells: gameState.correctCells,
    totalCells: 6,
    gridEquations: 3
  };

  console.log('Final Metrics:', JSON.stringify(metrics, null, 2));
  console.log('Attempt History:', JSON.stringify(gameState.attempts, null, 2));

  trackEvent('game_end', 'game', { metrics: metrics });

  // Seal SignalCollector BEFORE postMessage
  var sealResult = null;
  if (signalCollector) {
    try {
      signalCollector.recordViewEvent('screen_transition', { from: 'game', to: 'results' });
      sealResult = signalCollector.seal();
    } catch(e) {}
  }

  showResults(metrics);

  // Send game_complete to parent — include signal data from seal()
  var gameCompleteData = {
    metrics: metrics,
    attempts: gameState.attempts,
    completedAt: new Date().toISOString(),
    signal_event_count: sealResult && typeof sealResult.eventCount !== 'undefined' ? sealResult.eventCount : (sealResult && typeof sealResult.signal_event_count !== 'undefined' ? sealResult.signal_event_count : 0),
    signal_metadata: sealResult && sealResult.metadata ? sealResult.metadata : (sealResult && sealResult.signal_metadata ? sealResult.signal_metadata : { gameId: 'addition-grid', sealed: true })
  };
  window.parent.postMessage({
    type: 'game_complete',
    data: gameCompleteData
  }, '*');

  // Cleanup
  if (visibilityTracker) {
    try { visibilityTracker.destroy(); } catch(e) {}
  }
  try {
    FeedbackManager.sound.pause();
    FeedbackManager.stream.stopAll();
  } catch(e) {}
}

/* ========================================
   showResults (PART-019)
   ======================================== */
function showResults(metrics) {
  var gameScreen = document.getElementById('game-screen');
  var resultsScreen = document.getElementById('results-screen');

  if (gameScreen) gameScreen.style.display = 'none';
  if (resultsScreen) resultsScreen.style.display = 'block';

  // Stars display
  var starsEl = document.getElementById('results-stars');
  if (starsEl) {
    var starsHtml = '';
    for (var i = 0; i < 3; i++) {
      if (i < metrics.stars) {
        starsHtml += '<span class="star-filled">&#9733;</span>';
      } else {
        starsHtml += '<span class="star-empty">&#9733;</span>';
      }
    }
    starsEl.innerHTML = starsHtml;
  }

  // Score text
  var scoreEl = document.getElementById('results-score');
  if (scoreEl) {
    scoreEl.textContent = metrics.correctCells + ' / ' + metrics.totalCells + ' Correct';
  }

  // Metrics
  var metricCorrect = document.getElementById('metric-correct-cells');
  var metricTotal = document.getElementById('metric-total-cells');
  var metricAccuracy = document.getElementById('metric-accuracy');
  var metricTime = document.getElementById('metric-time');

  if (metricCorrect) metricCorrect.textContent = metrics.correctCells;
  if (metricTotal) metricTotal.textContent = metrics.totalCells;
  if (metricAccuracy) metricAccuracy.textContent = metrics.accuracy + '%';
  if (metricTime) metricTime.textContent = metrics.time + 's';
}

/* ========================================
   PART-005: VisibilityTracker handlers
   ======================================== */
function handleInactive() {
  gameState.duration_data.inActiveTime.push({ start: Date.now() });
  if (signalCollector) {
    try {
      signalCollector.pause();
      signalCollector.recordCustomEvent('visibility_hidden', {});
    } catch(e) {}
  }
  try {
    FeedbackManager.sound.pause();
    FeedbackManager.stream.pauseAll();
  } catch(e) {}
  if (previewScreen) {
    try { previewScreen.pause(); } catch(e) {}
  }
  trackEvent('game_paused', 'system');
}

function handleResume() {
  var inactive = gameState.duration_data.inActiveTime;
  var last = inactive[inactive.length - 1];
  if (last && !last.end) {
    last.end = Date.now();
    gameState.duration_data.totalInactiveTime += (last.end - last.start);
  }
  if (signalCollector) {
    try {
      signalCollector.resume();
      signalCollector.recordCustomEvent('visibility_visible', {});
    } catch(e) {}
  }
  try {
    FeedbackManager.sound.resume();
    FeedbackManager.stream.resumeAll();
  } catch(e) {}
  if (previewScreen) {
    try { previewScreen.resume(); } catch(e) {}
  }
  trackEvent('game_resumed', 'system');
}

/* ========================================
   PART-008: handlePostMessage
   ======================================== */
function handlePostMessage(event) {
  if (!event.data || event.data.type !== 'game_init') return;
  var d = event.data.data;

  gameState.content = d.content;
  gameState.signalConfig = d.signalConfig || {};

  if (signalCollector && gameState.signalConfig.flushUrl) {
    try {
      signalCollector.flushUrl = gameState.signalConfig.flushUrl;
      signalCollector.playId = gameState.signalConfig.playId || null;
      signalCollector.gameId = gameState.signalConfig.gameId || signalCollector.gameId;
      signalCollector.sessionId = gameState.signalConfig.sessionId || signalCollector.sessionId;
      signalCollector.contentSetId = gameState.signalConfig.contentSetId || signalCollector.contentSetId;
      signalCollector.studentId = gameState.signalConfig.studentId || signalCollector.studentId;
      signalCollector.startFlushing();
    } catch(e) {}
  }

  setupGame();
}

/* ========================================
   PART-012: Debug Functions
   ======================================== */
window.debugGame = function() { console.log('gameState:', JSON.stringify(gameState, null, 2)); };
window.debugAudio = function() {
  try {
    console.log('Sound:', JSON.stringify(FeedbackManager.sound.getState()));
    console.log('Stream:', JSON.stringify(FeedbackManager.stream.getState()));
  } catch(e) { console.error('Debug audio error:', JSON.stringify(e.message)); }
};

};

    try {
      signalCollector.debug();
      console.log('Signal events:', JSON.stringify(signalCollector.getInputEventsCount ? signalCollector.getInputEventsCount() : 'n/a'));

};
window.verifySentry = function() {
  var client = typeof Sentry !== 'undefined' ? Sentry.getClient() : null;
  console.log('Sentry loaded:', typeof Sentry !== 'undefined');
  console.log('Sentry initialized:', !!client);
  console.log('DSN:', client && client.getDsn ? client.getDsn().toString() : 'none');
};
window.testSentry = function() { throw new Error('Test Sentry error from addition-grid'); };

/* ========================================
   PART-004: DOMContentLoaded
   ======================================== */
window.addEventListener('DOMContentLoaded', async function() {
  try {
    // 1. Wait for CDN packages (PART-003)
    await waitForPackages();

    // 2. Init FeedbackManager (PART-017)
    await FeedbackManager.init();

    // 3. Preload audio (PART-017)
    await FeedbackManager.sound.preload([
      { id: 'celebration', url: 'https://cdn.mathai.ai/audio/celebration.mp3' },
      { id: 'encouragement', url: 'https://cdn.mathai.ai/audio/encouragement.mp3' }
    ]);

    // 4. Create SignalCollector (PART-010)
    signalCollector = new SignalCollector({
      sessionId: (window.gameVariableState && window.gameVariableState.sessionId) || 'session_' + Date.now(),
      studentId: (window.gameVariableState && window.gameVariableState.studentId) || null,
      gameId: 'addition-grid',
      contentSetId: null
    });
    window.signalCollector = signalCollector;

    // 5. ScreenLayout (PART-025)
    ScreenLayout.inject('app', {
      slots: { progressBar: false, previewScreen: true, transitionScreen: false }
    });

    // 6. Inject game HTML into #gameContent
    var gameContent = document.getElementById('gameContent');
    if (gameContent) {
      gameContent.innerHTML = gameScreenHTML + resultsScreenHTML;
    }

    // 7. Create VisibilityTracker (PART-005)
    visibilityTracker = new VisibilityTracker({
      onInactive: handleInactive,
      onResume: handleResume,
      popupProps: {
        title: 'Game Paused',
        description: 'Click Resume to continue.',
        primaryText: 'Resume'
      }
    });
    window.visibilityTracker = visibilityTracker;

    // 8. Create PreviewScreen (PART-039)
    previewScreen = new PreviewScreenComponent({
      autoInject: true,
      slotId: 'mathai-preview-slot',
      gameContentId: 'gameContent'
    });

    // 9. Register postMessage listener (PART-008) + send game_ready
    window.addEventListener('message', handlePostMessage);
    window.parent.postMessage({ type: 'game_ready' }, '*');

    // 10. Setup game with fallback content
    setupGame();

  } catch (err) {
    console.error('Init failed:', JSON.stringify(err.message));
    if (typeof Sentry !== 'undefined') {
      try { Sentry.captureException(err); } catch(e) {}
    }
  }
});
</script>
