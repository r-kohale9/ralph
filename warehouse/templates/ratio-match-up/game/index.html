<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Match Up!</title>
<style>
/* === CSS Variables (PART-020) === */
:root {
  --mathai-green: #219653;
  --mathai-light-green: #D9F8D9;
  --mathai-red: #E35757;
  --mathai-light-red: #FFD9D9;
  --mathai-blue: #2563eb;
  --mathai-light-blue: #EBF0FF;
  --mathai-gray: #828282;
  --mathai-light-gray: #F2F2F2;
  --mathai-border-gray: #E0E0E0;
  --mathai-white: #FFFFFF;
  --mathai-text-primary: #4a4a4a;
  --mathai-font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --mathai-font-size-title: 24px;
  --mathai-font-size-body: 16px;
  --mathai-font-size-label: 14px;
  --mathai-font-size-small: 14px;
  --mathai-font-size-button: 16px;
  --mathai-orange: #F2994A;
  --mathai-purple: #9B51E0;
  --mathai-border-radius-card: 16px;
  --mathai-border-radius-button: 12px;
  --mathai-padding-small: 8px;
  --mathai-cream: #FFF8F0;
}

/* === Reset === */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--mathai-font-family);
  background: var(--mathai-cream);
  color: var(--mathai-text-primary);
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 0;
  overflow-x: hidden;
}

.game-block {
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* === Question Section === */
.question-section {
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.round-label {
  font-size: var(--mathai-font-size-small);
  color: #6B6B6B;
  font-weight: 500;
}

.stage-badge {
  display: inline-block;
  font-size: var(--mathai-font-size-small);
  color: var(--mathai-purple);
  font-weight: 600;
  background: #F3ECFF;
  padding: 4px 12px;
  border-radius: 20px;
  align-self: center;
}

/* === Rule Card === */
.rule-card {
  background: var(--mathai-white);
  border: 2px solid var(--mathai-purple);
  border-radius: var(--mathai-border-radius-card);
  padding: 20px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(155, 81, 224, 0.1);
}

.rule-text {
  font-size: 18px;
  font-weight: 500;
  line-height: 1.6;
}

.ratio-number {
  font-size: 22px;
  font-weight: 700;
  color: var(--mathai-purple);
}

/* === Comparison Card (Type A) === */
.comparison-card {
  background: #FFFDE7;
  border: 2px solid var(--mathai-orange);
  border-radius: var(--mathai-border-radius-card);
  padding: 20px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(242, 153, 74, 0.1);
}

.comparison-text {
  font-size: 18px;
  font-weight: 500;
  line-height: 1.6;
}

.comparison-card.correct {
  border-color: var(--mathai-green);
  background: var(--mathai-light-green);
}

.comparison-card.incorrect {
  border-color: var(--mathai-red);
  background: var(--mathai-light-red);
}

/* === Production Area (Type B) === */
.production-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

.multiplier-badge {
  font-size: 28px;
  font-weight: 800;
  color: var(--mathai-white);
  background: var(--mathai-purple);
  width: 56px;
  height: 56px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 12px rgba(155, 81, 224, 0.3);
}

.input-row {
  display: flex;
  gap: 20px;
  justify-content: center;
  align-items: center;
}

.input-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.game-input {
  width: 80px;
  height: 56px;
  font-size: 24px;
  font-weight: 700;
  font-family: var(--mathai-font-family);
  text-align: center;
  border: 2px solid var(--mathai-border-gray);
  border-radius: 12px;
  outline: none;
  transition: border-color 0.2s ease;
  background: var(--mathai-white);
  color: var(--mathai-text-primary);
}

.game-input:focus {
  border-color: var(--mathai-blue);
}

.game-input.correct {
  border-color: var(--mathai-green);
  background: var(--mathai-light-green);
}

.game-input.incorrect {
  border-color: var(--mathai-red);
  background: var(--mathai-light-red);
}

.input-emoji {
  font-size: 24px;
}

/* Hide number input spinners */
.game-input::-webkit-outer-spin-button,
.game-input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}
.game-input[type=number] {
  -moz-appearance: textfield;
}

/* === Feedback Section === */
.feedback-section {
  text-align: center;
  padding: 12px 16px;
  border-radius: 12px;
  background: var(--mathai-white);
  animation: fadeIn 0.3s ease;
}

.feedback-text {
  font-size: var(--mathai-font-size-body);
  font-weight: 500;
  line-height: 1.5;
}

.feedback-text.correct-text {
  color: #1B7D44;
}

.feedback-text.incorrect-text {
  color: #C73E3E;
}

/* === Buttons === */
.btn-container {
  display: flex;
  justify-content: center;
  gap: 12px;
  padding: var(--mathai-padding-small) 16px;
  flex-wrap: wrap;
  max-width: 480px;
  margin: 0 auto;
  width: 100%;
}

.game-btn {
  padding: 14px 28px;
  font-size: var(--mathai-font-size-button);
  font-weight: 600;
  font-family: var(--mathai-font-family);
  border: none;
  border-radius: var(--mathai-border-radius-button);
  cursor: pointer;
  transition: all 0.2s ease;
  color: var(--mathai-white);
  min-height: 48px;
  min-width: 44px;
}

.game-btn:active { transform: translateY(0); }
.game-btn:disabled { opacity: 0.6; cursor: not-allowed; }

.btn-primary { background: var(--mathai-green); }
.btn-primary:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(33, 150, 83, 0.4);
}

.btn-secondary { background: var(--mathai-blue); }
.btn-secondary:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
}

.btn-same {
  background: var(--mathai-green);
  flex: 1;
  max-width: 200px;
}
.btn-same:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(33, 150, 83, 0.4);
}

.btn-different {
  background: var(--mathai-red);
  flex: 1;
  max-width: 200px;
}
.btn-different:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(227, 87, 87, 0.4);
}

.btn-same.selected { box-shadow: 0 0 0 3px var(--mathai-green), 0 6px 20px rgba(33, 150, 83, 0.4); }
.btn-different.selected { box-shadow: 0 0 0 3px var(--mathai-red), 0 6px 20px rgba(227, 87, 87, 0.4); }

.btn-same:disabled, .btn-different:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

/* === Results Screen === */
.results-container {
  max-width: 480px;
  margin: 0 auto;
  padding: 32px 24px;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.stars-display {
  font-size: 40px;
  letter-spacing: 8px;
}

.results-metrics {
  display: flex;
  flex-direction: column;
  gap: 12px;
  background: var(--mathai-white);
  border-radius: var(--mathai-border-radius-card);
  padding: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.metric-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--mathai-light-gray);
}

.metric-row:last-child { border-bottom: none; }

.metric-label {
  font-size: var(--mathai-font-size-label);
  color: var(--mathai-gray);
}

.metric-value {
  font-size: var(--mathai-font-size-body);
  font-weight: 700;
  color: var(--mathai-text-primary);
}

/* === Utilities === */
.hidden { display: none !important; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div id="app"></div>

<template id="game-template">
  <!-- Game Screen -->
  <div id="game-screen" class="game-block" style="display:none;">
    <!-- Question Section -->
    <div class="question-section">

        <div class="input-group">

          <span class="input-emoji" id="input-emoji1"></span>

        <div class="input-group">
          <input type="number" class="game-input" id="input-field2" data-signal-id="input-field2" placeholder="?" inputmode="numeric" />

    <button class="game-btn btn-primary" id="btn-submit" data-signal-id="btn-submit" onclick="handleTypeBSubmit()">Submit</button>
    <button class="game-btn btn-secondary hidden" id="btn-retry" data-signal-id="btn-retry" onclick="handleRetry()">Retry</button>
    <button class="game-btn btn-primary hidden" id="btn-next" data-signal-id="btn-next" onclick="nextRound()">Next</button>
  </div>

  <!-- Results Screen -->
  <div id="results-screen" style="display:none;">
    <div class="results-container">
      <h2 id="results-title">Game Complete!</h2>
      <div id="stars-display" class="stars-display"></div>
      <div class="results-metrics">
        <div class="metric-row">
          <span class="metric-label">Accuracy</span>
          <span id="result-score" class="metric-value">0%</span>
        </div>
        <div class="metric-row">
          <span class="metric-label">Time</span>
          <span id="result-time" class="metric-value">0s</span>
        </div>
        <div class="metric-row">
          <span class="metric-label">Correct</span>
          <span id="result-correct" class="metric-value">0/0</span>
        </div>
        <div class="metric-row">
          <span class="metric-label">Lives Left</span>
          <span id="result-lives" class="metric-value">0</span>
        </div>
      </div>
      <button class="game-btn btn-primary" onclick="location.reload()">Play Again</button>
    </div>
  </div>
</template>

<!-- STEP 1: SentryConfig package -->
<script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/sentry/index.js"></script>

<!-- STEP 2: initSentry() function definition (PART-030) -->
<script>
function initSentry() {
  try {
    if (typeof Sentry === 'undefined' || typeof SentryConfig === 'undefined') return;
    var config = SentryConfig.getConfig ? SentryConfig.getConfig() : {};
    Sentry.init({
      dsn: config.dsn || '',
      integrations: [
        Sentry.browserTracingIntegration && Sentry.browserTracingIntegration(),
        Sentry.replayIntegration && Sentry.replayIntegration(),
        Sentry.captureConsoleIntegration && Sentry.captureConsoleIntegration({ levels: ['error'] }),
        Sentry.browserProfilingIntegration && Sentry.browserProfilingIntegration()
      ].filter(Boolean),
      tracesSampleRate: config.tracesSampleRate || 0.1,
      replaysSessionSampleRate: config.replaysSessionSampleRate || 0.1,
      replaysOnErrorSampleRate: config.replaysOnErrorSampleRate || 1.0,
      profilesSampleRate: config.profilesSampleRate || 0.1
    });
    Sentry.setTag('gameId', 'ratio-match-up');
  } catch (e) {
    console.error(JSON.stringify({ error: 'Sentry init failed', message: e.message }, null, 2));
  }
}
</script>

<script src="https://browser.sentry-cdn.com/10.23.0/bundle.tracing.replay.feedback.min.js" crossorigin="anonymous"></script>

<script>

// === Game State (PART-007) ===
window.gameState = {
  currentRound: 0,
  totalRounds: 10,
  score: 0,
  attempts: [],
  events: [],
  startTime: null,
  isActive: false,
  content: null,
  duration_data: {
    startTime: null,
    preview: [],
    attempts: [],
    evaluations: [],
    inActiveTime: [],
    totalInactiveTime: 0,
    currentTime: null
  },
  lives: 3,
  totalLives: 3,
  roundType: null,
  stage: 1,
  pendingEndProblem: null,
  sessionHistory: [],
  signalConfig: {},
  answering: false
};

var timer = null;
var visibilityTracker = null;
var signalCollector = null;
var progressBar = null;
var transitionScreen = null;

// === waitForPackages (PART-003) ===
function waitForPackages() {
  return new Promise(function(resolve, reject) {
    var maxWait = 10000;
    var interval = 100;
    var elapsed = 0;
    function check() {
      if (typeof FeedbackManager !== 'undefined' &&
          typeof MathAIComponents !== 'undefined' &&
          typeof MathAIHelpers !== 'undefined') {
        resolve();
      } else if (elapsed >= maxWait) {
        reject(new Error('Packages failed to load within ' + maxWait + 'ms'));
      } else {
        elapsed += interval;
        setTimeout(check, interval);
      }
    }
    check();
  });
}

// === Utility: trackEvent (PART-010) ===
function trackEvent(type, target, data) {
  gameState.events.push({
    type: type,
    target: target,
    timestamp: Date.now(),
    ...(data || {})
  });
}

// === Utility: recordAttempt (PART-009) ===
function recordAttempt(data) {
  var attempt = {
    attempt_timestamp: new Date().toISOString(),
    time_since_start_of_game: (Date.now() - gameState.startTime) / 1000,
    input_of_user: data.userAnswer,
    attempt_number: gameState.attempts.length + 1,
    correct: data.correct,
    metadata: {
      round: gameState.currentRound,
      question: data.question,
      correctAnswer: data.correctAnswer,
      validationType: data.validationType || 'fixed'
    }
  };
  gameState.attempts.push(attempt);
  gameState.duration_data.attempts.push({
    startTime: new Date().toISOString(),
    time_to_first_attempt: (Date.now() - gameState.startTime) / 1000,
    duration: 0
  });
  console.log(JSON.stringify({ event: 'Attempt', data: attempt }, null, 2));
}

// === Utility: computeTriesPerRound ===
function computeTriesPerRound(attempts) {
  var rounds = {};
  attempts.forEach(function(a) {
    var r = a.metadata.round;
    rounds[r] = (rounds[r] || 0) + 1;
  });
  return Object.keys(rounds).map(function(r) {
    return { round: Number(r), triesCount: rounds[r] };
  });
}

// === Utility: showButton ===
function showButton(buttonId, containerId) {
  var container = document.getElementById(containerId);
  if (container) {
    container.querySelectorAll('.game-btn').forEach(function(btn) { btn.classList.add('hidden'); });
  }
  var btn = document.getElementById(buttonId);
  if (btn) btn.classList.remove('hidden');
}

// === setupGame ===

    gameState.content = fallbackContent;
  }

  gameState.duration_data.attempts = [];
  gameState.duration_data.evaluations = [];
  gameState.duration_data.inActiveTime = [];
  gameState.duration_data.totalInactiveTime = 0;
  gameState.totalRounds = gameState.content.rounds.length;

  if (progressBar) {
    progressBar.update(0, gameState.lives);
  }
  trackEvent('game_start', 'game');

  if (transitionScreen) {
    transitionScreen.show({
      icons: ['\ud83d\udcca'],
      iconSize: 'large',
      title: 'Match Up!',
      subtitle: 'Compare ratios and find equivalents!',
      buttons: [{ text: "I'm ready!", type: 'primary', action: function() { startPlaying(); } }]
    });
  }
}

// === startPlaying ===
function startPlaying() {
  if (transitionScreen) transitionScreen.hide();
  var gs = document.getElementById('game-screen');
  if (gs) gs.style.display = 'flex';
  renderRound();
}

// === renderRound ===
function renderRound() {
  // Flush deferred endProblem
  if (signalCollector && gameState.pendingEndProblem) {
    signalCollector.endProblem(gameState.pendingEndProblem.id, gameState.pendingEndProblem.outcome);
    gameState.pendingEndProblem = null;
  }

  var roundData = gameState.content.rounds[gameState.currentRound];
  gameState.roundType = roundData.type;

  var stageNames = { 1: 'Easy', 2: 'Mixed', 3: 'Hard' };
  var newStage = gameState.currentRound < 3 ? 1 : gameState.currentRound < 7 ? 2 : 3;

  if (newStage !== gameState.stage) {
    gameState.stage = newStage;
    trackEvent('stage_change', 'game', { stage: newStage, name: stageNames[newStage] });
    if (transitionScreen) {
      transitionScreen.show({
        icons: ['\ud83c\udf1f'],
        iconSize: 'normal',
        title: 'Stage ' + newStage + ': ' + stageNames[newStage] + '!',
        titleStyles: { color: '#270F63', fontSize: '36px' },
        duration: 2000
      });
    }
    setTimeout(function() { renderRoundContent(roundData); }, 2100);
    return;
  }

  renderRoundContent(roundData);
}

// === renderRoundContent ===
function renderRoundContent(roundData) {
  // Keep answering locked briefly so rapid taps during transition don't register
  setTimeout(function() { gameState.answering = false; }, 300);
  // Update round label
  var roundLabel = document.getElementById('round-label');
  if (roundLabel) roundLabel.textContent = 'Round ' + (gameState.currentRound + 1) + ' of ' + gameState.totalRounds;

  // Update stage badge
  var stageNames = { 1: 'Easy', 2: 'Mixed', 3: 'Hard' };
  var stageBadge = document.getElementById('stage-badge');
  if (stageBadge) stageBadge.textContent = 'Stage ' + gameState.stage + ': ' + stageNames[gameState.stage];

  // Start signalCollector problem
  if (signalCollector) {
    signalCollector.startProblem('round_' + gameState.currentRound, {
      type: roundData.type,
      baseRatio: roundData.baseRatio,
      stage: gameState.stage
    });
  }

  // Set rule card
  var rn1 = document.getElementById('rule-num1');
  var rn2 = document.getElementById('rule-num2');
  var re1 = document.getElementById('rule-emoji1');
  var re2 = document.getElementById('rule-emoji2');
  if (rn1) rn1.textContent = roundData.baseRatio[0];
  if (rn2) rn2.textContent = roundData.baseRatio[1];
  if (re1) re1.textContent = roundData.emoji1;
  if (re2) re2.textContent = roundData.emoji2;

  // Hide feedback
  var feedbackArea = document.getElementById('feedback-area');
  if (feedbackArea) feedbackArea.classList.add('hidden');

  if (roundData.type === 'A') {
    renderTypeA(roundData);
  } else {
    renderTypeB(roundData);
  }

  // SignalCollector recordViewEvent
  if (signalCollector) {
    signalCollector.recordViewEvent('content_render', {
      screen: 'gameplay',
      content_snapshot: {
        round: gameState.currentRound,
        type: roundData.type,
        baseRatio: roundData.baseRatio,
        trigger: 'round_start'
      },
      components: {
        progress: { current: gameState.currentRound, total: gameState.totalRounds }
      }
    });
  }
}

// === handleTypeAAnswer ===
async function handleTypeAAnswer(answer) {
  if (!gameState.isActive || gameState.answering) return;
  gameState.answering = true;

  // Disable both buttons
  var btnSame = document.getElementById('btn-same');
  var btnDiff = document.getElementById('btn-different');
  if (btnSame) btnSame.disabled = true;
  if (btnDiff) btnDiff.disabled = true;

  // Highlight selected
  if (answer === 'same' && btnSame) btnSame.classList.add('selected');
  if (answer === 'different' && btnDiff) btnDiff.classList.add('selected');

  var roundData = gameState.content.rounds[gameState.currentRound];
  var isCorrect = answer === roundData.correctAnswer;
  var compCard = document.getElementById('comparison-area');
  var feedbackArea = document.getElementById('feedback-area');
  var feedbackText = document.getElementById('feedback-text');

  if (isCorrect) {
    if (compCard) compCard.classList.add('correct');
    gameState.score++;
    if (feedbackArea) feedbackArea.classList.remove('hidden');
    if (feedbackText) {
      feedbackText.textContent = roundData.voiceOver.correct;
      feedbackText.className = 'feedback-text correct-text';
    }
    trackEvent('answer_correct', 'game', { round: gameState.currentRound, answer: answer });
    try { await FeedbackManager.sound.play('correct_tap', { subtitle: roundData.voiceOver.correct }); } catch(e) { console.error(JSON.stringify({ error: e.message }, null, 2)); }
  } else {
    if (compCard) compCard.classList.add('incorrect');
    gameState.lives--;
    if (progressBar) progressBar.update(gameState.currentRound, gameState.lives);
    if (feedbackArea) feedbackArea.classList.remove('hidden');
    if (feedbackText) {
      feedbackText.textContent = roundData.voiceOver.incorrect;
      feedbackText.className = 'feedback-text incorrect-text';
    }
    trackEvent('answer_wrong', 'game', { round: gameState.currentRound, answer: answer });
    if (gameState.lives <= 0) {
      trackEvent('life_lost', 'game', { livesRemaining: 0 });
    }
    try { await FeedbackManager.sound.play('wrong_tap', { subtitle: roundData.voiceOver.incorrect }); } catch(e) { console.error(JSON.stringify({ error: e.message }, null, 2)); }
  }

  // Record attempt
  recordAttempt({
    userAnswer: answer,
    correct: isCorrect,
    question: 'Is ' + roundData.baseRatio.join(':') + ' same as ' + roundData.comparisonRatio.join(':') + '?',
    correctAnswer: roundData.correctAnswer,
    validationType: 'fixed'
  });

  // Signal collector
  if (signalCollector) {
    signalCollector.recordCustomEvent('round_solved', {
      round: gameState.currentRound,
      correct: isCorrect,
      answer: answer
    });
  }

  // Defer endProblem
  gameState.pendingEndProblem = {
    id: 'round_' + gameState.currentRound,
    outcome: isCorrect ? 'correct' : 'incorrect'
  };

  if (gameState.lives <= 0) {
    setTimeout(function() { endGame(); }, 1500);
    return;
  }
  setTimeout(function() { nextRound(); }, 1500);
}

// === handleTypeBSubmit ===
async function handleTypeBSubmit() {
  if (!gameState.isActive || gameState.answering) return;
  gameState.answering = true;

  var roundData = gameState.content.rounds[gameState.currentRound];
  var f1 = document.getElementById('input-field1');
  var f2 = document.getElementById('input-field2');
  var val1 = parseInt(f1 ? f1.value : '');
  var val2 = parseInt(f2 ? f2.value : '');

  var feedbackArea = document.getElementById('feedback-area');
  var feedbackText = document.getElementById('feedback-text');

  if (isNaN(val1) || isNaN(val2)) {
    gameState.answering = false;
    if (feedbackArea) feedbackArea.classList.remove('hidden');
    if (feedbackText) {
      feedbackText.textContent = 'Please fill in both numbers!';
      feedbackText.className = 'feedback-text incorrect-text';
    }
    return;
  }

  var correct1 = val1 === roundData.baseRatio[0] * roundData.multiplier;
  var correct2 = val2 === roundData.baseRatio[1] * roundData.multiplier;
  var isCorrect = correct1 && correct2;

  // Mark each input
  if (f1) f1.classList.add(correct1 ? 'correct' : 'incorrect');
  if (f2) f2.classList.add(correct2 ? 'correct' : 'incorrect');

  // Disable inputs
  if (f1) f1.disabled = true;
  if (f2) f2.disabled = true;

  var btnSubmit = document.getElementById('btn-submit');
  var btnReset = document.getElementById('btn-reset');
  var btnRetry = document.getElementById('btn-retry');
  var btnNext = document.getElementById('btn-next');

  var feedbackMsg = '';

  if (isCorrect) {
    gameState.score++;
    feedbackMsg = roundData.voiceOver.correct;
    if (feedbackArea) feedbackArea.classList.remove('hidden');
    if (feedbackText) {
      feedbackText.textContent = feedbackMsg;
      feedbackText.className = 'feedback-text correct-text';
    }
    trackEvent('answer_correct', 'game', { round: gameState.currentRound, val1: val1, val2: val2 });
    // Show next, hide submit/retry/reset
    if (btnNext) btnNext.classList.remove('hidden');
    if (btnSubmit) btnSubmit.classList.add('hidden');
    if (btnRetry) btnRetry.classList.add('hidden');
    if (btnReset) btnReset.classList.add('hidden');
    try { await FeedbackManager.sound.play('correct_tap', { subtitle: roundData.voiceOver.correct }); } catch(e) { console.error(JSON.stringify({ error: e.message }, null, 2)); }
  } else {
    gameState.lives--;
    if (progressBar) progressBar.update(gameState.currentRound, gameState.lives);

    // Build partial feedback
    if (correct1 && !correct2) {
      feedbackMsg = 'First number correct! Check the second.';
    } else if (!correct1 && correct2) {
      feedbackMsg = 'Second number correct! Check the first.';
    } else {
      feedbackMsg = roundData.voiceOver.incorrect || "Did you add instead of multiply? Multiply BOTH sides by the same number.";
    }

    if (feedbackArea) feedbackArea.classList.remove('hidden');
    if (feedbackText) {
      feedbackText.textContent = feedbackMsg;
      feedbackText.className = 'feedback-text incorrect-text';
    }
    trackEvent('answer_wrong', 'game', { round: gameState.currentRound, val1: val1, val2: val2, correct1: correct1, correct2: correct2 });

    if (gameState.lives <= 0) {
      trackEvent('life_lost', 'game', { livesRemaining: 0 });
      // Hide all action buttons
      if (btnSubmit) btnSubmit.classList.add('hidden');
      if (btnReset) btnReset.classList.add('hidden');
      if (btnRetry) btnRetry.classList.add('hidden');
      if (btnNext) btnNext.classList.add('hidden');
    } else {
      // Show retry, hide submit/reset
      if (btnRetry) btnRetry.classList.remove('hidden');
      if (btnSubmit) btnSubmit.classList.add('hidden');
      if (btnReset) btnReset.classList.add('hidden');
    }
    try { await FeedbackManager.sound.play('wrong_tap', { subtitle: feedbackMsg }); } catch(e) { console.error(JSON.stringify({ error: e.message }, null, 2)); }
  }

  // Record attempt
  recordAttempt({
    userAnswer: val1 + ':' + val2,
    correct: isCorrect,
    question: roundData.baseRatio.join(':') + ' x' + roundData.multiplier,
    correctAnswer: (roundData.baseRatio[0] * roundData.multiplier) + ':' + (roundData.baseRatio[1] * roundData.multiplier),
    validationType: 'function'
  });

  // Signal collector
  if (signalCollector) {
    signalCollector.recordCustomEvent('round_solved', {
      round: gameState.currentRound,
      correct: isCorrect,
      answer: val1 + ':' + val2
    });
  }

  // Defer endProblem
  gameState.pendingEndProblem = {
    id: 'round_' + gameState.currentRound,
    outcome: isCorrect ? 'correct' : 'incorrect'
  };

  if (gameState.lives <= 0) {
    setTimeout(function() { endGame(); }, 1500);
  }
}

// === handleRetry ===
function handleRetry() {

  if (f1) { f1.value = ''; f1.classList.remove('correct', 'incorrect'); f1.disabled = false; }

function resetInputs() {

// === nextRound ===
function nextRound() {
  gameState.currentRound++;
  if (progressBar) progressBar.update(gameState.currentRound, gameState.lives);
  if (gameState.currentRound >= gameState.totalRounds) {
    endGame();
    return;
  }
  renderRound();
}

// === endGame (PART-011) ===
function endGame() {
  if (!gameState.isActive) return;
  gameState.isActive = false;
  gameState.duration_data.currentTime = new Date().toISOString();

  // Flush pending endProblem
  if (signalCollector && gameState.pendingEndProblem) {
    signalCollector.endProblem(gameState.pendingEndProblem.id, gameState.pendingEndProblem.outcome);
    gameState.pendingEndProblem = null;
  }

  // Calculate metrics
  var correct = gameState.attempts.filter(function(a) { return a.correct; }).length;
  var total = gameState.attempts.length;
  var accuracy = total > 0 ? Math.round((correct / total) * 100) : 0;
  var timeTaken = Math.round((Date.now() - gameState.startTime) / 1000);
  var stars = accuracy >= 80 ? 3 : accuracy >= 50 ? 2 : accuracy > 0 ? 1 : 0;

  var metrics = {
    accuracy: accuracy,
    time: timeTaken,
    stars: stars,
    attempts: gameState.attempts,
    duration_data: gameState.duration_data,
    totalLives: gameState.totalLives,
    tries: computeTriesPerRound(gameState.attempts),
    livesRemaining: gameState.lives
  };

  console.log(JSON.stringify({ event: 'Final Metrics', data: metrics }, null, 2));
  trackEvent('game_end', 'game', { metrics: metrics });

  if (signalCollector) signalCollector.seal();

  // Hide game screen
  var gs = document.getElementById('game-screen');
  if (gs) gs.style.display = 'none';

  // Hide button containers
  var typeABtns = document.getElementById('type-a-buttons');
  var typeBBtns = document.getElementById('type-b-buttons');
  if (typeABtns) typeABtns.classList.add('hidden');
  if (typeBBtns) typeBBtns.classList.add('hidden');

  if (gameState.lives <= 0) {
    if (transitionScreen) {
      transitionScreen.show({
        icons: ['\ud83d\ude14'],
        iconSize: 'large',
        title: 'Game Over!',
        subtitle: 'All lives lost! You got ' + correct + ' out of ' + gameState.currentRound + ' correct.',
        buttons: [{ text: 'See Results', type: 'primary', action: function() { showResults(metrics); } }]
      });
    } else {
      showResults(metrics);
    }
  } else {
    if (transitionScreen) {
      transitionScreen.show({
        stars: stars,
        title: stars === 3 ? 'Amazing!' : stars === 2 ? 'Great job!' : 'Good effort!',
        subtitle: correct + ' out of ' + gameState.totalRounds + ' correct!',
        buttons: [{ text: 'Claim Stars', type: 'primary', action: function() { showResults(metrics); } }]
      });
    } else {
      showResults(metrics);
    }
  }

  // PostMessage
  window.parent.postMessage({
    type: 'game_complete',
    data: {
      metrics: metrics,
      attempts: gameState.attempts,
      completedAt: Date.now()
    }
  }, '*');

  // Cleanup
  if (visibilityTracker) { visibilityTracker.destroy(); visibilityTracker = null; }
  try { FeedbackManager.sound.stopAll(); } catch(e) { console.error(JSON.stringify({ error: e.message }, null, 2)); }
  try { FeedbackManager.stream.stopAll(); } catch(e) { console.error(JSON.stringify({ error: e.message }, null, 2)); }
}

// === showResults (PART-019) ===
function showResults(metrics) {
  if (transitionScreen) transitionScreen.hide();
  var gs = document.getElementById('game-screen');
  if (gs) gs.style.display = 'none';

  var correct = gameState.attempts.filter(function(a) { return a.correct; }).length;

  var rs = document.getElementById('result-score');
  var rt = document.getElementById('result-time');
  var rc = document.getElementById('result-correct');
  var rl = document.getElementById('result-lives');
  var sd = document.getElementById('stars-display');
  var resultsScreen = document.getElementById('results-screen');

  if (rs) rs.textContent = metrics.accuracy + '%';
  if (rt) rt.textContent = metrics.time + 's';
  if (rc) rc.textContent = correct + '/' + gameState.attempts.length;
  if (rl) rl.textContent = String(gameState.lives);
  if (sd) sd.textContent = '\u2b50'.repeat(metrics.stars) + '\u2606'.repeat(3 - metrics.stars);
  if (resultsScreen) resultsScreen.style.display = 'block';
}

// === handlePostMessage (PART-008) ===
function handlePostMessage(event) {
  if (!event.data || event.data.type !== 'game_init') return;
  var d = event.data.data;
  gameState.content = d.content;
  gameState.signalConfig = d.signalConfig || {};
  if (signalCollector && gameState.signalConfig.flushUrl) {
    signalCollector.flushUrl = gameState.signalConfig.flushUrl;
    signalCollector.playId = gameState.signalConfig.playId || null;
    signalCollector.gameId = gameState.signalConfig.gameId || signalCollector.gameId;
    signalCollector.sessionId = gameState.signalConfig.sessionId || signalCollector.sessionId;
    signalCollector.contentSetId = gameState.signalConfig.contentSetId || signalCollector.contentSetId;
    signalCollector.studentId = gameState.signalConfig.studentId || signalCollector.studentId;
    signalCollector.startFlushing();
  }
  setupGame();
}

    var template = document.getElementById('game-template');
    if (gameContent && template) {
      gameContent.appendChild(template.content.cloneNode(true));
    }

    progressBar = new ProgressBarComponent({
      autoInject: true,
      totalRounds: 10,
      totalLives: 3,
      slotId: 'mathai-progress-slot'
    });

    transitionScreen = new TransitionScreenComponent({ autoInject: true });

    visibilityTracker = new VisibilityTracker({
      onInactive: function() {
        var inactiveStart = Date.now();
        gameState.duration_data.inActiveTime.push({ start: inactiveStart });
        if (signalCollector) {
          signalCollector.pause();
          signalCollector.recordCustomEvent('visibility_hidden', {});
        }
        try { FeedbackManager.sound.pause(); } catch(e) {}
        try { FeedbackManager.stream.pauseAll(); } catch(e) {}
        trackEvent('game_paused', 'system');
      },
      onResume: function() {
        var lastInactive = gameState.duration_data.inActiveTime[gameState.duration_data.inActiveTime.length - 1];
        if (lastInactive && !lastInactive.end) {
          lastInactive.end = Date.now();
          gameState.duration_data.totalInactiveTime += (lastInactive.end - lastInactive.start);
        }
        if (signalCollector) {
          signalCollector.resume();
          signalCollector.recordCustomEvent('visibility_visible', {});
        }
        try { FeedbackManager.sound.resume(); } catch(e) {}
        try { FeedbackManager.stream.resumeAll(); } catch(e) {}
        trackEvent('game_resumed', 'system');
      },
      popupProps: {
        title: 'Game Paused',
        description: 'Click Resume to continue.',
        primaryText: 'Resume'
      }
    });

    window.addEventListener('message', handlePostMessage);
    window.parent.postMessage({ type: 'game_ready' }, '*');

    setupGame();
  } catch (error) {
    console.error(JSON.stringify({ error: 'Initialization failed', message: error.message }, null, 2));
  }
});
</script>
</body>
</html>
