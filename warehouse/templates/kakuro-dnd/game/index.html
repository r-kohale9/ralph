.clue-container {

  color: var(--mathai-white);
  z-index: 1;
}

}

<script>
/* ============================================================
   PART-007: Game State
   ============================================================ */
window.gameState = {
  gameId: 'game_1710000000_kakuro001',
  contentSetId: null,
  signalConfig: {},
  sessionHistory: [],
  currentRound: 0,
  totalRounds: 1,
  score: 0,
  attempts: [],
  events: [],
  startTime: null,
  isActive: false,
  isProcessing: false,
  content: null,
  duration_data: {
    startTime: null,
    preview: [],
    attempts: [],
    evaluations: [],
    inActiveTime: [],
    totalInactiveTime: 0,
    currentTime: null
  },
  lives: 3,
  totalLives: 3,
  grid: null,
  solution: null,
  clues: null,
  numberTags: [],
  userValues: {},
  dragState: null,
  tagPlacement: {},
  showingFeedback: false
};

let timer = null;
let visibilityTracker = null;
let signalCollector = null;
let progressBar = null;
let transitionScreen = null;
let groups = [];

/* ============================================================
   PART-028: Fallback Content
   ============================================================ */
const fallbackContent = {
  gridSize: 5,
  cells: [
    { row: 0, col: 0, type: "black" },
    { row: 0, col: 1, type: "clue", clueDown: 6 },
    { row: 0, col: 2, type: "clue", clueDown: 9 },
    { row: 0, col: 3, type: "black" },
    { row: 0, col: 4, type: "black" },
    { row: 1, col: 0, type: "clue", clueRight: 3 },
    { row: 1, col: 1, type: "fillable", answer: 1 },
    { row: 1, col: 2, type: "fillable", answer: 2 },
    { row: 1, col: 3, type: "clue", clueDown: 8 },
    { row: 1, col: 4, type: "clue", clueDown: 9 },
    { row: 2, col: 0, type: "clue", clueRight: 26 },
    { row: 2, col: 1, type: "fillable", answer: 5 },
    { row: 2, col: 2, type: "fillable", answer: 7 },
    { row: 2, col: 3, type: "fillable", answer: 6 },
    { row: 2, col: 4, type: "fillable", answer: 8 },
    { row: 3, col: 0, type: "black" },
    { row: 3, col: 1, type: "black" },
    { row: 3, col: 2, type: "clue", clueRight: 3 },
    { row: 3, col: 3, type: "fillable", answer: 2 },
    { row: 3, col: 4, type: "fillable", answer: 1 },

    { row: 4, col: 2, type: "black" },
    { row: 4, col: 3, type: "black" },

  ],
  numberTags: [8, 2, 5, 1, 7, 1, 6, 2]
};

/* ============================================================
   PART-003: waitForPackages
   ============================================================ */
function waitForPackages(maxWait) {
  maxWait = maxWait || 8000;
  return new Promise(function(resolve) {
    var start = Date.now();
    function check() {
      var ready = (
        typeof FeedbackManager !== 'undefined' &&
        typeof VisibilityTracker !== 'undefined' &&
        typeof SignalCollector !== 'undefined' &&
        typeof ScreenLayout !== 'undefined' &&
        typeof ProgressBarComponent !== 'undefined' &&
        typeof TransitionScreenComponent !== 'undefined' &&
        typeof EventCapture !== 'undefined'
      );
      if (ready) {
        if (typeof Sentry !== 'undefined' && SentryConfig.enabled) {
          Sentry.addBreadcrumb({ category: 'lifecycle', message: 'All packages loaded', level: 'info' });
        }
        resolve(true);
      } else if (Date.now() - start > maxWait) {
        console.warn('Packages not fully loaded after ' + maxWait + 'ms — proceeding');
        resolve(false);
      } else {
        setTimeout(check, 100);
      }
    }
    check();
  });
}

/* ============================================================
   PART-010: Event Tracking
   ============================================================ */
function trackEvent(type, target, data) {
  var evt = {
    type: type,
    target: target || 'game',
    data: data || {},
    timestamp: Date.now()
  };
  gameState.events.push(evt);
  console.log('Event:', JSON.stringify(evt, null, 2));
}

/* ============================================================
   PART-009: Record Attempt
   ============================================================ */
function recordAttempt(data) {
  var attempt = {
    timestamp: Date.now(),
    userAnswer: data.userAnswer,
    correctAnswer: data.correctAnswer,
    correct: data.correct,
    metadata: {
      round: gameState.currentRound,
      question: data.question || 'kakuro_puzzle',
      validationType: data.validationType || 'function'
    }
  };
  gameState.attempts.push(attempt);
  gameState.duration_data.attempts.push({ timestamp: attempt.timestamp });
  console.log('Attempt recorded:', JSON.stringify(attempt, null, 2));
}

/* ============================================================
   PART-011 v3: computeTriesPerRound
   ============================================================ */
function computeTriesPerRound(attempts) {
  var rounds = {};
  attempts.forEach(function(a) {
    var r = a.metadata.round;
    rounds[r] = (rounds[r] || 0) + 1;
  });
  return Object.keys(rounds).map(function(r) {
    return { round: Number(r), triesCount: rounds[r] };
  });
}

/* ============================================================
   PART-022: showButton
   ============================================================ */
function showButton(buttonId) {
  var btn = document.getElementById(buttonId);
  if (btn) btn.classList.remove('hidden');
}

/* ============================================================
   Game Functions
   ============================================================ */

function buildGroups(cells, gridSize) {
  var cellMap = {};
  cells.forEach(function(c) {
    cellMap[c.row + '-' + c.col] = c;
  });

  var result = [];

  cells.forEach(function(c) {
    if (c.type !== 'clue') return;

    // Horizontal group (clueRight)
    if (c.clueRight !== undefined && c.clueRight !== null) {
      var hCells = [];
      for (var cc = c.col + 1; cc < gridSize; cc++) {
        var key = c.row + '-' + cc;
        var neighbor = cellMap[key];
        if (neighbor && neighbor.type === 'fillable') {
          hCells.push({ row: c.row, col: cc });
        } else {
          break;
        }
      }
      if (hCells.length > 0) {
        result.push({ clueValue: c.clueRight, direction: 'right', cells: hCells });
      }
    }

    // Vertical group (clueDown)
    if (c.clueDown !== undefined && c.clueDown !== null) {
      var vCells = [];
      for (var rr = c.row + 1; rr < gridSize; rr++) {
        var key2 = rr + '-' + c.col;
        var neighbor2 = cellMap[key2];
        if (neighbor2 && neighbor2.type === 'fillable') {
          vCells.push({ row: rr, col: c.col });
        } else {
          break;
        }
      }
      if (vCells.length > 0) {
        result.push({ clueValue: c.clueDown, direction: 'down', cells: vCells });
      }
    }
  });

  return result;
}

function validateGroup(group, userValues) {
  var values = [];
  for (var i = 0; i < group.cells.length; i++) {
    var cell = group.cells[i];
    var key = cell.row + '-' + cell.col;
    var val = userValues[key];
    if (val === undefined || val === null) {
      return { valid: false, reason: 'incomplete', cells: group.cells };
    }
    values.push(val);
  }

  var sum = values.reduce(function(a, b) { return a + b; }, 0);
  if (sum !== group.clueValue) {
    return { valid: false, reason: 'wrong_sum', cells: group.cells };
  }

  if (new Set(values).size !== values.length) {
    return { valid: false, reason: 'duplicates', cells: group.cells };
  }

  return { valid: true, cells: group.cells };
}

function renderGrid() {
  var gridEl = document.getElementById('kakuro-grid');
  gridEl.innerHTML = '';

  var content = gameState.content;
  var gridSize = content.gridSize;
  gridEl.style.setProperty('--grid-size', gridSize);

  var cellMap = {};
  content.cells.forEach(function(c) {
    cellMap[c.row + '-' + c.col] = c;
  });

  for (var r = 0; r < gridSize; r++) {
    for (var c = 0; c < gridSize; c++) {
      var key = r + '-' + c;
      var cellDef = cellMap[key];
      var div = document.createElement('div');
      div.classList.add('kakuro-cell');

      if (!cellDef || cellDef.type === 'black') {
        div.classList.add('cell-black');
      } else if (cellDef.type === 'clue') {
        div.classList.add('cell-clue');
        var container = document.createElement('div');
        container.classList.add('clue-container');

        if (cellDef.clueRight !== undefined && cellDef.clueRight !== null) {
          var spanR = document.createElement('span');
          spanR.classList.add('clue-right');
          spanR.textContent = cellDef.clueRight;
          container.appendChild(spanR);
        }
        if (cellDef.clueDown !== undefined && cellDef.clueDown !== null) {
          var spanD = document.createElement('span');
          spanD.classList.add('clue-down');
          spanD.textContent = cellDef.clueDown;
          container.appendChild(spanD);
        }
        div.appendChild(container);
      } else if (cellDef.type === 'fillable') {
        div.classList.add('cell-fillable');
        div.setAttribute('data-row', r);
        div.setAttribute('data-col', c);
        div.setAttribute('data-signal-id', 'cell-' + r + '-' + c);

        // Check if already filled (for re-render)
        var userVal = gameState.userValues[key];
        if (userVal !== undefined) {
          div.textContent = userVal;
          div.classList.add('filled');
          div.setAttribute('data-tag-id', gameState.tagPlacement[key] || '');
        }

        // Click handler for returning tags
        div.addEventListener('click', (function(row, col, el) {
          return function() { handleCellTap(row, col, el); };
        })(r, c, div));
      }

      gridEl.appendChild(div);
    }
  }

  // Record content_render view event
  if (signalCollector) {
    try {
      signalCollector.recordViewEvent('content_render', {
        screen: 'gameplay',
        content_snapshot: {
          type: 'grid_rendered',
          grid_size: content.gridSize,
          fillable_cells: Object.keys(gameState.solution).length,
          tags_available: gameState.numberTags.length,
          trigger: 'round_start'
        },
        components: {
          progress: { current: 1, total: gameState.totalRounds }
        }
      });
    } catch (e) { console.error('SignalCollector error:', JSON.stringify({ error: e.message }, null, 2)); }
  }
}

function renderTags() {
  var cluster = document.getElementById('tag-cluster');
  cluster.innerHTML = '';

  gameState.numberTags.forEach(function(num, index) {
    var tag = document.createElement('div');
    tag.classList.add('number-tag');
    tag.setAttribute('data-tag-id', index.toString());
    tag.setAttribute('data-value', num);
    tag.setAttribute('data-signal-id', 'tag-' + index);
    tag.setAttribute('draggable', 'true');
    tag.textContent = num;

    // Check if already used
    var isUsed = false;
    for (var key in gameState.tagPlacement) {
      if (gameState.tagPlacement[key] === index.toString()) {
        isUsed = true;
        break;
      }
    }
    if (isUsed) tag.classList.add('used');

    cluster.appendChild(tag);
  });
}

var _dragDropInitialized = false;
function initDragDrop() {
  if (_dragDropInitialized) return;
  _dragDropInitialized = true;

  var gridEl = document.getElementById('kakuro-grid');
  var cluster = document.getElementById('tag-cluster');

  // === Desktop HTML5 Drag API ===
  cluster.addEventListener('dragstart', function(e) {
    var tag = e.target.closest('.number-tag');
    if (!tag) return;
    e.dataTransfer.setData('text/plain', tag.getAttribute('data-tag-id'));
    e.dataTransfer.effectAllowed = 'move';
    tag.classList.add('dragging');
  });

  cluster.addEventListener('dragend', function(e) {
    var tag = e.target.closest('.number-tag');
    if (tag) tag.classList.remove('dragging');
  });

  gridEl.addEventListener('dragover', function(e) {
    var cell = e.target.closest('.cell-fillable');
    if (cell) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      cell.classList.add('drag-over');
    }
  });

  gridEl.addEventListener('dragleave', function(e) {
    var cell = e.target.closest('.cell-fillable');
    if (cell) cell.classList.remove('drag-over');
  });

  gridEl.addEventListener('drop', function(e) {
    e.preventDefault();
    var cell = e.target.closest('.cell-fillable');
    if (!cell) return;
    cell.classList.remove('drag-over');
    var tagId = e.dataTransfer.getData('text/plain');
    var row = parseInt(cell.getAttribute('data-row'));
    var col = parseInt(cell.getAttribute('data-col'));
    placeTag(tagId, row, col);
  });

  // === Mobile Touch Events ===
  var floatingClone = null;
  var activeTouchTagId = null;

  cluster.addEventListener('touchstart', function(e) {
    var tag = e.target.closest('.number-tag');
    if (!tag || tag.classList.contains('used')) return;
    e.preventDefault();

    activeTouchTagId = tag.getAttribute('data-tag-id');
    tag.classList.add('dragging');
    gameState.dragState = tag;

    // Create floating clone
    floatingClone = document.createElement('div');
    floatingClone.classList.add('drag-clone');
    floatingClone.textContent = tag.textContent;
    var touch = e.touches[0];
    floatingClone.style.left = touch.clientX + 'px';
    floatingClone.style.top = touch.clientY + 'px';
    document.body.appendChild(floatingClone);
  }, { passive: false });

  document.addEventListener('touchmove', function(e) {
    if (!floatingClone) return;
    e.preventDefault();
    var touch = e.touches[0];
    floatingClone.style.left = touch.clientX + 'px';
    floatingClone.style.top = touch.clientY + 'px';

    // Highlight drop target
    var elBelow = document.elementFromPoint(touch.clientX, touch.clientY);
    // Clear all drag-over first
    document.querySelectorAll('.cell-fillable.drag-over').forEach(function(c) {
      c.classList.remove('drag-over');
    });
    if (elBelow) {
      var cell = elBelow.closest('.cell-fillable');
      if (cell) cell.classList.add('drag-over');
    }
  }, { passive: false });

  document.addEventListener('touchend', function(e) {
    if (!floatingClone || activeTouchTagId === null) return;

    // Find drop target
    var touch = e.changedTouches[0];
    var elBelow = document.elementFromPoint(touch.clientX, touch.clientY);

    // Clean up
    document.querySelectorAll('.cell-fillable.drag-over').forEach(function(c) {
      c.classList.remove('drag-over');
    });

    if (floatingClone && floatingClone.parentNode) {
      floatingClone.parentNode.removeChild(floatingClone);
    }
    floatingClone = null;

    if (gameState.dragState) {
      gameState.dragState.classList.remove('dragging');
    }

    if (elBelow) {
      var cell = elBelow.closest('.cell-fillable');
      if (cell) {
        var row = parseInt(cell.getAttribute('data-row'));
        var col = parseInt(cell.getAttribute('data-col'));
        placeTag(activeTouchTagId, row, col);
      }
    }

    activeTouchTagId = null;
    gameState.dragState = null;
  });

  document.addEventListener('touchcancel', function() {
    if (floatingClone && floatingClone.parentNode) {
      floatingClone.parentNode.removeChild(floatingClone);
    }
    floatingClone = null;
    if (gameState.dragState) {
      gameState.dragState.classList.remove('dragging');
    }
    activeTouchTagId = null;
    gameState.dragState = null;
    document.querySelectorAll('.cell-fillable.drag-over').forEach(function(c) {
      c.classList.remove('drag-over');
    });
  });
}

function placeTag(tagId, row, col) {
  var key = row + '-' + col;
  var tag = document.querySelector('.number-tag[data-tag-id="' + tagId + '"]');
  if (!tag) return;

  var value = parseInt(tag.getAttribute('data-value'));
  var cell = document.querySelector('.cell-fillable[data-row="' + row + '"][data-col="' + col + '"]');
  if (!cell) return;

  // If cell already has a value, return existing tag first
  if (cell.classList.contains('filled')) {
    var existingTagId = cell.getAttribute('data-tag-id');
    if (existingTagId !== null && existingTagId !== '') {
      returnTag(existingTagId, row, col);
    }
  }

  // Place the tag
  cell.textContent = value;
  cell.classList.add('filled');
  cell.setAttribute('data-tag-id', tagId);
  tag.classList.add('used');

  gameState.userValues[key] = value;
  gameState.tagPlacement[key] = tagId;

  trackEvent('tag_drop', 'game', { tagId: tagId, value: value, row: row, col: col });

  // EventCapture
  try {
    if (typeof EventCapture !== 'undefined') {
      EventCapture.drop('cell-' + row + '-' + col, { tagId: tagId, value: value, row: row, col: col, round: 0 });
    }
  } catch (e) { /* swallow */ }

  // SignalCollector
  if (signalCollector) {
    try {
      signalCollector.recordViewEvent('visual_update', {
        screen: 'gameplay',
        content_snapshot: {
          type: 'tag_placed',
          cell: { row: row, col: col },
          value: value,
          cells_filled: Object.keys(gameState.userValues).length,
          trigger: 'user_action'
        }
      });
    } catch (e) { /* swallow */ }
  }
}

function handleCellTap(row, col, cell) {
  if (gameState.showingFeedback) return;
  if (!cell.classList.contains('filled')) return;

  var tagId = cell.getAttribute('data-tag-id');
  if (tagId !== null && tagId !== '') {
    returnTag(tagId, row, col);
  }

  // EventCapture
  try {
    if (typeof EventCapture !== 'undefined') {
      EventCapture.buttonPress('cell-' + row + '-' + col, { tagId: tagId, row: row, col: col, round: 0 });
    }
  } catch (e) { /* swallow */ }
}

function returnTag(tagId, row, col) {
  var key = row + '-' + col;
  var cell = document.querySelector('.cell-fillable[data-row="' + row + '"][data-col="' + col + '"]');
  var tag = document.querySelector('.number-tag[data-tag-id="' + tagId + '"]');

  if (cell) {
    cell.textContent = '';
    cell.classList.remove('filled');
    cell.removeAttribute('data-tag-id');
  }

  if (tag) {
    tag.classList.remove('used');
  }

  delete gameState.userValues[key];
  delete gameState.tagPlacement[key];

  trackEvent('tag_return', 'game', { tagId: tagId, row: row, col: col });

  // SignalCollector
  if (signalCollector) {
    try {
      signalCollector.recordViewEvent('visual_update', {
        screen: 'gameplay',
        content_snapshot: {
          type: 'tag_returned',
          cell: { row: row, col: col },
          cells_filled: Object.keys(gameState.userValues).length,
          trigger: 'user_action'
        }
      });
    } catch (e) { /* swallow */ }
  }
}

function resetDragDrop() {
  try {
    if (typeof EventCapture !== 'undefined') {
      EventCapture.buttonPress('btn-reset', { round: 0 });
    }
  } catch (e) { /* swallow */ }

  // Return all placed tags
  var keys = Object.keys(gameState.userValues);
  keys.forEach(function(key) {
    var parts = key.split('-');
    var row = parseInt(parts[0]);
    var col = parseInt(parts[1]);
    var tagId = gameState.tagPlacement[key];
    if (tagId !== undefined) {
      returnTag(tagId, row, col);
    }
  });

  gameState.userValues = {};
  gameState.tagPlacement = {};

  // Remove all highlight classes
  document.querySelectorAll('.cell-fillable').forEach(function(c) {
    c.classList.remove('correct', 'incorrect', 'filled');
    c.textContent = '';
    c.removeAttribute('data-tag-id');
  });

  // Show all tags
  document.querySelectorAll('.number-tag').forEach(function(t) {
    t.classList.remove('used');
  });

  // Hide feedback
  var fb = document.getElementById('feedback-area');
  if (fb) fb.classList.add('hidden');
}

function clearHighlights() {
  document.querySelectorAll('.cell-fillable').forEach(function(c) {
    c.classList.remove('correct', 'incorrect');
  });

  var fb = document.getElementById('feedback-area');
  if (fb) fb.classList.add('hidden');

  gameState.showingFeedback = false;
}

async function handleSubmit() {
  if (gameState.isProcessing || !gameState.isActive) return;
  gameState.isProcessing = true;

  try {
    // EventCapture
    try {
      if (typeof EventCapture !== 'undefined') {
        EventCapture.buttonPress('btn-submit', { round: 0 });
      }
    } catch (e) { /* swallow */ }

    // Count fillable cells
    var fillableCount = Object.keys(gameState.solution).length;
    var filledCount = Object.keys(gameState.userValues).length;

    if (filledCount < fillableCount) {
      var fb = document.getElementById('feedback-area');
      var ft = document.getElementById('feedback-text');
      fb.classList.remove('hidden');
      fb.style.background = 'var(--mathai-cell-bg-yellow)';
      ft.textContent = 'Place all numbers first!';
      ft.style.color = 'var(--mathai-primary)';
      return;
    }

    // Validate all groups
    var incorrectCells = {};
    var correctCells = {};
    var allValid = true;

    groups.forEach(function(group) {
      var result = validateGroup(group, gameState.userValues);
      if (!result.valid) {
        allValid = false;
        result.cells.forEach(function(c) {
          incorrectCells[c.row + '-' + c.col] = true;
        });
      } else {
        result.cells.forEach(function(c) {
          correctCells[c.row + '-' + c.col] = true;
        });
      }
    });

    var isCorrect = allValid;

    trackEvent('check_answer', 'game', { allFilled: true, isCorrect: isCorrect });

    // Record attempt
    recordAttempt({
      userAnswer: Object.assign({}, gameState.userValues),
      correct: isCorrect,
      question: 'kakuro_puzzle',
      correctAnswer: gameState.solution,
      validationType: 'function'
    });

    // SignalCollector custom event
    if (signalCollector) {
      try {
        signalCollector.recordCustomEvent('round_solved', { correct: isCorrect, answer: gameState.userValues });
      } catch (e) { /* swallow */ }
    }

    if (isCorrect) {
      // Mark all cells correct
      document.querySelectorAll('.cell-fillable').forEach(function(c) {
        c.classList.add('correct');
      });

      trackEvent('game_won', 'game', { lives: gameState.lives });
      gameState.score = 1;

      // SignalCollector feedback
      if (signalCollector) {
        try {
          signalCollector.recordViewEvent('feedback_display', {
            screen: 'gameplay',
            content_snapshot: { feedback_type: 'correct', message: 'You solved it!', audio_id: 'dynamic' }
          });
        } catch (e) { /* swallow */ }
      }

      // Play correct audio with sticker
      try {
        await FeedbackManager.sound.play('all_correct', {
          subtitle: '**Great job!** You solved the puzzle!',
          sticker: { image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1757512958230-30.gif', duration: 2, type: 'IMAGE_GIF' }
        });
      } catch (e) { console.error('Audio error:', JSON.stringify({ error: e.message }, null, 2)); }

      // Play end-game TTS with trophy
      try {
        var accuracy = 100;
        var timeTaken = Math.round((Date.now() - gameState.startTime) / 1000);
        await FeedbackManager.playDynamicFeedback({
          audio_content: 'You scored ' + accuracy + '% in ' + timeTaken + ' seconds!',
          subtitle: 'You scored ' + accuracy + '% in ' + timeTaken + ' seconds!',
          sticker: 'https://cdn.mathai.ai/mathai-assets/lottie/trophy.json'
        });
      } catch (e) { console.error('TTS error:', JSON.stringify({ error: e.message }, null, 2)); }

      // Show victory transition
      var starsCount = gameState.lives >= 3 ? 3 : gameState.lives >= 2 ? 2 : 1;
      if (transitionScreen) {
        try {
          transitionScreen.show({
            icons: starsCount === 3 ? ['⭐', '⭐', '⭐'] : starsCount === 2 ? ['⭐', '⭐'] : ['⭐'],
            iconSize: 'large',
            title: starsCount === 3 ? 'Perfect!' : starsCount === 2 ? 'Great Job!' : 'Well Done!',
            subtitle: 'You solved the Kakuro puzzle!',
            buttons: [{ text: 'See Results', type: 'primary', action: function() { transitionScreen.hide(); } }]
          });
        } catch (e) { /* swallow */ }
      }

      endGame();

    } else {
      // Incorrect
      gameState.lives--;
      trackEvent('life_lost', 'game', { livesRemaining: gameState.lives });

      if (progressBar) {
        try { progressBar.update(0, gameState.lives); } catch (e) { /* swallow */ }
      }

      // Highlight cells
      gameState.showingFeedback = true;
      document.querySelectorAll('.cell-fillable').forEach(function(c) {
        var k = c.getAttribute('data-row') + '-' + c.getAttribute('data-col');
        if (incorrectCells[k]) {
          c.classList.add('incorrect');
        } else if (correctCells[k] && !incorrectCells[k]) {
          c.classList.add('correct');
        }
      });

      // SignalCollector
      if (signalCollector) {
        try {
          signalCollector.recordViewEvent('visual_update', {
            screen: 'gameplay',
            content_snapshot: {
              type: 'validation_highlights',
              incorrect_cells: Object.keys(incorrectCells).length,
              trigger: 'user_action'
            }
          });
          signalCollector.recordViewEvent('feedback_display', {
            screen: 'gameplay',
            content_snapshot: { feedback_type: 'incorrect', message: 'Some fields are wrong!', audio_id: 'dynamic' }
          });
        } catch (e) { /* swallow */ }
      }

      // Play incorrect audio
      try {
        await FeedbackManager.sound.play('wrong_tap', {
          subtitle: 'Not quite. Try again!',
          sticker: { image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1757512958230-49.gif', duration: 2, type: 'IMAGE_GIF' }
        });
      } catch (e) { console.error('Audio error:', JSON.stringify({ error: e.message }, null, 2)); }

      if (gameState.lives <= 0) {
        trackEvent('game_over', 'game', { reason: 'lives_lost' });

        // SignalCollector
        if (signalCollector) {
          try {
            signalCollector.recordViewEvent('feedback_display', {
              screen: 'gameplay',
              content_snapshot: { feedback_type: 'game_over', message: 'All lives lost!', audio_id: 'dynamic' }
            });
          } catch (e) { /* swallow */ }
        }

        try {
          await FeedbackManager.sound.play('all_incorrect_last_attempt', {
            subtitle: 'All lives lost!',
            sticker: { image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1757512958230-49.gif', duration: 2, type: 'IMAGE_GIF' }
          });
        } catch (e) { console.error('Audio error:', JSON.stringify({ error: e.message }, null, 2)); }

        try {
          var accuracy2 = 0;
          var timeTaken2 = Math.round((Date.now() - gameState.startTime) / 1000);
          await FeedbackManager.playDynamicFeedback({
            audio_content: 'You scored ' + accuracy2 + '% in ' + timeTaken2 + ' seconds!',
            subtitle: 'You scored ' + accuracy2 + '% in ' + timeTaken2 + ' seconds!',
            sticker: 'https://cdn.mathai.ai/mathai-assets/lottie/trophy.json'
          });
        } catch (e) { console.error('TTS error:', JSON.stringify({ error: e.message }, null, 2)); }

        // Game over transition
        if (transitionScreen) {
          try {
            transitionScreen.show({
              icons: ['😔'],
              iconSize: 'large',
              title: 'Game Over',
              subtitle: 'All lives lost! Better luck next time.',
              buttons: [{ text: 'Try Again', type: 'primary', action: function() { transitionScreen.hide(); restartGame(); } }]
            });
          } catch (e) { /* swallow */ }
        }

        endGame();

      } else {
        // Show feedback, clear after 2s
        var fb2 = document.getElementById('feedback-area');
        var ft2 = document.getElementById('feedback-text');
        fb2.classList.remove('hidden');
        fb2.style.background = 'var(--mathai-cell-bg-red)';
        ft2.textContent = 'Incorrect! ' + gameState.lives + ' ' + (gameState.lives === 1 ? 'life' : 'lives') + ' remaining';
        ft2.style.color = 'var(--mathai-cell-border-red)';

        setTimeout(function() { clearHighlights(); }, 2000);
      }
    }
  } catch (error) {
    console.error('handleSubmit error:', JSON.stringify({ error: error.message }, null, 2));
    if (typeof Sentry !== 'undefined' && SentryConfig.enabled) {
      try { Sentry.captureException(error); } catch (e) { /* swallow */ }
    }
  } finally {
    gameState.isProcessing = false;
  }
}

function setupGame() {
  if (!gameState.content) {
    gameState.content = fallbackContent;
  }

  var content = gameState.content;

  // Build solution map
  gameState.solution = {};
  content.cells.forEach(function(c) {
    if (c.type === 'fillable') {
      gameState.solution[c.row + '-' + c.col] = c.answer;
    }
  });

  // Build groups
  groups = buildGroups(content.cells, content.gridSize);
  gameState.clues = groups;

  // Store number tags
  gameState.numberTags = content.numberTags.slice();

  // Clear user values
  gameState.userValues = {};
  gameState.tagPlacement = {};
  gameState.showingFeedback = false;

  // Hide any lingering feedback
  var fbArea = document.getElementById('feedback-area');
  if (fbArea) fbArea.classList.add('hidden');

  // Render
  renderGrid();
  renderTags();
  initDragDrop();

  // Set timing
  gameState.startTime = Date.now();
  gameState.duration_data.startTime = new Date().toISOString();
  gameState.isActive = true;

  trackEvent('game_start', 'game');

  // Update progress bar
  if (progressBar) {
    try { progressBar.update(0, gameState.lives); } catch (e) { /* swallow */ }
  }

  // Show game screen
  document.getElementById('game-screen').style.display = '';

  // SignalCollector screen transition
  if (signalCollector) {
    try {
      signalCollector.recordViewEvent('screen_transition', {
        screen: 'gameplay',
        metadata: { transition_from: 'ready' }
      });
    } catch (e) { /* swallow */ }
  }
}

function startGame() {
  if (transitionScreen) {
    try { transitionScreen.hide(); } catch (e) { /* swallow */ }
  }
  setupGame();
}

function endGame() {
  if (!gameState.isActive) return;
  gameState.isActive = false;
  gameState.duration_data.currentTime = new Date().toISOString();

  var accuracy = gameState.score > 0 ? 100 : 0;
  var timeTaken = Math.round((Date.now() - gameState.startTime) / 1000);
  var stars = gameState.lives >= 3 ? 3 : gameState.lives >= 2 ? 2 : gameState.lives >= 1 ? 1 : 0;

  var metrics = {
    accuracy: accuracy,
    time: timeTaken,
    stars: stars,
    attempts: gameState.attempts,
    duration_data: gameState.duration_data,
    totalLives: gameState.totalLives,
    tries: computeTriesPerRound(gameState.attempts),
    sessionHistory: gameState.sessionHistory || []
  };

  console.log('Game metrics:', JSON.stringify(metrics, null, 2));
  trackEvent('game_end', 'game', { metrics: metrics });

  // Record screen transition to results BEFORE sealing
  if (signalCollector) {
    try {
      signalCollector.recordViewEvent('screen_transition', {
        screen: 'results',
        metadata: { transition_from: 'gameplay' }
      });
    } catch (e) { /* swallow */ }
  }

  // Seal SignalCollector
  if (signalCollector) {
    try { signalCollector.seal(); } catch (e) { /* swallow */ }
  }

  if (typeof Sentry !== 'undefined' && SentryConfig.enabled) {
    try { Sentry.addBreadcrumb({ category: 'lifecycle', message: 'Game ended', level: 'info', data: { accuracy: accuracy, stars: stars } }); } catch (e) { /* swallow */ }
  }

  showResults(metrics);

  // postMessage game_complete
  try {
    window.parent.postMessage({
      type: 'game_complete',
      data: {
        metrics: metrics,
        attempts: gameState.attempts,
        completedAt: Date.now()
      }
    }, '*');
  } catch (e) { /* swallow */ }

  // Cleanup
  try {
    if (visibilityTracker) visibilityTracker.destroy();
  } catch (e) { /* swallow */ }
  try {
    if (progressBar) progressBar.destroy();
  } catch (e) { /* swallow */ }
  try {
    FeedbackManager.sound.pause();
    FeedbackManager.stream.pauseAll();
  } catch (e) { /* swallow */ }
}

function showResults(metrics) {
  document.getElementById('result-score').textContent = metrics.accuracy + '%';
  document.getElementById('result-time').textContent = metrics.time + 's';
  document.getElementById('result-correct').textContent = (gameState.score > 0 ? '1' : '0') + '/1';
  document.getElementById('result-lives').textContent = gameState.lives;

  var starsText = '';
  for (var i = 0; i < metrics.stars; i++) starsText += '⭐';
  for (var j = metrics.stars; j < 3; j++) starsText += '☆';
  document.getElementById('stars-display').textContent = starsText;

  if (metrics.accuracy === 100) {
    document.getElementById('results-title').textContent = 'You Won!';
  } else {
    document.getElementById('results-title').textContent = 'Game Over';
  }

  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('results-screen').style.display = '';
}

function restartGame() {
  // Push session snapshot
  if (!gameState.sessionHistory) gameState.sessionHistory = [];
  gameState.sessionHistory.push({
    totalLives: gameState.totalLives,
    tries: computeTriesPerRound(gameState.attempts)
  });

  // Preserve
  var preserved = {
    content: gameState.content,
    contentSetId: gameState.contentSetId,
    signalConfig: gameState.signalConfig,
    sessionHistory: gameState.sessionHistory
  };

  // Reset
  gameState.currentRound = 0;
  gameState.score = 0;
  gameState.attempts = [];
  gameState.events = [];
  gameState.isActive = false;
  gameState.isProcessing = false;
  gameState.lives = 3;
  gameState.userValues = {};
  gameState.tagPlacement = {};
  gameState.grid = null;
  gameState.solution = null;
  gameState.clues = null;
  gameState.numberTags = [];
  gameState.dragState = null;
  gameState.showingFeedback = false;

  // Restore preserved
  gameState.content = preserved.content;
  gameState.contentSetId = preserved.contentSetId;
  gameState.signalConfig = preserved.signalConfig;
  gameState.sessionHistory = preserved.sessionHistory;

  // Reset duration_data
  gameState.duration_data = {
    startTime: null,
    preview: [],
    attempts: [],
    evaluations: [],
    inActiveTime: [],
    totalInactiveTime: 0,
    currentTime: null
  };

  // Recreate SignalCollector
  try {
    signalCollector = new SignalCollector({
      sessionId: (window.gameVariableState && window.gameVariableState.sessionId) || 'session_' + Date.now(),
      studentId: (window.gameVariableState && window.gameVariableState.studentId) || null,
      gameId: gameState.gameId,
      contentSetId: gameState.contentSetId
    });
    window.signalCollector = signalCollector;
    if (gameState.signalConfig.flushUrl) {
      signalCollector.flushUrl = gameState.signalConfig.flushUrl;
      signalCollector.playId = gameState.signalConfig.playId || null;
      signalCollector.sessionId = gameState.signalConfig.sessionId || signalCollector.sessionId;
      signalCollector.studentId = gameState.signalConfig.studentId || signalCollector.studentId;
      signalCollector.startFlushing();
    }
  } catch (e) { console.error('SignalCollector recreate error:', JSON.stringify({ error: e.message }, null, 2)); }

  // Recreate VisibilityTracker
  try {
    visibilityTracker = new VisibilityTracker({
      onInactive: function() {
        var inactiveStart = Date.now();
        gameState.duration_data.inActiveTime.push({ start: inactiveStart });
        if (signalCollector) {
          try { signalCollector.pause(); } catch (e) { /* swallow */ }
          try { signalCollector.recordCustomEvent('visibility_hidden', {}); } catch (e) { /* swallow */ }
        }
        if (timer) try { timer.pause({ fromVisibilityTracker: true }); } catch (e) { /* swallow */ }
        try { FeedbackManager.sound.pause(); } catch (e) { /* swallow */ }
        try { FeedbackManager.stream.pauseAll(); } catch (e) { /* swallow */ }
        trackEvent('game_paused', 'system');
      },
      onResume: function() {
        var lastInactive = gameState.duration_data.inActiveTime[gameState.duration_data.inActiveTime.length - 1];
        if (lastInactive && !lastInactive.end) {
          lastInactive.end = Date.now();
          gameState.duration_data.totalInactiveTime += (lastInactive.end - lastInactive.start);
        }
        if (signalCollector) {
          try { signalCollector.resume(); } catch (e) { /* swallow */ }
          try { signalCollector.recordCustomEvent('visibility_visible', {}); } catch (e) { /* swallow */ }
        }
        if (timer && timer.isPaused) try { timer.resume({ fromVisibilityTracker: true }); } catch (e) { /* swallow */ }
        try { FeedbackManager.sound.resume(); } catch (e) { /* swallow */ }
        try { FeedbackManager.stream.resumeAll(); } catch (e) { /* swallow */ }
        trackEvent('game_resumed', 'system');
      },
      popupProps: {
        title: 'Game Paused',
        description: 'Click Resume to continue.',
        primaryText: 'Resume'
      }
    });
  } catch (e) { console.error('VisibilityTracker recreate error:', JSON.stringify({ error: e.message }, null, 2)); }

  // Recreate ProgressBar
  try {
    progressBar = new ProgressBarComponent({
      autoInject: true,
      totalRounds: 1,
      totalLives: 3,
      slotId: 'mathai-progress-slot'
    });
  } catch (e) { console.error('ProgressBar recreate error:', JSON.stringify({ error: e.message }, null, 2)); }

  // Hide results, show game
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'none';

  setupGame();
}

function handlePostMessage(event) {
  if (!event.data || event.data.type !== 'game_init') return;
  var d = event.data.data;

  gameState.content = d.content;
  if (d.gameId) gameState.gameId = d.gameId;
  gameState.contentSetId = d.contentSetId || null;
  gameState.signalConfig = d.signalConfig || {};

  if (typeof Sentry !== 'undefined' && SentryConfig.enabled) {
    try { Sentry.addBreadcrumb({ category: 'lifecycle', message: 'game_init received', level: 'info' }); } catch (e) { /* swallow */ }
  }

  // Configure SignalCollector
  if (signalCollector && gameState.signalConfig.flushUrl) {
    try {
      signalCollector.flushUrl = gameState.signalConfig.flushUrl;
      signalCollector.playId = gameState.signalConfig.playId || null;
      signalCollector.sessionId = gameState.signalConfig.sessionId || signalCollector.sessionId;
      signalCollector.studentId = gameState.signalConfig.studentId || signalCollector.studentId;
      signalCollector.startFlushing();
    } catch (e) { console.error('SignalCollector config error:', JSON.stringify({ error: e.message }, null, 2)); }
  }

  setupGame();
}

   PART-012: Debug Functions

};

};

window.testResume = function() {

};

    var summary = EventCapture.getSummary();
    console.log('EventCapture Debug:', JSON.stringify(summary, null, 2));

/* ============================================================
   PART-004: DOMContentLoaded Initialization
   ============================================================ */
window.addEventListener('DOMContentLoaded', async function() {
  try {
    await waitForPackages();

    try {
      await FeedbackManager.init();
    } catch (e) { console.error('FeedbackManager init error:', JSON.stringify({ error: e.message }, null, 2)); }

    // Audio preload (PART-017)
    try {
      await FeedbackManager.sound.preload([
        { id: 'correct_tap', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757501597903.mp3' },
        { id: 'wrong_tap', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757501956470.mp3' }
      ]);
    } catch (e) { console.error('Sound preload error:', JSON.stringify({ error: e.message }, null, 2)); }

    try {
      await FeedbackManager.sound.preload([
        { id: 'all_correct', url: 'https://cdn.mathai.ai/mathai-assets/dev/worksheet/audio/ab12c9db-1f0c-4ce3-a215-afc86e385df8.mp3' },
        { id: 'all_incorrect_last_attempt', url: 'https://cdn.mathai.ai/mathai-assets/dev/worksheet/audio/6420e861-2213-4855-8992-e3e964fabb29.mp3' }
      ]);
    } catch (e) { console.error('Sound preload error:', JSON.stringify({ error: e.message }, null, 2)); }

    // SignalCollector (PART-010 v3)
    try {
      signalCollector = new SignalCollector({
        sessionId: (window.gameVariableState && window.gameVariableState.sessionId) || 'session_' + Date.now(),
        studentId: (window.gameVariableState && window.gameVariableState.studentId) || null,
        gameId: gameState.gameId,
        contentSetId: gameState.contentSetId
      });
      window.signalCollector = signalCollector;
    } catch (e) { console.error('SignalCollector init error:', JSON.stringify({ error: e.message }, null, 2)); }

    // EventCapture (PART-036)
    try {
      EventCapture.init();
    } catch (e) { console.error('EventCapture init error:', JSON.stringify({ error: e.message }, null, 2)); }

    // ScreenLayout (PART-025)
    try {
      ScreenLayout.inject('app', {
        slots: { progressBar: true, transitionScreen: true }
      });
    } catch (e) { console.error('ScreenLayout error:', JSON.stringify({ error: e.message }, null, 2)); }

    // ProgressBar (PART-023)
    try {
      progressBar = new ProgressBarComponent({
        autoInject: true,
        totalRounds: 1,
        totalLives: 3,
        slotId: 'mathai-progress-slot'
      });
    } catch (e) { console.error('ProgressBar error:', JSON.stringify({ error: e.message }, null, 2)); }

    // TransitionScreen (PART-024)
    try {
      transitionScreen = new TransitionScreenComponent({
        autoInject: true
      });
    } catch (e) { console.error('TransitionScreen error:', JSON.stringify({ error: e.message }, null, 2)); }

    // VisibilityTracker (PART-005)
    try {
      visibilityTracker = new VisibilityTracker({
        onInactive: function() {
          var inactiveStart = Date.now();
          gameState.duration_data.inActiveTime.push({ start: inactiveStart });
          if (signalCollector) {
            try { signalCollector.pause(); } catch (e) { /* swallow */ }
            try { signalCollector.recordCustomEvent('visibility_hidden', {}); } catch (e) { /* swallow */ }
          }
          if (timer) try { timer.pause({ fromVisibilityTracker: true }); } catch (e) { /* swallow */ }
          try { FeedbackManager.sound.pause(); } catch (e) { /* swallow */ }
          try { FeedbackManager.stream.pauseAll(); } catch (e) { /* swallow */ }
          trackEvent('game_paused', 'system');
        },
        onResume: function() {
          var lastInactive = gameState.duration_data.inActiveTime[gameState.duration_data.inActiveTime.length - 1];
          if (lastInactive && !lastInactive.end) {
            lastInactive.end = Date.now();
            gameState.duration_data.totalInactiveTime += (lastInactive.end - lastInactive.start);
          }
          if (signalCollector) {
            try { signalCollector.resume(); } catch (e) { /* swallow */ }
            try { signalCollector.recordCustomEvent('visibility_visible', {}); } catch (e) { /* swallow */ }
          }
          if (timer && timer.isPaused) try { timer.resume({ fromVisibilityTracker: true }); } catch (e) { /* swallow */ }
          try { FeedbackManager.sound.resume(); } catch (e) { /* swallow */ }
          try { FeedbackManager.stream.resumeAll(); } catch (e) { /* swallow */ }
          trackEvent('game_resumed', 'system');
        },
        popupProps: {
          title: 'Game Paused',
          description: 'Click Resume to continue.',
          primaryText: 'Resume'
        }
      });
    } catch (e) { console.error('VisibilityTracker error:', JSON.stringify({ error: e.message }, null, 2)); }

    // PostMessage listener (PART-008)
    window.addEventListener('message', handlePostMessage);

    // Signal game_ready
    window.parent.postMessage({ type: 'game_ready' }, '*');

    if (typeof Sentry !== 'undefined' && SentryConfig.enabled) {
      try { Sentry.addBreadcrumb({ category: 'lifecycle', message: 'Game ready signal sent', level: 'info' }); } catch (e) { /* swallow */ }
    }

    // Show start transition screen (PART-024)
    if (transitionScreen) {
      try {
        transitionScreen.show({
          icons: ['🧩'],
          iconSize: 'large',
          title: 'Kakuro',
          subtitle: 'Fill cells so groups sum to clues. No repeats!',
          buttons: [{ text: "Let's Go!", type: 'primary', action: function() { startGame(); } }]
        });
      } catch (e) {
        console.error('TransitionScreen show error:', JSON.stringify({ error: e.message }, null, 2));
        // Fallback: start game directly
        startGame();
      }
    } else {
      // No transition screen available, start directly
      startGame();
    }

  } catch (error) {
    console.error('Initialization failed:', JSON.stringify({ error: error.message }, null, 2));
    if (typeof Sentry !== 'undefined' && SentryConfig.enabled) {
      try { Sentry.captureException(error); } catch (e) { /* swallow */ }
    }
    // Fallback: try to start game anyway
    try { startGame(); } catch (e) { console.error('Fallback start failed:', JSON.stringify({ error: e.message }, null, 2)); }
  }
});
</script>
