<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Egyptian Hieroglyph Decode</title>
<style>
/* === CSS Variables & Colors — PART-020 === */
:root {
  --mathai-primary: #6c5ce7;
  --mathai-primary-dark: #5a4bd1;
  --mathai-success: #27ae60;
  --mathai-error: #e74c3c;
  --mathai-warning: #f39c12;
  --mathai-bg: #1a1a2e;
  --mathai-bg-card: #16213e;
  --mathai-bg-input: #2a2a3e;
  --mathai-text-primary: #e6e6e6;
  --mathai-text-secondary: #aaa;
  --mathai-border: #444;
  --mathai-radius: 12px;
  --mathai-transition: 0.25s ease;
}

/* === Dark Theme === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--mathai-bg) !important;
  color: var(--mathai-text-primary) !important;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  font-size: 16px;
  line-height: 1.5;
  width: 100%;
  height: 100%;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  -webkit-text-size-adjust: 100%;
}

/* Dark theme overrides for PreviewScreenComponent wrapper.
   NOTE: The components package overrides --mathai-text-primary to #4a4a4a,
   so we use literal color values here instead of CSS variables. */
#mathai-preview-slot {
  background: #1a1a2e !important;
}

#mathai-preview-slot .mathai-preview-body {
  background: #1a1a2e !important;
}

#mathai-preview-slot .mathai-preview-instruction {
  color: #e6e6e6 !important;
}

#mathai-preview-slot .mathai-preview-instruction p {
  color: #e6e6e6 !important;
}

#mathai-preview-slot .mathai-preview-instruction b {
  color: #fff !important;
}

#mathai-preview-slot .mathai-preview-game-container {
  background: #1a1a2e !important;
}

#mathai-preview-slot .mathai-preview-header {
  background: #16213e !important;
  border-bottom: 1px solid #2a2a3e !important;
}

#mathai-preview-slot .mathai-preview-header * {
  color: #e6e6e6 !important;
}

#mathai-preview-slot .mathai-preview-skip-btn {
  background: #6c5ce7 !important;
  color: #fff !important;
}

#app {
  width: 100%;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* === Images inside preview instruction area === */
.key-image {
  width: 100%;
  max-width: 420px;
  border-radius: 12px;
  display: block;
  margin: 8px auto;
}

.question-image {
  width: 100%;
  max-width: 420px;
  border-radius: 12px;
  display: block;
  margin: 8px auto;
}

.prompt-text {
  font-size: 15px;
  font-weight: 500;
  color: #ccc;
  text-align: left;
  line-height: 1.5;
  margin: 12px 0 4px;
}

/* === Game play area: input + submit ONLY === */
.game-play-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  padding: 16px;
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
}

/* Answer input */
.input-wrapper {
  display: flex;
  justify-content: center;
  width: 100%;
}

.answer-input {
  width: 160px;
  height: 52px;
  font-size: 20px;
  font-weight: 600;
  text-align: center;
  border: 2px solid var(--mathai-border);
  border-radius: 8px;
  outline: none;
  background: var(--mathai-bg-input);
  color: var(--mathai-text-primary);
  transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
  -moz-appearance: textfield;
}

.answer-input::-webkit-outer-spin-button,
.answer-input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

.answer-input::placeholder {
  color: #777;
}

.answer-input:focus {
  border-color: var(--mathai-primary);
  box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.25);
}

.answer-input.correct {
  border-color: var(--mathai-success) !important;
  background: rgba(39, 174, 96, 0.15) !important;
  box-shadow: 0 0 0 3px rgba(39, 174, 96, 0.2);
}

.answer-input.incorrect {
  border-color: var(--mathai-error) !important;
  background: rgba(231, 76, 60, 0.15) !important;
  box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.2);
  animation: shake 0.4s ease;
}

.answer-input:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}

/* Button row */
.button-row {
  display: flex;
  gap: 12px;
  justify-content: center;
  width: 100%;
}

.game-btn {
  min-width: 120px;
  min-height: 48px;
  padding: 12px 28px;
  font-size: 16px;
  font-weight: 600;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: all var(--mathai-transition);
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

.btn-primary {
  background: var(--mathai-primary);
  color: #fff;
  box-shadow: 0 4px 12px rgba(108, 92, 231, 0.3);
}

.btn-primary:active:not(:disabled) {
  transform: scale(0.96);
  box-shadow: 0 2px 6px rgba(108, 92, 231, 0.2);
}

.btn-primary:disabled {
  opacity: 0.45;
  cursor: not-allowed;
  box-shadow: none;
}

/* Results metrics */
.results-metrics {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin: 16px 0;
}

.metric {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.metric-label {
  font-size: 13px;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.metric-value {
  font-size: 24px;
  font-weight: 700;
  color: var(--mathai-text-primary);
}

/* Correct answer display */
.correct-answer-display {
  text-align: center;
  font-size: 14px;
  color: #e74c3c;
  font-weight: 500;
  margin-top: -8px;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.correct-answer-display.visible {
  opacity: 1;
}
</style>

<!-- STEP 2: initSentry() function definition -->
<script>
function initSentry() {
  if (typeof SentryConfig !== 'undefined' && SentryConfig.enabled && typeof Sentry !== 'undefined') {
    Sentry.init({
      dsn: SentryConfig.dsn,
      environment: SentryConfig.environment,
      release: 'game-egyptian-hieroglyph-decode@1.0.0',
      tracesSampleRate: SentryConfig.tracesSampleRate,
      sampleRate: SentryConfig.sampleRate,
      maxBreadcrumbs: 50,
      ignoreErrors: [
        'ResizeObserver loop limit exceeded',
        'ResizeObserver loop completed with undelivered notifications',
        'Non-Error promise rejection captured',
        'Script error.',
        'Load failed',
        'Failed to fetch'
      ]
    });
  }
}

window.addEventListener('error', function(event) {
  if (typeof Sentry !== 'undefined') {
    Sentry.captureException(event.error || new Error(event.message), {
      tags: { errorType: 'unhandled', severity: 'critical' },
      contexts: { errorEvent: { message: event.message, filename: event.filename, lineno: event.lineno } }
    });
  }
});

window.addEventListener('unhandledrejection', function(event) {
  if (typeof Sentry !== 'undefined') {
    Sentry.captureException(event.reason || new Error('Unhandled promise rejection'), {
      tags: { errorType: 'unhandled-promise', severity: 'critical' }
    });
  }
});
</script>

<script src="https://browser.sentry-cdn.com/10.23.0/bundle.tracing.replay.feedback.min.js" crossorigin="anonymous"></script>

<body>
<div id="app"></div>

<script>
/* ============================================================
   GAME STATE — PART-007
   ============================================================ */
window.gameState = {
  gameId: 'game_egyptian_hieroglyph_decode',
  currentRound: 0,
  totalRounds: 10,
  lives: 2,
  totalLives: 2,
  score: 0,
  attempts: [],
  events: [],
  startTime: null,
  isActive: false,
  content: null,
  contentSetId: null,
  signalConfig: null,
  sessionHistory: [],
  duration_data: {
    startTime: null,
    preview: [],
    attempts: [],
    evaluations: [],
    inActiveTime: [],
    totalInactiveTime: 0,
    currentTime: null
  },
  userAnswer: '',
  phase: 'idle',
  gameEnded: false
};
var gameState = window.gameState;

var timer = null;
var visibilityTracker = null;
var previewScreen = null;
var progressBar = null;
var transitionScreen = null;
var signalCollector = null;
var interactionManager = null;

/* ============================================================
   FALLBACK CONTENT
   ============================================================ */
var fallbackContent = {
  previewInstruction: "Key to <b>Egyptian Hieroglyphs</b> \ud83d\udc47",
  previewAudioText: "Key to Egyptian Hieroglyphs",
  keyImageUrl: "https://ik.imagekit.io/thehomeworkapp/Egyptian%20Numbers/Key_A0dI1GZKT.png?updatedAt=1712989567593",
  rounds: [
    { imageUrl: "https://ik.imagekit.io/thehomeworkapp/Egyptian%20Numbers/27_-v1Ik7IUdT.png?updatedAt=1712997989238", correctAnswer: 27, prompt: "Decode this \ud83d\udc47 hieroglyph!" },
    { imageUrl: "https://ik.imagekit.io/thehomeworkapp/Egyptian%20Numbers/27_-v1Ik7IUdT.png?updatedAt=1712997989238", correctAnswer: 27, prompt: "Decode this \ud83d\udc47 hieroglyph!" },
    { imageUrl: "https://ik.imagekit.io/thehomeworkapp/Egyptian%20Numbers/27_-v1Ik7IUdT.png?updatedAt=1712997989238", correctAnswer: 27, prompt: "Decode this \ud83d\udc47 hieroglyph!" },
    { imageUrl: "https://ik.imagekit.io/thehomeworkapp/Egyptian%20Numbers/27_-v1Ik7IUdT.png?updatedAt=1712997989238", correctAnswer: 27, prompt: "Decode this \ud83d\udc47 hieroglyph!" },
    { imageUrl: "https://ik.imagekit.io/thehomeworkapp/Egyptian%20Numbers/27_-v1Ik7IUdT.png?updatedAt=1712997989238", correctAnswer: 27, prompt: "Decode this \ud83d\udc47 hieroglyph!" },
    { imageUrl: "https://ik.imagekit.io/thehomeworkapp/Egyptian%20Numbers/27_-v1Ik7IUdT.png?updatedAt=1712997989238", correctAnswer: 27, prompt: "Decode this \ud83d\udc47 hieroglyph!" },
    { imageUrl: "https://ik.imagekit.io/thehomeworkapp/Egyptian%20Numbers/27_-v1Ik7IUdT.png?updatedAt=1712997989238", correctAnswer: 27, prompt: "Decode this \ud83d\udc47 hieroglyph!" },
    { imageUrl: "https://ik.imagekit.io/thehomeworkapp/Egyptian%20Numbers/27_-v1Ik7IUdT.png?updatedAt=1712997989238", correctAnswer: 27, prompt: "Decode this \ud83d\udc47 hieroglyph!" },
    { imageUrl: "https://ik.imagekit.io/thehomeworkapp/Egyptian%20Numbers/27_-v1Ik7IUdT.png?updatedAt=1712997989238", correctAnswer: 27, prompt: "Decode this \ud83d\udc47 hieroglyph!" },
    { imageUrl: "https://ik.imagekit.io/thehomeworkapp/Egyptian%20Numbers/27_-v1Ik7IUdT.png?updatedAt=1712997989238", correctAnswer: 27, prompt: "Decode this \ud83d\udc47 hieroglyph!" }
  ]
};

/* ============================================================
   PART-003 — waitForPackages
   ============================================================ */
function waitForPackages() {
  return new Promise(function(resolve, reject) {
    var timeout = 180000;
    var start = Date.now();
    var required = ['FeedbackManager', 'ScreenLayout', 'PreviewScreenComponent', 'ProgressBarComponent', 'TransitionScreenComponent', 'SignalCollector', 'InteractionManager', 'VisibilityTracker'];

    function check() {
      var allReady = required.every(function(name) {
        return typeof window[name] !== 'undefined';
      });
      if (allReady) {
        resolve();
      } else if (Date.now() - start > timeout) {
        console.warn('waitForPackages: timeout reached, proceeding anyway');
        resolve();
      } else {
        setTimeout(check, 100);
      }
    }
    check();
  });
}

/* ============================================================
   PART-010 — trackEvent
   ============================================================ */
function trackEvent(type, target, data) {
  var ev = {
    type: type,
    target: target,
    timestamp: Date.now(),
    data: data || {}
  };
  gameState.events.push(ev);
  console.log('[Event]', type, target, data);
}

/* ============================================================
   PART-009 — recordAttempt
   ============================================================ */
function recordAttempt(data) {
  var attempt = {
    round: data.round,
    input_of_user: data.input_of_user,
    correct_answer: data.correct_answer,
    correct: data.correct,
    timestamp: Date.now()
  };
  gameState.attempts.push(attempt);

  if (signalCollector && typeof signalCollector.recordAttempt === 'function') {
    signalCollector.recordAttempt(attempt);
  }
}

/* ============================================================
   PART-008 — PostMessage Protocol
   ============================================================ */
function handlePostMessage(event) {
  var data = event.data;
  if (!data || !data.type) return;

  if (data.type === 'game_init') {
    console.log('[PostMessage] game_init received');
    if (data.content) {
      gameState.content = data.content;
    }
    if (data.contentSetId) {
      gameState.contentSetId = data.contentSetId;
    }
    if (data.signalConfig) {
      gameState.signalConfig = data.signalConfig;

      // Configure SignalCollector properties from signalConfig
      if (signalCollector) {
        if (data.signalConfig.flushUrl) signalCollector.flushUrl = data.signalConfig.flushUrl;
        if (data.signalConfig.playId) signalCollector.playId = data.signalConfig.playId;
        if (data.signalConfig.gameId) signalCollector.gameId = data.signalConfig.gameId;
        if (data.signalConfig.sessionId) signalCollector.sessionId = data.signalConfig.sessionId;
        if (data.signalConfig.contentSetId) signalCollector.contentSetId = data.signalConfig.contentSetId;
        if (data.signalConfig.studentId) signalCollector.studentId = data.signalConfig.studentId;

        // Start flushing signals to GCS
        if (typeof signalCollector.startFlushing === 'function') {
          signalCollector.startFlushing();
          console.log('[SignalCollector] Flushing started');
        }
      }
    }
    if (data.content && data.content.rounds) {
      gameState.totalRounds = data.content.rounds.length;
    }
    setupGame();
  }

  if (data.type === 'game_pause') {
    gameState.isActive = false;
  }

  if (data.type === 'game_resume') {
    gameState.isActive = true;
  }
}

function sendPostMessage(type, payload) {
  var msg = {
    type: type,
    gameId: gameState.gameId,
    timestamp: Date.now()
  };
  if (payload) {
    Object.keys(payload).forEach(function(key) {
      msg[key] = payload[key];
    });
  }
  try {
    window.parent.postMessage(msg, '*');
  } catch (e) {
    console.warn('[PostMessage] send failed:', e);
  }
}

/* ============================================================
   computeTriesPerRound
   ============================================================ */
function computeTriesPerRound() {
  var tries = {};
  gameState.attempts.forEach(function(a) {
    var r = a.round;
    if (!tries[r]) tries[r] = 0;
    tries[r]++;
  });
  return tries;
}

/* ============================================================
   showPreviewScreen
   ============================================================ */
function showPreviewScreen() {
  var firstInstructionHtml =
    '<p>' + gameState.content.previewInstruction + '</p>' +
    '<img class="key-image" src="' + gameState.content.keyImageUrl + '" alt="Hieroglyph key" />';

  previewScreen.show({
    instruction: firstInstructionHtml,
    audioUrl: null,
    showGameOnPreview: true,
    onComplete: startGameAfterPreview
  });
}

/* ============================================================
   startGameAfterPreview
   ============================================================ */
function startGameAfterPreview(previewData) {
  gameState.previewResult = previewData || {};
  var dur = (previewData && previewData.duration) ? previewData.duration : 0;
  gameState.duration_data.preview.push({ duration: dur });
  gameState.startTime = Date.now();
  gameState.isActive = true;
  gameState.phase = 'playing';
  gameState.duration_data.startTime = Date.now();

  trackEvent('game_start', 'game');

  if (signalCollector && typeof signalCollector.recordViewEvent === 'function') {
    signalCollector.recordViewEvent('screen_transition', { from: 'preview', to: 'game' });
  }

  renderRound();
}

/* ============================================================
   updateInstructionArea
   ============================================================ */
function updateInstructionArea() {
  var round = gameState.content.rounds[gameState.currentRound];
  var prompt = (round && round.prompt) ? round.prompt : 'Decode this \ud83d\udc47 hieroglyph!';

  var instructionHtml =
    '<p>' + gameState.content.previewInstruction + '</p>' +
    '<img class="key-image" src="' + gameState.content.keyImageUrl + '" alt="Hieroglyph key" />' +
    '<p class="prompt-text">' + prompt + '</p>' +
    '<img class="question-image" src="' + round.imageUrl + '" alt="Hieroglyph to decode" />';

  var instrEl = document.querySelector('.mathai-preview-instruction');
  if (instrEl) {
    instrEl.innerHTML = instructionHtml;
  }
}

/* ============================================================
   renderRound
   ============================================================ */
function renderRound() {
  gameState.userAnswer = '';
  gameState.phase = 'playing';

  var answerInput = document.getElementById('answerInput');
  var btnSubmit = document.getElementById('btn-submit');
  var btnNext = document.getElementById('btn-next');
  var correctDisplay = document.getElementById('correctAnswerDisplay');

  if (answerInput) {
    answerInput.value = '';
    answerInput.classList.remove('correct', 'incorrect');
    answerInput.disabled = false;
  }

  if (btnSubmit) {
    btnSubmit.style.display = '';
    btnSubmit.disabled = true;
  }

  if (btnNext) {
    btnNext.style.display = 'none';
  }

  if (correctDisplay) {
    correctDisplay.classList.remove('visible');
    correctDisplay.textContent = '';
  }

  if (progressBar && typeof progressBar.update === 'function') {
    progressBar.update(gameState.currentRound, gameState.lives);
  }

  updateInstructionArea();

  if (signalCollector && typeof signalCollector.recordViewEvent === 'function') {
    signalCollector.recordViewEvent('round_start', { round: gameState.currentRound + 1 });
  }

  // Re-enable interaction
  if (interactionManager && typeof interactionManager.enable === 'function') {
    interactionManager.enable();
  }

  // Focus input after short delay (for mobile keyboards)
  setTimeout(function() {
    if (answerInput && !answerInput.disabled) {
      answerInput.focus();
    }
  }, 300);
}

/* ============================================================
   handleSubmit
   ============================================================ */
function handleSubmit() {
  if (gameState.phase !== 'playing') return;
  if (gameState.userAnswer.trim() === '') return;

  gameState.phase = 'feedback';

  // Suppress further taps during feedback
  if (interactionManager && typeof interactionManager.disable === 'function') {
    interactionManager.disable();
  }

  var round = gameState.content.rounds[gameState.currentRound];
  var userNum = parseInt(gameState.userAnswer.trim(), 10);
  var isCorrect = (userNum === round.correctAnswer);

  var attemptStartTime = Date.now();
  recordAttempt({
    round: gameState.currentRound + 1,
    input_of_user: userNum,
    correct_answer: round.correctAnswer,
    correct: isCorrect
  });

  gameState.duration_data.attempts.push({
    round: gameState.currentRound + 1,
    startTime: attemptStartTime,
    endTime: Date.now()
  });

  var answerInput = document.getElementById('answerInput');
  var btnSubmit = document.getElementById('btn-submit');
  var btnNext = document.getElementById('btn-next');
  var correctDisplay = document.getElementById('correctAnswerDisplay');

  if (isCorrect) {
    gameState.score++;
    if (answerInput) answerInput.classList.add('correct');
  } else {
    gameState.lives--;
    if (answerInput) answerInput.classList.add('incorrect');

    // Show correct answer
    if (correctDisplay) {
      correctDisplay.textContent = 'Correct answer: ' + round.correctAnswer;
      correctDisplay.classList.add('visible');
    }
  }

  // Disable input, hide submit, show next
  if (answerInput) answerInput.disabled = true;
  if (btnSubmit) { btnSubmit.disabled = true; btnSubmit.style.display = 'none'; }
  if (btnNext && gameState.lives > 0) btnNext.style.display = '';

  // Update progress bar for lives
  if (progressBar && typeof progressBar.update === 'function') {
    progressBar.update(gameState.currentRound, gameState.lives);
  }

  // Audio feedback
  if (typeof FeedbackManager !== 'undefined' && FeedbackManager.playDynamicFeedback) {
    try {
      FeedbackManager.playDynamicFeedback(isCorrect);
    } catch (e) {
      console.warn('[FeedbackManager] error:', e);
    }
  }

  trackEvent('answer_submitted', 'game', {
    round: gameState.currentRound + 1,
    correct: isCorrect,
    userAnswer: userNum,
    correctAnswer: round.correctAnswer
  });

  // Check game over (lives exhausted)
  if (!isCorrect && gameState.lives <= 0) {
    setTimeout(function() {
      endGame();
    }, 1500);
    return;
  }

  // Re-enable interaction for Next button
  setTimeout(function() {
    if (interactionManager && typeof interactionManager.enable === 'function') {
      interactionManager.enable();
    }
  }, 400);
}

/* ============================================================
   nextRound
   ============================================================ */
function nextRound() {
  gameState.currentRound++;
  if (gameState.currentRound >= gameState.totalRounds) {
    endGame();
  } else {
    renderRound();
  }
}

/* ============================================================
   endGame — PART-011
   ============================================================ */
function endGame() {
  if (gameState.gameEnded) return;
  gameState.gameEnded = true;
  gameState.isActive = false;
  gameState.phase = 'ended';

  var totalTime = (Date.now() - gameState.startTime) / 1000;

  var accuracy = gameState.totalRounds > 0
    ? Math.round((gameState.score / gameState.totalRounds) * 100) : 0;

  var stars;
  if (gameState.lives <= 0) {
    stars = 0;
  } else if (accuracy >= 80) {
    stars = 3;
  } else if (accuracy >= 50) {
    stars = 2;
  } else if (accuracy >= 1) {
    stars = 1;
  } else {
    stars = 0;
  }

  var metrics = {
    accuracy: accuracy,
    time: parseFloat(totalTime.toFixed(1)),
    stars: stars,
    star_thresholds: { 3: 80, 2: 50, 1: 1, 0: 0 },
    attempts: gameState.attempts,
    duration_data: gameState.duration_data,
    totalLives: gameState.totalLives,
    tries: computeTriesPerRound()
  };

  trackEvent('game_end', 'game', {
    score: gameState.score,
    accuracy: accuracy,
    stars: stars
  });

  if (signalCollector && typeof signalCollector.seal === 'function') {
    signalCollector.seal();
  }

  // Show results via TransitionScreen
  var isGameOver = (gameState.lives <= 0);
  var resultsTitle = isGameOver ? 'Game Over!' : (stars >= 2 ? 'Great Work!' : 'Keep Practicing!');

  var resultsContent =
    '<div class="results-metrics">' +
      '<div class="metric"><span class="metric-label">Score</span><span class="metric-value">' + gameState.score + '/' + gameState.totalRounds + '</span></div>' +
      '<div class="metric"><span class="metric-label">Accuracy</span><span class="metric-value">' + accuracy + '%</span></div>' +
    '</div>';

  if (transitionScreen && typeof transitionScreen.show === 'function') {
    // Play celebration or encouragement
    if (!isGameOver && stars >= 3 && typeof FeedbackManager !== 'undefined' && FeedbackManager.playCelebration) {
      try { FeedbackManager.playCelebration(); } catch (e) { console.warn(e); }
    }

    transitionScreen.show({
      stars: stars,
      title: resultsTitle,
      content: resultsContent,
      persist: true,
      buttons: [{ text: 'Play Again', type: 'primary', action: function() { restartGame(); } }]
    });
  }

  // Send gameOver postMessage event
  sendPostMessage('gameOver', {
    score: gameState.score,
    totalRounds: gameState.totalRounds,
    metrics: metrics
  });

  // Send game_complete postMessage with nested data.metrics schema
  var signalEventCount = (signalCollector && typeof signalCollector.getEventCount === 'function') ? signalCollector.getEventCount() : 0;
  var signalMetadata = (signalCollector && typeof signalCollector.getMetadata === 'function') ? signalCollector.getMetadata() : {};

  sendPostMessage('game_complete', {
    data: {
      metrics: metrics,
      completedAt: Date.now(),
      signal_event_count: signalEventCount,
      signal_metadata: signalMetadata
    },
    sessionHistory: gameState.sessionHistory
  });

  // Cleanup
  if (previewScreen && typeof previewScreen.destroy === 'function') {
    previewScreen.destroy();
  }
  if (visibilityTracker && typeof visibilityTracker.destroy === 'function') {
    visibilityTracker.destroy();
  }
}

/* ============================================================
   restartGame
   ============================================================ */
function restartGame() {
  gameState.currentRound = 0;
  gameState.score = 0;
  gameState.lives = gameState.totalLives;
  gameState.attempts = [];
  gameState.events = [];
  gameState.startTime = Date.now();
  gameState.isActive = true;
  gameState.gameEnded = false;
  gameState.userAnswer = '';
  gameState.phase = 'playing';
  gameState.duration_data = {
    startTime: Date.now(),
    preview: gameState.duration_data.preview || [],
    attempts: [],
    evaluations: [],
    inActiveTime: [],
    totalInactiveTime: 0,
    currentTime: null
  };

  // Store session history
  gameState.sessionHistory.push({
    timestamp: Date.now(),
    action: 'restart'
  });

  if (transitionScreen && typeof transitionScreen.hide === 'function') {
    transitionScreen.hide();
  }

  if (progressBar && typeof progressBar.update === 'function') {
    progressBar.update(0, gameState.lives);
  }

  trackEvent('game_start', 'game');
  renderRound();
}

/* ============================================================
   setupGame
   ============================================================ */
function setupGame() {
  // Use fallback content if not provided
  if (!gameState.content) {
    gameState.content = fallbackContent;
  }
  gameState.totalRounds = gameState.content.rounds.length;

  // Build game play area HTML into #gameContent
  var gameContent = document.getElementById('gameContent');
  if (gameContent) {
    gameContent.innerHTML =
      '<div class="game-play-area">' +
        '<div class="input-wrapper">' +
          '<input type="number" id="answerInput" class="answer-input" placeholder="Type here" inputmode="numeric" pattern="[0-9]*" />' +
        '</div>' +
        '<div class="correct-answer-display" id="correctAnswerDisplay"></div>' +
        '<div class="button-row" id="buttonRow">' +
          '<button class="game-btn btn-primary" id="btn-submit" disabled>Submit</button>' +
          '<button class="game-btn btn-primary" id="btn-next" style="display:none;">Next</button>' +
        '</div>' +
      '</div>';

    // Attach event listeners
    var answerInput = document.getElementById('answerInput');
    var btnSubmit = document.getElementById('btn-submit');
    var btnNext = document.getElementById('btn-next');

    if (answerInput) {
      answerInput.addEventListener('input', function() {
        gameState.userAnswer = answerInput.value;
        if (btnSubmit) {
          btnSubmit.disabled = (answerInput.value.trim() === '');
        }
      });

      // Allow Enter key to submit
      answerInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !btnSubmit.disabled && gameState.phase === 'playing') {
          e.preventDefault();
          handleSubmit();
        }
      });
    }

    if (btnSubmit) {
      btnSubmit.addEventListener('click', function(e) {
        e.preventDefault();
        handleSubmit();
      });
    }

    if (btnNext) {
      btnNext.addEventListener('click', function(e) {
        e.preventDefault();
        nextRound();
      });
    }
  }

  // Setup InteractionManager
  if (typeof InteractionManager !== 'undefined') {
    try {
      interactionManager = new InteractionManager({
        selector: '.game-play-area'
      });
    } catch (e) {
      console.warn('[InteractionManager] init error:', e);
    }
  }

  showPreviewScreen();
}

/* ============================================================
   PART-012 — Debug Functions
   ============================================================ */
window.debugGame = function() {
  console.log('=== GAME STATE DEBUG ===');
  console.log('Round:', gameState.currentRound + 1, '/', gameState.totalRounds);
  console.log('Score:', gameState.score);
  console.log('Lives:', gameState.lives, '/', gameState.totalLives);
  console.log('Phase:', gameState.phase);
  console.log('Active:', gameState.isActive);
  console.log('Ended:', gameState.gameEnded);
  console.log('Attempts:', gameState.attempts.length);
  console.log('Events:', gameState.events.length);
  console.log('Full state:', JSON.parse(JSON.stringify(gameState)));
  return gameState;
};

window.debugAudio = function() {
  if (typeof FeedbackManager !== 'undefined') {
    console.log('FeedbackManager available:', true);
    return FeedbackManager;
  }
  console.log('FeedbackManager not loaded');
  return null;
};

window.testAudio = function(correct) {
  if (typeof FeedbackManager !== 'undefined' && FeedbackManager.playDynamicFeedback) {
    FeedbackManager.playDynamicFeedback(correct !== false);
  }
};

window.testPause = function() {
  gameState.isActive = false;
  console.log('Game paused');
};

window.testResume = function() {
  gameState.isActive = true;
  console.log('Game resumed');
};

/* ============================================================
   DOMContentLoaded — PART-004 Init
   ============================================================ */
document.addEventListener('DOMContentLoaded', function() {
  waitForPackages().then(function() {
    console.log('[Init] Packages loaded');

    // Initialize FeedbackManager
    if (typeof FeedbackManager !== 'undefined' && FeedbackManager.init) {
      try {
        FeedbackManager.init();
        console.log('[Init] FeedbackManager initialized');
      } catch (e) {
        console.warn('[Init] FeedbackManager init error:', e);
      }
    }

    // VisibilityTracker — PART-005
    if (typeof VisibilityTracker !== 'undefined') {
      try {
        visibilityTracker = new VisibilityTracker({
          onInactive: function(inactiveStart) {
            if (gameState.duration_data) {
              gameState.duration_data.inActiveTime.push({ start: inactiveStart });
            }
            if (previewScreen && typeof previewScreen.pause === 'function') {
              previewScreen.pause();
            }
          },
          onResume: function(resumeTime, inactiveDuration) {
            if (gameState.duration_data) {
              var last = gameState.duration_data.inActiveTime[gameState.duration_data.inActiveTime.length - 1];
              if (last) last.end = resumeTime;
              gameState.duration_data.totalInactiveTime += inactiveDuration || 0;
            }
            if (previewScreen && typeof previewScreen.resume === 'function') {
              previewScreen.resume();
            }
          }
        });
        console.log('[Init] VisibilityTracker created');
      } catch (e) {
        console.warn('[Init] VisibilityTracker error:', e);
      }
    }

    // ScreenLayout — PART-025 v2
    if (typeof ScreenLayout !== 'undefined' && ScreenLayout.inject) {
      try {
        ScreenLayout.inject('app', {
          slots: { previewScreen: true, transitionScreen: true }
        });
        console.log('[Init] ScreenLayout injected');
      } catch (e) {
        console.warn('[Init] ScreenLayout error:', e);
      }
    }

    // PreviewScreenComponent — PART-039
    if (typeof PreviewScreenComponent !== 'undefined') {
      try {
        previewScreen = new PreviewScreenComponent({
          autoInject: true,
          slotId: 'mathai-preview-slot',
          gameContentId: 'gameContent'
        });
        console.log('[Init] PreviewScreen created');
      } catch (e) {
        console.warn('[Init] PreviewScreen error:', e);
      }
    }

    // ProgressBarComponent — PART-023 v2
    if (typeof ProgressBarComponent !== 'undefined') {
      try {
        progressBar = new ProgressBarComponent({
          totalRounds: gameState.totalRounds,
          totalLives: gameState.totalLives
        });
        console.log('[Init] ProgressBar created');
      } catch (e) {
        console.warn('[Init] ProgressBar error:', e);
      }
    }

    // TransitionScreenComponent — PART-024 v2
    if (typeof TransitionScreenComponent !== 'undefined') {
      try {
        transitionScreen = new TransitionScreenComponent({
          slotId: 'mathai-transition-slot'
        });
        console.log('[Init] TransitionScreen created');
      } catch (e) {
        console.warn('[Init] TransitionScreen error:', e);
      }
    }

    // SignalCollector — PART-008
    if (typeof SignalCollector !== 'undefined') {
      try {
        signalCollector = new SignalCollector({
          gameId: gameState.gameId,
          config: gameState.signalConfig
        });
        console.log('[Init] SignalCollector created');
      } catch (e) {
        console.warn('[Init] SignalCollector error:', e);
      }
    }

    // Setup the game
    setupGame();

    // Listen for postMessages
    window.addEventListener('message', handlePostMessage);

    console.log('[Init] Game ready');
  }).catch(function(err) {
    console.error('[Init] Fatal error:', err);
  });
});
</script>
