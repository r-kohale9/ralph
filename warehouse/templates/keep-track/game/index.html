<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Keep Track</title>
  <style>
    /* === CSS Variables (PART-020) === */
    :root {
      --mathai-green: #219653;
      --mathai-light-green: #EAFBF1;
      --mathai-red: #E35757;
      --mathai-light-red: #FDECEC;
      --mathai-blue: #2563eb;
      --mathai-light-blue: #EBF0FF;
      --mathai-gray: #828282;
      --mathai-light-gray: #F2F2F2;
      --mathai-white: #FFFFFF;
      --mathai-black: #1A1A2E;
      --mathai-font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --mathai-font-size-title: 24px;
      --mathai-font-size-body: 16px;
      --mathai-font-size-label: 14px;
      --mathai-font-size-small: 12px;
    }

    /* === Reset === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--mathai-font-family);
      background: var(--mathai-light-gray);
      color: var(--mathai-black);
      -webkit-font-smoothing: antialiased;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* === Game Block === */
    .game-block {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      gap: 16px;
    }

    /* === Instruction Area === */
    .instruction-area {
      width: 100%;
      max-width: 340px;
      margin: 0 auto;
      padding: 0 4px;
      text-align: center;
    }

    .instruction-text {
      font-size: var(--mathai-font-size-body);
      color: var(--mathai-black);
      line-height: 1.5;
      margin-bottom: 4px;
      font-weight: 600;
    }

    /* === Cups Row === */
    .cups-row {
      display: flex;
      justify-content: center;
      gap: 16px;
      max-width: 360px;
      width: 100%;
      margin: 24px auto;
      position: relative;
      min-height: 120px;
      align-items: flex-end;
    }

    .cup-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      position: relative;
      cursor: default;
      min-width: 44px;
      min-height: 44px;
    }

    .cup-container.clickable {
      cursor: pointer;
    }

    .cup-container.clickable:hover .cup-icon {
      transform: scale(1.1);
    }

    .cup-icon {
      font-size: 48px;
      transition: transform 0.2s ease;
      user-select: none;
      line-height: 1;
    }

    .cup-item {
      font-size: 24px;
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 0.3s ease, transform 0.3s ease;
      position: absolute;
      bottom: -28px;
      user-select: none;
    }

    .cup-item.visible {
      opacity: 1;
      transform: scale(1);
    }

    /* Cup lift animation for reveal */
    .cup-container.revealing .cup-icon {
      animation: cupLift 0.4s ease-out forwards;
    }

    .cup-container.hiding .cup-icon {
      animation: cupDrop 0.4s ease-in forwards;
    }

    @keyframes cupLift {
      0% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-20px) scale(1.05); }
      100% { transform: translateY(-16px) scale(1.05); }
    }

    @keyframes cupDrop {
      0% { transform: translateY(-16px) scale(1.05); }
      50% { transform: translateY(-20px) scale(1.05); }
      100% { transform: translateY(0) scale(1); }
    }

    /* Landing bounce after swap completes */
    .cup-container.landing {
      animation: landBounce 0.2s ease-out;
    }

    @keyframes landBounce {
      0% { transform: translateY(-4px); }
      50% { transform: translateY(2px); }
      100% { transform: translateY(0); }
    }

    /* Guess phase — cups gently pulse to invite tapping */
    .cup-container.clickable .cup-icon {
      animation: gentlePulse 1.5s ease-in-out infinite;
    }

    @keyframes gentlePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    /* Feedback states */
    .cup-container.correct .cup-icon {
      filter: drop-shadow(0 0 12px rgba(33, 150, 83, 0.7));
      animation: correctPop 0.4s ease-out;
    }

    .cup-container.wrong .cup-icon {
      filter: drop-shadow(0 0 12px rgba(227, 87, 87, 0.7));
      animation: wrongShake 0.4s ease-out;
    }

    @keyframes correctPop {
      0% { transform: scale(1); }
      40% { transform: scale(1.2); }
      100% { transform: scale(1.05); }
    }

    @keyframes wrongShake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    /* === Buttons (PART-022) === */
    .game-btn {
      padding: 12px 32px;
      border: none;
      border-radius: 12px;
      font-size: var(--mathai-font-size-body);
      font-weight: 600;
      font-family: var(--mathai-font-family);
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease;
      user-select: none;
      min-height: 44px;
      min-width: 44px;
    }

    .game-btn:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--mathai-blue);
      color: var(--mathai-white);
    }

    .btn-primary:hover { background: #1d4ed8; }

    .btn-secondary {
      background: var(--mathai-light-gray);
      color: var(--mathai-black);
    }

    /* === Utility === */
    .hidden { display: none !important; }

    /* === Results Card (PART-019) === */
    .results-card {
      width: 100%;
      max-width: 340px;
      background: var(--mathai-white);
      border-radius: 16px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .stars-display { font-size: 36px; margin-bottom: 12px; }

    .results-title {
      font-size: var(--mathai-font-size-title);
      font-weight: 700;
      margin-bottom: 20px;
    }

    .results-metrics {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .metric-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--mathai-light-gray);
    }

    .metric-label { font-size: var(--mathai-font-size-label); color: var(--mathai-gray); }
    .metric-value { font-size: var(--mathai-font-size-body); font-weight: 600; color: var(--mathai-black); }
  </style>
</head>
<body>
  <!-- 1. Sentry Config + SDK (PART-030) -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/sentry/index.js"></script>
  <script src="https://browser.sentry-cdn.com/10.23.0/bundle.tracing.replay.feedback.min.js" crossorigin="anonymous"></script>

  <!-- 2. Game Packages (PART-002) -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

  <div id="app"></div>

  <template id="game-template">
    <div id="game-screen" class="game-block">
      <div id="timer-container"></div>

      <div class="instruction-area">
        <p class="instruction-text" id="instruction-text">Watch where the star hides!</p>
      </div>

      <div class="cups-row" id="cups-row" data-signal-id="cups-row">
        <!-- Cup elements generated by JavaScript -->
      </div>
    </div>

    <div id="results-screen" class="game-block hidden">
      <div class="results-card">
        <div id="stars-display" class="stars-display"></div>
        <h2 class="results-title">Game Complete!</h2>
        <div class="results-metrics">
          <div class="metric-row">
            <span class="metric-label">Score</span>
            <span class="metric-value" id="result-score">0/5</span>
          </div>
          <div class="metric-row">
            <span class="metric-label">Time</span>
            <span class="metric-value" id="result-time">0:00</span>
          </div>
          <div class="metric-row">
            <span class="metric-label">Rounds Completed</span>
            <span class="metric-value" id="result-correct">0</span>
          </div>
          <div class="metric-row">
            <span class="metric-label">Lives Remaining</span>
            <span class="metric-value" id="result-lives">0</span>
          </div>
          <div class="metric-row">
            <span class="metric-label">Accuracy</span>
            <span class="metric-value" id="result-accuracy">0%</span>
          </div>
        </div>
        <button class="game-btn btn-primary" id="btn-restart" data-signal-id="restart-button" onclick="restartGame()">Play Again</button>
      </div>
    </div>
  </template>

  <script>
    /* ========================================
       GAME STATE (PART-007)
       ======================================== */
    window.gameState = {
      gameId: 'game_keep_track',
      contentSetId: null,
      signalConfig: null,
      currentRound: 0,
      totalRounds: 5,
      score: 0,
      attempts: [],
      events: [],
      startTime: null,
      isActive: false,
      gameEnded: false,
      isProcessing: false,
      content: null,
      sessionHistory: [],
      duration_data: {
        startTime: null,
        preview: [],
        attempts: [],
        evaluations: [],
        inActiveTime: [],
        totalInactiveTime: 0,
        currentTime: null
      },
      // GAME-SPECIFIC
      lives: 3,
      totalLives: 3,
      phase: 'idle',
      cupCount: 3,
      shuffles: [],
      shuffleSpeed: 0.8,
      correctCup: 0,
      cupPositions: [],
      roundStartTime: null,
      roundTimes: []
    };

    let timer = null;
    let visibilityTracker = null;
    let signalCollector = null;
    let progressBar = null;
    let transitionScreen = null;

    /* ========================================
       FALLBACK CONTENT (PART-028)
       ======================================== */
    const fallbackContent = {
      rounds: [
        {
          cupCount: 3,
          shuffles: [[0, 1], [1, 2], [0, 2]],
          shuffleSpeed: 0.8,
          itemStartPosition: 1
        },
        {
          cupCount: 3,
          shuffles: [[0, 2], [1, 2], [0, 1], [1, 2]],
          shuffleSpeed: 0.6,
          itemStartPosition: 0
        },
        {
          cupCount: 4,
          shuffles: [[1, 3], [0, 2], [2, 3], [0, 1], [1, 3]],
          shuffleSpeed: 0.5,
          itemStartPosition: 2
        },
        {
          cupCount: 4,
          shuffles: [[2, 3], [0, 1], [1, 2], [0, 3], [2, 3], [0, 1]],
          shuffleSpeed: 0.4,
          itemStartPosition: 3
        },
        {
          cupCount: 5,
          shuffles: [[0, 4], [1, 3], [2, 4], [0, 2], [3, 4], [1, 2], [0, 3], [2, 4]],
          shuffleSpeed: 0.3,
          itemStartPosition: 2
        }
      ]
    };

    /* ========================================
       SENTRY INITIALIZATION (PART-030)
       ======================================== */
    function initSentry() {
      if (typeof Sentry === 'undefined' || typeof SentryConfig === 'undefined') return;
      if (!SentryConfig.enabled) return;
      Sentry.init({
        dsn: SentryConfig.dsn,
        environment: SentryConfig.environment,
        release: 'keep-track@1.0.0',
        tracesSampleRate: SentryConfig.tracesSampleRate,
        sampleRate: SentryConfig.sampleRate,
        maxBreadcrumbs: 50,
        ignoreErrors: [
          'ResizeObserver loop limit exceeded',
          'ResizeObserver loop completed with undelivered notifications',
          'Non-Error promise rejection captured',
          'Script error.',
          'Load failed',
          'Failed to fetch',
        ],
      });
    }
    window.addEventListener('load', initSentry);

    window.addEventListener('error', function(event) {
      if (typeof Sentry !== 'undefined') {
        Sentry.captureException(event.error || new Error(event.message), {
          tags: { errorType: 'unhandled', severity: 'critical' },
          contexts: { errorEvent: { message: event.message, filename: event.filename, lineno: event.lineno } },
        });
      }
    });

    window.addEventListener('unhandledrejection', function(event) {
      if (typeof Sentry !== 'undefined') {
        Sentry.captureException(event.reason || new Error('Unhandled promise rejection'), {
          tags: { errorType: 'unhandled-promise', severity: 'critical' },
        });
      }
    });

    /* ========================================
       UTILITY FUNCTIONS
       ======================================== */
    function delay(ms) {
      return new Promise(function(resolve) { setTimeout(resolve, ms); });
    }

    function formatTime(seconds) {
      var m = Math.floor(seconds / 60);
      var s = Math.floor(seconds % 60);
      return m + ':' + String(s).padStart(2, '0');
    }

    /* ========================================
       EVENT TRACKING (PART-010)
       ======================================== */
    function trackEvent(type, target, data) {
      gameState.events.push({
        type: type,
        target: target,
        timestamp: Date.now(),
        time_since_start: gameState.startTime ? (Date.now() - gameState.startTime) / 1000 : 0,
        data: data || {}
      });
    }

    /* ========================================
       ATTEMPT RECORDING (PART-009)
       ======================================== */
    function recordAttempt(data) {
      var attempt = {
        attempt_timestamp: new Date().toISOString(),
        time_since_start_of_game: gameState.startTime ? (Date.now() - gameState.startTime) / 1000 : 0,
        input_of_user: data.input_of_user,
        attempt_number: gameState.attempts.length + 1,
        correct: data.correct,
        metadata: data.metadata
      };
      gameState.attempts.push(attempt);
    }

    /* ========================================
       TRIES PER ROUND (PART-011 v3)
       ======================================== */
    function computeTriesPerRound() {
      var triesMap = {};
      gameState.attempts.forEach(function(a) {
        var round = (a.metadata && a.metadata.round) || 1;
        triesMap[round] = (triesMap[round] || 0) + 1;
      });
      return Object.entries(triesMap).map(function(entry) {
        return { round: Number(entry[0]), triesCount: entry[1] };
      });
    }

    /* ========================================
       RENDER CUPS (PART-027)
       ======================================== */
    function renderCups(count, clickable) {
      var row = document.getElementById('cups-row');
      row.innerHTML = '';
      for (var i = 0; i < count; i++) {
        var container = document.createElement('div');
        container.className = 'cup-container';
        container.setAttribute('data-signal-id', 'cup-' + i);
        container.setAttribute('data-cup-index', i);
        if (clickable) {
          container.classList.add('clickable');
          container.setAttribute('onclick', 'handleCupTap(' + i + ')');
        }
        var icon = document.createElement('span');
        icon.className = 'cup-icon';
        icon.textContent = '🥤';
        var item = document.createElement('span');
        item.className = 'cup-item';
        item.textContent = '⭐';
        container.appendChild(icon);
        container.appendChild(item);
        row.appendChild(container);
      }
    }

    /* ========================================
       SWAP CUPS ANIMATION
       ======================================== */
    async function swapCups(indexA, indexB, speed) {
      var row = document.getElementById('cups-row');
      var cupEls = row.children;
      var elA = cupEls[indexA];
      var elB = cupEls[indexB];

      if (!elA || !elB) return;

      // Calculate horizontal offset
      var rectA = elA.getBoundingClientRect();
      var rectB = elB.getBoundingClientRect();
      var offsetX = rectB.left - rectA.left;

      // Set CSS custom properties for animation duration
      var durationMs = speed * 1000;

      // Animate using transform transitions
      elA.style.transition = 'transform ' + speed + 's cubic-bezier(0.45, 0, 0.55, 1)';
      elB.style.transition = 'transform ' + speed + 's cubic-bezier(0.45, 0, 0.55, 1)';

      // Apply transforms - elA goes right, elB goes left, both arc up
      // We use a keyframe-like approach with intermediate steps
      elA.style.transform = 'translateX(' + offsetX + 'px)';
      elB.style.transform = 'translateX(' + (-offsetX) + 'px)';

      // Play shuffle sound (fire-and-forget)
      try { FeedbackManager.sound.play('shuffle_move'); } catch(e) {}

      await delay(durationMs);

      // Reset transforms
      elA.style.transition = 'none';
      elB.style.transition = 'none';
      elA.style.transform = '';
      elB.style.transform = '';

      // Actually swap DOM elements
      if (indexA < indexB) {
        row.insertBefore(elB, elA);
      } else {
        row.insertBefore(elA, elB);
      }

      // Update onclick handlers after DOM swap
      var newCupEls = row.children;
      for (var k = 0; k < newCupEls.length; k++) {
        newCupEls[k].setAttribute('data-cup-index', k);
        if (newCupEls[k].classList.contains('clickable')) {
          newCupEls[k].setAttribute('onclick', 'handleCupTap(' + k + ')');
        }
      }

      // Landing bounce
      var swappedA = newCupEls[indexA];
      var swappedB = newCupEls[indexB];
      if (swappedA) swappedA.classList.add('landing');
      if (swappedB) swappedB.classList.add('landing');

      await delay(200);

      if (swappedA) swappedA.classList.remove('landing');
      if (swappedB) swappedB.classList.remove('landing');

      // Swap positions in cupPositions array
      var temp = gameState.cupPositions[indexA];
      gameState.cupPositions[indexA] = gameState.cupPositions[indexB];
      gameState.cupPositions[indexB] = temp;
    }

    /* ========================================
       START ROUND
       ======================================== */
    async function startRound() {
      var content = gameState.content || fallbackContent;
      var round = content.rounds[gameState.currentRound];

      gameState.cupCount = round.cupCount;
      gameState.shuffles = round.shuffles;
      gameState.shuffleSpeed = round.shuffleSpeed;
      gameState.correctCup = round.itemStartPosition;
      gameState.cupPositions = Array.from({ length: round.cupCount }, function(_, i) { return i; });

      renderCups(round.cupCount, false);

      gameState.phase = 'reveal';
      document.getElementById('instruction-text').textContent = 'Watch where the ⭐ hides!';

      // Reveal animation
      var cupEls = document.getElementById('cups-row').children;
      var correctEl = cupEls[gameState.correctCup];
      if (correctEl) {
        correctEl.classList.add('revealing');
        var starEl = correctEl.querySelector('.cup-item');
        if (starEl) starEl.classList.add('visible');
      }

      // Play reveal sound (fire-and-forget)
      try { FeedbackManager.sound.play('reveal_sound'); } catch(e) {}

      trackEvent('item_revealed', 'game', { round: gameState.currentRound + 1, position: round.itemStartPosition });

      // Record view event for round content render
      if (signalCollector) {
        signalCollector.recordViewEvent('content_render', {
          screen: 'gameplay',
          content_snapshot: {
            round: gameState.currentRound + 1,
            cup_count: round.cupCount,
            phase: 'reveal',
            item_position: round.itemStartPosition,
            trigger: 'round_start'
          },
          components: {
            timer: timer ? { value: timer.getCurrentTime(), state: timer.isRunning ? 'running' : 'paused' } : null,
            progress: { current: gameState.currentRound, total: gameState.totalRounds }
          }
        });
      }

      await delay(1500);

      // Hide animation
      if (correctEl) {
        correctEl.classList.remove('revealing');
        correctEl.classList.add('hiding');
        var starEl2 = correctEl.querySelector('.cup-item');
        if (starEl2) starEl2.classList.remove('visible');
      }

      await delay(400);

      if (correctEl) correctEl.classList.remove('hiding');

      // Shuffle phase
      gameState.phase = 'shuffling';
      document.getElementById('instruction-text').textContent = 'Watch the cups shuffle!';

      // Play shuffle start sound (fire-and-forget)
      try { FeedbackManager.sound.play('shuffle_start_sound'); } catch(e) {}

      trackEvent('shuffle_start', 'game', { round: gameState.currentRound + 1, count: round.shuffles.length, speed: round.shuffleSpeed });

      // Execute shuffles
      for (var i = 0; i < round.shuffles.length; i++) {
        var pair = round.shuffles[i];
        var a = pair[0];
        var b = pair[1];
        await swapCups(a, b, round.shuffleSpeed);
        // Update correctCup tracking
        if (gameState.correctCup === a) {
          gameState.correctCup = b;
        } else if (gameState.correctCup === b) {
          gameState.correctCup = a;
        }
      }

      trackEvent('shuffle_end', 'game', { round: gameState.currentRound + 1, correctCup: gameState.correctCup });

      await delay(300);

      // Guess phase
      gameState.phase = 'guess';
      var allCups = document.getElementById('cups-row').children;
      for (var j = 0; j < allCups.length; j++) {
        allCups[j].classList.add('clickable');
        allCups[j].setAttribute('onclick', 'handleCupTap(' + j + ')');
      }
      document.getElementById('instruction-text').textContent = 'Where is the ⭐?';
      gameState.roundStartTime = Date.now();

      // Record view event for guess phase
      if (signalCollector) {
        signalCollector.recordViewEvent('visual_update', {
          screen: 'gameplay',
          content_snapshot: {
            type: 'guess_phase_start',
            round: gameState.currentRound + 1,
            cup_count: gameState.cupCount,
            trigger: 'user_action'
          }
        });
      }
    }

    /* ========================================
       HANDLE CUP TAP
       ======================================== */
    async function handleCupTap(cupIndex) {
      if (gameState.phase !== 'guess' || !gameState.isActive || gameState.isProcessing) return;
      gameState.isProcessing = true;
      gameState.phase = 'feedback';

      // Remove clickable from all cups
      var cupEls = document.getElementById('cups-row').children;
      for (var i = 0; i < cupEls.length; i++) {
        cupEls[i].classList.remove('clickable');
        cupEls[i].removeAttribute('onclick');
      }

      var isCorrect = (cupIndex === gameState.correctCup);
      var roundTime = (Date.now() - gameState.roundStartTime) / 1000;
      gameState.roundTimes.push(roundTime);

      // Record attempt
      recordAttempt({
        input_of_user: { action: 'cup_tap', cupIndex: cupIndex },
        correct: isCorrect,
        metadata: {
          round: gameState.currentRound + 1,
          question: 'Which cup hides the star?',
          correctAnswer: gameState.correctCup,
          validationType: 'function'
        }
      });

      if (signalCollector) {
        signalCollector.recordCustomEvent('round_solved', { correct: isCorrect, answer: cupIndex });
      }

      if (isCorrect) {
        // Correct feedback
        cupEls[cupIndex].classList.add('correct');
        cupEls[cupIndex].classList.add('revealing');
        var starEl = cupEls[cupIndex].querySelector('.cup-item');
        if (starEl) starEl.classList.add('visible');

        trackEvent('cup_correct', 'game', { round: gameState.currentRound + 1, cup: cupIndex, roundTime: roundTime });

        if (signalCollector) {
          signalCollector.recordViewEvent('feedback_display', {
            screen: 'gameplay',
            content_snapshot: { feedback_type: 'correct', message: 'Great tracking!', round: gameState.currentRound + 1, tapped_cup: cupIndex }
          });
        }

        try {
          await FeedbackManager.sound.play('correct_tap', { sticker: { image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1754587201419-20.gif', duration: 2, type: 'IMAGE_GIF' } });
        } catch(e) {
          console.error('correct_tap error:', JSON.stringify({ error: e.message }));
        }

        try {
          await FeedbackManager.playDynamicFeedback({ audio_content: 'great tracking!', subtitle: 'Great tracking!', sticker: { image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1754587201419-20.gif', duration: 2, type: 'IMAGE_GIF' } });
        } catch(e) {
          console.error('dynamic feedback error:', JSON.stringify({ error: e.message }));
        }

        gameState.score++;
        gameState.isProcessing = false;
        await delay(1000);
        nextRound();

      } else {
        // Wrong feedback
        cupEls[cupIndex].classList.add('wrong');
        cupEls[gameState.correctCup].classList.add('correct');
        cupEls[gameState.correctCup].classList.add('revealing');
        var correctStarEl = cupEls[gameState.correctCup].querySelector('.cup-item');
        if (correctStarEl) correctStarEl.classList.add('visible');

        trackEvent('cup_wrong', 'game', { round: gameState.currentRound + 1, tapped: cupIndex, correct: gameState.correctCup });

        if (signalCollector) {
          signalCollector.recordViewEvent('feedback_display', {
            screen: 'gameplay',
            content_snapshot: { feedback_type: 'incorrect', message: 'Not quite!', round: gameState.currentRound + 1, tapped_cup: cupIndex, correct_cup: gameState.correctCup }
          });
        }

        gameState.lives--;
        trackEvent('life_lost', 'game', { livesRemaining: gameState.lives });
        if (progressBar) progressBar.update(gameState.currentRound, gameState.lives);

        try {
          await FeedbackManager.sound.play('wrong_tap', { sticker: { image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1754587201419-28.gif', duration: 2, type: 'IMAGE_GIF' } });
        } catch(e) {
          console.error('wrong_tap error:', JSON.stringify({ error: e.message }));
        }

        try {
          await FeedbackManager.playDynamicFeedback({ audio_content: 'oh no, it was under this one!', subtitle: 'Not quite!', sticker: { image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1754587201419-28.gif', duration: 2, type: 'IMAGE_GIF' } });
        } catch(e) {
          console.error('dynamic feedback error:', JSON.stringify({ error: e.message }));
        }

        gameState.isProcessing = false;

        if (gameState.lives <= 0) {
          await delay(1000);
          endGame('game_over');
        } else {
          await delay(1500);
          nextRound();
        }
      }
    }

    /* ========================================
       NEXT ROUND
       ======================================== */
    function nextRound() {
      gameState.currentRound++;
      if (progressBar) progressBar.update(gameState.currentRound, gameState.lives);

      if (gameState.currentRound >= gameState.totalRounds) {
        endGame('victory');
      } else {
        // Play round transition sound (fire-and-forget)
        try { FeedbackManager.sound.play('round_transition'); } catch(e) {}
        startRound();
      }
    }

    /* ========================================
       SETUP GAME
       ======================================== */
    function setupGame() {
      var content = gameState.content || fallbackContent;

      // Reset state
      gameState.lives = 3;
      gameState.totalLives = 3;
      gameState.currentRound = 0;
      gameState.score = 0;
      gameState.attempts = [];
      gameState.events = [];
      gameState.roundTimes = [];
      gameState.phase = 'idle';
      gameState.gameEnded = false;
      gameState.isProcessing = false;
      gameState.startTime = Date.now();
      gameState.isActive = true;
      gameState.duration_data.startTime = new Date().toISOString();

      if (timer) timer.start();
      if (progressBar) progressBar.update(0, 3);

      trackEvent('game_start', 'game');

      if (signalCollector) {
        signalCollector.recordViewEvent('screen_transition', { screen: 'gameplay', metadata: { transition_from: 'start' } });
      }

      startRound();
    }

    /* ========================================
       END GAME (PART-011)
       ======================================== */
    async function endGame(reason) {
      if (gameState.gameEnded) return;
      gameState.gameEnded = true;
      gameState.isActive = false;
      gameState.phase = 'idle';
      gameState.duration_data.currentTime = new Date().toISOString();

      if (timer) timer.pause();

      var totalTime = timer ? Math.round(timer.getCurrentTime()) : Math.round((Date.now() - gameState.startTime) / 1000);
      var stars = gameState.lives >= 3 ? 3 : gameState.lives >= 2 ? 2 : gameState.lives >= 1 ? 1 : 0;
      var totalAttempts = gameState.attempts.length;
      var correctAttempts = gameState.attempts.filter(function(a) { return a.correct; }).length;
      var accuracy = totalAttempts > 0 ? Math.round((correctAttempts / totalAttempts) * 100) : 0;
      var tries = computeTriesPerRound();

      var metrics = {
        accuracy: accuracy,
        time: totalTime,
        stars: stars,
        attempts: gameState.attempts,
        duration_data: Object.assign({}, gameState.duration_data, { currentTime: new Date().toISOString() }),
        totalLives: gameState.totalLives,
        tries: tries,
        sessionHistory: gameState.sessionHistory,
        score: gameState.score,
        roundsCompleted: gameState.currentRound,
        livesRemaining: gameState.lives,
        roundTimes: gameState.roundTimes,
        reason: reason
      };

      console.log('Final Metrics:', JSON.stringify(metrics, null, 2));
      console.log('Attempt History:', JSON.stringify(gameState.attempts, null, 2));

      trackEvent('game_end', 'game', { reason: reason, stars: stars, score: gameState.score, accuracy: accuracy, time: totalTime });

      if (typeof Sentry !== 'undefined') {
        Sentry.addBreadcrumb({ category: 'state', message: 'Game complete', level: 'info', data: { score: accuracy, stars: stars, reason: reason } });
      }

      // Record screen transition BEFORE seal
      if (signalCollector) {
        signalCollector.recordViewEvent('screen_transition', { screen: 'results', metadata: { transition_from: 'gameplay', reason: reason } });
      }

      // Seal SignalCollector
      if (signalCollector) {
        signalCollector.seal();
      }

      showResults(metrics, reason);

      // Play end-game audio
      if (reason === 'game_over') {
        try { await FeedbackManager.sound.play('game_over_sound_effect', { sticker: { image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1757430772002-95.gif', duration: 3, type: 'IMAGE_GIF' } }); } catch(e) {}
        try { await FeedbackManager.sound.play('all_incorrect_last_attempt'); } catch(e) {}
      }

      if (reason === 'victory' && stars === 3) {
        try { await FeedbackManager.sound.play('victory_sound_effect', { sticker: { image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1757430772002-98.gif', duration: 3, type: 'IMAGE_GIF' } }); } catch(e) {}
        try { await FeedbackManager.sound.play('all_correct'); } catch(e) {}
      }

      if (reason === 'victory' && stars <= 2) {
        try { await FeedbackManager.sound.play('game_complete_sound_effect', { sticker: { image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1754587201419-25.gif', duration: 3, type: 'IMAGE_GIF' } }); } catch(e) {}
      }

      // Send postMessage — NO signal payload
      window.parent.postMessage({ type: 'game_complete', data: { metrics: metrics, attempts: gameState.attempts, completedAt: Date.now() } }, '*');

      // Cleanup — guard against restart during audio
      if (gameState.gameEnded) {
        if (timer) { timer.destroy(); timer = null; }
        if (progressBar) { progressBar.destroy(); progressBar = null; }
        if (visibilityTracker) { visibilityTracker.destroy(); visibilityTracker = null; }
        try { FeedbackManager.sound.stopAll(); FeedbackManager.stream.stopAll(); } catch(e) {}
      }
    }

    /* ========================================
       SHOW RESULTS (PART-019)
       ======================================== */
    function showResults(metrics, reason) {
      document.getElementById('game-screen').classList.add('hidden');
      document.getElementById('results-screen').classList.remove('hidden');

      document.getElementById('result-score').textContent = metrics.score + '/' + gameState.totalRounds;
      document.getElementById('result-time').textContent = formatTime(metrics.time);
      document.getElementById('result-correct').textContent = metrics.roundsCompleted;
      document.getElementById('result-lives').textContent = metrics.livesRemaining;
      document.getElementById('result-accuracy').textContent = metrics.accuracy + '%';

      var starsDisplay = document.getElementById('stars-display');
      starsDisplay.innerHTML = '';
      for (var i = 0; i < 3; i++) {
        starsDisplay.innerHTML += i < metrics.stars ? '⭐' : '☆';
      }
    }

    /* ========================================
       RESTART GAME
       ======================================== */
    function restartGame() {
      // Stop any playing audio
      try { FeedbackManager.sound.stopAll(); FeedbackManager.stream.stopAll(); } catch(e) {}

      // Push session snapshot
      gameState.sessionHistory.push({ totalLives: gameState.totalLives, tries: computeTriesPerRound() });

      // Preserve content, contentSetId, signalConfig, sessionHistory
      var preserved = {
        content: gameState.content,
        contentSetId: gameState.contentSetId,
        signalConfig: gameState.signalConfig,
        sessionHistory: gameState.sessionHistory
      };

      // Toggle screens
      document.getElementById('results-screen').classList.add('hidden');
      document.getElementById('game-screen').classList.remove('hidden');

      // Recreate SignalCollector
      try {
        signalCollector = new SignalCollector({
          gameId: gameState.gameId,
          contentSetId: preserved.contentSetId,
          flushUrl: preserved.signalConfig ? preserved.signalConfig.flushUrl : undefined,
          playId: preserved.signalConfig ? preserved.signalConfig.playId : undefined
        });
        window.signalCollector = signalCollector;
        signalCollector.startFlushing();
      } catch(e) {
        console.error('SignalCollector recreate error:', JSON.stringify({ error: e.message }));
      }

      // Recreate timer
      timer = new TimerComponent('timer-container', {
        timerType: 'increase',
        format: 'min',
        startTime: 0,
        endTime: 100000,
        autoStart: false
      });

      // Recreate progressBar
      progressBar = new ProgressBarComponent({
        autoInject: true,
        totalRounds: 5,
        totalLives: 3,
        slotId: 'mathai-progress-slot'
      });

      // Recreate visibilityTracker
      visibilityTracker = new VisibilityTracker({
        onInactive: function() {
          var inactiveStart = Date.now();
          gameState.duration_data.inActiveTime.push({ start: inactiveStart });
          if (signalCollector) { signalCollector.pause(); signalCollector.recordCustomEvent('visibility_hidden', {}); }
          if (timer) timer.pause({ fromVisibilityTracker: true });
          FeedbackManager.sound.pause();
          FeedbackManager.stream.pauseAll();
          trackEvent('game_paused', 'system');
        },
        onResume: function() {
          var lastInactive = gameState.duration_data.inActiveTime[gameState.duration_data.inActiveTime.length - 1];
          if (lastInactive && !lastInactive.end) {
            lastInactive.end = Date.now();
            gameState.duration_data.totalInactiveTime += (lastInactive.end - lastInactive.start);
          }
          if (signalCollector) { signalCollector.resume(); signalCollector.recordCustomEvent('visibility_visible', {}); }
          if (timer && timer.isPaused) timer.resume({ fromVisibilityTracker: true });
          FeedbackManager.sound.resume();
          FeedbackManager.stream.resumeAll();
          trackEvent('game_resumed', 'system');
        },
        popupProps: { title: 'Game Paused', description: 'Click Resume to continue.', primaryText: 'Resume' }
      });

      // Restore preserved state
      gameState.content = preserved.content;
      gameState.contentSetId = preserved.contentSetId;
      gameState.signalConfig = preserved.signalConfig;
      gameState.sessionHistory = preserved.sessionHistory;

      setupGame();
    }

    /* ========================================
       POST MESSAGE HANDLER (PART-008)
       ======================================== */
    function handlePostMessage(event) {
      if (!event.data || event.data.type !== 'game_init') return;
      try {
        var data = event.data.data;
        var gameId = data.gameId;
        var content = data.content;
        var contentSetId = data.contentSetId;
        var signalConfig = data.signalConfig;

        gameState.content = content;
        if (gameId) gameState.gameId = gameId;
        if (contentSetId) gameState.contentSetId = contentSetId;
        if (signalConfig) gameState.signalConfig = signalConfig;

        console.log('Content received:', JSON.stringify(gameState.content, null, 2));

        // Configure SignalCollector with received signalConfig
        if (signalConfig && signalCollector) {
          signalCollector = new SignalCollector({
            gameId: gameState.gameId,
            contentSetId: gameState.contentSetId,
            flushUrl: signalConfig.flushUrl,
            playId: signalConfig.playId
          });
          window.signalCollector = signalCollector;
          signalCollector.startFlushing();
        }

        if (typeof Sentry !== 'undefined') {
          Sentry.addBreadcrumb({ category: 'postmessage', message: 'game_init received', level: 'info' });
        }
      } catch(e) {
        console.error('PostMessage error:', JSON.stringify({ error: e.message }, null, 2));
        if (typeof Sentry !== 'undefined') {
          Sentry.captureException(e, { tags: { phase: 'initialization', severity: 'high' } });
        }
      }
    }

    /* ========================================
       WAIT FOR PACKAGES (PART-003)
       ======================================== */
    async function waitForPackages() {
      var timeout = 10000;
      var interval = 50;
      var elapsed = 0;
      while (
        typeof ScreenLayout === 'undefined' ||
        typeof ProgressBarComponent === 'undefined' ||
        typeof TransitionScreenComponent === 'undefined' ||
        typeof TimerComponent === 'undefined' ||
        typeof FeedbackManager === 'undefined' ||
        typeof VisibilityTracker === 'undefined' ||
        typeof SignalCollector === 'undefined'
      ) {
        if (elapsed >= timeout) throw new Error('Packages failed to load within 10s');
        await new Promise(function(resolve) { setTimeout(resolve, interval); });
        elapsed += interval;
      }
      console.log('[keep-track] All packages loaded');
    }

    /* ========================================
       DOM CONTENT LOADED (PART-004)
       ======================================== */
    window.addEventListener('DOMContentLoaded', async function() {
      try {
        await waitForPackages();

        if (typeof Sentry !== 'undefined') {
          Sentry.addBreadcrumb({ category: 'package-loading', message: 'All packages loaded', level: 'info' });
        }

        await FeedbackManager.init();

        // Preload sounds (PART-017)
        try {
          await FeedbackManager.sound.preload([
            { id: 'reveal_sound', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432104595.mp3' },
            { id: 'shuffle_start_sound', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506558124.mp3' },
            { id: 'shuffle_move', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432016820.mp3' },
            { id: 'correct_tap', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757588479110.mp3' },
            { id: 'wrong_tap', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
            { id: 'round_transition', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506558124.mp3' },
            { id: 'all_correct', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506764346.mp3' },
            { id: 'all_incorrect_last_attempt', url: 'https://cdn.mathai.ai/mathai-assets/dev/worksheet/audio/5140e0b6-cada-4424-8e5d-f9cd06a0c83f.mp3' },
            { id: 'game_over_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506638331.mp3' },
            { id: 'game_complete_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506659491.mp3' },
            { id: 'victory_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506672258.mp3' }
          ]);
        } catch(e) {
          console.error('Sound preload error:', JSON.stringify({ error: e.message }, null, 2));
          if (typeof Sentry !== 'undefined') {
            Sentry.captureException(e, { tags: { phase: 'audio-playback', component: 'FeedbackManager', severity: 'medium' } });
          }
        }

        // SignalCollector (PART-010 v3)
        signalCollector = new SignalCollector({
          gameId: gameState.gameId,
          contentSetId: gameState.contentSetId
        });
        window.signalCollector = signalCollector;

        // ScreenLayout (PART-025)
        ScreenLayout.inject('app', { slots: { progressBar: true, transitionScreen: true } });

        // Clone template into gameContent
        var gameContent = document.getElementById('gameContent');
        var template = document.getElementById('game-template');
        gameContent.appendChild(template.content.cloneNode(true));

        // Timer (PART-006)
        timer = new TimerComponent('timer-container', {
          timerType: 'increase',
          format: 'min',
          startTime: 0,
          endTime: 100000,
          autoStart: false
        });

        // ProgressBar (PART-023)
        progressBar = new ProgressBarComponent({
          autoInject: true,
          totalRounds: 5,
          totalLives: 3,
          slotId: 'mathai-progress-slot'
        });

        // TransitionScreen (PART-024)
        transitionScreen = new TransitionScreenComponent({ autoInject: true });

        // VisibilityTracker (PART-005)
        visibilityTracker = new VisibilityTracker({
          onInactive: function() {
            var inactiveStart = Date.now();
            gameState.duration_data.inActiveTime.push({ start: inactiveStart });
            if (signalCollector) { signalCollector.pause(); signalCollector.recordCustomEvent('visibility_hidden', {}); }
            if (timer) timer.pause({ fromVisibilityTracker: true });
            FeedbackManager.sound.pause();
            FeedbackManager.stream.pauseAll();
            trackEvent('game_paused', 'system');
          },
          onResume: function() {
            var lastInactive = gameState.duration_data.inActiveTime[gameState.duration_data.inActiveTime.length - 1];
            if (lastInactive && !lastInactive.end) {
              lastInactive.end = Date.now();
              gameState.duration_data.totalInactiveTime += (lastInactive.end - lastInactive.start);
            }
            if (signalCollector) { signalCollector.resume(); signalCollector.recordCustomEvent('visibility_visible', {}); }
            if (timer && timer.isPaused) timer.resume({ fromVisibilityTracker: true });
            FeedbackManager.sound.resume();
            FeedbackManager.stream.resumeAll();
            trackEvent('game_resumed', 'system');
          },
          popupProps: { title: 'Game Paused', description: 'Click Resume to continue.', primaryText: 'Resume' }
        });

        // Fallback content for standalone testing
        if (!gameState.content) {
          gameState.content = fallbackContent;
        }

        // Listen for postMessage (PART-008)
        window.addEventListener('message', handlePostMessage);

        // Signal parent harness that game is ready (PART-008)
        window.parent.postMessage({ type: 'game_ready' }, '*');

        // Show start screen
        transitionScreen.show({
          icons: ['🏆'],
          iconSize: 'large',
          title: 'Keep Track',
          subtitle: 'Follow the ⭐!',
          buttons: [{ text: "Let's go!", type: 'primary', action: function() { setupGame(); } }]
        });
      } catch(e) {
        console.error('Init error:', JSON.stringify({ error: e.message }, null, 2));
        if (typeof Sentry !== 'undefined') {
          Sentry.captureException(e, { tags: { phase: 'initialization', severity: 'critical' } });
        }
      }
    });

    /* ========================================
       DEBUG FUNCTIONS (PART-012)
       ======================================== */
    window.debugGame = function() {
      console.log('Game State:', JSON.stringify({
        currentRound: gameState.currentRound,
        totalRounds: gameState.totalRounds,
        lives: gameState.lives,
        score: gameState.score,
        phase: gameState.phase,
        correctCup: gameState.correctCup,
        isActive: gameState.isActive,
        gameEnded: gameState.gameEnded,
        isProcessing: gameState.isProcessing
      }, null, 2));
    };

    window.debugAudio = function() {
      console.log('FeedbackManager available:', typeof FeedbackManager !== 'undefined');
    };

    window.testAudio = async function(id) {
      try {
        await FeedbackManager.sound.play(id || 'correct_tap');
        console.log('Audio played successfully');
      } catch(e) {
        console.error('Audio test error:', JSON.stringify({ error: e.message }, null, 2));
      }
    };

    window.testPause = function() { if (timer) timer.pause(); };
    window.testResume = function() { if (timer && gameState.isActive) timer.resume(); };

    window.verifySentry = function() {
      var checks = {
        sdkLoaded: typeof Sentry !== 'undefined',
        initialized: typeof Sentry !== 'undefined' && Sentry.getClient() !== undefined,
        dsn: typeof Sentry !== 'undefined' && Sentry.getClient() && Sentry.getClient().getDsn() ? Sentry.getClient().getDsn().toString() : null
      };
      console.log('Sentry Status:', JSON.stringify(checks, null, 2));
      return checks;
    };

    window.testSentry = function() {
      try {
        throw new Error('Test error from testSentry()');
      } catch(error) {
        if (typeof Sentry !== 'undefined') {
          Sentry.captureException(error, { tags: { test: true } });
          console.log('Test error sent to Sentry. Check dashboard.');
        } else {
          console.log('Sentry not loaded');
        }
      }
    };

    /* ========================================
       WINDOW EXPOSURE (RULE-001)
       ======================================== */
    window.endGame = endGame;
    window.restartGame = restartGame;
    window.startRound = startRound;
    window.setupGame = setupGame;
    window.handleCupTap = handleCupTap;
  </script>
</body>
</html>
