<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Video Pattern MCQ</title>
<style>
/* === CSS Reset & Base (PART-021 v2) === */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}
html, body {
  width: 100%;
  min-height: 100dvh;
  overflow-x: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
  background: var(--mathai-bg, #f8f9fa);
  color: var(--mathai-text-primary, #1a1a2e);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* === CSS Variables & Colors (PART-020) === */
:root {
  --mathai-primary: #6c5ce7;
  --mathai-primary-light: #a29bfe;
  --mathai-primary-bg: #f0edff;
  --mathai-success: #27ae60;
  --mathai-success-bg: #eafaf1;
  --mathai-error: #e74c3c;
  --mathai-error-bg: #fdf2f2;
  --mathai-warning: #f39c12;
  --mathai-text-primary: #1a1a2e;
  --mathai-text-secondary: #666;
  --mathai-bg: #f8f9fa;
  --mathai-surface: #ffffff;
  --mathai-border: #e0e0e0;
  --mathai-shadow: 0 2px 8px rgba(0,0,0,0.08);
  --mathai-radius: 12px;
}

#app {
  width: 100%;
  min-height: 100dvh;
  position: relative;
}

/* === ScreenLayout v2 overrides (PART-025) === */
.mathai-layout-playarea {
  overflow-y: auto !important;
  -webkit-overflow-scrolling: touch !important;
  flex: 1 !important;
  display: flex !important;
  flex-direction: column !important;
  align-items: center !important;
}

/* === Video Pattern MCQ (Section 6) === */
.game-play-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding: 8px 16px 16px;
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
}

.instruction-text {
  font-size: 16px;
  font-weight: 500;
  color: var(--mathai-text-primary, #1a1a2e);
  text-align: center;
  line-height: 1.5;
  width: 100%;
}

.prompt-text {
  font-size: 14px;
  font-weight: 500;
  color: var(--mathai-text-primary, #1a1a2e);
  text-align: center;
  line-height: 1.5;
  width: 100%;
}

.video-container {
  width: 100%;
  max-width: 360px;
  aspect-ratio: 9 / 16;
  border-radius: 12px;
  overflow: hidden;
  background: #000;
  position: relative;
}

.video-container video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: #000;
}

.options-container {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: nowrap;
  width: 100%;
}

.option-card {
  width: 90px;
  height: 90px;
  flex-shrink: 1;
  border: 3px solid #e0e0e0;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
  background: #fff;
  padding: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  min-width: 44px;
  min-height: 44px;
}

.option-card img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  pointer-events: none;
}

.option-card:hover {
  border-color: var(--mathai-primary, #6c5ce7);
  transform: scale(1.03);
}

.option-card.selected {
  border-color: var(--mathai-primary, #6c5ce7);
  box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.25);
  background: #f0edff;
}

.option-card.correct {
  border-color: var(--mathai-success, #27ae60);
  background: #eafaf1;
  box-shadow: 0 0 0 3px rgba(39, 174, 96, 0.25);
}

.option-card.incorrect {
  border-color: var(--mathai-error, #e74c3c);
  background: #fdf2f2;
  box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.25);
}

.option-card.disabled {
  pointer-events: none;
  opacity: 0.7;
}

/* Button row & game buttons (PART-022) */
.button-row {
  display: flex;
  gap: 12px;
  justify-content: center;
  width: 100%;
  margin-top: 8px;
}

.game-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 12px 32px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s ease, transform 0.15s ease, opacity 0.2s ease;
  min-height: 48px;
  min-width: 120px;
  -webkit-user-select: none;
  user-select: none;
}

.game-btn:active {
  transform: scale(0.97);
}

.game-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.btn-primary {
  background: var(--mathai-primary, #6c5ce7);
  color: #fff;
}

.btn-primary:hover:not(:disabled) {
  background: #5a4bd1;
}

/* Results metrics */
.results-metrics {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin: 16px 0;
}

.metric {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.metric-label {
  font-size: 13px;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.metric-value {
  font-size: 24px;
  font-weight: 700;
  color: var(--mathai-text-primary, #1a1a2e);
}

/* Responsive */
@media (max-width: 360px) {
  .option-card {
    width: 75px;
    height: 75px;
  }
  .options-container {
    gap: 6px;
  }
}

/* TransitionScreen button touch target override */
#mathai-transition-slot button {
  min-height: 48px !important;
}
</style>

<!-- STEP 2: initSentry() function definition (PART-030) -->
<script>
function initSentry() {
  if (typeof SentryConfig !== 'undefined' && SentryConfig.enabled && typeof Sentry !== 'undefined') {
    Sentry.init({
      dsn: SentryConfig.dsn,
      environment: SentryConfig.environment,
      release: 'game-video-pattern-mcq@1.0.0',
      tracesSampleRate: SentryConfig.tracesSampleRate,
      sampleRate: SentryConfig.sampleRate,
      maxBreadcrumbs: 50,
      ignoreErrors: [
        'ResizeObserver loop limit exceeded',
        'ResizeObserver loop completed with undelivered notifications',
        'Non-Error promise rejection captured',
        'Script error.',
        'Load failed',
        'Failed to fetch'
      ]
    });
  }
}

window.addEventListener('error', function(event) {
  if (typeof Sentry !== 'undefined') {
    Sentry.captureException(event.error || new Error(event.message), {
      tags: { errorType: 'unhandled', severity: 'critical' },
      contexts: { errorEvent: { message: event.message, filename: event.filename, lineno: event.lineno } }
    });
  }
});

window.addEventListener('unhandledrejection', function(event) {
  if (typeof Sentry !== 'undefined') {
    Sentry.captureException(event.reason || new Error('Unhandled promise rejection'), {
      tags: { errorType: 'unhandled-promise', severity: 'critical' }
    });
  }
});
</script>

<body>
<div id="app"></div>

<script>
/* ============================================================
   Video Pattern MCQ — Full Game Script
   ============================================================ */

/* === Fallback Content (PART-028) === */
var fallbackContent = {
  instruction: "Watch the <b>pattern</b> shown in this video \ud83d\udc47",
  videoUrl: "https://ik.imagekit.io/thehomeworkapp/Personalised_videos/Logic/Q1.mp4?updatedAt=1731901431160",
  prompt: "Tap and select the option that will replace the question mark in the video \ud83d\udc47",
  options: [
    { imageUrl: "https://cdn.homeworkapp.ai/sets-gamify-assets/dev/home-explore/document/1731766055285.png", label: "Option A" },
    { imageUrl: "https://cdn.homeworkapp.ai/sets-gamify-assets/dev/home-explore/document/1731766065591.png", label: "Option B" },
    { imageUrl: "https://cdn.homeworkapp.ai/sets-gamify-assets/dev/home-explore/document/1731766074368.png", label: "Option C" }
  ],
  correctIndex: 2,
  previewInstruction: "Watch the video and find the <b>pattern</b>! Can you figure out what replaces the question mark?",
  previewAudio: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/1a5a2e85-a5ab-46d0-960a-3c6db31e5fa4.mp3',
  previewAudioText: "Watch the video and find the pattern! Can you figure out what replaces the question mark?"
};

/* === Game State (PART-007) === */
window.gameState = {
  gameId: 'game_video_pattern_mcq',
  currentRound: 0,
  totalRounds: 1,
  score: 0,
  attempts: [],
  events: [],
  startTime: null,
  isActive: false,
  content: null,
  contentSetId: null,
  signalConfig: null,
  sessionHistory: [],
  duration_data: {
    startTime: null,
    preview: [],
    attempts: [],
    evaluations: [],
    inActiveTime: [],
    totalInactiveTime: 0,
    currentTime: null
  },
  selectedOption: null,
  videoPlayed: false,
  phase: 'idle',
  gameEnded: false
};
var gameState = window.gameState;

var timer = null;
var visibilityTracker = null;
var transitionScreen = null;
var signalCollector = null;
var previewScreen = null;
var interactionManager = null;

/* === waitForPackages (PART-003) === */
function waitForPackages() {
  return new Promise(function(resolve) {
    var required = ['ScreenLayout', 'TransitionScreenComponent', 'FeedbackManager', 'SignalCollector', 'PreviewScreenComponent'];
    var maxWait = 10000;
    var start = Date.now();

    function check() {
      var allReady = required.every(function(pkg) {
        return typeof window[pkg] !== 'undefined';
      });
      if (allReady) {
        console.log('[waitForPackages] All packages loaded: ' + JSON.stringify(required));
        resolve(true);
      } else if (Date.now() - start > maxWait) {
        var missing = required.filter(function(pkg) { return typeof window[pkg] === 'undefined'; });
        console.log('[waitForPackages] Timeout waiting for: ' + JSON.stringify(missing));
        resolve(false);
      } else {
        setTimeout(check, 100);
      }
    }
    check();
  });
}

/* === trackEvent (PART-010) === */
function trackEvent(type, target, data) {
  var evt = {
    type: type,
    target: target,
    timestamp: Date.now(),
    data: data || {}
  };
  gameState.events.push(evt);
  console.log('[trackEvent] ' + JSON.stringify(evt));
}

/* === recordAttempt (PART-009) === */
function recordAttempt(data) {
  var attempt = {
    round: data.round,
    input_of_user: data.input_of_user,
    correct_answer: data.correct_answer,
    correct: data.correct,
    timestamp: Date.now(),
    time: new Date().toISOString()
  };
  gameState.attempts.push(attempt);
  console.log('[recordAttempt] ' + JSON.stringify(attempt));
}

/* === handlePostMessage (PART-008) === */
function handlePostMessage(event) {
  try {
    var data = event.data;
    if (!data || !data.type) return;

    console.log('[handlePostMessage] type=' + JSON.stringify(data.type));

    if (data.type === 'game_init') {
      var payload = data.payload || {};

      if (payload.content) {
        gameState.content = payload.content;
      }
      if (payload.contentSetId) {
        gameState.contentSetId = payload.contentSetId;
      }
      if (payload.signalConfig) {
        gameState.signalConfig = payload.signalConfig;
      }
      if (payload.sessionHistory) {
        gameState.sessionHistory = payload.sessionHistory;
      }

      gameState.totalRounds = 1;

      /* SignalCollector 6-property pattern */
      if (typeof SignalCollector !== 'undefined' && gameState.signalConfig) {
        try {
          signalCollector = new SignalCollector({
            gameId: gameState.gameId,
            contentSetId: gameState.contentSetId,
            signalConfig: gameState.signalConfig,
            sessionHistory: gameState.sessionHistory,
            content: gameState.content,
            totalRounds: gameState.totalRounds
          });

          /* Configure all 6 SignalCollector properties from signalConfig */
          var sc = gameState.signalConfig;
          if (sc.flushUrl) signalCollector.flushUrl = sc.flushUrl;
          if (sc.playId) signalCollector.playId = sc.playId;
          if (sc.gameId) signalCollector.gameId = sc.gameId;
          if (sc.sessionId) signalCollector.sessionId = sc.sessionId;
          if (sc.contentSetId) signalCollector.contentSetId = sc.contentSetId;
          if (sc.studentId) signalCollector.studentId = sc.studentId;

          /* Start flushing events to GCS (PART-010 Batch Flushing) */
          if (typeof signalCollector.startFlushing === 'function') {
            signalCollector.startFlushing();
          }
        } catch (e) {
          console.log('[handlePostMessage] SignalCollector init error: ' + JSON.stringify(e.message));
        }
      }

      console.log('[handlePostMessage] game_init processed, content set: ' + JSON.stringify(!!gameState.content));
    }
  } catch (e) {
    console.log('[handlePostMessage] Error: ' + JSON.stringify(e.message));
  }
}

/* === onVideoEnded === */
function onVideoEnded() {
  gameState.videoPlayed = true;
  trackEvent('video_played', 'video', {});
  console.log('[onVideoEnded] Video playback completed');
}

/* === selectOption (RULE-001: global scope) === */
function selectOption(index) {
  if (gameState.phase === 'feedback') return;
  if (interactionManager && typeof interactionManager.isInteractive === 'function' && !interactionManager.isInteractive()) return;

  gameState.selectedOption = index;
  gameState.phase = 'choosing';

  var allCards = document.querySelectorAll('.option-card');
  allCards.forEach(function(card) {
    card.classList.remove('selected');
  });

  var selectedCard = document.querySelector('.option-card[data-index="' + index + '"]');
  if (selectedCard) {
    selectedCard.classList.add('selected');
  }

  var submitBtn = document.getElementById('btn-submit');
  if (submitBtn) {
    submitBtn.disabled = false;
  }

  trackEvent('option_selected', 'option', { index: index });
}

/* === handleSubmit (RULE-001: global scope) === */
function handleSubmit() {
  if (gameState.selectedOption === null) return;
  if (gameState.phase === 'feedback') return;

  gameState.phase = 'feedback';

  /* Suppress further taps via InteractionManager (PART-038) */
  if (interactionManager && typeof interactionManager.disable === 'function') {
    interactionManager.disable();
  }

  var content = gameState.content;
  var isCorrect = gameState.selectedOption === content.correctIndex;

  /* Duration tracking */
  var attemptStartTime = gameState.duration_data.attempts.length > 0
    ? gameState.duration_data.attempts[gameState.duration_data.attempts.length - 1].endTime
    : gameState.startTime;
  var now = Date.now();
  gameState.duration_data.attempts.push({
    startTime: attemptStartTime,
    endTime: now,
    duration: now - attemptStartTime
  });

  recordAttempt({
    round: 1,
    input_of_user: gameState.selectedOption,
    correct_answer: content.correctIndex,
    correct: isCorrect
  });

  if (isCorrect) {
    gameState.score++;
  }

  /* Visual feedback */
  var correctCard = document.querySelector('.option-card[data-index="' + content.correctIndex + '"]');
  if (correctCard) {
    correctCard.classList.remove('selected');
    correctCard.classList.add('correct');
  }

  if (!isCorrect) {
    var wrongCard = document.querySelector('.option-card[data-index="' + gameState.selectedOption + '"]');
    if (wrongCard) {
      wrongCard.classList.remove('selected');
      wrongCard.classList.add('incorrect');
    }
  }

  /* Disable all options */
  var allCards = document.querySelectorAll('.option-card');
  allCards.forEach(function(card) {
    card.classList.add('disabled');
  });

  /* Disable submit */
  var submitBtn = document.getElementById('btn-submit');
  if (submitBtn) {
    submitBtn.disabled = true;
  }

  /* Audio feedback (PART-017) */
  try {
    if (typeof FeedbackManager !== 'undefined') {
      if (isCorrect) {
        FeedbackManager.playDynamicFeedback({ type: 'correct' });
      } else {
        FeedbackManager.playDynamicFeedback({ type: 'incorrect' });
      }
    }
  } catch (e) {
    console.log('Feedback error: ' + JSON.stringify(e.message));
  }

  trackEvent('answer_submitted', 'game', {
    correct: isCorrect,
    selected: gameState.selectedOption,
    correctIndex: content.correctIndex
  });

  /* SignalCollector deferred endProblem */
  if (signalCollector && typeof signalCollector.endProblem === 'function') {
    try {
      signalCollector.endProblem({
        round: 1,
        correct: isCorrect,
        input: gameState.selectedOption,
        answer: content.correctIndex
      });
    } catch (e) {
      console.log('[handleSubmit] signalCollector.endProblem error: ' + JSON.stringify(e.message));
    }
  }

  setTimeout(function() {
    endGame();
  }, 1500);
}

/* === endGame (PART-011) === */
function endGame() {
  if (gameState.gameEnded) return;
  gameState.gameEnded = true;
  gameState.isActive = false;

  var totalTime = (Date.now() - gameState.startTime) / 1000;
  var accuracy = gameState.score === 1 ? 100 : 0;
  var stars = gameState.score === 1 ? 3 : 0;

  var metrics = {
    accuracy: accuracy,
    time: parseFloat(totalTime.toFixed(1)),
    stars: stars,
    star_thresholds: { 3: 100, 2: 100, 1: 100, 0: 0 },
    attempts: gameState.attempts,
    duration_data: gameState.duration_data,
    totalLives: 1,
    tries: [{ round: 1, triesCount: gameState.attempts.length }]
  };

  trackEvent('game_end', 'game', { score: gameState.score, accuracy: accuracy, stars: stars });

  /* Seal signal collector and capture metadata */
  var sealResult = null;
  if (signalCollector && typeof signalCollector.seal === 'function') {
    try {
      sealResult = signalCollector.seal();
    } catch (e) {
      console.log('[endGame] signalCollector.seal error: ' + JSON.stringify(e.message));
    }
  }

  /* Add signal metadata from seal result */
  if (sealResult) {
    metrics.signal_event_count = sealResult.event_count || sealResult.signal_event_count || 0;
    metrics.signal_metadata = sealResult.metadata || sealResult.signal_metadata || {};
  } else {
    metrics.signal_event_count = 0;
    metrics.signal_metadata = {};
  }

  /* Add completedAt timestamp (postmessage-out.schema.json) */
  metrics.completedAt = Date.now();

  console.log('[endGame] metrics: ' + JSON.stringify(metrics));

  showResults(metrics);

  /* postMessage out */
  try {
    window.parent.postMessage({
      type: 'game_complete',
      payload: metrics
    }, '*');
  } catch (e) {
    console.log('[endGame] postMessage error: ' + JSON.stringify(e.message));
  }

  /* Release InteractionManager */
  if (interactionManager && typeof interactionManager.enable === 'function') {
    interactionManager.enable();
  }

  /* Cleanup: destroy PreviewScreen (PART-039 contract) */
  if (previewScreen && typeof previewScreen.destroy === 'function') {
    try {
      previewScreen.destroy();
    } catch (e) {
      console.log('[endGame] previewScreen.destroy error: ' + JSON.stringify(e.message));
    }
  }
}

/* === showResults (PART-019 v2) === */
function showResults(metrics) {
  if (!transitionScreen) {
    console.log('[showResults] TransitionScreen not available');
    return;
  }

  try {
    var titleText = metrics.stars === 3 ? 'Correct! Well Done!' : 'Not quite!';
    var feedbackType = metrics.stars === 3 ? 'celebration' : 'encouragement';

    transitionScreen.show({
      stars: metrics.stars,
      title: titleText,
      content: '<div class="results-metrics">' +
        '<div class="metric"><span class="metric-label">Result</span><span class="metric-value">' +
        (gameState.score === 1 ? 'Correct' : 'Incorrect') +
        '</span></div>' +
        '</div>',
      persist: true,
      buttons: [{ text: 'Play Again', type: 'primary', action: function() { restartGame(); } }]
    });

    /* Celebration/encouragement audio (PART-024: every transition plays audio) */
    try {
      if (typeof FeedbackManager !== 'undefined') {
        FeedbackManager.playDynamicFeedback({ type: feedbackType });
      }
    } catch (e) {
      console.log('[showResults] Feedback error: ' + JSON.stringify(e.message));
    }
  } catch (e) {
    console.log('[showResults] Error: ' + JSON.stringify(e.message));
  }
}

/* === renderQuestion === */
function renderQuestion() {
  var content = gameState.content;
  if (!content) {
    console.log('[renderQuestion] No content available');
    return;
  }

  /* Instruction */
  var instructionEl = document.getElementById('instructionText');
  if (instructionEl) {
    instructionEl.innerHTML = content.instruction;
  }

  /* Video */
  var videoSource = document.getElementById('videoSource');
  var patternVideo = document.getElementById('patternVideo');
  if (videoSource && patternVideo) {
    videoSource.src = content.videoUrl;
    patternVideo.load();
  }

  /* Prompt */
  var promptEl = document.getElementById('promptText');
  if (promptEl) {
    promptEl.innerHTML = content.prompt;
  }

  /* Options */
  var optionsHtml = content.options.map(function(opt, i) {
    return '<div class="option-card" data-index="' + i + '" onclick="selectOption(' + i + ')">' +
      '<img src="' + opt.imageUrl + '" alt="' + (opt.label || 'Option ' + (i + 1)) + '" />' +
      '</div>';
  }).join('');
  var optionsContainer = document.getElementById('optionsContainer');
  if (optionsContainer) {
    optionsContainer.innerHTML = optionsHtml;
  }

  /* Reset state */
  gameState.selectedOption = null;
  gameState.videoPlayed = false;
  gameState.phase = 'watching';

  /* Disable submit */
  var submitBtn = document.getElementById('btn-submit');
  if (submitBtn) {
    submitBtn.disabled = true;
  }

  /* Signal collector view event */
  if (signalCollector && typeof signalCollector.recordViewEvent === 'function') {
    try {
      signalCollector.recordViewEvent('question_start', {});
    } catch (e) {
      console.log('[renderQuestion] signalCollector error: ' + JSON.stringify(e.message));
    }
  }

  console.log('[renderQuestion] Question rendered with ' + JSON.stringify(content.options.length) + ' options');
}

/* === showPreviewScreen === */
function showPreviewScreen() {
  if (!previewScreen) {
    console.log('[showPreviewScreen] PreviewScreen not available, starting game directly');
    startGameAfterPreview({ duration: 0 });
    return;
  }

  try {
    var content = gameState.content || fallbackContent;
    previewScreen.show({
      instruction: content.previewInstruction || fallbackContent.previewInstruction,
      audioUrl: content.previewAudio || fallbackContent.previewAudio || null,
      onComplete: startGameAfterPreview
    });
  } catch (e) {
    console.log('[showPreviewScreen] Error: ' + JSON.stringify(e.message));
    startGameAfterPreview({ duration: 0 });
  }
}

/* === startGameAfterPreview === */
function startGameAfterPreview(previewData) {
  previewData = previewData || { duration: 0 };
  gameState.previewResult = previewData;
  gameState.duration_data.preview = gameState.duration_data.preview || [];
  gameState.duration_data.preview.push({ duration: previewData.duration || 0 });

  gameState.startTime = Date.now();
  gameState.isActive = true;
  gameState.duration_data.startTime = new Date().toISOString();

  trackEvent('game_start', 'game');

  if (signalCollector && typeof signalCollector.recordViewEvent === 'function') {
    try {
      signalCollector.recordViewEvent('screen_transition', { from: 'preview', to: 'game' });
    } catch (e) {
      console.log('[startGameAfterPreview] signalCollector error: ' + JSON.stringify(e.message));
    }
  }

  renderQuestion();
}

/* === setupGame === */
function setupGame() {
  /* Use fallback content if not set via postMessage */
  if (!gameState.content) {
    gameState.content = fallbackContent;
  }

  /* Build play area (PART-027) */
  var gameContent = document.getElementById('gameContent');
  if (gameContent) {
    gameContent.innerHTML =
      '<div class="game-play-area">' +
        '<div class="instruction-text" id="instructionText"></div>' +
        '<div class="video-container" id="videoContainer">' +
          '<video id="patternVideo" playsinline webkit-playsinline preload="metadata">' +
            '<source id="videoSource" src="" type="video/mp4">' +
            'Your browser does not support the video tag.' +
          '</video>' +
        '</div>' +
        '<div class="prompt-text" id="promptText"></div>' +
        '<div class="options-container" id="optionsContainer"></div>' +
        '<div class="button-row" id="buttonRow">' +
          '<button class="game-btn btn-primary" id="btn-submit" disabled>Submit</button>' +
        '</div>' +
      '</div>';
  }

  /* Attach submit handler */
  var submitBtn = document.getElementById('btn-submit');
  if (submitBtn) {
    submitBtn.addEventListener('click', handleSubmit);
  }

  /* Attach video ended handler */
  var patternVideo = document.getElementById('patternVideo');
  if (patternVideo) {
    patternVideo.addEventListener('ended', onVideoEnded);
  }

  /* InteractionManager (PART-038) */
  if (typeof InteractionManager !== 'undefined') {
    try {
      interactionManager = new InteractionManager({ selector: '.game-play-area' });
    } catch (e) {
      console.log('[setupGame] InteractionManager error: ' + JSON.stringify(e.message));
    }
  }

  /* Show preview screen */
  showPreviewScreen();
}

/* === restartGame === */
function restartGame() {
  gameState.currentRound = 0;
  gameState.score = 0;
  gameState.attempts = [];
  gameState.events = [];
  gameState.selectedOption = null;
  gameState.videoPlayed = false;
  gameState.phase = 'idle';
  gameState.gameEnded = false;
  gameState.isActive = false;
  gameState.startTime = null;
  gameState.duration_data = {
    startTime: null,
    preview: [],
    attempts: [],
    evaluations: [],
    inActiveTime: [],
    totalInactiveTime: 0,
    currentTime: null
  };

  /* Hide transition screen if visible */
  if (transitionScreen && typeof transitionScreen.hide === 'function') {
    try {
      transitionScreen.hide();
    } catch (e) {
      console.log('[restartGame] transitionScreen.hide error: ' + JSON.stringify(e.message));
    }
  }

  /* RESTART RULE: Preview is shown ONCE per session.
     Do NOT call setupGame() or showPreviewScreen() again.
     Instead, rebuild play area and start game directly. */
  if (!gameState.content) {
    gameState.content = fallbackContent;
  }

  /* Rebuild play area HTML */
  var gameContent = document.getElementById('gameContent');
  if (gameContent) {
    gameContent.innerHTML =
      '<div class="game-play-area">' +
        '<div class="instruction-text" id="instructionText"></div>' +
        '<div class="video-container" id="videoContainer">' +
          '<video id="patternVideo" playsinline webkit-playsinline preload="metadata">' +
            '<source id="videoSource" src="" type="video/mp4">' +
            'Your browser does not support the video tag.' +
          '</video>' +
        '</div>' +
        '<div class="prompt-text" id="promptText"></div>' +
        '<div class="options-container" id="optionsContainer"></div>' +
        '<div class="button-row" id="buttonRow">' +
          '<button class="game-btn btn-primary" id="btn-submit" disabled>Submit</button>' +
        '</div>' +
      '</div>';
  }

  /* Reattach event listeners */
  var submitBtn = document.getElementById('btn-submit');
  if (submitBtn) {
    submitBtn.addEventListener('click', handleSubmit);
  }
  var patternVideo = document.getElementById('patternVideo');
  if (patternVideo) {
    patternVideo.addEventListener('ended', onVideoEnded);
  }

  /* InteractionManager */
  if (typeof InteractionManager !== 'undefined') {
    try {
      interactionManager = new InteractionManager({ selector: '.game-play-area' });
    } catch (e) {
      console.log('[restartGame] InteractionManager error: ' + JSON.stringify(e.message));
    }
  }

  /* Start game directly — skip preview on restart */
  gameState.startTime = Date.now();
  gameState.isActive = true;
  gameState.duration_data.startTime = new Date().toISOString();
  trackEvent('game_start', 'game');
  renderQuestion();
}

/* === Debug Functions (PART-012) === */
window.debugGame = function() {
  console.log('[debugGame] gameState: ' + JSON.stringify(gameState, null, 2));
  return gameState;
};

window.debugAudio = function() {
  if (typeof FeedbackManager !== 'undefined' && typeof FeedbackManager.debug === 'function') {
    return FeedbackManager.debug();
  }
  console.log('[debugAudio] FeedbackManager not available');
  return null;
};

window.testAudio = function(type) {
  type = type || 'correct';
  try {
    if (typeof FeedbackManager !== 'undefined') {
      FeedbackManager.playDynamicFeedback({ type: type });
      console.log('[testAudio] Playing: ' + JSON.stringify(type));
    }
  } catch (e) {
    console.log('[testAudio] Error: ' + JSON.stringify(e.message));
  }
};

window.testPause = function() {
  if (typeof FeedbackManager !== 'undefined' && typeof FeedbackManager.pauseAll === 'function') {
    FeedbackManager.pauseAll();
    console.log('[testPause] Audio paused');
  }
};

window.testResume = function() {
  if (typeof FeedbackManager !== 'undefined' && typeof FeedbackManager.resumeAll === 'function') {
    FeedbackManager.resumeAll();
    console.log('[testResume] Audio resumed');
  }
};

/* === DOMContentLoaded (PART-004) === */
document.addEventListener('DOMContentLoaded', async function() {
  console.log('[DOMContentLoaded] Initializing game...');

  try {
    /* PART-003: Wait for packages */
    var packagesLoaded = await waitForPackages();
    console.log('[DOMContentLoaded] Packages loaded: ' + JSON.stringify(packagesLoaded));

    /* PART-017: FeedbackManager init */
    if (typeof FeedbackManager !== 'undefined') {
      try {
        FeedbackManager.init();
        console.log('[DOMContentLoaded] FeedbackManager initialized');
      } catch (e) {
        console.log('[DOMContentLoaded] FeedbackManager.init error: ' + JSON.stringify(e.message));
      }
    }

    /* PART-005: VisibilityTracker */
    if (typeof VisibilityTracker !== 'undefined') {
      try {
        visibilityTracker = new VisibilityTracker({
          onInactive: function(data) {
            /* Pause preview screen audio/timer */
            if (previewScreen && typeof previewScreen.pause === 'function') {
              try { previewScreen.pause(); } catch (e) { console.log('[VisibilityTracker] previewScreen.pause error: ' + JSON.stringify(e.message)); }
            }
            if (gameState.isActive) {
              gameState.duration_data.inActiveTime.push({
                startTime: Date.now(),
                type: 'inactive'
              });
              try {
                if (typeof FeedbackManager !== 'undefined' && typeof FeedbackManager.pauseAll === 'function') {
                  FeedbackManager.pauseAll();
                }
              } catch (e) {
                console.log('[VisibilityTracker] pause error: ' + JSON.stringify(e.message));
              }
              /* Pause video */
              var video = document.getElementById('patternVideo');
              if (video && !video.paused) {
                video.pause();
              }
            }
          },
          onResume: function(data) {
            /* Resume preview screen audio/timer */
            if (previewScreen && typeof previewScreen.resume === 'function') {
              try { previewScreen.resume(); } catch (e) { console.log('[VisibilityTracker] previewScreen.resume error: ' + JSON.stringify(e.message)); }
            }
            if (gameState.isActive) {
              var inactiveArr = gameState.duration_data.inActiveTime;
              if (inactiveArr.length > 0) {
                var last = inactiveArr[inactiveArr.length - 1];
                last.endTime = Date.now();
                last.duration = last.endTime - last.startTime;
                gameState.duration_data.totalInactiveTime += last.duration;
              }
              try {
                if (typeof FeedbackManager !== 'undefined' && typeof FeedbackManager.resumeAll === 'function') {
                  FeedbackManager.resumeAll();
                }
              } catch (e) {
                console.log('[VisibilityTracker] resume error: ' + JSON.stringify(e.message));
              }
            }
          }
        });
        console.log('[DOMContentLoaded] VisibilityTracker created');
      } catch (e) {
        console.log('[DOMContentLoaded] VisibilityTracker error: ' + JSON.stringify(e.message));
      }
    }

    /* PART-025 v2: ScreenLayout inject */
    if (typeof ScreenLayout !== 'undefined') {
      try {
        ScreenLayout.inject('app', {
          slots: {
            previewScreen: true,
            transitionScreen: true
          }
        });
        console.log('[DOMContentLoaded] ScreenLayout injected');
      } catch (e) {
        console.log('[DOMContentLoaded] ScreenLayout.inject error: ' + JSON.stringify(e.message));
      }
    }

    /* PART-024 v2: TransitionScreen */
    if (typeof TransitionScreenComponent !== 'undefined') {
      try {
        transitionScreen = new TransitionScreenComponent({
          containerId: 'mathai-transition-slot'
        });
        console.log('[DOMContentLoaded] TransitionScreen created');
      } catch (e) {
        console.log('[DOMContentLoaded] TransitionScreen error: ' + JSON.stringify(e.message));
      }
    }

    /* PART-039: PreviewScreenComponent */
    if (typeof PreviewScreenComponent !== 'undefined') {
      try {
        previewScreen = new PreviewScreenComponent({
          autoInject: true,
          slotId: 'mathai-preview-slot',
          gameContentId: 'gameContent'
        });
        console.log('[DOMContentLoaded] PreviewScreenComponent created');
      } catch (e) {
        console.log('[DOMContentLoaded] PreviewScreenComponent error: ' + JSON.stringify(e.message));
      }
    }

    /* SignalCollector init with fallback */
    if (typeof SignalCollector !== 'undefined' && !signalCollector) {
      try {
        signalCollector = new SignalCollector({
          gameId: gameState.gameId,
          contentSetId: gameState.contentSetId,
          signalConfig: gameState.signalConfig,
          sessionHistory: gameState.sessionHistory,
          content: gameState.content,
          totalRounds: gameState.totalRounds
        });
        console.log('[DOMContentLoaded] SignalCollector created');
      } catch (e) {
        console.log('[DOMContentLoaded] SignalCollector error: ' + JSON.stringify(e.message));
      }
    }

    /* Create a no-op signalCollector if not available */
    if (!signalCollector) {
      signalCollector = {
        recordViewEvent: function() {},
        endProblem: function() {},
        seal: function() {}
      };
    }

    /* PART-008: postMessage listener */
    window.addEventListener('message', handlePostMessage);

    /* Setup game */
    setupGame();

    console.log('[DOMContentLoaded] Game initialized successfully');

  } catch (e) {
    console.log('[DOMContentLoaded] Critical error: ' + JSON.stringify(e.message));
    /* Fallback: try to setup game anyway */
    if (!signalCollector) {
      signalCollector = {
        recordViewEvent: function() {},
        endProblem: function() {},
        seal: function() {}
      };
    }
    gameState.content = fallbackContent;
    setupGame();
  }
});
</script>
