<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AudioKit with Streaming Example</title>

  <!-- REQUIRED: Load AudioKit (includes ogg-opus-decoder, BufferedStreamReader, everything) -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/audio-manager/audio-manager.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
    }
    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
    }
    #subtitle {
      margin-top: 20px;
      padding: 15px;
      background: #f0f0f0;
      border-radius: 8px;
      display: none;
      font-size: 18px;
    }
    .status {
      margin-top: 20px;
      padding: 10px;
      background: #e8f5e9;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>AudioKit with Streaming</h1>

  <div class="status">
    <strong>Status:</strong> <span id="status">Initializing...</span>
  </div>

  <h2>Regular Audio</h2>
  <button onclick="playRegularAudio()">Play Regular Audio</button>

  <h2>Dynamic Streaming Audio</h2>
  <button onclick="playDynamicAudio()">Play Dynamic Audio</button>
  <button onclick="playGameStats()">Play Game Stats</button>

  <div id="subtitle"></div>

  <script>
    // AudioKit is ready to use (no initialization needed)
    document.getElementById('status').textContent = 'Ready (click any button to unlock audio)';

    // Regular audio example
    async function playRegularAudio() {
      await AudioKit.unlock();

      // Preload a test audio file
      await AudioKit.sound.preload([
        { id: 'test', url: 'https://storage.googleapis.com/test-dynamic-assets/audio/tap.mp3' }
      ]);

      AudioKit.sound.play('test');
      document.getElementById('status').textContent = 'Playing regular audio...';
    }

    // Dynamic audio example - handles both cached and streams
    async function playDynamicAudio() {
      await AudioKit.unlock();

      const text = 'Great job! You got that correct!';
      const apiUrl = `https://asia-south1-mathai-449208.cloudfunctions.net/generate-audio?text=${encodeURIComponent(text)}`;

      document.getElementById('status').textContent = 'Fetching dynamic audio...';

      try {
        const response = await fetch(apiUrl);
        const contentType = response.headers.get('content-type');

        if (contentType?.includes('application/json')) {
          // Cached audio
          const { audio_url } = await response.json();
          console.log('✅ Cache HIT - Loading from URL');
          await AudioKit.sound.preload([{ id: 'dynamic', url: audio_url }]);
          AudioKit.sound.play('dynamic');
          document.getElementById('status').textContent = 'Playing cached audio...';
        } else {
          // Live stream
          console.log('⚡ Cache MISS - Loading stream');
          await AudioKit.stream.addFromResponse('dynamic', response, () => {
            console.log('Stream ready to play');
          });
          AudioKit.stream.play('dynamic');
          document.getElementById('status').textContent = 'Playing streamed audio...';
        }

        // Show subtitle
        const subtitleEl = document.getElementById('subtitle');
        subtitleEl.textContent = text;
        subtitleEl.style.display = 'block';
        setTimeout(() => {
          subtitleEl.style.display = 'none';
        }, 3000);

      } catch (error) {
        console.error('❌ Failed to play dynamic audio:', error);
        document.getElementById('status').textContent = 'Error: ' + error.message;
      }
    }

    // Game stats example with variables
    async function playGameStats() {
      await AudioKit.unlock();

      const score = 8;
      const total = 10;
      const accuracy = Math.round((score / total) * 100);

      const text = `Congratulations! You got ${score} out of ${total} correct with ${accuracy}% accuracy!`;
      const apiUrl = `https://asia-south1-mathai-449208.cloudfunctions.net/generate-audio?text=${encodeURIComponent(text)}`;

      document.getElementById('status').textContent = 'Generating game stats audio...';

      try {
        const response = await fetch(apiUrl);
        const contentType = response.headers.get('content-type');

        if (contentType?.includes('application/json')) {
          const { audio_url } = await response.json();
          console.log('✅ Cache HIT');
          await AudioKit.sound.preload([{ id: 'stats', url: audio_url }]);
          AudioKit.sound.play('stats');
        } else {
          console.log('⚡ Cache MISS - Streaming');
          await AudioKit.stream.addFromResponse('stats', response);
          AudioKit.stream.play('stats');
        }

        document.getElementById('status').textContent = 'Playing game stats...';

        // Show subtitle
        const subtitleEl = document.getElementById('subtitle');
        subtitleEl.textContent = text;
        subtitleEl.style.display = 'block';
        setTimeout(() => {
          subtitleEl.style.display = 'none';
        }, 5000);

      } catch (error) {
        console.error('❌ Failed to play stats:', error);
        document.getElementById('status').textContent = 'Error: ' + error.message;
      }
    }

    // Debug functions
    window.testAudioKit = function() {
      const soundState = AudioKit.sound.getState();
      const streamState = AudioKit.stream.getState();
      console.log('🎵 AudioKit State:', JSON.stringify({
        sound: soundState,
        stream: streamState
      }, null, 2));
    };

    console.log('📋 Available commands:');
    console.log('  - testAudioKit() - Show AudioKit state');
    console.log('  - AudioKit - Access AudioKit instance');
  </script>
</body>
</html>
