<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathAI Game - Template</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <!-- Header -->
        <header class="game-header">
            <h1 class="game-title">Math Quiz Game</h1>
            <div class="game-stats">
                <span class="stat">Score: <strong id="score">0</strong></span>
                <span class="stat">Question: <strong id="question-number">1</strong>/<strong id="total-questions">5</strong></span>
            </div>
        </header>

        <!-- Main Game Area -->
        <main class="game-content">
            <!-- Question Display -->
            <div id="question-container" class="question-container">
                <h2 id="question-text" class="question-text">Loading question...</h2>
            </div>

            <!-- Answer Options -->
            <div id="answer-container" class="answer-container">
                <!-- Answer buttons will be dynamically inserted here -->
            </div>

            <!-- Feedback Message -->
            <div id="feedback" class="feedback hidden">
                <p id="feedback-text"></p>
            </div>

            <!-- Next/Submit Button -->
            <div class="controls">
                <button id="next-btn" class="btn btn-primary hidden">Next Question</button>
                <button id="submit-btn" class="btn btn-success hidden">Submit Results</button>
            </div>
        </main>

        <!-- Results Screen (hidden initially) -->
        <div id="results-container" class="results-container hidden">
            <h2>Game Complete!</h2>
            <div class="results-summary">
                <p class="result-item">Final Score: <strong id="final-score">0</strong></p>
                <p class="result-item">Accuracy: <strong id="accuracy">0</strong>%</p>
                <p class="result-item">Time: <strong id="total-time">0</strong>s</p>
            </div>
            <button id="restart-btn" class="btn btn-primary">Play Again</button>
        </div>

        <!-- Audio Controls -->
        <div class="audio-controls">
            <button id="mute-btn" class="btn-icon" title="Toggle Sound">
                🔊
            </button>
        </div>
    </div>

    <!-- Helper Libraries - MUST BE LOADED IN THIS ORDER -->
    <script src="helpers/case-converter.js"></script>
    <script src="helpers/audio-helper.js"></script>
    <script src="helpers/tracker-helper.js"></script>
    <!-- API Helper and InteractionManager are loaded from the helpers package, not the template -->

    <!-- Game Logic -->
    <script src="game.js"></script>
</body>
</html>
