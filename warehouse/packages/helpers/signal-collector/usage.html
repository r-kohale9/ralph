<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SignalCollector v3 - Usage Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px; background: #f5f5f5; }
    h1 { margin-bottom: 4px; }
    .subtitle { color: #666; margin-bottom: 20px; }
    .game-play-area {
      background: white; border: 2px solid #ddd; border-radius: 12px; padding: 24px;
      min-height: 300px; margin-bottom: 20px;
    }
    .question { font-size: 24px; font-weight: bold; margin-bottom: 16px; }
    .options { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
    .option {
      padding: 12px 24px; border: 2px solid #ddd; border-radius: 8px;
      cursor: pointer; font-size: 18px; transition: all 0.2s;
      background: white; user-select: none;
    }
    .option:hover { border-color: #4A90D9; background: #f0f7ff; }
    .option.selected { border-color: #4A90D9; background: #4A90D9; color: white; }
    .input-area { margin-bottom: 16px; }
    .input-area input {
      padding: 10px; font-size: 18px; border: 2px solid #ddd; border-radius: 8px; width: 200px;
    }
    .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    button {
      padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer;
      font-size: 14px; font-weight: 600;
    }
    .btn-primary { background: #4A90D9; color: white; }
    .btn-secondary { background: #eee; color: #333; }
    .btn-danger { background: #e74c3c; color: white; }
    .log-panel {
      background: #1e1e1e; color: #d4d4d4; border-radius: 8px; padding: 16px;
      font-family: 'Menlo', 'Monaco', monospace; font-size: 12px;
      max-height: 400px; overflow-y: auto; white-space: pre-wrap; word-break: break-all;
    }
    .log-label { font-weight: bold; margin-bottom: 8px; color: #999; font-size: 13px; }
    .draggable {
      width: 60px; height: 60px; background: #ff9800; border-radius: 8px;
      display: inline-flex; align-items: center; justify-content: center;
      color: white; font-weight: bold; cursor: grab; margin-right: 12px;
    }
    .drop-zone {
      width: 80px; height: 80px; border: 2px dashed #aaa; border-radius: 8px;
      display: inline-flex; align-items: center; justify-content: center;
      color: #aaa; margin-left: 12px;
    }
    .drag-area { display: flex; align-items: center; margin-bottom: 16px; }
    .status { font-size: 13px; color: #888; margin-bottom: 8px; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px;
      font-weight: 600; background: #e8f4fd; color: #1a73e8; margin-right: 6px;
    }
  </style>
</head>
<body>

  <h1>SignalCollector v3 Demo</h1>
  <p class="subtitle">Interact with the game area below. Events are captured, flushed in batches, and logged.</p>

  <div class="controls">
    <button class="btn-primary" onclick="startFlushing()">Start Flushing</button>
    <button class="btn-secondary" onclick="stopFlushing()">Stop Flushing</button>
    <button class="btn-danger" onclick="sealCollector()">Seal (Game End)</button>
    <button class="btn-secondary" onclick="showDebug()">Debug</button>
    <button class="btn-secondary" onclick="clearLog()">Clear Log</button>
  </div>

  <div id="statusBar" class="status">
    Status: <span class="badge" id="statusBadge">initialized</span>
    Events buffered: <span id="eventCount">0</span>
  </div>

  <div class="game-play-area" data-signal-id="game-area">
    <div class="question" data-signal-id="question-text">What is 38 + 25?</div>

    <div class="options">
      <div class="option" data-signal-id="option-a" onclick="selectOption(this)">53</div>
      <div class="option" data-signal-id="option-b" onclick="selectOption(this)">63</div>
      <div class="option" data-signal-id="option-c" onclick="selectOption(this)">65</div>
      <div class="option" data-signal-id="option-d" onclick="selectOption(this)">67</div>
    </div>

    <div class="input-area">
      <input type="text" data-signal-id="answer-input" placeholder="Or type your answer...">
    </div>

    <div class="drag-area">
      <div class="draggable" draggable="true" data-signal-id="drag-number">40</div>
      <span>Drag to: </span>
      <div class="drop-zone" data-signal-id="drop-target"
           ondragover="event.preventDefault()"
           ondrop="handleDrop(event)">Drop</div>
    </div>
  </div>

  <div class="log-label">Event Log</div>
  <div class="log-panel" id="logPanel">Waiting for interactions...\n</div>

  <script src="./index.js"></script>
  <script>
    var collector;
    var logPanel = document.getElementById('logPanel');
    var eventCountEl = document.getElementById('eventCount');
    var statusBadge = document.getElementById('statusBadge');

    // Intercept SignalCollector console output
    var origLog = console.log;
    var origWarn = console.warn;
    var origError = console.error;
    function patchConsole(fn, level) {
      return function() {
        fn.apply(console, arguments);
        var msg = Array.from(arguments).map(function(a) {
          return typeof a === 'string' ? a : JSON.stringify(a, null, 2);
        }).join(' ');
        if (msg.indexOf('[SignalCollector]') !== -1) {
          logPanel.textContent += '[' + level + '] ' + msg + '\n';
          logPanel.scrollTop = logPanel.scrollHeight;
        }
      };
    }
    console.log = patchConsole(origLog, 'LOG');
    console.warn = patchConsole(origWarn, 'WARN');
    console.error = patchConsole(origError, 'ERROR');

    // Initialize — flushUrl points to a local mock that will 404 (expected in demo)
    // Replace with your actual cloud function URL in production
    collector = new SignalCollector({
      containerSelector: '.game-play-area',
      sessionId: 'demo_session_' + Date.now(),
      studentId: 'demo_student',
      gameId: 'demo_game',
      playId: 'demo_play_' + Date.now(),
      flushUrl: 'https://asia-south1-mathai-449208.cloudfunctions.net/write-to-gcs'  // Replace with real URL to see successful flushes
    });

    // Poll event count display
    setInterval(function() {
      eventCountEl.textContent = collector._events.length;
    }, 500);

    function startFlushing() {
      collector.startFlushing();
      statusBadge.textContent = 'flushing';
      log('Started flush interval (every 5s)');
    }

    function stopFlushing() {
      collector.stopFlushing();
      statusBadge.textContent = 'paused';
    }

    function sealCollector() {
      var result = collector.seal();
      statusBadge.textContent = 'sealed';
      log('Sealed: ' + JSON.stringify(result, null, 2));
    }

    function selectOption(el) {
      document.querySelectorAll('.option').forEach(function(o) { o.classList.remove('selected'); });
      el.classList.add('selected');
      collector.recordViewEvent('visual_update', {
        screen: 'gameplay',
        content_snapshot: { type: 'option_selected', option: el.dataset.signalId, value: el.textContent }
      });
    }

    function handleDrop(e) {
      e.preventDefault();
      e.target.textContent = '40';
      e.target.style.borderColor = '#4A90D9';
      e.target.style.color = '#4A90D9';
    }

    function showDebug() {
      collector.debug();
    }

    function log(msg) {
      logPanel.textContent += '> ' + msg + '\n';
      logPanel.scrollTop = logPanel.scrollHeight;
    }

    function clearLog() {
      logPanel.textContent = '';
    }

    // Record initial screen
    collector.recordViewEvent('screen_transition', {
      screen: 'gameplay',
      metadata: { transition_from: 'ready' }
    });
  </script>
</body>
</html>
