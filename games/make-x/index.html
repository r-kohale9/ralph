<!-- STEP 2: initSentry() function definition -->
<script>
function initSentry() {
  try {
    if (typeof SentryConfig !== 'undefined' && SentryConfig.enabled && typeof Sentry !== 'undefined') {
      Sentry.init({
        dsn: SentryConfig.dsn,
        environment: SentryConfig.environment,
        release: "make-x@1.0.0",
        tracesSampleRate: SentryConfig.tracesSampleRate,
        sampleRate: SentryConfig.sampleRate,
        maxBreadcrumbs: 50,
        ignoreErrors: [
          "ResizeObserver loop limit exceeded",
          "ResizeObserver loop completed with undelivered notifications",
          "Non-Error promise rejection captured",
          "Script error.",
          "Load failed",
          "Failed to fetch"
        ]
      });
    }
  } catch (e) { console.error('Sentry init failed:', e.message); }
}
</script>

<style>
/* === RESET === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100dvh; overflow: hidden; overscroll-behavior: none; }
@supports not (height: 100dvh) { html, body { height: 100vh; } }
body {
  font-family: var(--mathai-font-family);
  background: var(--mathai-white);
  color: var(--mathai-text-primary);
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
  -webkit-tap-highlight-color: transparent;
}

/* === LAYOUT ROOT === */
.mathai-layout-root { max-width: 480px; margin: 0 auto; }

/* === PLAY AREA LAYOUT === */
.mathai-layout-playarea {
  display: flex;
  flex-direction: column !important;
  align-items: center !important;
  padding: 0 20px 32px !important;
}

.mathai-ts-screen.active {
  flex: 1;
  align-items: center;
  justify-content: flex-start;
  padding-top: 16px;
}

.mathai-ts-card {
  min-height: 50dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* === GAME PLAY AREA === */
.game-play-area {
  width: 100%;
  max-width: 440px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 0;
}

/* === TARGET DISPLAY === */
.target-display {
  text-align: center;
  padding: 16px;
  margin-bottom: 16px;
}

.target-title {
  font-size: 28px;
  font-weight: 700;
  color: var(--mathai-primary);
  font-family: var(--mathai-font-family);
}

#target-value { color: var(--mathai-blue); }

/* === RUNNING SUM === */
.running-sum {
  text-align: center;
  margin-bottom: 16px;
  min-height: 32px;
}

.running-sum-text {
  font-size: 20px;
  font-weight: 600;
  color: var(--mathai-gray);
  font-family: var(--mathai-font-family);
  transition: color 0.2s ease;
}

.running-sum-text.near-target { color: var(--mathai-orange, #f59e0b); }
.running-sum-text.at-target { color: var(--mathai-green); }
.running-sum-text.over-target { color: var(--mathai-red); }

/* === TILE GRID === */
.tile-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 400px;

}

/* === INDIVIDUAL TILE === */
.tile {
  padding: 14px 20px;
  margin: 6px;
  border: 2px solid var(--mathai-border-gray);
  border-radius: 24px;
  cursor: pointer;
  font-size: var(--mathai-font-size-body);

  font-family: var(--mathai-font-family);

  color: var(--mathai-text-primary);
  transition: all 0.2s ease;
  min-width: 64px;
  min-height: 48px;
  text-align: center;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.tile:active { transform: scale(0.95); }

/* Tile states */
.tile.selected {
  background: var(--mathai-cell-bg-yellow);
  border-color: #f0c800;
  transform: scale(1.05);
}

.tile.correct {
  background: var(--mathai-cell-bg-green);
  border-color: var(--mathai-cell-border-green);
}

.tile.incorrect {

  border-color: var(--mathai-cell-border-red);
}

.tile.disabled { pointer-events: none; opacity: 0.6; }

.tile.solution-hint {

  border-color: var(--mathai-green);
  box-shadow: 0 0 12px rgba(33, 150, 83, 0.5);
}

/* Interaction disabled */
.tile-grid.interaction-disabled .tile { pointer-events: none; }

/* === INSTRUCTION AREA === */

}

/* === RESULTS METRICS === */
.results-metrics {

  flex-direction: column;

.metric-row { padding: 4px 0; }
.metric-label { color: var(--mathai-gray); font-size: var(--mathai-font-size-small); }
.metric-value-large { font-size: 32px; font-weight: 700; color: var(--mathai-primary); }
.metric-hint { font-size: var(--mathai-font-size-small); color: var(--mathai-blue); margin-top: 4px; }

/* === BUTTON OVERRIDES === */
.game-btn {
  padding: 14px 32px;
  font-size: var(--mathai-font-size-button);
  font-weight: 600;
  font-family: var(--mathai-font-family);
  border: none;
  border-radius: var(--mathai-border-radius-button);

}

.btn-primary { background: var(--mathai-green); }

}

}

.hidden { display: none !important; }

/* === MICRO-ANIMATIONS === */
@keyframes scoreBounce {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
  20%, 40%, 60%, 80% { transform: translateX(4px); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes starPop {
  0% { transform: scale(0); opacity: 0; }
  60% { transform: scale(1.2); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes heartBreak {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.3); opacity: 0.5; }
  100% { transform: scale(0.8); opacity: 0; }
}

@keyframes solutionGlow {
  0%, 100% { box-shadow: 0 0 4px rgba(33, 150, 83, 0.3); }
  50% { box-shadow: 0 0 16px rgba(33, 150, 83, 0.7); }
}

@keyframes confettiFall {
  0% { transform: translateY(-100%) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

.shake-wrong { animation: shake 0.5s ease-in-out; }
.score-bounce { animation: scoreBounce 0.4s ease; }
.fade-in { animation: fadeIn 0.35s ease; }

/* === LANDSCAPE LOCK === */
@media (orientation: landscape) and (max-height: 500px) {
  .landscape-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: var(--mathai-white); z-index: 10000;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: var(--mathai-text-primary);
    text-align: center; padding: 20px;
  }
}
</style>

<body>
<div id="app" data-phase="start_screen" data-score="0" data-lives="3"></div>

<script>
/* ============================================================
   GAME STATE (PART-007)
   ============================================================ */
window.gameState = {
  gameId: 'make-x',
  phase: 'start_screen',
  currentRound: 0,
  totalRounds: 5,
  score: 0,
  attempts: [],
  events: [],
  startTime: null,
  isActive: false,
  content: null,
  duration_data: {
    startTime: null,
    preview: [],
    attempts: [],
    evaluations: [],
    inActiveTime: [],
    totalInactiveTime: 0,
    currentTime: null
  },
  lives: 3,
  totalLives: 3,
  currentLevel: 1,
  selectedTiles: [],
  roundTimes: [],
  roundStartTime: null,
  isProcessing: false,
  gameEnded: false,
  correctAnswer: null,
  consecutiveOvershoots: 0,
  streak: 0,
  consecutiveWrongs: 0,
  contentSetId: null
};

var timer = null;
var visibilityTracker = null;
var progressBar = null;
var transitionScreen = null;
var previewScreen = null;
var signalCollector = null;

/* ============================================================
   FALLBACK CONTENT (5 rounds, 2 levels — from spec)
   ============================================================ */
var fallbackContent = {
  rounds: [
    {
      round: 1, level: 1, type: 'A', target: 50,

        { id: 't1', display: '10', value: 10 },
        { id: 't2', display: '15', value: 15 },
        { id: 't3', display: '20', value: 20 },
        { id: 't4', display: '25', value: 25 },
        { id: 't5', display: '30', value: 30 },
        { id: 't6', display: '35', value: 35 }
      ],
      solutions: [[20, 30], [15, 35], [10, 15, 25]],
      difficulty_level: 1,
      misconception_tags: { overshoot: 'greedy-selection', select_all: 'no-subset-reasoning' }
    },
    {
      round: 2, level: 1, type: 'A', target: 80,
      tiles: [
        { id: 't1', display: '15', value: 15 },
        { id: 't2', display: '20', value: 20 },
        { id: 't3', display: '25', value: 25 },
        { id: 't4', display: '30', value: 30 },
        { id: 't5', display: '35', value: 35 },
        { id: 't6', display: '40', value: 40 }
      ],
      solutions: [[40, 25, 15], [35, 25, 20], [30, 35, 15]],
      difficulty_level: 1,
      misconception_tags: { overshoot: 'greedy-selection', near_miss: 'partial-sum-neglect' }
    },
    {
      round: 3, level: 1, type: 'A', target: 100,
      tiles: [
        { id: 't1', display: '20', value: 20 },
        { id: 't2', display: '25', value: 25 },
        { id: 't3', display: '30', value: 30 },
        { id: 't4', display: '35', value: 35 },
        { id: 't5', display: '40', value: 40 },
        { id: 't6', display: '45', value: 45 }
      ],
      solutions: [[25, 30, 45], [20, 35, 45], [25, 35, 40]],
      difficulty_level: 2,
      misconception_tags: { overshoot: 'greedy-selection', three_largest: 'no-mental-check' }
    },
    {
      round: 4, level: 2, type: 'A', target: 90,
      tiles: [
        { id: 't1', display: '20+10', value: 30 },
        { id: 't2', display: '15+5', value: 20 },
        { id: 't3', display: '25+15', value: 40 },
        { id: 't4', display: '40+10', value: 50 },
        { id: 't5', display: '10+20', value: 30 }
      ],
      solutions: [[30, 20, 40], [40, 50]],
      difficulty_level: 2,
      misconception_tags: { overshoot: 'greedy-selection', expression_error: 'expression-evaluation-error', treat_as_first_operand: 'partial-expression-read' }
    },
    {
      round: 5, level: 2, type: 'A', target: 120,
      tiles: [
        { id: 't1', display: '30+20', value: 50 },
        { id: 't2', display: '45+5', value: 50 },
        { id: 't3', display: '25+15', value: 40 },
        { id: 't4', display: '35+25', value: 60 },
        { id: 't5', display: '20+10', value: 30 }
      ],
      solutions: [[50, 40, 30]],
      difficulty_level: 3,
      misconception_tags: { overshoot: 'greedy-selection', expression_error: 'expression-evaluation-error', select_similar_values: 'magnitude-confusion' }
    }
  ]
};

/* ============================================================
   HELPERS
   ============================================================ */
function getRounds() {
  return gameState.content ? gameState.content.rounds : fallbackContent.rounds;
}

function waitForPackages() {
  return new Promise(function(resolve, reject) {
    var timeout = 10000;
    var start = Date.now();
    var check = setInterval(function() {
      if (
        typeof FeedbackManager !== 'undefined' &&
        typeof TimerComponent !== 'undefined' &&
        typeof VisibilityTracker !== 'undefined' &&
        typeof SignalCollector !== 'undefined'
      ) {
        clearInterval(check);
        resolve();
      } else if (Date.now() - start > timeout) {
        clearInterval(check);
        reject(new Error('Packages failed to load within ' + timeout + 'ms'));
      }
    }, 100);
  });
}

/* === syncDOMState (PART-007 + test harness) === */
function syncDOMState() {
  var app = document.getElementById('app');
  if (!app) return;
  app.setAttribute('data-phase', gameState.phase);
  app.setAttribute('data-score', gameState.score);
  app.setAttribute('data-lives', Math.max(0, gameState.lives));
  app.setAttribute('data-round', gameState.currentRound);
}

/* === getSelectedSum === */
function getSelectedSum() {
  var roundData = getRounds()[gameState.currentRound];
  var sum = 0;
  for (var i = 0; i < gameState.selectedTiles.length; i++) {
    sum += roundData.tiles[gameState.selectedTiles[i]].value;
  }
  return sum;
}

/* === getSelectedDisplayValues === */
function getSelectedDisplayValues() {
  var roundData = getRounds()[gameState.currentRound];
  var values = [];
  for (var i = 0; i < gameState.selectedTiles.length; i++) {
    values.push(roundData.tiles[gameState.selectedTiles[i]].display);
  }
  return values;
}

/* === calcStars (FM-11: must be on window) === */
function calcStars() {
  if (gameState.lives <= 0) return 0;
  if (gameState.roundTimes.length === 0) return 1;
  var avgTime = gameState.roundTimes.reduce(function(a, b) { return a + b; }, 0) / gameState.roundTimes.length;
  return avgTime <= 3 ? 3 : avgTime <= 5 ? 2 : 1;
}
window.calcStars = calcStars;

/* ============================================================
   RECORD ATTEMPT (PART-009 — 12 fields)
   ============================================================ */
function recordAttempt(roundIndex, userInput, correct, metadata) {
  var round = getRounds()[roundIndex];
  var attempt = {
    attempt_timestamp: Date.now(),
    time_since_start_of_game: gameState.startTime ? Date.now() - gameState.startTime : 0,
    input_of_user: userInput,
    correct: correct,
    round_number: roundIndex + 1,
    question_id: 'r' + (roundIndex + 1),
    correct_answer: round.target,
    response_time_ms: gameState.roundStartTime ? Date.now() - gameState.roundStartTime : 0,
    misconception_tag: correct ? null : (metadata.misconception_tag || 'greedy-selection'),
    difficulty_level: round.difficulty_level || 1,
    is_retry: metadata.is_retry || false,
    metadata: metadata
  };
  gameState.attempts.push(attempt);
  gameState.duration_data.attempts.push({
    round: roundIndex + 1,
    timestamp: Date.now()
  });
}

/* === trackEvent (PART-010) === */
function trackEvent(type, target, data) {
  var evt = { type: type, target: target, timestamp: Date.now() };
  if (data) {
    var keys = Object.keys(data);
    for (var i = 0; i < keys.length; i++) { evt[keys[i]] = data[keys[i]]; }
  }
  gameState.events.push(evt);
}

/* === computeTriesPerRound === */
function computeTriesPerRound(attempts) {
  var rounds = {};
  attempts.forEach(function(a) {
    var r = a.round_number;
    rounds[r] = (rounds[r] || 0) + 1;
  });
  return Object.keys(rounds).map(function(r) {
    return { round: Number(r), triesCount: rounds[r] };
  });
}

/* === createProgressBar (PART-023) === */
function createProgressBar() {
  if (progressBar) progressBar.destroy();
  progressBar = new ProgressBarComponent({
    slotId: 'mathai-progress-slot',
    totalRounds: gameState.totalRounds,
    totalLives: gameState.totalLives
  });
}

/* ============================================================
   TILE TAP HANDLER — core mechanic
   ============================================================ */
async function handleTileTap(index) {
  if (!gameState.isActive) return;
  if (gameState.isProcessing) return;
  if (gameState.gameEnded) return;

  var roundData = getRounds()[gameState.currentRound];
  var tileEl = document.querySelectorAll('.tile')[index];
  if (!tileEl) return;

  var selectedIdx = gameState.selectedTiles.indexOf(index);

  if (selectedIdx !== -1) {
    /* === DESELECT === */
    gameState.selectedTiles.splice(selectedIdx, 1);
    tileEl.classList.remove('selected');

    try { FeedbackManager.sound.play('sound_bubble_deselect'); } catch(e) {}

    trackEvent('tile_deselect', 'tile-' + index, {
      tileDisplay: roundData.tiles[index].display,
      tileValue: roundData.tiles[index].value
    });

    updateRunningSum();
  } else {
    /* === SELECT === */
    gameState.selectedTiles.push(index);
    tileEl.classList.add('selected');

    trackEvent('tile_select', 'tile-' + index, {
      tileDisplay: roundData.tiles[index].display,
      tileValue: roundData.tiles[index].value
    });


    var sum = getSelectedSum();
    var target = roundData.target;

    if (sum === target) {
      /* Correct! */
      try { FeedbackManager.sound.play('sound_bubble_select'); } catch(e) {}
      updateRunningSum();
      await handleCorrectAnswer();
    } else if (sum > target) {
      /* Overshoot! */
      updateRunningSum();
      await handleOvershoot();
    } else {
      /* Still selecting */
      try { FeedbackManager.sound.play('sound_bubble_select'); } catch(e) {}
      updateRunningSum();
    }
  }
}

/* === updateRunningSum display === */
function updateRunningSum() {
  var sumEl = document.getElementById('running-sum-value');
  if (!sumEl) return;
  var sum = getSelectedSum();
  var roundData = getRounds()[gameState.currentRound];
  var target = roundData.target;

  sumEl.textContent = sum > 0 ? 'Sum: ' + sum : '\u00A0';

  sumEl.classList.remove('near-target', 'at-target', 'over-target');
  if (sum === target) {
    sumEl.classList.add('at-target');
  } else if (sum > target) {
    sumEl.classList.add('over-target');
  } else if (sum >= target * 0.7) {
    sumEl.classList.add('near-target');
  }
}

/* ============================================================
   CORRECT ANSWER HANDLER
   ============================================================ */
async function handleCorrectAnswer() {
  gameState.isProcessing = true;
  var roundData = getRounds()[gameState.currentRound];

  /* Visual: mark tiles green */
  gameState.selectedTiles.forEach(function(idx) {
    var tile = document.querySelectorAll('.tile')[idx];
    if (tile) { tile.classList.remove('selected'); tile.classList.add('correct'); }
  });

  if (signalCollector) signalCollector.recordViewEvent('feedback_display', {
    screen: 'gameplay',
    content_snapshot: { feedback_type: 'correct', round: gameState.currentRound + 1, target: roundData.target, selected: getSelectedDisplayValues() },
    components: { progress: { current: gameState.currentRound, total: gameState.totalRounds }, lives: gameState.lives },
    metadata: { trigger: 'user_action' }
  });

  /* Timer + metrics */
  if (timer) timer.pause();
  var roundTimeMs = Date.now() - gameState.roundStartTime;
  var roundTimeSec = roundTimeMs / 1000;
  gameState.roundTimes.push(roundTimeSec);
  gameState.score++;
  gameState.streak++;
  gameState.consecutiveWrongs = 0;
  gameState.consecutiveOvershoots = 0;
  syncDOMState();

  /* Record attempt */
  var selectedDisplays = getSelectedDisplayValues();
  recordAttempt(gameState.currentRound, selectedDisplays, true, {
    round: gameState.currentRound + 1,
    target: roundData.target,
    timeTaken: roundTimeSec,
    level: roundData.level,
    is_retry: false
  });

  if (signalCollector) signalCollector.recordCustomEvent('round_solved', {
    round: gameState.currentRound + 1,
    correct: true,
    answer: selectedDisplays,
    correct_answer: roundData.target,
    time_ms: roundTimeMs
  });

  trackEvent('correct_answer', 'game', {
    round: gameState.currentRound + 1,
    target: roundData.target,
    timeTaken: Math.round(roundTimeSec)
  });

  /* Feedback: SFX (awaited) -> Dynamic TTS (awaited) */
  try {
    await FeedbackManager.sound.play('sound_correct', {
      sticker: {
        image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif',
        duration: 2,
        type: 'IMAGE_GIF'
      }
    });
  } catch (e) { console.error('Correct SFX error:', e.message); }

  var ttsText = 'Great! ' + selectedDisplays.join(' + ') + ' = ' + roundData.target + '!';
  try {
    await FeedbackManager.playDynamicFeedback({
      audio_content: ttsText,
      subtitle: ttsText,
      sticker: {
        image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif',
        duration: 2,
        type: 'IMAGE_GIF'
      }
    });
  } catch (e) { console.error('Correct TTS error:', e.message); }

  /* Advance */
  gameState.currentRound++;
  if (progressBar) progressBar.update(gameState.currentRound, gameState.lives);
  gameState.isProcessing = false;

  if (gameState.currentRound >= gameState.totalRounds) {
    showGameComplete();
  } else if (gameState.currentRound === 3) {
    gameState.currentLevel = 2;
    showLevelTransition(2);
  } else {
    startRound();
  }
}

/* ============================================================
   OVERSHOOT HANDLER
   ============================================================ */
async function handleOvershoot() {
  gameState.isProcessing = true;
  var roundData = getRounds()[gameState.currentRound];
  var sum = getSelectedSum();
  var selectedDisplays = getSelectedDisplayValues();

  /* Visual: mark tiles red + shake */
  var tileEls = document.querySelectorAll('.tile');
  gameState.selectedTiles.forEach(function(idx) {
    var tile = tileEls[idx];
    if (tile) {
      tile.classList.remove('selected');
      tile.classList.add('incorrect', 'shake-wrong');
    }
  });

  if (signalCollector) signalCollector.recordViewEvent('feedback_display', {
    screen: 'gameplay',
    content_snapshot: { feedback_type: 'incorrect', round: gameState.currentRound + 1, target: roundData.target, sum: sum, selected: selectedDisplays },
    components: { progress: { current: gameState.currentRound, total: gameState.totalRounds }, lives: gameState.lives },
    metadata: { trigger: 'user_action' }
  });

  /* Lose a life */
  gameState.lives--;
  gameState.streak = 0;
  gameState.consecutiveWrongs++;
  gameState.consecutiveOvershoots++;
  if (progressBar) progressBar.update(gameState.currentRound, Math.max(0, gameState.lives));
  syncDOMState();

  /* Record attempt */
  recordAttempt(gameState.currentRound, selectedDisplays, false, {
    round: gameState.currentRound + 1,
    target: roundData.target,
    sum: sum,
    level: roundData.level,
    misconception_tag: 'greedy-selection',
    is_retry: gameState.consecutiveOvershoots > 1
  });

  if (signalCollector) signalCollector.recordCustomEvent('round_solved', {
    round: gameState.currentRound + 1,
    correct: false,
    answer: selectedDisplays,
    correct_answer: roundData.target,
    sum: sum
  });

  trackEvent('incorrect_answer', 'game', {
    round: gameState.currentRound + 1,
    target: roundData.target,
    sum: sum
  });
  trackEvent('life_lost', 'game', { livesRemaining: gameState.lives });

  /* Case 8: Last life -> skip incorrect SFX, go straight to game over */
  if (gameState.lives <= 0) {
    showGameOver();
    return;
  }

  /* Feedback: SFX (awaited) -> Dynamic TTS (awaited) */
  try {
    await FeedbackManager.sound.play('sound_life_lost', {
      sticker: {
        image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-99.gif',
        duration: 2,
        type: 'IMAGE_GIF'
      }
    });
  } catch (e) { console.error('Life lost SFX error:', e.message); }

  var ttsText = 'Oops! ' + sum + ' is more than ' + roundData.target + '!';
  try {
    await FeedbackManager.playDynamicFeedback({
      audio_content: ttsText,
      subtitle: ttsText,
      sticker: {
        image: 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-99.gif',
        duration: 2,
        type: 'IMAGE_GIF'
      }
    });
  } catch (e) { console.error('Overshoot TTS error:', e.message); }

  /* Reset tiles for retry */
  tileEls = document.querySelectorAll('.tile');
  gameState.selectedTiles.forEach(function(idx) {
    var tile = tileEls[idx];
    if (tile) { tile.classList.remove('incorrect', 'shake-wrong', 'selected'); }
  });
  gameState.selectedTiles = [];
  updateRunningSum();

  /* Scaffolding: after 2 consecutive overshoots, highlight one valid solution */
  if (gameState.consecutiveOvershoots >= 2 && roundData.solutions && roundData.solutions.length > 0) {
    var solution = roundData.solutions[0];
    var hintIndices = [];
    for (var s = 0; s < solution.length; s++) {
      for (var t = 0; t < roundData.tiles.length; t++) {
        if (roundData.tiles[t].value === solution[s] && hintIndices.indexOf(t) === -1) {
          hintIndices.push(t);
          break;
        }
      }
    }

    tileEls = document.querySelectorAll('.tile');
    hintIndices.forEach(function(idx) {
      if (tileEls[idx]) tileEls[idx].classList.add('solution-hint');
    });

    await new Promise(function(resolve) { setTimeout(resolve, 1500); });

    tileEls = document.querySelectorAll('.tile');
    hintIndices.forEach(function(idx) {
      if (tileEls[idx]) tileEls[idx].classList.remove('solution-hint');
    });
  }

  gameState.isProcessing = false;
}

/* ============================================================
   START ROUND
   ============================================================ */
async function startRound() {
  var roundData = getRounds()[gameState.currentRound];
  if (!roundData) return;

  gameState.phase = 'playing';
  gameState.selectedTiles = [];
  gameState.consecutiveOvershoots = 0;
  gameState.correctAnswer = roundData.target;
  syncDOMState();

  /* Render target */
  document.getElementById('target-value').textContent = roundData.target;

  /* Render tiles */
  var tileGrid = document.getElementById('tile-grid');
  tileGrid.innerHTML = '';
  for (var i = 0; i < roundData.tiles.length; i++) {
    var tile = document.createElement('div');
    tile.className = 'tile fade-in';
    tile.textContent = roundData.tiles[i].display;
    tile.setAttribute('data-signal-id', 'tile-' + i);
    tile.setAttribute('data-index', i);
    tile.setAttribute('data-testid', 'tile-' + i);
    tile.onclick = (function(idx) {
      return function() { handleTileTap(idx); };
    })(i);
    tileGrid.appendChild(tile);
  }

  /* Reset running sum display */
  updateRunningSum();

  /* Show game content, hide transition */
  var gameContentEl = document.getElementById('gameContent');
  if (gameContentEl) gameContentEl.style.display = '';
  transitionScreen.hide();

  /* Timer */
  if (timer) {
    timer.resume();
    timer.reset();
    timer.start();
  }
  gameState.roundStartTime = Date.now();

  if (signalCollector) signalCollector.recordViewEvent('content_render', {
    screen: 'gameplay',
    content_snapshot: { round: gameState.currentRound + 1, target: roundData.target, level: roundData.level, tile_count: roundData.tiles.length },
    components: { timer: { value: 0, state: 'running' }, progress: { current: gameState.currentRound, total: gameState.totalRounds }, lives: gameState.lives },
    metadata: { trigger: 'round_start' }
  });

  trackEvent('question_shown', 'game', {
    round: gameState.currentRound + 1,
    target: roundData.target,
    level: roundData.level
  });

  /* Dynamic TTS: "Make [target]!" — does NOT block input */
  try {
    FeedbackManager.playDynamicFeedback({
      audio_content: 'Make ' + roundData.target,
      subtitle: 'Make ' + roundData.target
    });
  } catch (e) { console.error('Round start TTS error:', e.message); }

  /* New cards SFX */
  try { FeedbackManager.sound.play('sound_new_cards'); } catch(e) {}
}

/* ============================================================
   END GAME (PART-011)
   ============================================================ */
function endGame(isGameOver) {
  if (gameState.gameEnded) return;
  if (!gameState.isActive) return;
  gameState.isActive = false;
  gameState.gameEnded = true;
  gameState.duration_data.currentTime = new Date().toISOString();

  if (timer) { timer.pause(); }

  var stars = isGameOver ? 0 : calcStars();
  var correct = gameState.attempts.filter(function(a) { return a.correct; }).length;
  var total = gameState.attempts.length;
  var accuracy = total > 0 ? Math.round((correct / total) * 100) : 0;
  var timeTaken = gameState.startTime ? Math.round((Date.now() - gameState.startTime) / 1000) : 0;
  var avgTime = gameState.roundTimes.length > 0
    ? gameState.roundTimes.reduce(function(a, b) { return a + b; }, 0) / gameState.roundTimes.length
    : 0;

  gameState.phase = isGameOver ? 'gameover' : 'results';
  syncDOMState();

  var metrics = {
    accuracy: accuracy,
    time: timeTaken,
    stars: stars,
    attempts: gameState.attempts,
    duration_data: gameState.duration_data,
    totalLives: gameState.totalLives,
    tries: computeTriesPerRound(gameState.attempts),
    avgTimePerRound: Math.round(avgTime * 10) / 10,
    roundTimes: gameState.roundTimes
  };

  trackEvent('game_end', 'game', { metrics: metrics });

  var signalResult = signalCollector ? signalCollector.seal() : { event_count: 0, metadata: {} };

  window.parent.postMessage({
    type: 'game_complete',
    data: {
      metrics: metrics,
      attempts: gameState.attempts,
      completedAt: Date.now(),
      signal_event_count: signalResult.event_count,
      signal_metadata: signalResult.metadata
    }
  }, '*');

  if (timer) { timer.destroy(); timer = null; }
  if (visibilityTracker) { visibilityTracker.destroy(); visibilityTracker = null; }
  try { FeedbackManager.sound.stopAll(); } catch(e) {}
  try { FeedbackManager.stream.stopAll(); } catch(e) {}
}

/* ============================================================
   RESTART GAME
   ============================================================ */
function restartGame() {
  try { FeedbackManager.sound.stopAll(); } catch(e) {}
  try { FeedbackManager.stream.stopAll(); } catch(e) {}

  signalCollector = new SignalCollector({
    sessionId: window.gameVariableState?.sessionId || 'session_' + Date.now(),
    studentId: window.gameVariableState?.studentId || null,
    gameId: gameState.gameId || null,
    contentSetId: gameState.contentSetId || null
  });
  window.signalCollector = signalCollector;

  if (gameState.signalConfig && gameState.signalConfig.flushUrl) {
    signalCollector.flushUrl = gameState.signalConfig.flushUrl;
    signalCollector.playId = gameState.signalConfig.playId || null;
    signalCollector.gameId = gameState.signalConfig.gameId || signalCollector.gameId;
    signalCollector.sessionId = gameState.signalConfig.sessionId || signalCollector.sessionId;
    signalCollector.contentSetId = gameState.signalConfig.contentSetId || signalCollector.contentSetId;
    signalCollector.studentId = gameState.signalConfig.studentId || signalCollector.studentId;
    signalCollector.startFlushing();
  }

  window.gameState.phase = 'start_screen';
  window.gameState.currentRound = 0;
  window.gameState.score = 0;
  window.gameState.attempts = [];
  window.gameState.events = [];
  window.gameState.isActive = true;
  window.gameState.gameEnded = false;
  window.gameState.startTime = Date.now();
  window.gameState.lives = 3;
  window.gameState.currentLevel = 1;
  window.gameState.selectedTiles = [];
  window.gameState.roundTimes = [];
  window.gameState.roundStartTime = null;
  window.gameState.isProcessing = false;
  window.gameState.consecutiveOvershoots = 0;
  window.gameState.streak = 0;
  window.gameState.consecutiveWrongs = 0;
  window.gameState.correctAnswer = null;
  window.gameState.duration_data = {
    startTime: new Date().toISOString(),
    preview: [],
    attempts: [],
    evaluations: [],
    inActiveTime: [],
    totalInactiveTime: 0,
    currentTime: null
  };

  syncDOMState();

  /* Re-create timer */
  timer = new TimerComponent('timer-container', {
    timerType: 'increase',
    format: 'min',
    startTime: 0,
    endTime: 100000,
    autoStart: false,
    onEnd: function() {}
  });

  /* Re-create visibility tracker */
  visibilityTracker = new VisibilityTracker({
    onInactive: onInactiveHandler,
    onResume: onResumeHandler,
    popupProps: { title: 'Game Paused', description: 'Click Resume to continue.', primaryText: 'Resume' }
  });

  createProgressBar();
  progressBar.update(0, gameState.lives);

  trackEvent('game_start', 'game', { totalRounds: gameState.totalRounds });

  showWelcomeScreen();
}

  gameState.currentLevel = 1;

/* === handlePostMessage (PART-008) === */
function handlePostMessage(event) {
  if (!event.data || event.data.type !== 'game_init') return;

  gameState.phase = 'playing';
  syncDOMState();

  var d = event.data.data || event.data;
  if (d.content) gameState.content = d.content;

  var sc = gameState.signalConfig = d.signalConfig || {};
  if (signalCollector && sc.flushUrl) {
    signalCollector.flushUrl = sc.flushUrl;
    signalCollector.playId = sc.playId || null;
    signalCollector.gameId = sc.gameId || signalCollector.gameId;
    signalCollector.sessionId = sc.sessionId || signalCollector.sessionId;
    signalCollector.contentSetId = sc.contentSetId || signalCollector.contentSetId;
    signalCollector.studentId = sc.studentId || signalCollector.studentId;
    signalCollector.startFlushing();
  }

  setupGame();
}

/* === Visibility handlers (PART-005) === */
function onInactiveHandler() {
  gameState.duration_data.inActiveTime.push({ start: Date.now() });
  if (signalCollector) {
    signalCollector.pause();
    signalCollector.recordCustomEvent('visibility_hidden', {});
  }
  if (timer) timer.pause({ fromVisibilityTracker: true });
  try { FeedbackManager.sound.pause(); } catch(e) {}
  try { FeedbackManager.stream.pauseAll(); } catch(e) {}
  trackEvent('game_paused', 'system');
}

function onResumeHandler() {
  var lastInactive = gameState.duration_data.inActiveTime[gameState.duration_data.inActiveTime.length - 1];
  if (lastInactive && !lastInactive.end) {
    lastInactive.end = Date.now();
    gameState.duration_data.totalInactiveTime += (lastInactive.end - lastInactive.start);
  }
  if (signalCollector) {
    signalCollector.resume();
    signalCollector.recordCustomEvent('visibility_visible', {});
  }
  if (timer && timer.isPaused) timer.resume({ fromVisibilityTracker: true });
  try { FeedbackManager.sound.resume(); } catch(e) {}
  try { FeedbackManager.stream.resumeAll(); } catch(e) {}
  trackEvent('game_resumed', 'system');
}

  try {
    throw new Error('Test error from testSentry()');
  } catch (error) {
    if (typeof Sentry !== 'undefined') Sentry.captureException(error, { tags: { test: true } });
    console.log('Test error sent to Sentry.');
  }
};

window.loadRound = function(n) {
  gameState.currentRound = n - 1;
  gameState.isActive = true;
  gameState.gameEnded = false;
  gameState.isProcessing = false;
  startRound();
};
