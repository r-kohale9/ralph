<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Spot the Pairs — Friendly Pairs Sum Challenge</title>

  <!-- Sentry (error tracking) -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/sentry/index.js"></script>
  <script>
    function initSentry() {
      if (typeof SentryConfig === 'undefined' || !SentryConfig.enabled) return;
      if (typeof Sentry === 'undefined') return;
      try {
        Sentry.init(SentryConfig.getConfig({ release: 'spot-the-pairs@1.0.0' }));
      } catch (e) { /* noop */ }
    }
  </script>
  <script src="https://browser.sentry-cdn.com/10.23.0/bundle.tracing.replay.feedback.min.js" crossorigin="anonymous"></script>
  <script src="https://browser.sentry-cdn.com/10.23.0/captureconsole.min.js" crossorigin="anonymous"></script>
  <script src="https://browser.sentry-cdn.com/10.23.0/browserprofiling.min.js" crossorigin="anonymous"></script>
  <script>window.addEventListener('load', initSentry);</script>

  <!-- Game CDN packages (exact order) -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

  <style>
    :root {
      --mathai-game-max-width: 480px;
      --mathai-stack-gap: 10px;
      --mathai-game-padding-top: 54px;

      --mathai-primary: #270f36;
      --mathai-level-text: #270F63;
      --mathai-purple: #9B51E0;
      --mathai-purple-deep: #7534BB;
      --mathai-lavender: #F3ECFB;
      --mathai-lavender-strong: #E4D3F5;

      --mathai-success-color: #219653;
      --mathai-blue: #667eea;
      --mathai-red: #E35757;
      --mathai-orange: #F2994A;
      --mathai-yellow: #FFDE49;

      --mathai-white: #ffffff;
      --mathai-gray: #666666;
      --mathai-light-gray: #f5f5f5;
      --mathai-disabled-gray: #E0E0E0;
      --mathai-text-primary: #4a4a4a;
      --mathai-border-gray: #e0e0e0;

      --mathai-cell-bg-green: #D9F8D9;
      --mathai-cell-bg-yellow: #FCF6D7;
      --mathai-cell-bg-red: #FFD9D9;
      --mathai-cell-bg-grey: #E0E0E0;
      --mathai-cell-border-green: #27ae60;
      --mathai-cell-border-red: #e74c3c;

      --mathai-success: #219653;
      --mathai-error: #E35757;
      --mathai-warning: #F2994A;

      --mathai-font-family: 'Epilogue', -apple-system, 'Segoe UI', Roboto, sans-serif;
      --mathai-font-size-title: 32px;
      --mathai-font-size-subtitle: 18px;
      --mathai-font-size-button: 16px;
      --mathai-font-size-body: 16px;
      --mathai-font-size-small: 14px;
      --mathai-font-size-large: 24px;

      --mathai-padding-large: 56px 40px;
      --mathai-padding-medium: 16px 24px;
      --mathai-padding-small: 10px;
      --mathai-border-radius: 24px;
      --mathai-border-radius-small: 8px;
      --mathai-border-radius-button: 10px;
      --mathai-border-radius-card: 12px;
      --mathai-border-radius-pill: 999px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      overflow-x: hidden;
      margin: 0;
      padding: 0;
      overscroll-behavior: none;
    }

    body {
      font-family: var(--mathai-font-family);
      background: var(--mathai-white);
      color: var(--mathai-text-primary);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.5;
    }

    .hidden { display: none !important; }

    #app {
      width: 100%;
      max-width: var(--mathai-game-max-width);
      min-height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: clip;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    @supports not (min-height: 100dvh) {
      #app { min-height: 100vh; }
    }

    /* Preview-wrapper scroll compatibility */
    #mathai-preview-slot {
      height: 100dvh;
      overflow: hidden;
      position: relative;
    }
    #mathai-preview-slot .mathai-preview-body {
      height: 100dvh;
      box-sizing: border-box;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    input, textarea {
      -webkit-user-select: text;
      user-select: text;
    }

    button,
    .pill,
    [role="button"],
    input[type="submit"] {
      min-height: 44px;
      min-width: 44px;
      touch-action: manipulation;
    }

    /* ============================================================
       Gameplay layout
       ============================================================ */
    #gameContent {
      padding: 10px 14px 24px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      position: relative;
      min-height: 480px;
    }

    /* Custom sub-header (timer + stars) — sits inside #gameContent, below the CDN header */
    .play-subheader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 2px 8px 2px;
      font-size: var(--mathai-font-size-small);
      color: var(--mathai-primary);
      font-weight: 700;
    }
    .play-subheader .timer-pill {
      background: var(--mathai-lavender);
      color: var(--mathai-purple-deep);
      padding: 4px 12px;
      border-radius: var(--mathai-border-radius-pill);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.5px;
      min-width: 62px;
      text-align: center;
    }
    .play-subheader .question-pill {
      background: var(--mathai-light-gray);
      color: var(--mathai-gray);
      padding: 4px 10px;
      border-radius: var(--mathai-border-radius-pill);
      font-size: 13px;
      font-weight: 800;
    }
    .play-subheader .stars-pill {
      display: inline-flex;
      align-items: center;
      background: #EAF3FD;
      color: var(--mathai-blue);
      padding: 4px 10px;
      border-radius: var(--mathai-border-radius-pill);
      font-size: 13px;
      font-weight: 800;
      min-width: 56px;
      justify-content: center;
    }
    .play-subheader .stars-pill .star-glyph {
      margin-right: 4px;
      font-size: 14px;
    }
    .play-subheader .stars-pill.star-pop {
      animation: starPop 0.25s ease;
    }

    /* Target sum display (the round's question) */
    .target-sum-display {
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      color: var(--mathai-purple-deep);
      margin: 12px 0 14px 0;
      letter-spacing: 0.3px;
    }

    /* Pill board — staggered 3+3+2 */
    .board {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 4px 0 14px 0;
    }
    .board-row {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      margin-bottom: 10px;
    }
    .board-row .pill {
      margin: 0 5px;
    }
    /* Row 3 is centred under columns 0 & 1 — shift left by ~1/6 of row width
       so 2 pills hang under the first two of the 3 above them. */
    .board-row.row-3 {
      justify-content: center;
      padding-right: 88px; /* approx one pill-column width to shift leftwards */
    }

    /* Pill */
    .pill {
      background: var(--mathai-lavender);
      color: var(--mathai-purple-deep);
      border: 2px solid var(--mathai-lavender-strong);
      border-radius: var(--mathai-border-radius-pill);
      font-family: var(--mathai-font-family);
      font-size: 18px;
      font-weight: 800;
      padding: 10px 18px;
      min-height: 48px;
      min-width: 76px;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      -webkit-user-select: none;
      user-select: none;
      touch-action: manipulation;
      transition: background 0.15s ease, color 0.15s ease, transform 0.12s ease, border-color 0.15s ease, opacity 0.3s ease;
    }
    .pill:active {
      transform: scale(0.97);
    }
    .pill.pill-press {
      transform: scale(1.04);
    }
    .pill.matched {
      background: var(--mathai-purple);
      color: var(--mathai-white);
      border-color: var(--mathai-purple-deep);
      cursor: default;
      pointer-events: none;
      animation: matchedFlash 400ms ease;
    }
    .pill.matched.fading {
      opacity: 0;
    }
    .pill.wrong-flash {
      background: var(--mathai-cell-bg-red);
      color: var(--mathai-error);
      border-color: var(--mathai-cell-border-red);
      animation: wrongShake 600ms ease;
    }

    /* Action row — "Next Round" anchored bottom-right */
    .action-row {
      display: flex;
      justify-content: flex-end;
      margin-top: auto;
      padding: 16px 0 calc(8px + env(safe-area-inset-bottom, 0px)) 0;
    }
    .action-btn {
      background: var(--mathai-yellow);
      color: var(--mathai-primary);
      border: none;
      border-radius: var(--mathai-border-radius-button);
      font-family: var(--mathai-font-family);
      font-size: var(--mathai-font-size-subtitle);
      font-weight: 800;
      padding: 14px 28px;
      cursor: pointer;
      letter-spacing: 0.5px;
      -webkit-appearance: none;
      appearance: none;
      min-height: 48px;
      box-shadow: 0 3px 0 #B89800;
      transition: background 0.2s ease, color 0.2s ease, opacity 0.2s ease;
    }
    .action-btn:disabled,
    .action-btn.disabled {
      background: var(--mathai-disabled-gray);
      color: var(--mathai-gray);
      cursor: not-allowed;
      pointer-events: none;
      box-shadow: none;
      opacity: 0.85;
    }

    /* Animations */
    @keyframes matchedFlash {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.10); }
      100% { transform: scale(1); }
    }
    @keyframes wrongShake {
      0%, 100% { transform: translateX(0); }
      15% { transform: translateX(-4px); }
      30% { transform: translateX(4px); }
      45% { transform: translateX(-3px); }
      60% { transform: translateX(3px); }
      75% { transform: translateX(-2px); }
      90% { transform: translateX(2px); }
    }
    @keyframes starPop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.35s ease; }

    /* Processing state — disable pill taps while feedback plays */
    .is-processing .pill:not(.matched) {
      pointer-events: none;
    }

    /* Landscape lock */
    @media screen and (orientation: landscape) and (max-height: 500px) {
      body::before {
        content: 'Please rotate your phone to portrait mode';
        position: fixed;
        inset: 0;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--mathai-white);
        color: var(--mathai-primary);
        font-family: var(--mathai-font-family);
        font-size: var(--mathai-font-size-subtitle);
        text-align: center;
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <div id="app" data-phase="start_screen" data-score="0" data-round="0" data-lives="3" data-stars="0"></div>

  <script>
    /* ============================================================
       Sticker URLs (standard set)
       ============================================================ */
    var STICKER_CORRECT = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif';
    var STICKER_WRONG = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-99.gif';
    var STICKER_ROUND = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-87.gif';
    var STICKER_LEVEL = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-234.gif';
    var STICKER_VICTORY = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-230.gif';
    var STICKER_GAME_COMPLETE_2 = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-113.gif';
    var STICKER_GAME_COMPLETE_1 = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-110.gif';
    var STICKER_SAD = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-103.gif';
    var STICKER_RESTART = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1757430772002-102.gif';

    /* ============================================================
       gameState (PART-007) — gameId MUST be first field
       ============================================================ */
    var gameState = {
      gameId: 'spot-the-pairs',
      phase: 'start_screen',
      currentRound: 0,
      totalRounds: 3,
      score: 0,
      lives: 3,
      totalLives: 3,
      correctAnswer: null,
      attempts: [],
      events: [],
      startTime: null,
      isActive: false,
      isProcessing: false,
      gameEnded: false,
      content: null,
      stars: 0,
      starCount: 0,
      foundCorrect: 0,
      foundCorrectByRound: {},
      roundsClearedCount: 0,
      roundStartTime: null,
      levelEnableTime: null,
      lastSpeedRefTime: null,
      previewResult: null,
      currentRoundData: null,
      responseTimes: [],
      duration_data: {
        startTime: null,
        preview: [],
        attempts: [],
        evaluations: [],
        inActiveTime: [],
        totalInactiveTime: 0
      }
    };
    window.gameState = gameState;

    /* ============================================================
       fallbackContent — 3 levels, single-digit pairs that sum to 10
       ============================================================ */
    var fallbackContent = {
      previewInstruction: '<p><b>Tap and select all friendly pairs of 10!</b><br><br>Spot each pair under 2 seconds to win 3 stars!</p>',
      previewAudioText: 'Tap and select all friendly pairs of ten. Spot each pair under two seconds to win three stars.',
      previewAudio: null,
      showGameOnPreview: false,
      rounds: [
        {
          round: 1, level: 1, stage: 1, type: 'A',
          target: 10, targetLabel: 'Make Sum 10',
          pills: [
            { id: 'p1_1', a: 6, b: 4, correct: true  },
            { id: 'p1_2', a: 5, b: 6, correct: false },
            { id: 'p1_3', a: 2, b: 8, correct: true  },
            { id: 'p1_4', a: 4, b: 5, correct: false }
          ],
          correctCount: 2,
          misconception_tags: {
            'off-by-one-under': 'Student taps 5+6=11 — adds one too many.',
            'off-by-one-over':  'Student taps 4+5=9 — under-counts by 1.'
          }
        },
        {
          round: 2, level: 2, stage: 2, type: 'A',
          target: 10, targetLabel: 'Make Sum 10',
          pills: [
            { id: 'p2_1', a: 7, b: 3, correct: true  },
            { id: 'p2_2', a: 3, b: 8, correct: false },
            { id: 'p2_3', a: 9, b: 1, correct: true  },
            { id: 'p2_4', a: 6, b: 3, correct: false },
            { id: 'p2_5', a: 5, b: 5, correct: true  }
          ],
          correctCount: 3,
          misconception_tags: {
            'off-by-one-under': 'Student taps 3+8=11.',
            'off-by-one-over':  'Student taps 6+3=9.'
          }
        },
        {
          round: 3, level: 3, stage: 3, type: 'A',
          target: 10, targetLabel: 'Make Sum 10',
          pills: [
            { id: 'p3_1', a: 8, b: 2, correct: true  },
            { id: 'p3_2', a: 7, b: 4, correct: false },
            { id: 'p3_3', a: 4, b: 6, correct: true  },
            { id: 'p3_4', a: 5, b: 6, correct: false },
            { id: 'p3_5', a: 9, b: 1, correct: true  },
            { id: 'p3_6', a: 3, b: 6, correct: false }
          ],
          correctCount: 3,
          misconception_tags: {
            'off-by-one-over':  'Student taps 7+4=11 (mistaken).',
            'off-by-one-under': 'Student taps 5+6=11 — adds one too many.',
            'arbitrary-fill':   'Student taps any pill to try luck.'
          }
        }
      ]
    };

    /* ============================================================
       Module-scope runtime references
       ============================================================ */
    var timer = null;
    var visibilityTracker = null;
    var signalCollector = null;
    var progressBar = null;
    var transitionScreen = null;
    var previewScreen = null;
    var audioPermissionChecked = false;

    // Header count-up timer
    var headerTimerIntervalId = null;
    var headerTimerStartTs = null;

    /* ============================================================
       syncDOM — writes #app data-* attrs
       ============================================================ */
    function syncDOM() {
      var app = document.getElementById('app');
      if (!app) return;
      app.setAttribute('data-phase', gameState.phase);
      app.setAttribute('data-score', gameState.score);
      app.setAttribute('data-round', gameState.currentRound);
      app.setAttribute('data-lives', gameState.lives);
      app.setAttribute('data-stars', gameState.stars);
    }

    /* ============================================================
       trackEvent (PART-010)
       ============================================================ */
    function trackEvent(type, data) {
      try {
        var evt = { event: type, timestamp: Date.now() };
        if (data && typeof data === 'object') {
          for (var k in data) { if (data.hasOwnProperty(k)) evt[k] = data[k]; }
        }
        gameState.events.push(evt);
      } catch (e) { /* noop */ }
    }

    /* ============================================================
       recordAttempt (PART-009, 12 fields)
       ============================================================ */
    function recordAttempt(params) {
      try {
        var now = Date.now();
        var sinceStart = gameState.startTime ? (now - gameState.startTime) : 0;
        var responseMs = 0;
        if (params && typeof params.response_time_ms === 'number') {
          responseMs = params.response_time_ms;
        } else if (gameState.roundStartTime) {
          responseMs = now - gameState.roundStartTime;
        }
        var attempt = {
          attempt_timestamp: now,
          time_since_start_of_game: sinceStart,
          input_of_user: params.input_of_user,
          correct: !!params.correct,
          round_number: params.round_number,
          question_id: params.question_id,
          correct_answer: params.correct_answer,
          response_time_ms: responseMs,
          misconception_tag: params.misconception_tag == null ? null : params.misconception_tag,
          difficulty_level: params.difficulty_level || 1,
          is_retry: !!params.is_retry,
          metadata: params.metadata || {}
        };
        gameState.attempts.push(attempt);
        gameState.duration_data.attempts.push({
          round: params.round_number,
          timestamp: now,
          response_time_ms: responseMs
        });
      } catch (e) { /* noop */ }
    }

    /* ============================================================
       getRounds — with fallback
       ============================================================ */
    function getRounds() {
      if (gameState.content && gameState.content.rounds &&
          gameState.content.rounds.length >= gameState.totalRounds) {
        return gameState.content.rounds;
      }
      return fallbackContent.rounds;
    }

    /* ============================================================
       getStars — 3-star rating from starCount
       ============================================================ */
    function getStars() {
      var s = gameState.starCount || 0;
      if (s >= 8) return 3;
      if (s >= 5) return 2;
      if (s >= 1) return 1;
      return 0;
    }

    /* ============================================================
       waitForPackages (PART-003)
       ============================================================ */
    function waitForPackages() {
      return new Promise(function(resolve, reject) {
        var startT = Date.now();
        var timeout = 120000;
        var interval = setInterval(function() {
          var ok = (typeof FeedbackManager !== 'undefined') &&
                   (typeof VisibilityTracker !== 'undefined') &&
                   (typeof ScreenLayout !== 'undefined') &&
                   (typeof ProgressBarComponent !== 'undefined') &&
                   (typeof TransitionScreenComponent !== 'undefined') &&
                   (typeof PreviewScreenComponent !== 'undefined');
          if (ok) { clearInterval(interval); resolve(true); return; }
          if (Date.now() - startT > timeout) {
            clearInterval(interval);
            try { throw new Error('Packages failed to load within ' + timeout + 'ms'); }
            catch (err) { reject(err); }
          }
        }, 50);
      });
    }

    /* ============================================================
       Audio readiness check
       ============================================================ */
    function waitForAudioPermission() {
      return new Promise(function(resolve) {
        if (audioPermissionChecked) return resolve();
        if (typeof FeedbackManager === 'undefined' || !FeedbackManager.canPlayAudio) {
          audioPermissionChecked = true;
          return resolve();
        }
        try {
          if (FeedbackManager.canPlayAudio()) {
            audioPermissionChecked = true;
            return resolve();
          }
        } catch (e) { /* noop */ }
        var check = setInterval(function() {
          try {
            if (FeedbackManager.canPlayAudio && FeedbackManager.canPlayAudio()) {
              clearInterval(check);
              audioPermissionChecked = true;
              resolve();
            }
          } catch (e) { /* noop */ }
        }, 200);
        setTimeout(function() { clearInterval(check); audioPermissionChecked = true; resolve(); }, 15000);
      });
    }

    /* ============================================================
       FeedbackManager preload
       ============================================================ */
    function preloadAllAudio() {
      return FeedbackManager.sound.preload([
        { id: 'correct_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757588479110.mp3' },
        { id: 'incorrect_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
        { id: 'rounds_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506558124.mp3' },
        { id: 'victory_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506672258.mp3' },
        { id: 'game_complete_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506659491.mp3' },
        { id: 'tap_sound', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432016820.mp3' },
        { id: 'sound_bubble_select', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1758162403784.mp3' },
        { id: 'sound_bubble_deselect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1758712800721.mp3' },
        { id: 'new_cards', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432104595.mp3' }
      ]);
    }

    /* ============================================================
       Safe FM wrappers
       ============================================================ */
    function safePlaySound(id, opts) {
      try {
        if (typeof FeedbackManager === 'undefined' || !FeedbackManager.sound || !FeedbackManager.sound.play) return Promise.resolve();
        return FeedbackManager.sound.play(id, opts || {});
      } catch (e) {
        return Promise.resolve();
      }
    }
    function safeStopAllAudio() {
      try { if (FeedbackManager && FeedbackManager.sound && FeedbackManager.sound.pause) FeedbackManager.sound.pause(); } catch (e) {}
      try { if (FeedbackManager && FeedbackManager.stream && FeedbackManager.stream.pauseAll) FeedbackManager.stream.pauseAll(); } catch (e) {}
      try { if (FeedbackManager && FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}
    }

    /* ============================================================
       createProgressBar (PART-023)
       ============================================================ */
    function createProgressBar() {
      try { if (progressBar && progressBar.destroy) progressBar.destroy(); } catch (e) {}
      try {
        progressBar = new ProgressBarComponent({
          slotId: 'mathai-progress-slot',
          totalRounds: gameState.totalRounds,
          totalLives: gameState.totalLives
        });
        progressBar.show();
        progressBar.update(0, gameState.totalLives);
      } catch (e) {
        console.error('[progressBar] ' + e.message);
      }
    }

    /* ============================================================
       handlePostMessage (PART-008)
       ============================================================ */
    function handlePostMessage(event) {
      try {
        if (!event || !event.data || typeof event.data !== 'object') return;
        var msg = event.data;
        if (msg.type === 'game_init') {
          gameState.phase = 'playing';
          var d = msg.data || msg;
          if (d.content) gameState.content = d.content;
          else if (msg.content) gameState.content = msg.content;

          gameState.signalConfig = d.signalConfig || msg.signalConfig || {};
          var sc = gameState.signalConfig;
          if (signalCollector) {
            try { signalCollector.flushUrl = sc.flushUrl; } catch (e) {}
            try { signalCollector.playId = sc.playId; } catch (e) {}
            try { signalCollector.gameId = sc.gameId || gameState.gameId; } catch (e) {}
            try { signalCollector.sessionId = sc.sessionId; } catch (e) {}
            try { signalCollector.contentSetId = sc.contentSetId; } catch (e) {}
            try { signalCollector.studentId = sc.studentId; } catch (e) {}
            try { if (signalCollector.startFlushing) signalCollector.startFlushing(); } catch (e) {}
          }
          syncDOM();
          setupGame();
        }
      } catch (e) { /* noop */ }
    }

    /* ============================================================
       escapeHTML helper
       ============================================================ */
    function escapeHTML(s) {
      if (s == null) return '';
      return String(s).replace(/[&<>"']/g, function(ch) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch];
      });
    }

    /* ============================================================
       Game scaffold injection
       ============================================================ */
    function injectGameHTML() {
      var gc = document.getElementById('gameContent');
      if (!gc) return;
      gc.innerHTML =
        '<div class="play-subheader fade-in" id="playSubheader">' +
          '<span class="question-pill" id="questionPill" data-testid="question-pill">Q 1</span>' +
          '<span class="timer-pill" id="timerDisplay" data-testid="timer-display">00:00</span>' +
          '<span class="stars-pill" id="starsCounter" data-testid="stars-counter"><span class="star-glyph">★</span><span id="starsCounterText">0/10</span></span>' +
        '</div>' +
        '<div class="target-sum-display fade-in" id="targetSumDisplay" data-testid="target-sum-display">Make Sum 10</div>' +
        '<div class="board fade-in" id="board">' +
          '<div class="board-row row-1" id="boardRow1"></div>' +
          '<div class="board-row row-2" id="boardRow2"></div>' +
          '<div class="board-row row-3" id="boardRow3"></div>' +
        '</div>' +
        '<div class="action-row">' +
          '<button type="button" id="nextRoundBtn" data-testid="btn-next-round" class="action-btn disabled" disabled>Next Round</button>' +
        '</div>';

      var btn = document.getElementById('nextRoundBtn');
      if (btn) btn.onclick = onNextRoundClick;
    }

    /* ============================================================
       renderInitialState — paint Level 1 behind preview (non-interactive)
       ============================================================ */
    function renderInitialState() {
      var rounds = getRounds();
      if (!rounds || !rounds[0]) return;
      buildRoundDOM(rounds[0], /* interactive */ false);
    }

    /* ============================================================
       buildRoundDOM — render banner + 8 pills in staggered 3+3+2
       ============================================================ */
    function buildRoundDOM(round, interactive) {
      gameState.currentRoundData = round;

      // Target display + question pill
      var tdisp = document.getElementById('targetSumDisplay');
      if (tdisp) tdisp.textContent = round.targetLabel || ('Make Sum ' + round.target);

      var qp = document.getElementById('questionPill');
      if (qp) qp.textContent = 'Q ' + (round.round || 1);

      // Build pill rows
      var row1 = document.getElementById('boardRow1');
      var row2 = document.getElementById('boardRow2');
      var row3 = document.getElementById('boardRow3');
      if (row1) row1.innerHTML = '';
      if (row2) row2.innerHTML = '';
      if (row3) row3.innerHTML = '';

      var pills = round.pills || [];
      for (var i = 0; i < pills.length; i++) {
        var p = pills[i];
        var pillHTML =
          '<button type="button" class="pill" data-testid="pill-' + p.id + '" ' +
          'data-pill-id="' + p.id + '" ' +
          'data-correct="' + (p.correct ? 'true' : 'false') + '">' +
          escapeHTML(p.a + ' + ' + p.b) +
          '</button>';
        var targetRow;
        if (i < 3) targetRow = row1;
        else if (i < 6) targetRow = row2;
        else targetRow = row3;
        if (targetRow) targetRow.insertAdjacentHTML('beforeend', pillHTML);
      }

      // Next Round btn state
      var nbtn = document.getElementById('nextRoundBtn');
      if (nbtn) {
        nbtn.classList.add('disabled');
        nbtn.setAttribute('disabled', 'true');
      }

      // Star counter & timer reset display
      updateStarCounterDisplay();
      setTimerDisplay(0);

      // Wire pill handlers if interactive
      if (interactive) bindPillHandlers();
    }

    function bindPillHandlers() {
      var gc = document.getElementById('gameContent');
      if (!gc) return;
      var pills = gc.querySelectorAll('.pill');
      for (var i = 0; i < pills.length; i++) {
        pills[i].onclick = onPillClick;
      }
    }

    /* ============================================================
       Header helpers
       ============================================================ */
    function updateStarCounterDisplay() {
      var t = document.getElementById('starsCounterText');
      if (t) t.textContent = gameState.starCount + '/10';
      var s = document.getElementById('starsCounter');
      if (s) {
        s.classList.remove('star-pop');
        // Force reflow to restart animation
        // eslint-disable-next-line no-unused-expressions
        void s.offsetWidth;
        s.classList.add('star-pop');
      }
    }

    function setTimerDisplay(totalSeconds) {
      var el = document.getElementById('timerDisplay');
      if (!el) return;
      var mm = Math.floor(totalSeconds / 60);
      var ss = totalSeconds % 60;
      var mmStr = mm < 10 ? ('0' + mm) : String(mm);
      var ssStr = ss < 10 ? ('0' + ss) : String(ss);
      el.textContent = mmStr + ':' + ssStr;
    }

    function startHeaderTimer() {
      stopHeaderTimer();
      headerTimerStartTs = Date.now();
      setTimerDisplay(0);
      headerTimerIntervalId = setInterval(function() {
        if (!headerTimerStartTs) return;
        var elapsed = Math.floor((Date.now() - headerTimerStartTs) / 1000);
        setTimerDisplay(elapsed);
      }, 1000);
    }

    function stopHeaderTimer() {
      if (headerTimerIntervalId) {
        clearInterval(headerTimerIntervalId);
        headerTimerIntervalId = null;
      }
      headerTimerStartTs = null;
    }

    /* ============================================================
       renderRound — called when entering gameplay
       ============================================================ */
    function renderRound() {
      var rounds = getRounds();
      var idx = gameState.currentRound - 1;
      if (idx < 0) idx = 0;
      if (idx >= rounds.length) idx = rounds.length - 1;
      var r = rounds[idx];
      if (!r) return;

      gameState.correctAnswer = r.target;
      gameState.isActive = true;
      gameState.isProcessing = false;
      gameState.phase = 'gameplay';
      gameState.roundStartTime = Date.now();
      gameState.levelEnableTime = Date.now();
      gameState.lastSpeedRefTime = gameState.levelEnableTime;
      gameState.foundCorrect = 0;

      if (!document.getElementById('board')) injectGameHTML();

      buildRoundDOM(r, /* interactive */ true);

      var gc = document.getElementById('gameContent');
      if (gc) gc.classList.remove('is-processing');

      syncDOM();

      // Fire-and-forget "new cards"
      safePlaySound('new_cards', {});

      // Start the visible count-up timer
      startHeaderTimer();

      trackEvent('question_shown', {
        round: gameState.currentRound,
        target: r.target,
        correctCount: r.correctCount,
        stage: r.stage
      });
    }

    /* ============================================================
       Misconception derivation
       ============================================================ */
    function deriveMisconception(pill, round) {
      var sum = pill.a + pill.b;
      var off = sum - round.target;
      if (off === 1) return 'off-by-one-over';
      if (off === -1) return 'off-by-one-under';
      if (off === 2) return 'off-by-two-over';
      if (off === -2) return 'off-by-two-under';
      if (Math.abs(off) >= 3) return 'arbitrary-fill';
      // Check if adding only units digits would equal target (place-value-drop)
      var onesA = pill.a % 10;
      var onesB = pill.b % 10;
      if ((onesA + onesB) === round.target && pill.a >= 10) return 'place-value-drop';
      // Fallback to first tag from the round
      if (round.misconception_tags) {
        for (var k in round.misconception_tags) {
          if (round.misconception_tags.hasOwnProperty(k)) return k;
        }
      }
      return null;
    }

    /* ============================================================
       Pill tap handler — PRIMARY GAME LOOP
       ============================================================ */
    function onPillClick(ev) {
      var pillEl = ev.currentTarget;
      if (!pillEl) return;

      // Guards
      if (!gameState.isActive) return;
      if (gameState.isProcessing) return;
      if (gameState.gameEnded) return;
      if (pillEl.classList.contains('matched')) return;

      var round = gameState.currentRoundData;
      if (!round) return;

      var pillId = pillEl.getAttribute('data-pill-id');
      var pill = null;
      for (var i = 0; i < round.pills.length; i++) {
        if (round.pills[i].id === pillId) { pill = round.pills[i]; break; }
      }
      if (!pill) return;

      gameState.isProcessing = true;
      var gc = document.getElementById('gameContent');
      if (gc) gc.classList.add('is-processing');

      var now = Date.now();
      var sinceRef = now - (gameState.lastSpeedRefTime || gameState.levelEnableTime || now);
      var isCorrect = (pill.a + pill.b) === round.target;
      var speedBonus = isCorrect && sinceRef <= 2000;

      // recordAttempt BEFORE audio
      recordAttempt({
        input_of_user: pill.a + ' + ' + pill.b,
        correct: isCorrect,
        round_number: gameState.currentRound,
        question_id: 'r' + gameState.currentRound + '_sum' + round.target + '_' + pill.id,
        correct_answer: round.target,
        response_time_ms: sinceRef,
        misconception_tag: isCorrect ? null : deriveMisconception(pill, round),
        difficulty_level: round.stage || 1,
        is_retry: false,
        metadata: {
          target: round.target,
          pillId: pill.id,
          a: pill.a,
          b: pill.b,
          sum: pill.a + pill.b,
          off: (pill.a + pill.b) - round.target,
          speedBonus: speedBonus
        }
      });
      trackEvent('answer_submitted', { round: gameState.currentRound, correct: isCorrect, pillId: pill.id });

      gameState.responseTimes.push(sinceRef);

      if (isCorrect) {
        handleCorrectTap(pillEl, pill, round, speedBonus);
      } else {
        handleWrongTap(pillEl, pill, round);
      }
    }

    /* ============================================================
       Correct tap flow
       ============================================================ */
    function handleCorrectTap(pillEl, pill, round, speedBonus) {
      pillEl.classList.add('matched');
      gameState.foundCorrect += 1;
      gameState.score += 1;
      gameState.foundCorrectByRound[gameState.currentRound] = gameState.foundCorrect;

      if (speedBonus) {
        gameState.starCount = Math.min(10, gameState.starCount + 1);
      }
      gameState.lastSpeedRefTime = Date.now();

      updateStarCounterDisplay();
      syncDOM();

      var levelClear = gameState.foundCorrect >= round.correctCount;

      // If level clears, bump progressBar FIRST (MEMORY.md rule)
      if (levelClear) {
        gameState.roundsClearedCount = (gameState.roundsClearedCount || 0) + 1;
        try {
          if (progressBar && progressBar.update) {
            var _livesClamp = Math.max(0, gameState.lives);
            progressBar.update(gameState.currentRound, _livesClamp);
          }
        } catch (e) {}
      }

      (async function() {
        try {
          await Promise.all([
            safePlaySound('correct_sound_effect', { sticker: STICKER_CORRECT }),
            new Promise(function(res) { setTimeout(res, 1500); })
          ]);
        } catch (e) { /* noop */ }

        // Fade the pill out
        pillEl.classList.add('fading');
        setTimeout(function() {
          try { pillEl.style.visibility = 'hidden'; } catch (e) {}
        }, 320);

        if (levelClear) {
          gameState.phase = 'round_complete';
          syncDOM();
          enableNextRoundCTA();
          trackEvent('round_complete', { round: gameState.currentRound, cleared: true, foundCorrect: gameState.foundCorrect });
          // Stop the header timer for this level
          stopHeaderTimer();
        }

        gameState.isProcessing = false;
        var gc = document.getElementById('gameContent');
        if (gc) gc.classList.remove('is-processing');
      })();
    }

    /* ============================================================
       Wrong tap flow
       ============================================================ */
    function handleWrongTap(pillEl, pill, round) {
      pillEl.classList.add('wrong-flash');
      gameState.lives -= 1;
      if (gameState.lives < 0) gameState.lives = 0;
      syncDOM();

      var outOfLives = gameState.lives === 0;

      // Hearts decrement via progressBar (not a level clear; round progress unchanged)
      try {
        if (progressBar && progressBar.update) {
          var completedRounds = (gameState.roundsClearedCount || 0);
          var _livesWrong = Math.max(0, gameState.lives);
          progressBar.update(completedRounds, _livesWrong);
        }
      } catch (e) {}

      (async function() {
        try {
          await Promise.all([
            safePlaySound('incorrect_sound_effect', { sticker: STICKER_WRONG }),
            new Promise(function(res) { setTimeout(res, 1500); })
          ]);
        } catch (e) { /* noop */ }

        // Clear wrong flash class
        setTimeout(function() {
          try { pillEl.classList.remove('wrong-flash'); } catch (e) {}
        }, 600);

        if (outOfLives) {
          trackEvent('round_complete', { round: gameState.currentRound, cleared: false, lives: 0 });
          stopHeaderTimer();
          // Transition to Game Over
          endGame(false);
          return;
        }

        gameState.isProcessing = false;
        var gc = document.getElementById('gameContent');
        if (gc) gc.classList.remove('is-processing');
      })();
    }

    /* ============================================================
       Enable "Next Round" CTA
       ============================================================ */
    function enableNextRoundCTA() {
      var btn = document.getElementById('nextRoundBtn');
      if (!btn) return;
      btn.classList.remove('disabled');
      btn.removeAttribute('disabled');
    }

    function onNextRoundClick() {
      if (!gameState.isActive || gameState.gameEnded) return;
      if (gameState.phase !== 'round_complete') return;
      safeStopAllAudio();
      if (gameState.currentRound >= gameState.totalRounds) {
        showVictory();
        return;
      }
      gameState.currentRound += 1;
      showRoundIntro(gameState.currentRound);
    }

    /* ============================================================
       showRoundIntro — TransitionScreen auto-advance
       ============================================================ */
    function showRoundIntro(n) {
      safeStopAllAudio();
      stopHeaderTimer();

      gameState.phase = 'round_intro';
      syncDOM();

      // progressBar reflects rounds already cleared (which is gameState.roundsClearedCount)
      try {
        if (progressBar && progressBar.update) {
          var _rcc = gameState.roundsClearedCount || 0;
          var _livesIntro = Math.max(0, gameState.lives);
          progressBar.update(_rcc, _livesIntro);
        }
      } catch (e) {}

      var rounds = getRounds();
      var idx = n - 1;
      if (idx < 0) idx = 0;
      if (idx >= rounds.length) idx = rounds.length - 1;
      var round = rounds[idx];
      var targetLabel = round.targetLabel || ('Make Sum ' + round.target);
      var intoEmoji = (round.target === 20) ? '🎯' : '🔟';

      (async function() {
        try {
          await waitForAudioPermission();
          if (transitionScreen && transitionScreen.show) {
            await transitionScreen.show({
              icons: [intoEmoji],
              title: 'Level ' + n,
              subtitle: targetLabel,
              onMounted: function() {
                (async function() {
                  try {
                    await safePlaySound('rounds_sound_effect', { sticker: STICKER_LEVEL });
                  } catch (e) {}
                  try {
                    if (FeedbackManager && FeedbackManager.playDynamicFeedback) {
                      await FeedbackManager.playDynamicFeedback({
                        audio_content: 'Make sum of ' + round.target + '!',
                        subtitle: targetLabel,
                        sticker: STICKER_LEVEL
                      });
                    }
                  } catch (e) {}
                  try { if (transitionScreen && transitionScreen.hide) transitionScreen.hide(); } catch (e) {}
                  enterGameplay(n);
                })();
              }
            });
          } else {
            enterGameplay(n);
          }
        } catch (e) {
          try { if (transitionScreen && transitionScreen.hide) transitionScreen.hide(); } catch (eh) {}
          enterGameplay(n);
        }
      })();

      // Hard fallback — enter gameplay after 4s if stalled
      setTimeout(function() {
        if (gameState.phase === 'round_intro' && gameState.currentRound === n && !gameState.gameEnded) {
          try { if (transitionScreen && transitionScreen.hide) transitionScreen.hide(); } catch (e) {}
          enterGameplay(n);
        }
      }, 4000);
    }

    function enterGameplay(n) {
      if (gameState.gameEnded) return;
      if (gameState.phase === 'gameplay' && gameState.currentRound === n) return;
      gameState.currentRound = n;
      renderRound();
    }

    /* ============================================================
       showVictory (CASE 11)
       ============================================================ */
    function showVictory() {
      if (gameState.gameEnded) return;

      safeStopAllAudio();
      stopHeaderTimer();

      gameState.phase = 'results';
      gameState.isActive = false;
      gameState.stars = getStars();

      // Progress bar to final (rounds completed = totalRounds)
      try {
        if (progressBar && progressBar.update) {
          var _finalRoundsDone = gameState.totalRounds;
          var _finalLives = Math.max(0, gameState.lives);
          progressBar.update(_finalRoundsDone, _finalLives);
        }
      } catch (e) {}

      syncDOM();

      // postMessage BEFORE audio
      postGameComplete(true);

      var stars = gameState.stars;
      var subtitle = 'You got ' + gameState.starCount + ' of 10 quick taps!';

      var buttons;
      if (stars === 3) {
        buttons = [
          { text: 'Claim Stars', type: 'primary', action: function() {
            safeStopAllAudio();
            try { if (transitionScreen && transitionScreen.hide) transitionScreen.hide(); } catch (e) {}
            showStarsCollected();
          } }
        ];
      } else {
        buttons = [
          { text: 'Play Again', type: 'secondary', action: function() {
            safeStopAllAudio();
            try { if (transitionScreen && transitionScreen.hide) transitionScreen.hide(); } catch (e) {}
            showMotivation();
          } },
          { text: 'Claim Stars', type: 'primary', action: function() {
            safeStopAllAudio();
            try { if (transitionScreen && transitionScreen.hide) transitionScreen.hide(); } catch (e) {}
            showStarsCollected();
          } }
        ];
      }

      (async function() {
        try {
          if (transitionScreen && transitionScreen.show) {
            var victorySticker = (stars === 3) ? STICKER_VICTORY : (stars === 2 ? STICKER_GAME_COMPLETE_2 : STICKER_GAME_COMPLETE_1);
            await transitionScreen.show({
              stars: stars,
              title: 'Victory 🎉',
              subtitle: subtitle,
              persist: true,
              buttons: buttons,
              onMounted: function() {
                (async function() {
                  try {
                    var sfxId = (stars === 3) ? 'victory_sound_effect' : 'game_complete_sound_effect';
                    await safePlaySound(sfxId, { sticker: victorySticker });
                    try {
                      if (FeedbackManager && FeedbackManager.playDynamicFeedback) {
                        var voText;
                        if (stars === 3) voText = 'Amazing! Three stars! You spotted every friendly pair in a flash.';
                        else if (stars === 2) voText = 'Well done! You got ' + gameState.starCount + ' of 10 quick taps.';
                        else if (stars === 1) voText = 'Good effort! You got ' + gameState.starCount + ' of 10 quick taps.';
                        else voText = 'Nice try — keep practising your friendly pairs!';
                        await FeedbackManager.playDynamicFeedback({
                          audio_content: voText,
                          subtitle: voText,
                          sticker: victorySticker
                        });
                      }
                    } catch (e) {}
                  } catch (e) {}
                })();
              }
            });
          }
        } catch (e) { /* noop */ }
      })();
    }

    /* ============================================================
       showMotivation
       ============================================================ */
    function showMotivation() {
      safeStopAllAudio();
      gameState.phase = 'results';
      syncDOM();

      (async function() {
        try {
          if (transitionScreen && transitionScreen.show) {
            await transitionScreen.show({
              title: 'Ready to improve your score? ⚡',
              persist: true,
              buttons: [
                {
                  text: "I'm ready! 🙌",
                  type: 'primary',
                  action: function() {
                    safeStopAllAudio();
                    try { if (transitionScreen && transitionScreen.hide) transitionScreen.hide(); } catch (e) {}
                    restartGame();
                  }
                }
              ],
              onMounted: function() {
                (async function() {
                  try {
                    await safePlaySound('rounds_sound_effect', { sticker: STICKER_RESTART });
                    try {
                      if (FeedbackManager && FeedbackManager.playDynamicFeedback) {
                        await FeedbackManager.playDynamicFeedback({
                          audio_content: 'Ready to give it another shot?',
                          subtitle: 'Ready to improve your score?',
                          sticker: STICKER_RESTART
                        });
                      }
                    } catch (e) {}
                  } catch (e) {}
                })();
              }
            });
          }
        } catch (e) { /* noop */ }
      })();

    /* ============================================================
       showStarsCollected
       ============================================================ */
    function showStarsCollected() {
      safeStopAllAudio();
      gameState.phase = 'results';
      syncDOM();

      (async function() {
        try {
          if (transitionScreen && transitionScreen.show) {
            await transitionScreen.show({
              title: 'Yay! 🎉\nStars collected!',
              styles: { title: { whiteSpace: 'pre-line', lineHeight: '1.3' } },
              onMounted: function() {
                (async function() {
                  try {
                    await safePlaySound('victory_sound_effect', { sticker: STICKER_VICTORY });
                  } catch (e) {}
                })();
              }
            });
          }
        } catch (e) { /* noop */ }
        setTimeout(function() {
          safeStopAllAudio();
          try { if (transitionScreen && transitionScreen.hide) transitionScreen.hide(); } catch (e) {}
          try { window.parent.postMessage({ type: 'game_exit' }, '*'); } catch (e) {}
          endGame(gameState.stars > 0);
        }, 2500);
      })();
    }

    /* ============================================================
       Game Over flow
       ============================================================ */
    function showGameOver() {
      safeStopAllAudio();
      stopHeaderTimer();

      gameState.phase = 'results';
      gameState.isActive = false;
      gameState.stars = 0;
      syncDOM();

      // postMessage BEFORE audio
      postGameComplete(false);

      var roundsCleared = gameState.roundsClearedCount || 0;
      var subtitle = 'You completed ' + roundsCleared + ' of ' + gameState.totalRounds + ' levels';

      (async function() {
        try {
          if (transitionScreen && transitionScreen.show) {
            await transitionScreen.show({
              icons: ['😅'],
              title: 'Game Over',
              subtitle: subtitle,
              persist: true,
              buttons: [
                {
                  text: 'Try Again',
                  type: 'primary',
                  action: function() {
                    safeStopAllAudio();
                    try { if (transitionScreen && transitionScreen.hide) transitionScreen.hide(); } catch (e) {}
                    restartGame();
                  }
                }
              ],
              onMounted: function() {
                (async function() {
                  try {
                    await safePlaySound('game_complete_sound_effect', { sticker: STICKER_SAD });
                    try {
                      if (FeedbackManager && FeedbackManager.playDynamicFeedback) {
                        await FeedbackManager.playDynamicFeedback({
                          audio_content: 'Not this time. Tap Try Again to give it another go.',
                          subtitle: subtitle,
                          sticker: STICKER_SAD
                        });
                      }
                    } catch (e) {}
                  } catch (e) {}
                })();
              }
            });
          }
        } catch (e) { /* noop */ }
      })();
    }

    /* ============================================================
       postGameComplete — BEFORE audio (victory OR game-over)
       ============================================================ */
    function postGameComplete(won) {
      try {
        var completedAt = Date.now();
        var avgMs = 0;
        if (gameState.responseTimes.length > 0) {
          var sum = 0;
          for (var i = 0; i < gameState.responseTimes.length; i++) sum += gameState.responseTimes[i];
          avgMs = sum / gameState.responseTimes.length;
        }
        var accuracy = 0;
        var totalAttempts = gameState.attempts.length;
        if (totalAttempts > 0) {
          var correctCnt = 0;
          for (var a = 0; a < totalAttempts; a++) {
            if (gameState.attempts[a].correct) correctCnt += 1;
          }
          accuracy = Math.round((correctCnt / totalAttempts) * 100);
        }
        if (accuracy < 0) accuracy = 0;
        if (accuracy > 100) accuracy = 100;

        var sigEventCount = 0;
        var sigMetadata = {};
        try {
          if (signalCollector) {
            if (typeof signalCollector.getInputEvents === 'function') {
              var inputEvents = signalCollector.getInputEvents() || [];
              sigEventCount = inputEvents.length;
            }
            if (typeof signalCollector.getMetadata === 'function') {
              sigMetadata = signalCollector.getMetadata() || {};
            }
          }
        } catch (e) { /* noop */ }

        // Compute tries-per-round array for analytics (recommended metric)
        var triesByRound = {};
        for (var ti = 0; ti < gameState.attempts.length; ti++) {
          var rn = gameState.attempts[ti].round_number;
          if (!triesByRound[rn]) triesByRound[rn] = { round: rn, attempts: 0, correct: 0 };
          triesByRound[rn].attempts += 1;
          if (gameState.attempts[ti].correct) triesByRound[rn].correct += 1;
        }
        var triesArr = [];
        for (var rr = 1; rr <= gameState.totalRounds; rr++) {
          if (triesByRound[rr]) triesArr.push(triesByRound[rr]);
          else triesArr.push({ round: rr, attempts: 0, correct: 0 });
        }

        var metrics = {
          accuracy: accuracy,
          time: gameState.startTime ? Math.round((completedAt - gameState.startTime) / 1000) : 0,
          stars: gameState.stars,
          attempts: gameState.attempts,
          duration_data: gameState.duration_data,
          totalLives: gameState.totalLives,
          livesRemaining: gameState.lives,
          tries: triesArr,
          starCount: gameState.starCount,
          foundCorrectByRound: gameState.foundCorrectByRound,
          roundsCleared: gameState.roundsClearedCount || 0,
          avgResponseTime: avgMs,
          signal_event_count: sigEventCount,
          signal_metadata: sigMetadata,
          won: !!won
        };

        window.parent.postMessage({
          type: 'game_complete',
          data: {
            metrics: metrics,
            completedAt: completedAt,
            previewResult: gameState.previewResult || null
          },
          payload: {
            score: gameState.score,
            totalQuestions: gameState.totalRounds,
            stars: gameState.stars,
            accuracy: accuracy,
            timeSpent: gameState.startTime ? (completedAt - gameState.startTime) : 0,
            avgResponseTime: avgMs,
            livesRemaining: gameState.lives
          }
        }, '*');
      } catch (e) { /* noop */ }
    }

    /* ============================================================
       endGame — fires on both paths
       ============================================================ */
    function endGame(won) {
      if (gameState.gameEnded) {
        // If game was already ended but we need to re-show game-over (edge case: win path reaches endGame via stars collected)
        return;
      }
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { FeedbackManager.stream.pauseAll(); } catch (e) {}
      safeStopAllAudio();
      stopHeaderTimer();

      gameState.phase = 'results';
      gameState.isActive = false;
      gameState.gameEnded = true;
      syncDOM();
      trackEvent('game_end', { won: !!won, score: gameState.score, stars: gameState.stars });

      if (!won) {
        // Game over path — render screen (game_complete fires inside showGameOver via postGameComplete)
        // Unset gameEnded temporarily so showGameOver can syncDOM transitions. But easier:
        // showGameOver handles its own state.
        gameState.gameEnded = false; // allow showGameOver to proceed; it'll mark phase = results
        showGameOver();
        gameState.gameEnded = true;
      }

      try {
        if (previewScreen && previewScreen.destroy) previewScreen.destroy();
      } catch (e) { /* noop */ }
    }
    window.endGame = endGame;

    /* ============================================================
       restartGame — fresh state, NO preview re-show
       ============================================================ */
    function restartGame() {
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { FeedbackManager.stream.pauseAll(); } catch (e) {}
      safeStopAllAudio();
      stopHeaderTimer();

      gameState.phase = 'start_screen';
      gameState.currentRound = 0;
      gameState.score = 0;
      gameState.lives = gameState.totalLives;
      gameState.attempts = [];
      gameState.events = [];
      gameState.responseTimes = [];
      gameState.isActive = false;
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState.stars = 0;
      gameState.starCount = 0;
      gameState.foundCorrect = 0;
      gameState.foundCorrectByRound = {};
      gameState.roundsClearedCount = 0;
      gameState.correctAnswer = null;
      gameState.roundStartTime = null;
      gameState.levelEnableTime = null;
      gameState.lastSpeedRefTime = null;
      gameState.currentRoundData = null;
      gameState.duration_data = {
        startTime: null,
        preview: gameState.duration_data.preview || [],
        attempts: [],
        evaluations: [],
        inActiveTime: [],
        totalInactiveTime: 0
      };

      try { if (signalCollector && signalCollector.reset) signalCollector.reset(); } catch (e) {}

      // Reset progress bar
      createProgressBar();

      gameState.startTime = Date.now();
      gameState.isActive = true;
      gameState.duration_data.startTime = new Date().toISOString();

      trackEvent('game_start', { totalRounds: gameState.totalRounds, restart: true });
      syncDOM();

      injectGameHTML();
      showRoundIntro(1);
    }
    window.restartGame = restartGame;

    /* ============================================================
       startGame — test-harness / fallback entry
       ============================================================ */
    function startGame() {
      if (gameState.isActive) return;
      gameState.isActive = true;
      gameState.startTime = Date.now();
      gameState.duration_data.startTime = new Date().toISOString();
      gameState.currentRound = 0;
      gameState.score = 0;
      gameState.lives = gameState.totalLives;
      gameState.starCount = 0;
      gameState.foundCorrect = 0;
      gameState.foundCorrectByRound = {};
      gameState.roundsClearedCount = 0;
      gameState.attempts = [];
      gameState.events = [];
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState.phase = 'gameplay';
      trackEvent('game_start', { totalRounds: gameState.totalRounds });
      syncDOM();
      if (!document.getElementById('board')) injectGameHTML();
      showRoundIntro(1);
    }
    window.startGame = startGame;

    /* ============================================================
       nextRound — test-harness hook
       ============================================================ */
    function nextRound() {
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { FeedbackManager.stream.pauseAll(); } catch (e) {}
      safeStopAllAudio();
      stopHeaderTimer();
      if (gameState.currentRound >= gameState.totalRounds) {
        showVictory();
        return;
      }
      gameState.currentRound += 1;
      showRoundIntro(gameState.currentRound);
    }
    window.nextRound = nextRound;

    /* ============================================================
       startGameAfterPreview — called by PreviewScreen onComplete
       ============================================================ */
    function startGameAfterPreview(previewData) {
      gameState.previewResult = previewData || null;
      if (gameState.duration_data.preview == null) gameState.duration_data.preview = [];
      if (previewData && typeof previewData.duration === 'number') {
        gameState.duration_data.preview.push({ duration: previewData.duration });
      }

      gameState.startTime = Date.now();
      gameState.isActive = true;
      gameState.duration_data.startTime = new Date().toISOString();

      trackEvent('game_start', { totalRounds: gameState.totalRounds });
      try { if (signalCollector && signalCollector.recordViewEvent) signalCollector.recordViewEvent('screen_transition', { from: 'preview', to: 'game' }); } catch (e) {}

      showRoundIntro(1);
    }

    /* ============================================================
       setupGame — scaffold + preview LAST
       ============================================================ */
    function setupGame() {
      var content = gameState.content || fallbackContent;
      if (!gameState.content) gameState.content = fallbackContent;

      injectGameHTML();
      renderInitialState();

      try {
        if (previewScreen && previewScreen.show) {
          previewScreen.show({
            instruction: content.previewInstruction || fallbackContent.previewInstruction,
            audioUrl: content.previewAudio || fallbackContent.previewAudio || null,
            showGameOnPreview: content.showGameOnPreview === true,
            onComplete: function(previewData) {
              startGameAfterPreview(previewData);
            }
          });
        } else {
          // No preview available — start directly
          gameState.startTime = Date.now();
          gameState.isActive = true;
          gameState.duration_data.startTime = new Date().toISOString();
          trackEvent('game_start', { totalRounds: gameState.totalRounds });
          showRoundIntro(1);
        }
      } catch (e) {
        console.error('[setupGame] ' + e.message);
      }
    }

    /* ============================================================
       Test-harness debug functions
       ============================================================ */
    window.debugGame = function() {
      return {
        phase: gameState.phase,
        currentRound: gameState.currentRound,
        score: gameState.score,
        lives: gameState.lives,
        stars: gameState.stars,
        starCount: gameState.starCount,
        foundCorrect: gameState.foundCorrect,
        roundsCleared: gameState.roundsClearedCount || 0,
        attempts: gameState.attempts.length,
        gameEnded: gameState.gameEnded
      };
    };
    window.loadRound = function(n) {
      if (typeof n === 'number' && n >= 1 && n <= gameState.totalRounds) {
        gameState.currentRound = n;
        renderRound();
      }
    };
    window.tapPill = function(pillId) {
      var el = document.querySelector('[data-pill-id="' + pillId + '"]');
      if (!el) return false;
      el.click();
      return true;
    };
    window.solveCurrentRound = function() {
      var r = gameState.currentRoundData;
      if (!r) return false;
      // Tap all correct pills (sequentially via click).
      // NOTE: Because each tap kicks off a 1500ms awaited SFX, they must be spaced out.
      // This is a test helper for Playwright — it expects tests to use `await page.locator(...).click()` on each pill explicitly, or call this and await completion via polling foundCorrect.
      var pills = r.pills || [];
      for (var i = 0; i < pills.length; i++) {
        if (pills[i].correct) {
          var el = document.querySelector('[data-pill-id="' + pills[i].id + '"]');
          if (el) el.click();
        }
      }
      return true;
    };

    /* ============================================================
       DOMContentLoaded — 16-step init sequence
       ============================================================ */
    document.addEventListener('DOMContentLoaded', function() {
      (async function() {
        try {
          // 1. Wait for CDN packages
          try {
            await waitForPackages();
          } catch (pkgErr) {
            console.error('[init] ' + pkgErr.message);
          }

          // 2. Initialize FeedbackManager
          try {
            if (typeof FeedbackManager !== 'undefined' && FeedbackManager.init) {
              await FeedbackManager.init();
            }
          } catch (e) { console.error('[init] FeedbackManager.init ' + e.message); }

          // 3. SignalCollector
          try {
            if (typeof SignalCollector !== 'undefined') {
              signalCollector = new SignalCollector({
                sessionId: null,
                studentId: null,
                gameId: gameState.gameId,
                contentSetId: null
              });
              window.signalCollector = signalCollector;
            }
          } catch (e) { /* noop */ }

          // 4. ScreenLayout.inject
          try {
            if (typeof ScreenLayout !== 'undefined' && ScreenLayout.inject) {
              ScreenLayout.inject('app', {
                slots: {
                  previewScreen: true,
                  progressBar: true,
                  transitionScreen: true
                }
              });
            }
          } catch (e) { console.error('[init] ScreenLayout.inject ' + e.message); }

          // 5. VisibilityTracker (autoShowPopup default true)
          try {
            if (typeof VisibilityTracker !== 'undefined') {
              visibilityTracker = new VisibilityTracker({
                popupProps: {
                  title: 'Paused',
                  description: 'Tap Resume to continue.',
                  primaryText: 'Resume'
                },
                onInactive: function() {
                  try { if (FeedbackManager && FeedbackManager.sound) FeedbackManager.sound.pause(); } catch (e) {}
                  try { if (FeedbackManager && FeedbackManager.stream) FeedbackManager.stream.pauseAll(); } catch (e) {}
                  try { if (previewScreen && previewScreen.pause) previewScreen.pause(); } catch (e) {}
                  try { stopHeaderTimer(); } catch (e) {}
                },
                onResume: function() {
                  try { if (FeedbackManager && FeedbackManager.sound) FeedbackManager.sound.resume(); } catch (e) {}
                  try { if (FeedbackManager && FeedbackManager.stream) FeedbackManager.stream.resumeAll(); } catch (e) {}
                  try { if (previewScreen && previewScreen.resume) previewScreen.resume(); } catch (e) {}
                  // Restart timer if gameplay is active
                  try { if (gameState.phase === 'gameplay' && !gameState.gameEnded) startHeaderTimer(); } catch (e) {}
                }
              });
            }
          } catch (e) { console.error('[init] VisibilityTracker ' + e.message); }

          // 6. createProgressBar
          createProgressBar();

          // 7. TransitionScreenComponent
          try {
            if (typeof TransitionScreenComponent !== 'undefined') {
              transitionScreen = new TransitionScreenComponent({ autoInject: true });
            }
          } catch (e) { console.error('[init] TransitionScreen ' + e.message); }

          // 8. PreviewScreenComponent
          try {
            if (typeof PreviewScreenComponent !== 'undefined') {
              previewScreen = new PreviewScreenComponent({ slotId: 'mathai-preview-slot' });
            }
          } catch (e) { console.error('[init] PreviewScreen ' + e.message); }

          // 9. Preload audio
          try {
            if (typeof FeedbackManager !== 'undefined' && FeedbackManager.sound && FeedbackManager.sound.preload) {
              await preloadAllAudio();
            }
          } catch (e) { console.error('[init] preload ' + e.message); }

          // 10. Register listener BEFORE game_ready
          window.addEventListener('message', handlePostMessage);

          // 11. Send game_ready
          try {
            window.parent.postMessage({ type: 'game_ready' }, '*');
          } catch (e) { /* noop */ }

          // 12. setupGame — scaffold + preview LAST
          setupGame();

        } catch (e) {
          console.error('[init] ' + e.message);
        }
      })();

      // Window exposures
      window.gameState = gameState;
      window.endGame = endGame;
      window.restartGame = restartGame;
      window.nextRound = nextRound;
      window.startGame = startGame;
    });

    /* ============================================================
       Standalone fallback — runs independently of waitForPackages
       ============================================================ */
    setTimeout(function() {
      try {
        if (previewScreen && previewScreen.isActive && previewScreen.isActive()) return;
        if (gameState.isActive || gameState.gameEnded) return;
        if (gameState.phase !== 'start_screen') return;

        var gc = document.getElementById('gameContent');
        if (!gc) {
          var app = document.getElementById('app');
          if (app && !document.getElementById('gameContent')) {
            var fallbackDiv = document.createElement('div');
            fallbackDiv.id = 'gameContent';
            app.appendChild(fallbackDiv);
          }
        }

        gameState.content = gameState.content || fallbackContent;
        gameState.totalRounds = fallbackContent.rounds.length;

        if (!gameState.isActive) {
          startGame();
        }
      } catch (e) { /* noop */ }
    }, 5000);
  </script>
</body>
</html>
