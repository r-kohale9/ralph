  color: var(--mathai-gray);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
  text-align: center;
}

/* === MATCH ITEM (CARD) === */
.match-item {
  width: 100%;
  min-height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid var(--mathai-border-gray);
  border-radius: var(--mathai-border-radius-card);
  background: var(--mathai-white);
  font-size: 20px;
  font-weight: 700;
  color: var(--mathai-primary);
  font-family: var(--mathai-font-family);
  cursor: pointer;
  touch-action: manipulation;
  transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
  margin-bottom: 10px;
  padding: 10px 8px;
  min-width: 44px;
}

.match-item:active {
  transform: scale(0.97);
}

.match-item.selected {
  border-color: var(--mathai-blue);
  background: rgba(102, 126, 234, 0.08);
  box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.25);

.match-item.selected-correct {
  border-color: var(--mathai-cell-border-green);
  background: var(--mathai-cell-bg-green);
  color: var(--mathai-success);
  opacity: 0.6;
  pointer-events: none;
  cursor: default;
}

.match-item.selected-wrong {
  border-color: var(--mathai-cell-border-red);
  background: var(--mathai-cell-bg-red);
  color: var(--mathai-red);
  animation: shake 0.5s ease-in-out;
}

.match-item.locked {
  opacity: 0.6;
  pointer-events: none;
  cursor: default;
}

  left: 0;
  right: 0;

@keyframes scoreBounce {

  40% { transform: scale(1.3); }
  100% { transform: scale(1); }

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }

@keyframes starPop {
  0% { transform: scale(0); }
  60% { transform: scale(1.3); }
  100% { transform: scale(1); }

  100% { transform: scale(0.5); opacity: 0; color: var(--mathai-red); }

  100% { box-shadow: 0 0 0 rgba(255, 193, 7, 0); }

  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }

.heart-break { animation: heartBreak 0.6s ease forwards; }
.star-earned { animation: starPop 0.4s ease forwards; }

.fade-in { animation: fadeIn 0.35s ease; }

        resolve();
      } else if (Date.now() - start > timeout) {
        clearInterval(check);
        reject(new Error('Packages failed to load within ' + timeout + 'ms'));
      }
    }, 100);
  });
}

/* === syncDOM (PART-007 + test harness) === */
function syncDOMState() {
  var app = document.getElementById('app');
  if (!app) return;
  app.setAttribute('data-phase', gameState.phase);
  app.setAttribute('data-score', gameState.score);
  app.setAttribute('data-lives', Math.max(0, gameState.lives));
  app.setAttribute('data-round', gameState.currentRound);
}

/* === Fisher-Yates shuffle === */
function shuffleArray(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i];
    a[i] = a[j];
    a[j] = tmp;
  }
  return a;
}

/* === getStars (time-based for this game) === */
function getStars(totalTimeMs) {
  if (totalTimeMs <= 60000) return 3;
  if (totalTimeMs <= 90000) return 2;
  return 1;
}
window.calcStars = function() {
  var elapsed = gameState.startTime ? Date.now() - gameState.startTime : 0;
  return getStars(elapsed);
};

/* === computeTriesPerRound === */
function computeTriesPerRound(attempts) {
  var rounds = {};
  for (var i = 0; i < attempts.length; i++) {
    var r = attempts[i].round_number;
    rounds[r] = (rounds[r] || 0) + 1;
  }
  var result = [];
  var keys = Object.keys(rounds);
  for (var k = 0; k < keys.length; k++) {
    result.push({ round: Number(keys[k]), triesCount: rounds[keys[k]] });
  }
  return result;
}

/* === formatTime === */
function formatTime(ms) {
  var totalSec = Math.floor(ms / 1000);
  var m = Math.floor(totalSec / 60);
  var s = totalSec % 60;
  return (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
}

/* ============================================================
   RECORD ATTEMPT (PART-009 - 12 fields)
   ============================================================ */
function recordAttempt(roundIndex, userInput, correct, metadata) {
  var round = getRounds()[roundIndex];
  var misconceptionKey = metadata.number + '_' + metadata.selectedDouble;
  var tag = correct ? null : ((round.misconception_tags && round.misconception_tags[misconceptionKey]) || null);
  var attempt = {
    attempt_timestamp: Date.now(),
    time_since_start_of_game: gameState.startTime ? Date.now() - gameState.startTime : 0,
    input_of_user: userInput,
    correct: correct,
    round_number: roundIndex + 1,
    question_id: 'r' + (roundIndex + 1) + '_match_' + metadata.number + 'x2',
    correct_answer: metadata.number * 2,
    response_time_ms: gameState.roundStartTime ? Date.now() - gameState.roundStartTime : 0,
    misconception_tag: tag,
    difficulty_level: round.stage || 1,
    is_retry: metadata.is_retry || false,
    metadata: metadata
  };
  gameState.attempts.push(attempt);
  gameState.duration_data.attempts.push({
    round: roundIndex + 1,
    timestamp: Date.now()
  });
}

/* === trackEvent (PART-010) === */
function trackEvent(type, target, data) {
  var evt = { type: type, target: target, timestamp: Date.now() };
  if (data) {
    var keys = Object.keys(data);
    for (var i = 0; i < keys.length; i++) { evt[keys[i]] = data[keys[i]]; }
  }
  gameState.events.push(evt);
}

/* === createProgressBar (PART-023) === */
function createProgressBar() {
  if (progressBar) progressBar.destroy();
  progressBar = new ProgressBarComponent({
    slotId: 'mathai-progress-slot',
    totalRounds: gameState.totalRounds,
    totalLives: gameState.totalLives
  });
}

/* ============================================================
   RENDER ROUND
   ============================================================ */
function renderRound() {
  var roundData = getRounds()[gameState.currentRound];
  if (!roundData) return;

  gameState.isProcessing = false;
  gameState.isActive = true;
  gameState.selectedLeft = null;
  gameState.matchedPairs = 0;
  gameState.correctAnswer = roundData.pairs.map(function(p) { return p.number + ' -> ' + p.double; }).join(', ');
  gameState.roundStartTime = Date.now();
  syncDOMState();

  /* Shuffle right-column doubles */
  var shuffledDoubles = shuffleArray(roundData.pairs.map(function(p) { return p.double; }));

  /* Build left and right columns */
  if (!leftColumnEl || !rightColumnEl) return;

  leftColumnEl.innerHTML = '';
  rightColumnEl.innerHTML = '';

  /* Render left items */
  for (var i = 0; i < roundData.pairs.length; i++) {
    var leftItem = document.createElement('div');
    leftItem.className = 'match-item fade-in';
    leftItem.textContent = roundData.pairs[i].number;
    leftItem.setAttribute('data-side', 'left');
    leftItem.setAttribute('data-index', i);
    leftItem.setAttribute('data-value', roundData.pairs[i].number);
    leftItem.setAttribute('data-testid', 'left-' + i);
    leftItem.setAttribute('data-signal-id', 'left-' + i);
    leftItem.onclick = (function(idx, val) {
      return function() { handleLeftTap(idx, val); };
    })(i, roundData.pairs[i].number);
    leftColumnEl.appendChild(leftItem);
  }

  /* Render right items */
  for (var j = 0; j < shuffledDoubles.length; j++) {
    var rightItem = document.createElement('div');
    rightItem.className = 'match-item fade-in';
    rightItem.textContent = shuffledDoubles[j];
    rightItem.setAttribute('data-side', 'right');
    rightItem.setAttribute('data-index', j);
    rightItem.setAttribute('data-value', shuffledDoubles[j]);
    rightItem.setAttribute('data-testid', 'right-' + j);
    rightItem.setAttribute('data-signal-id', 'right-' + j);
    rightItem.onclick = (function(idx, val) {
      return function() { handleRightTap(idx, val); };
    })(j, shuffledDoubles[j]);
    rightColumnEl.appendChild(rightItem);
  }

  /* Show game content, hide transition */
  if (gameContentEl) gameContentEl.style.display = '';
  if (transitionScreen) transitionScreen.hide();

  /* Update progress bar */
  if (progressBar) progressBar.update(gameState.currentRound, Math.max(0, gameState.lives));

  /* new_cards SFX (fire-and-forget) */
  try { FeedbackManager.sound.play('new_cards').catch(function(e) {}); } catch (e) {}

  /* Signal collector: content render */
  if (signalCollector) {
    signalCollector.recordViewEvent('content_render', {
      screen: 'gameplay',
      content_snapshot: { round: gameState.currentRound + 1, stage: roundData.stage, pairs: roundData.pairs.length },
      components: { progress: { current: gameState.currentRound, total: gameState.totalRounds }, lives: gameState.lives },
      metadata: { trigger: 'round_start' }
    });
  }

  trackEvent('question_shown', 'game', {
    round: gameState.currentRound + 1,
    stage: roundData.stage,
    pairs: roundData.pairs.length
  });
}

/* ============================================================
   LEFT TAP HANDLER
   ============================================================ */
function handleLeftTap(index, value) {
  if (gameState.isProcessing) return;
  if (gameState.gameEnded) return;
  if (!gameState.isActive) return;

  if (!leftColumnEl) return;
  var leftItems = leftColumnEl.children;
  var tappedItem = leftItems[index];
  if (!tappedItem) return;

  /* If this item is already matched/locked, ignore */
  if (tappedItem.classList.contains('locked')) return;

  /* If tapping the same already-selected item -> deselect */
  if (gameState.selectedLeft !== null && gameState.selectedLeft.index === index) {
    tappedItem.classList.remove('selected');
    gameState.selectedLeft = null;
    try { FeedbackManager.sound.play('sound_bubble_deselect').catch(function(e) {}); } catch (e) {}
    return;
  }

  /* If another left item is selected, deselect it first */
  if (gameState.selectedLeft !== null) {
    var prevItem = leftItems[gameState.selectedLeft.index];
    if (prevItem) prevItem.classList.remove('selected');
    try { FeedbackManager.sound.play('sound_bubble_deselect').catch(function(e) {}); } catch (e) {}
  }

  /* Select this left item */
  tappedItem.classList.add('selected');
  gameState.selectedLeft = { index: index, value: value };
  try { FeedbackManager.sound.play('sound_bubble_select').catch(function(e) {}); } catch (e) {}
}

/* ============================================================
   RIGHT TAP HANDLER
   ============================================================ */
async function handleRightTap(index, value) {
  if (gameState.isProcessing) return;
  if (gameState.gameEnded) return;
  if (!gameState.isActive) return;

  if (!rightColumnEl) return;
  var rightItems = rightColumnEl.children;
  var tappedRight = rightItems[index];
  if (!tappedRight) return;

  /* If this right item is already matched/locked, ignore */
  if (tappedRight.classList.contains('locked')) return;

  /* If no left item is selected, ignore */
  if (gameState.selectedLeft === null) return;

  if (!leftColumnEl) return;
  var leftItems = leftColumnEl.children;
  var selectedLeftItem = leftItems[gameState.selectedLeft.index];
  var selectedLeftValue = gameState.selectedLeft.value;
  var isCorrect = (value === selectedLeftValue * 2);

  gameState.totalAttempts++;

  /* Record attempt */
  var roundData = getRounds()[gameState.currentRound];
  recordAttempt(gameState.currentRound, { number: selectedLeftValue, selectedDouble: value }, isCorrect, {
    number: selectedLeftValue,
    selectedDouble: value,
    round: gameState.currentRound + 1,
    stage: roundData.stage,
    is_retry: false
  });

  trackEvent('answer_submitted', 'game', {
    round: gameState.currentRound + 1,
    correct: isCorrect,
    number: selectedLeftValue,
    selectedDouble: value,
    response_time_ms: gameState.roundStartTime ? Date.now() - gameState.roundStartTime : 0
  });

  if (signalCollector) {
    signalCollector.recordCustomEvent('match_attempt', {
      round: gameState.currentRound + 1,
      correct: isCorrect,
      number: selectedLeftValue,
      selectedDouble: value,
      correctDouble: selectedLeftValue * 2
    });
  }

  if (isCorrect) {
    handleCorrectMatch(selectedLeftItem, tappedRight, selectedLeftValue);
  } else {
    await handleWrongMatch(selectedLeftItem, tappedRight, selectedLeftValue, value);
  }
}

/* ============================================================
   CORRECT MATCH
   ============================================================ */
function handleCorrectMatch(leftEl, rightEl, leftValue) {
  /* Both items turn green and lock */
  leftEl.classList.remove('selected');
  leftEl.classList.add('selected-correct', 'locked');
  rightEl.classList.add('selected-correct', 'locked');

  /* Clear selection */
  gameState.selectedLeft = null;

  /* Score +1 */
  gameState.score++;
  gameState.streak++;
  gameState.consecutiveWrongs = 0;
  syncDOMState();

  /* Update progress bar */
  if (progressBar) progressBar.update(gameState.currentRound, Math.max(0, gameState.lives));

  /* Score bounce on display */
  if (scoreDisplayEl) {
    scoreDisplayEl.textContent = 'Score: ' + gameState.score;
    scoreDisplayEl.classList.remove('score-bounce');
    void scoreDisplayEl.offsetWidth;
    scoreDisplayEl.classList.add('score-bounce');
  }

  /* matchedPairs++ */
  gameState.matchedPairs++;

  /* Signal collector */
  if (signalCollector) {
    signalCollector.recordViewEvent('feedback_display', {
      screen: 'gameplay',
      content_snapshot: { feedback_type: 'correct', number: leftValue, double: leftValue * 2 },
      components: { progress: { current: gameState.currentRound, total: gameState.totalRounds }, lives: gameState.lives },
      metadata: { trigger: 'user_action' }
    });
  }

  /* Correct SFX + sticker (fire-and-forget) */
  FeedbackManager.sound.play('correct_sound_effect', {
    sticker: CORRECT_STICKER
  }).catch(function(e) { console.error('Correct SFX error:', e.message); });

  /* Check if all pairs matched */
  var roundData = getRounds()[gameState.currentRound];
  if (gameState.matchedPairs >= roundData.pairs.length) {
    handleRoundComplete();
  }
}

/* ============================================================
   WRONG MATCH
   ============================================================ */
async function handleWrongMatch(leftEl, rightEl, leftValue, rightValue) {
  /* Both items flash red */
  leftEl.classList.remove('selected');
  leftEl.classList.add('selected-wrong');
  rightEl.classList.add('selected-wrong');

  /* Clear selection */
  gameState.selectedLeft = null;

  /* Lose a life */
  gameState.lives--;
  gameState.streak = 0;
  gameState.consecutiveWrongs++;
  syncDOMState();

  /* Update progress bar */
  if (progressBar) progressBar.update(gameState.currentRound, Math.max(0, gameState.lives));

  /* Signal collector */
  if (signalCollector) {
    signalCollector.recordViewEvent('feedback_display', {
      screen: 'gameplay',
      content_snapshot: { feedback_type: 'incorrect', number: leftValue, selectedDouble: rightValue, correctDouble: leftValue * 2 },
      components: { progress: { current: gameState.currentRound, total: gameState.totalRounds }, lives: gameState.lives },
      metadata: { trigger: 'user_action' }
    });
  }

  trackEvent('life_lost', 'game', { livesRemaining: gameState.lives });

  /* Case 8: Last life -> skip wrong SFX, go straight to game over */
  if (gameState.lives <= 0) {
    showGameOver();
    return;
  }

  /* Wrong SFX + sticker (fire-and-forget) */
  FeedbackManager.sound.play('incorrect_sound_effect', {
    sticker: INCORRECT_STICKER
  }).catch(function(e) { console.error('Wrong SFX error:', e.message); });

  /* After 600ms, remove wrong styling */
  await new Promise(function(resolve) { setTimeout(resolve, 600); });
  leftEl.classList.remove('selected-wrong');
  rightEl.classList.remove('selected-wrong');
}

/* ============================================================
   ROUND COMPLETE
   ============================================================ */
async function handleRoundComplete() {
  gameState.isProcessing = true;

  trackEvent('round_complete', 'game', {
    round: gameState.currentRound + 1,
    score: gameState.score
  });

  /* Awaited: round-complete SFX + sticker */
  try {
    await FeedbackManager.sound.play('all_correct', {
      sticker: ROUND_STICKER,
      subtitle: 'All matched!'
    });
  } catch (e) { console.error('Round complete SFX error:', e.message); }

  gameState.isProcessing = false;
  gameState.currentRound++;
  syncDOMState();

  /* Check: was that the last round? */
  if (gameState.currentRound >= gameState.totalRounds) {
    showVictory();
  } else {
    renderRound();
  }
}

/* ============================================================
   NEXT ROUND (exposed for test harness)
   ============================================================ */
function nextRound() {
  if (gameState.currentRound < gameState.totalRounds) {
    renderRound();
  }
}

/* ============================================================
   END GAME (PART-011)
   ============================================================ */
function endGame(isGameOver) {
  if (gameState.gameEnded) return;
  gameState.gameEnded = true;
  gameState.isActive = false;
  gameState.duration_data.currentTime = new Date().toISOString();

  if (timer) { timer.pause(); }

  var totalTimeMs = gameState.startTime ? Date.now() - gameState.startTime : 0;
  var stars = isGameOver ? 0 : getStars(totalTimeMs);
  var correct = gameState.attempts.filter(function(a) { return a.correct; }).length;
  var total = gameState.attempts.length;
  var accuracy = total > 0 ? Math.round((correct / total) * 100) : 0;
  var timeTaken = Math.round(totalTimeMs / 1000);

  gameState.phase = isGameOver ? 'game_over' : 'results';
  syncDOMState();

  var metrics = {
    accuracy: accuracy,
    time: timeTaken,
    stars: stars,
    attempts: gameState.attempts,
    duration_data: gameState.duration_data,
    totalLives: gameState.totalLives,
    tries: computeTriesPerRound(gameState.attempts),
    livesRemaining: gameState.lives,
    roundsCompleted: gameState.currentRound,
    totalTimeMs: totalTimeMs
  };

  trackEvent('game_end', 'game', { metrics: metrics });

  var signalResult = null;
  try {
    signalResult = signalCollector ? signalCollector.seal() : { event_count: 0, metadata: {} };
  } catch (e) {
    signalResult = { event_count: 0, metadata: {} };
  }

  window.parent.postMessage({
    type: 'game_complete',
    data: {
      metrics: metrics,
      attempts: gameState.attempts,
      completedAt: Date.now(),
      signal_event_count: signalResult.event_count,
      signal_metadata: signalResult.metadata
    }
  }, '*');
}

/* ============================================================
   SHOW VICTORY (results screen)
   ============================================================ */
async function showVictory() {
  var totalTimeMs = gameState.startTime ? Date.now() - gameState.startTime : 0;
  var stars = getStars(totalTimeMs);
  var correct = gameState.attempts.filter(function(a) { return a.correct; }).length;
  var total = gameState.attempts.length;
  var accuracy = total > 0 ? Math.round((correct / total) * 100) : 0;

  endGame(false);

  /* Hide game content */
  if (gameContentEl) gameContentEl.style.display = 'none';

  /* Build results screen */
  var resultsScreen = document.getElementById('results-screen');
  if (!resultsScreen) {
    resultsScreen = document.createElement('div');
    resultsScreen.id = 'results-screen';
    document.body.appendChild(resultsScreen);
  }

  var starsHTML = '';
  for (var i = 0; i < 3; i++) {
    if (i < stars) {
      starsHTML += '<span class="star star-earned" style="animation-delay: ' + (i * 0.15) + 's">&#11088;</span>';
    } else {
      starsHTML += '<span class="star star-empty">&#11088;</span>';
    }
  }

  var audioStopped = false;

  resultsScreen.innerHTML =
    '<div class="results-title">Well Done!</div>' +
    '<div class="stars-container">' + starsHTML + '</div>' +
    '<div class="results-metric"><strong>Time:</strong> ' + formatTime(totalTimeMs) + '</div>' +
    '<div class="results-metric"><strong>Score:</strong> ' + gameState.score + '/' + MAX_SCORE + '</div>' +
    '<div class="results-metric"><strong>Accuracy:</strong> ' + accuracy + '%</div>' +
    '<p id="rounds-completed" class="results-metric">Rounds: ' + gameState.totalRounds + '/' + gameState.totalRounds + '</p>' +
    '<button class="results-btn" id="play-again-btn" data-testid="btn-play-again">Play Again</button>';
  resultsScreen.classList.remove('hidden');
  resultsScreen.style.display = '';

  var playAgainBtn = document.getElementById('play-again-btn');
  playAgainBtn.onclick = function() {
    audioStopped = true;
    try { FeedbackManager.sound.stopAll(); } catch(e) {}
    try { FeedbackManager._stopCurrentDynamic(); } catch(e) {}
    try { FeedbackManager.stream.stopAll(); } catch(e) {}
    restartGame();
  };

  if (signalCollector) {
    try {
      signalCollector.recordViewEvent('screen_transition', {
        screen: 'results',
        content_snapshot: { stars: stars, time: formatTime(totalTimeMs), score: gameState.score, accuracy: accuracy },
        components: { progress: { current: gameState.totalRounds, total: gameState.totalRounds }, lives: gameState.lives },
        metadata: { trigger: 'user_action', transition_from: 'gameplay' }
      });
    } catch (e) {}
  }

  /* Sequential awaited audio: SFX -> VO */
  var sfxId = stars === 3 ? 'victory_sound_effect' : 'game_complete_sound_effect';
  var stickerUrl = stars === 3 ? VICTORY_3_STICKER : (stars === 2 ? COMPLETE_2_STICKER : COMPLETE_1_STICKER);
  var voText = stars === 3 ? 'Amazing! 3 stars!' : (stars === 2 ? 'Well done! 2 stars!' : 'Good try! 1 star!');

  try {
    await FeedbackManager.sound.play(sfxId, { sticker: stickerUrl });
    if (audioStopped) return;
    await FeedbackManager.playDynamicFeedback({
      audio_content: voText,
      subtitle: voText,
      sticker: stickerUrl
    });
  } catch (e) { console.error('Victory audio error:', e.message); }
}

/* ============================================================
   SHOW GAME OVER

async function showGameOver() {

  if (gameContentEl) gameContentEl.style.display = 'none';

/* ============================================================
   START GAME
   ============================================================ */
function startGame() {
  if (gameState.isActive) return;
  gameState.isActive = true;
  gameState.startTime = Date.now();
  gameState.duration_data.startTime = new Date().toISOString();
  gameState.currentRound = 0;
  gameState.score = 0;
  gameState.attempts = [];
  gameState.events = [];
  gameState.isProcessing = false;
  gameState.gameEnded = false;
  gameState.lives = gameState.totalLives;
  gameState.totalAttempts = 0;
  gameState.selectedLeft = null;
  gameState.matchedPairs = 0;
  gameState.streak = 0;
  gameState.consecutiveWrongs = 0;
  gameState.phase = 'gameplay';
  syncDOMState();

  trackEvent('game_start', 'game', { totalRounds: gameState.totalRounds });

  /* Start timer */
  if (timer) {
    try { timer.start(); } catch (e) {}
  }

  createProgressBar();
  if (progressBar) progressBar.update(0, gameState.lives);

  renderRound();
}

/* ============================================================
   SETUP GAME (called from game_init or standalone fallback)
   ============================================================ */
async function setupGame() {
  if (!gameState.content) {
    gameState.content = fallbackContent;

  var gameoverScreen = document.getElementById('gameover-screen');
  if (gameoverScreen) gameoverScreen.style.display = 'none';

  /* Hide game content */
  if (gameContentEl) gameContentEl.style.display = 'none';

  /* Show start screen via TransitionScreen */

    await transitionScreen.show({
      title: 'Matching Doubles',
      subtitle: 'Match numbers to their doubles (x2)',

        text: 'Start',

        testId: 'btn-start',

          startGame();

    });

        metadata: { trigger: 'user_action', transition_from: 'none' }
      });
    } catch (e) {}
  }
}

/* ============================================================
   RESTART GAME
   ============================================================ */
function restartGame() {
  try { FeedbackManager.sound.stopAll(); } catch(e) {}
  try { FeedbackManager.stream.stopAll(); } catch(e) {}
  try { FeedbackManager._stopCurrentDynamic(); } catch(e) {}

  /* Re-instantiate SignalCollector (GEN-SIGNAL-RESET) */
  try {
    signalCollector = new SignalCollector({
      sessionId: 'session_' + Date.now(),
      studentId: null,
      gameId: gameState.gameId,
      contentSetId: gameState.contentSetId || null
    });
    window.signalCollector = signalCollector;

    if (gameState.signalConfig && gameState.signalConfig.flushUrl) {
      signalCollector.flushUrl = gameState.signalConfig.flushUrl;
      signalCollector.playId = gameState.signalConfig.playId || null;
      signalCollector.gameId = gameState.signalConfig.gameId || signalCollector.gameId;
      signalCollector.sessionId = gameState.signalConfig.sessionId || signalCollector.sessionId;
      signalCollector.contentSetId = gameState.signalConfig.contentSetId || signalCollector.contentSetId;
      signalCollector.studentId = gameState.signalConfig.studentId || signalCollector.studentId;
      signalCollector.startFlushing();
    }
  } catch (e) { console.error('SignalCollector restart error:', e.message); }

  /* Reset all state */
  gameState.phase = 'start_screen';
  gameState.currentRound = 0;
  gameState.score = 0;
  gameState.attempts = [];
  gameState.events = [];
  gameState.isActive = false;
  gameState.gameEnded = false;
  gameState.startTime = null;
  gameState.lives = gameState.totalLives;
  gameState.totalAttempts = 0;
  gameState.selectedLeft = null;
  gameState.matchedPairs = 0;
  gameState.roundStartTime = null;
  gameState.isProcessing = false;
  gameState.streak = 0;
  gameState.consecutiveWrongs = 0;
  gameState.correctAnswer = null;
  gameState.duration_data = {
    startTime: null,
    preview: [],
    attempts: [],
    evaluations: [],
    inActiveTime: [],
    totalInactiveTime: 0,
    currentTime: null
  };

  syncDOMState();

  /* Re-create timer */
  if (timer) {
    try { timer.destroy(); } catch (e) {}
  }
  timer = new TimerComponent('timer-container', {
    timerType: 'increase',
    format: 'min',
    startTime: 0,
    endTime: 600000,
    autoStart: false,
    onEnd: function() {}
  });

  /* Re-create visibility tracker */
  if (visibilityTracker) {
    try { visibilityTracker.destroy(); } catch (e) {}
  }
  visibilityTracker = new VisibilityTracker({
    onInactive: onInactiveHandler,
    onResume: onResumeHandler,
    popupProps: { title: 'Game Paused', description: 'Click Resume to continue.', primaryText: 'Resume' }
  });

  createProgressBar();
  if (progressBar) progressBar.update(0, gameState.totalLives);

  setupGame();
}

/* ============================================================
   HANDLE POST MESSAGE (PART-008)
   ============================================================ */
function handlePostMessage(event) {
  if (!event.data || event.data.type !== 'game_init') return;

  gameState.phase = 'playing';
  syncDOMState();

  var d = event.data.data || event.data;
  if (d.content) gameState.content = d.content;

  var sc = gameState.signalConfig = d.signalConfig || {};
  if (signalCollector && sc.flushUrl) {
    signalCollector.flushUrl = sc.flushUrl;
    signalCollector.playId = sc.playId || null;
    signalCollector.gameId = sc.gameId || signalCollector.gameId;
    signalCollector.sessionId = sc.sessionId || signalCollector.sessionId;
    signalCollector.contentSetId = sc.contentSetId || signalCollector.contentSetId;
    signalCollector.studentId = sc.studentId || signalCollector.studentId;
    signalCollector.startFlushing();
  }

  setupGame();
}

/* ============================================================
   VISIBILITY HANDLERS
   ============================================================ */
function onInactiveHandler() {
  gameState.duration_data.inActiveTime.push({ start: Date.now() });
  if (signalCollector) {
    try { signalCollector.pause(); } catch(e) {}
    try { signalCollector.recordCustomEvent('visibility_hidden', {}); } catch(e) {}
  }
  if (timer) { try { timer.pause({ fromVisibilityTracker: true }); } catch(e) {} }
  try { FeedbackManager.sound.pause(); } catch(e) {}
  try { FeedbackManager.stream.pauseAll(); } catch(e) {}
  trackEvent('game_paused', 'system');
}

function onResumeHandler() {
  var lastInactive = gameState.duration_data.inActiveTime[gameState.duration_data.inActiveTime.length - 1];
  if (lastInactive && !lastInactive.end) {
    lastInactive.end = Date.now();
    gameState.duration_data.totalInactiveTime += (lastInactive.end - lastInactive.start);
  }
  if (signalCollector) {
    try { signalCollector.resume(); } catch(e) {}
    try { signalCollector.recordCustomEvent('visibility_visible', {}); } catch(e) {}
  }
  if (timer && timer.isPaused) { try { timer.resume({ fromVisibilityTracker: true }); } catch(e) {} }
  try { FeedbackManager.sound.resume(); } catch(e) {}
  try { FeedbackManager.stream.resumeAll(); } catch(e) {}
  trackEvent('game_resumed', 'system');
}

/* ============================================================
   DEBUG FUNCTIONS (PART-012)
   ============================================================ */
window.debugGame = function() {
  console.log('Game State:', JSON.stringify(gameState, null, 2));
};

window.debugAudio = function() {
  try {
    console.log('Audio State:', JSON.stringify({
      sound: FeedbackManager.sound.getState(),
      stream: FeedbackManager.stream.getState()
    }, null, 2));
  } catch(e) { console.log('Audio debug error:', e.message); }
};

window.testAudio = async function(id) {
  console.log('Testing audio:', id);
  try { await FeedbackManager.sound.play(id); }
  catch (e) { console.error('Audio test failed:', e.message); }
};

window.testPause = function() {
  if (visibilityTracker) {
    visibilityTracker.triggerInactive();
  } else {
    if (timer) timer.pause();
    try { FeedbackManager.sound.pause(); } catch(e) {}
    try { FeedbackManager.stream.pauseAll(); } catch(e) {}
  }
  console.log('testPause triggered');
};

window.testResume = function() {
  if (visibilityTracker) {
    visibilityTracker.triggerResume();
  } else {
    if (timer && timer.isPaused) timer.resume();
    try { FeedbackManager.sound.resume(); } catch(e) {}
    try { FeedbackManager.stream.resumeAll(); } catch(e) {}
  }
  console.log('testResume triggered');
};

window.verifySentry = function() {
  var checks = {
    sdkLoaded: typeof Sentry !== 'undefined',
    configLoaded: typeof SentryConfig !== 'undefined',
    initialized: typeof Sentry !== 'undefined' && Sentry.getClient() !== undefined
  };
  console.log('Sentry Status:', JSON.stringify(checks, null, 2));
  return checks;
};

window.testSentry = function() {
  try {
    throw new Error('Test error from testSentry()');
  } catch (error) {
    if (typeof Sentry !== 'undefined') Sentry.captureException(error, { tags: { test: true } });
    console.log('Test error sent to Sentry.');
  }
};

window.loadRound = function(n) {
  gameState.currentRound = n - 1;
  gameState.isActive = true;
  gameState.gameEnded = false;
  gameState.isProcessing = false;
  renderRound();
};

/* ============================================================
   DOMContentLoaded (PART-004 — 15-step init)
   ============================================================ */
document.addEventListener('DOMContentLoaded', async function() {
  try {
    /* 1. Wait for packages */
    await waitForPackages();

    /* 2. Init FeedbackManager */
    await FeedbackManager.init();

    /* 3. SignalCollector creation */
    signalCollector = new SignalCollector({
      sessionId: 'session_' + Date.now(),
      studentId: null,
      gameId: gameState.gameId,
      contentSetId: gameState.contentSetId || null
    });
    window.signalCollector = signalCollector;

    /* 4. ScreenLayout inject */
    ScreenLayout.inject('app', {
      sections: {
        header: true,
        questionText: false,
        progressBar: true,
        playArea: true,
        transitionScreen: true
      },
      styles: {
        header: { background: 'var(--mathai-white, #ffffff)' },
        progressBar: { padding: '0 16px', maxWidth: '480px', marginLeft: 'auto', marginRight: 'auto', marginTop: '4px', width: '100%' }
      }
    });

    /* 5. Inject timer container into header slot */
    var headerSlot = document.getElementById('mathai-header-slot');
    if (headerSlot) {
      headerSlot.innerHTML =
        '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 16px;width:100%;">' +
          '<div id="timer-container" style="display:flex;align-items:center;"></div>' +
          '<div id="score-display" style="font-size:16px;font-weight:700;color:var(--mathai-primary);font-family:var(--mathai-font-family);">Score: 0</div>' +
        '</div>';
    }

    /* 6. Build play area HTML into #gameContent */
    gameContentEl = document.getElementById('gameContent');
    if (gameContentEl) {
      gameContentEl.innerHTML =
        '<div class="match-area">' +
          '<div class="columns-container">' +
            '<div class="column">' +
              '<div class="column-header">Number</div>' +
              '<div id="left-column"></div>' +
            '</div>' +
            '<div class="column">' +
              '<div class="column-header">Double</div>' +
              '<div id="right-column"></div>' +
            '</div>' +
          '</div>' +
        '</div>';
    }

    /* Cache DOM refs after ScreenLayout.inject */
    gameContentEl = document.getElementById('gameContent');
    leftColumnEl = document.getElementById('left-column');
    rightColumnEl = document.getElementById('right-column');
    scoreDisplayEl = document.getElementById('score-display');

    /* 7. TimerComponent creation */
    timer = new TimerComponent('timer-container', {
      timerType: 'increase',
      format: 'min',
      startTime: 0,
      endTime: 600000,
      autoStart: false,
      onEnd: function() {}
    });

    /* 8. InteractionManager creation */
    var interactionManager = new InteractionManager({
      selector: '.match-area',
      disableOnAudioFeedback: false,
      disableOnEvaluation: true
    });
    window.interactionManager = interactionManager;

    /* 9. VisibilityTracker creation */
    visibilityTracker = new VisibilityTracker({
      onInactive: onInactiveHandler,
      onResume: onResumeHandler,
      popupProps: {
        title: 'Game Paused',
        description: 'Click Resume to continue.',
        primaryText: 'Resume'
      }
    });

    /* 10. createProgressBar */
    createProgressBar();

    /* 11. TransitionScreenComponent creation */
    transitionScreen = new TransitionScreenComponent({ autoInject: true });

    /* 12. Audio preloading */
    try {
      await FeedbackManager.sound.preload([
        { id: 'correct_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757588479110.mp3' },
        { id: 'incorrect_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
        { id: 'sound_life_lost', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
        { id: 'sound_bubble_select', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1758162403784.mp3' },
        { id: 'sound_bubble_deselect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1758712800721.mp3' },
        { id: 'rounds_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506558124.mp3' },
        { id: 'victory_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506672258.mp3' },
        { id: 'game_complete_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506659491.mp3' },
        { id: 'game_over_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506638331.mp3' },
        { id: 'new_cards', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432104595.mp3' },
        { id: 'all_correct', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506764346.mp3' }
      ]);
    } catch (e) { console.error('Sound preload error:', e.message); }

    /* 13. Register handlePostMessage listener -- BEFORE game_ready */
    window.addEventListener('message', handlePostMessage);

    /* 14. Send game_ready postMessage */
    try { window.parent.postMessage({ type: 'game_ready' }, '*'); } catch (e) {}

    /* 15. Standalone fallback */
    setTimeout(function() {
      if (gameState.phase === 'start_screen' && !gameState.isActive) {
        setupGame();
      }
    }, 1000);

  } catch (error) {
    console.error('[init] ' + error.message);
  }

  /* Window exposures (MUST be at bottom of DOMContentLoaded) */
  window.gameState = gameState;
  window.endGame = endGame;
  window.restartGame = restartGame;
  window.nextRound = nextRound;
  window.startGame = startGame;
});
</script>
