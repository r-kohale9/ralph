<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Matching Doubles</title>

  <!-- ====== 1. SentryConfig package (MUST be first script) ====== -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/sentry/index.js"></script>

  <!-- ====== 2. initSentry() definition (inline) ====== -->
  <script>
    function initSentry() {
      if (typeof SentryConfig === 'undefined' || !SentryConfig.enabled) return;
      if (typeof Sentry === 'undefined') return;
      Sentry.init(SentryConfig.getConfig({
        release: 'matching-doubles@1.0.0'
      }));
    }
  </script>

  <!-- ====== 3. Sentry SDK (3 scripts, NO integrity attribute) ====== -->
  <script src="https://browser.sentry-cdn.com/10.23.0/bundle.tracing.replay.feedback.min.js" crossorigin="anonymous"></script>
  <script src="https://browser.sentry-cdn.com/10.23.0/captureconsole.min.js" crossorigin="anonymous"></script>
  <script src="https://browser.sentry-cdn.com/10.23.0/browserprofiling.min.js" crossorigin="anonymous"></script>

  <!-- ====== 4. Initialize Sentry on load ====== -->
  <script>window.addEventListener('load', initSentry);</script>

  <!-- ====== 5-7. Game CDN packages (exact order: feedback-manager, components, helpers) ====== -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

  <style>
    /* ====== 1. :root variables ====== */
    :root {
      --mathai-game-max-width: 480px;
      --mathai-stack-gap: 10px;
      --mathai-game-padding-top: 54px;
      --mathai-primary: #270f36;
      --mathai-level-text: #270F63;
      --mathai-purple: #9B51E0;
      --mathai-green: #219653;
      --mathai-blue: #667eea;
      --mathai-red: #E35757;
      --mathai-orange: #F2994A;
      --mathai-yellow: #FFDE49;
      --mathai-white: #ffffff;
      --mathai-gray: #666666;
      --mathai-light-gray: #f5f5f5;
      --mathai-disabled-gray: #E0E0E0;
      --mathai-text-primary: #4a4a4a;
      --mathai-border-gray: #e0e0e0;
      --mathai-cell-bg-green: #D9F8D9;
      --mathai-cell-bg-yellow: #FCF6D7;
      --mathai-cell-bg-red: #FFD9D9;
      --mathai-cell-bg-grey: #E0E0E0;
      --mathai-cell-border-green: #27ae60;
      --mathai-cell-border-red: #e74c3c;
      --mathai-font-family: 'Epilogue', -apple-system, 'Segoe UI', Roboto, sans-serif;
      --mathai-font-size-title: 32px;
      --mathai-font-size-subtitle: 18px;
      --mathai-font-size-button: 16px;
      --mathai-font-size-body: 16px;
      --mathai-font-size-small: 14px;
      --mathai-font-size-large: 24px;
      --mathai-padding-large: 56px 40px;
      --mathai-padding-medium: 16px 24px;
      --mathai-padding-small: 10px;
      --mathai-border-radius: 24px;
      --mathai-border-radius-small: 8px;
      --mathai-border-radius-button: 10px;
      --mathai-border-radius-card: 12px;
      --mathai-success: #219653;
      --mathai-error: #E35757;
      --mathai-warning: #F2994A;
    }

    /* ====== 2. Reset ====== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ====== 3. html, body ====== */
    html, body {
      width: 100%;
      overflow-x: hidden;
      margin: 0;
      padding: 0;
      overscroll-behavior: none;
    }

    body {
      font-family: var(--mathai-font-family);
      background: var(--mathai-white);
      color: var(--mathai-text-primary);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.5;
    }

    /* ====== 4. #app ====== */
    #app {
      width: 100%;
      max-width: var(--mathai-game-max-width);
      min-height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
      /* NEVER overflow:hidden here — clips content that exceeds viewport
         and kills both wheel and touch scroll. Use overflow-x: clip. */
      overflow-x: clip;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    @supports not (min-height: 100dvh) {
      #app { min-height: 100vh; }
    }

    /* Preview-wrapper scroll compatibility: the preview body must own
       vertical scrolling so gameplay surfaces still pan correctly. */
    #mathai-preview-slot {
      height: 100dvh;
      overflow: hidden;
    }

    #mathai-preview-slot .mathai-preview-body {
      height: 100dvh;
      box-sizing: border-box;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    /* ====== 5. Hidden utility ====== */
    .hidden { display: none !important; }

    /* ====== 6. Gameplay styles ====== */
    .match-board {
      width: 100%;
      padding: 12px 16px 24px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    .match-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-gap: 16px;
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
    }

    .match-col {
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    .match-col-header {
      font-size: var(--mathai-font-size-small);
      font-weight: 700;
      color: var(--mathai-gray);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    .match-tile-stack {
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    .match-tile {
      min-height: 56px;
      min-width: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--mathai-white);
      border: 2px solid var(--mathai-border-gray);
      border-radius: var(--mathai-border-radius-card);
      font-size: var(--mathai-font-size-large);
      font-weight: 700;
      color: var(--mathai-text-primary);
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      padding: 10px 12px;
      text-align: center;
      line-height: 1.2;
      transition: transform 0.15s ease, border-color 0.15s ease, background-color 0.15s ease;
      user-select: none;
      -webkit-user-select: none;
    }

    .match-tile + .match-tile {
      margin-top: 10px;
    }

    .match-tile:active {
      transform: scale(0.97);
    }

    .match-tile.selected {
      background: var(--mathai-cell-bg-yellow);
      border-color: var(--mathai-orange);
      color: var(--mathai-primary);
      transform: scale(1.03);
      box-shadow: 0 4px 12px rgba(242, 153, 74, 0.25);
    }

    .match-tile.selected-correct,
    .match-tile.locked {
      background: var(--mathai-cell-bg-green);
      border-color: var(--mathai-cell-border-green);
      color: var(--mathai-green);
      pointer-events: none;
    }

    .match-tile.locked {
      opacity: 0.95;
    }

    .match-tile.locked-pulse {
      animation: lockPulse 0.28s ease;
    }

    .match-tile.selected-wrong {
      background: var(--mathai-cell-bg-red);
      border-color: var(--mathai-cell-border-red);
      color: var(--mathai-red);
    }

    .match-tile.shake-wrong {
      animation: shake 0.5s ease;
    }

    .match-tile.disabled {
      opacity: 0.6;
      pointer-events: none;
      cursor: not-allowed;
    }

    .match-tile.fade-in {
      animation: fadeIn 0.35s ease;
    }

    .round-stage-chip {
      align-self: center;
      margin-bottom: 10px;
      padding: 4px 12px;
      border-radius: 999px;
      background: var(--mathai-light-gray);
      color: var(--mathai-gray);
      font-size: var(--mathai-font-size-small);
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    /* ====== 7. Landscape lock overlay ====== */
    @media screen and (orientation: landscape) and (max-height: 500px) {
      body::before {
        content: 'Please rotate your phone to portrait mode';
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--mathai-white, #ffffff);
        color: var(--mathai-primary, #270f36);
        font-family: var(--mathai-font-family, system-ui, -apple-system, sans-serif);
        font-size: var(--mathai-font-size-subtitle, 18px);
        text-align: center;
        padding: 24px;
      }
    }

    /* ====== 8. Micro-animations ====== */
    @keyframes scoreBounce {
      0% { transform: scale(1); }
      40% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes starPop {
      0% { transform: scale(0); }
      60% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    @keyframes heartBreak {
      0% { transform: scale(1); opacity: 1; }
      30% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(0.5); opacity: 0; color: var(--mathai-red); }
    }

    @keyframes lockPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    .score-bounce { animation: scoreBounce 0.4s ease; }
    .shake-wrong { animation: shake 0.5s ease; }
    .heart-break { animation: heartBreak 0.6s ease forwards; }
    .star-earned { animation: starPop 0.4s ease forwards; }
    .fade-in { animation: fadeIn 0.35s ease; }

    /* ====== 9. Touch targets ====== */
    button,
    .match-tile,
    [role="button"],
    input[type="submit"] {
      min-height: 44px;
      min-width: 44px;
      touch-action: manipulation;
    }

    /* ====== 10. Gesture suppression ====== */
    input, textarea {
      -webkit-user-select: text;
      user-select: text;
    }

    /* Timer container (mounted inside transition/preview header if present) */
    #timer-container {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div id="app" data-phase="start_screen" data-score="0" data-lives="3"></div>

  <script>
    /* ====== 1. gameState initialization ====== */
    var gameState = {
      gameId: 'matching-doubles',
      phase: 'start_screen',
      currentRound: 0,
      totalRounds: 9,
      score: 0,
      lives: 3,
      totalLives: 3,
      attempts: [],
      events: [],
      startTime: null,
      isActive: false,
      isProcessing: false,
      gameEnded: false,
      content: null,
      duration_data: {
        startTime: null,
        preview: [],
        attempts: [],
        evaluations: [],
        inActiveTime: [],
        totalInactiveTime: 0
      },
      roundStartTime: null,
      correctAnswer: null,
      streak: 0,
      consecutiveWrongs: 0,
      previewResult: null,
      stars: 0,
      /* Matching-doubles specific */
      selectedLeftIndex: null,
      selectedRightIndex: null,
      lockedLeft: {},          /* left index -> true once matched */
      lockedRight: {},         /* right index -> true once matched */
      pairsMatchedRound: 0,    /* resets per round */
      pairsMatchedTotal: 0,    /* across full session */
      wrongMatchesRound: 0,
      wrongMatchesTotal: 0,
      stage: 1
    };

    /* ====== 2. window.gameState ====== */
    window.gameState = gameState;

    /* ====== 3. fallbackContent (full 9-round content set from spec) ====== */
    var fallbackContent = {
      previewInstruction:
        '<p><strong>Match the doubles!</strong> Tap a number on the left, then tap its <em>double</em> (&times;2) on the right. Finish all 9 rounds before you run out of 3 lives. The faster you finish, the more stars you earn!</p>',
      previewAudioText:
        'Match the doubles! Tap a number on the left, then tap its double on the right. Finish all nine rounds before you lose your three lives. The faster you finish, the more stars you earn.',
      previewAudio: null,
      showGameOnPreview: false,
      rounds: [
        /* Stage 1: Warm-up (no distractors) */
        {
          round: 1, stage: 1, type: 'A',
          left: [3, 5, 8],
          right: [16, 6, 10],
          pairs: { '3': 6, '5': 10, '8': 16 },
          misconception_tags: {}
        },
        {
          round: 2, stage: 1, type: 'A',
          left: [4, 7, 9],
          right: [18, 8, 14],
          pairs: { '4': 8, '7': 14, '9': 18 },
          misconception_tags: {}
        },
        {
          round: 3, stage: 1, type: 'A',
          left: [2, 6, 9],
          right: [18, 4, 12],
          pairs: { '2': 4, '6': 12, '9': 18 },
          misconception_tags: {}
        },

        /* Stage 2: Standard (bigger numbers, 4 pairs) */
        {
          round: 4, stage: 2, type: 'A',
          left: [6, 11, 15, 22],
          right: [44, 12, 30, 22],
          pairs: { '6': 12, '11': 22, '15': 30, '22': 44 },
          misconception_tags: {}
        },
        {
          round: 5, stage: 2, type: 'A',
          left: [9, 13, 18, 25],
          right: [36, 18, 50, 26],
          pairs: { '9': 18, '13': 26, '18': 36, '25': 50 },
          misconception_tags: {}
        },
        {
          round: 6, stage: 2, type: 'A',
          left: [8, 14, 20, 27],
          right: [28, 40, 54, 16],
          pairs: { '8': 16, '14': 28, '20': 40, '27': 54 },
          misconception_tags: {}
        },

        /* Stage 3: Confusability (5 pairs + misconception distractors) */
        {
          round: 7, stage: 3, type: 'A',
          left: [15, 18, 21, 24, 30],
          right: [36, 17, 42, 60, 30, 48],
          pairs: { '15': 30, '18': 36, '21': 42, '24': 48, '30': 60 },
          misconception_tags: {
            '17': 'double-add-instead'
          }
        },
        {
          round: 8, stage: 3, type: 'A',
          left: [17, 23, 28, 35, 40],
          right: [46, 29, 56, 80, 70, 34, 55],
          pairs: { '17': 34, '23': 46, '28': 56, '35': 70, '40': 80 },
          misconception_tags: {
            '29': 'double-next-number',
            '55': 'double-off-by-one'
          }
        },
        {
          round: 9, stage: 3, type: 'A',
          left: [19, 26, 33, 42, 50],
          right: [38, 52, 44, 66, 84, 100, 51],
          pairs: { '19': 38, '26': 52, '33': 66, '42': 84, '50': 100 },
          misconception_tags: {
            '44': 'double-add-instead',
            '51': 'double-next-number'
          }
        }
      ]
    };

    /* ====== 4. Module-scope vars ====== */
    var timer = null;
    var visibilityTracker = null;
    var signalCollector = null;
    var progressBar = null;
    var transitionScreen = null;
    var previewScreen = null;
    var interactionManager = null;
    var voGameStartPlayed = false;

    /* ====== Sticker URLs ====== */
    var STICKER_CORRECT = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif';
    var STICKER_INCORRECT = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-99.gif';
    var STICKER_ROUND = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-87.gif';
    var STICKER_LEVEL = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-234.gif';
    var STICKER_VICTORY = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-230.gif';
    var STICKER_COMPLETE_2 = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-113.gif';
    var STICKER_COMPLETE_1 = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-110.gif';
    var STICKER_GAMEOVER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-103.gif';
    var STICKER_RESTART = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1757430772002-102.gif';

    /* ====== 5. syncDOM ====== */
    function syncDOM() {
      var app = document.getElementById('app');
      if (!app) return;
      app.setAttribute('data-phase', gameState.phase);
      app.setAttribute('data-score', gameState.score);
      app.setAttribute('data-lives', gameState.lives);
      app.setAttribute('data-round', gameState.currentRound);
      app.setAttribute('data-stage', gameState.stage);
      app.setAttribute('data-pairs-matched-total', gameState.pairsMatchedTotal);
      app.setAttribute('data-selected-left', gameState.selectedLeftIndex === null ? '' : String(gameState.selectedLeftIndex));
      app.setAttribute('data-selected-right', gameState.selectedRightIndex === null ? '' : String(gameState.selectedRightIndex));
    }

    /* ====== 6. trackEvent ====== */
    function trackEvent(type, data) {
      gameState.events.push({
        type: type,
        timestamp: Date.now(),
        data: data || {}
      });
    }

    /* ====== 7. recordAttempt ====== */
    function recordAttempt(roundIndex, userInput, correct, metadata) {
      var rounds = getRounds();
      var round = rounds[roundIndex];
      var leftValue = metadata && (typeof metadata.left_value !== 'undefined') ? metadata.left_value : null;
      var correctAnswer = null;
      if (leftValue !== null && round && round.pairs) {
        correctAnswer = round.pairs[String(leftValue)];
      }
      var attempt = {
        attempt_timestamp: Date.now(),
        time_since_start_of_game: gameState.startTime ? Date.now() - gameState.startTime : 0,
        input_of_user: userInput,
        correct: correct,
        round_number: roundIndex + 1,
        question_id: 'r' + (roundIndex + 1) + (leftValue !== null ? ('-p' + leftValue) : ''),
        correct_answer: correctAnswer,
        response_time_ms: gameState.roundStartTime ? Date.now() - gameState.roundStartTime : 0,
        misconception_tag: correct ? null : (metadata && metadata.misconception_tag ? metadata.misconception_tag : null),
        difficulty_level: round && round.stage ? round.stage : 1,
        is_retry: metadata && metadata.is_retry ? true : false,
        metadata: metadata || {}
      };
      gameState.attempts.push(attempt);
      gameState.duration_data.attempts.push({
        round: roundIndex + 1,
        timestamp: Date.now()
      });
    }

    /* ====== 8. getStars (time-only, per spec) ======
       3★ if final timer <= 60s
       2★ if final timer <= 90s
       1★ otherwise OR if lives hit 0
    */
    function getStars() {
      if (gameState.lives <= 0) return 1;
      var elapsedSec = 0;
      if (timer && typeof timer.getTimeTaken === 'function') {
        try { elapsedSec = timer.getTimeTaken(); } catch(e) { elapsedSec = 0; }
      }
      if (!elapsedSec || elapsedSec < 0) {
        elapsedSec = gameState.startTime ? Math.round((Date.now() - gameState.startTime) / 1000) : 0;
      }
      if (elapsedSec <= 60) return 3;
      if (elapsedSec <= 90) return 2;
      return 1;
    }

    /* calcStars (exposed on window for contract FM-11) */
    function calcStars() { return getStars(); }
    window.calcStars = calcStars;

    /* ====== 9. getRounds ====== */
    function getRounds() {
      if (gameState.content && gameState.content.rounds &&
          gameState.content.rounds.length >= gameState.totalRounds) {
        return gameState.content.rounds;
      }
      return fallbackContent.rounds;
    }

    /* ====== 10. waitForPackages ====== */
    function waitForPackages() {
      return new Promise(function(resolve, reject) {
        var startTime = Date.now();
        var maxWait = 180000;
        function check() {
          try {
            if (typeof FeedbackManager !== 'undefined' &&
                typeof TimerComponent !== 'undefined' &&
                typeof VisibilityTracker !== 'undefined' &&
                typeof SignalCollector !== 'undefined' &&
                typeof ScreenLayout !== 'undefined' &&
                typeof ProgressBarComponent !== 'undefined' &&
                typeof TransitionScreenComponent !== 'undefined' &&
                typeof PreviewScreenComponent !== 'undefined') {
              resolve(true);
              return;
            }
            if (Date.now() - startTime > maxWait) {
              throw new Error('waitForPackages() timeout after 180s — CDN packages failed to load');
            }
            setTimeout(check, 50);
          } catch (err) {
            reject(err);
          }
        }
        check();
      });
    }

    /* ====== 11. Audio helpers ====== */
    function preloadAudio() {
      try {
        FeedbackManager.sound.preload([
          { id: 'correct_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757588479110.mp3' },
          { id: 'incorrect_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
          { id: 'sound_life_lost', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' },
          { id: 'rounds_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506558124.mp3' },
          { id: 'victory_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506672258.mp3' },
          { id: 'game_complete_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506659491.mp3' },
          { id: 'game_over_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506638331.mp3' },
          { id: 'tap_sound', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432016820.mp3' },
          { id: 'sound_bubble_select', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1758162403784.mp3' },
          { id: 'sound_bubble_deselect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1758712800721.mp3' },
          { id: 'new_cards', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432104595.mp3' },
          { id: 'all_correct', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757506764346.mp3' }
        ]);
      } catch (e) {
        console.error('[preload] Audio preload error:', e.message);
      }
    }

    /* ====== 12. handlePostMessage ====== */
    function handlePostMessage(event) {
      if (!event || !event.data || !event.data.type) return;
      if (event.data.type === 'game_init') {
        gameState.phase = 'playing';
        syncDOM();
        var d = event.data;
        if (d.content) {
          gameState.content = d.content;
          if (d.content.rounds && d.content.rounds.length > 0) {
            gameState.totalRounds = d.content.rounds.length;
          }
        }
        /* Extract signalConfig onto gameState (PART-010) */
        gameState.signalConfig = d.signalConfig || {};
        if (gameState.signalConfig && signalCollector) {
          try {
            signalCollector.flushUrl = gameState.signalConfig.flushUrl || signalCollector.flushUrl;
            signalCollector.playId = gameState.signalConfig.playId || signalCollector.playId;
            signalCollector.gameId = gameState.signalConfig.gameId || signalCollector.gameId || 'matching-doubles';
            signalCollector.sessionId = gameState.signalConfig.sessionId || signalCollector.sessionId;
            signalCollector.contentSetId = gameState.signalConfig.contentSetId || signalCollector.contentSetId;
            signalCollector.studentId = gameState.signalConfig.studentId || signalCollector.studentId;
            if (gameState.signalConfig.gameSessionId) signalCollector.gameSessionId = gameState.signalConfig.gameSessionId;
            if (signalCollector.startFlushing) signalCollector.startFlushing();
          } catch (e) {
            console.error('[signalCollector] Config error:', e.message);
          }
        }
        if (progressBar) {
          createProgressBar();
        }
      }
    }

    /* ====== 13. createProgressBar helper ====== */
    function createProgressBar() {
      try { if (progressBar) progressBar.destroy(); } catch (e) {}
      progressBar = new ProgressBarComponent({
        slotId: 'mathai-progress-slot',
        totalRounds: gameState.totalRounds,
        totalLives: Math.max(1, gameState.totalLives)
      });
      progressBar.show();
      progressBar.update(0, gameState.totalLives);
    }

    /* ====== 14. Inject game HTML into #gameContent ====== */
    function injectGameHTML() {
      var gc = document.getElementById('gameContent');
      if (!gc) return;
      gc.innerHTML =
        '<div class="match-board" id="matchBoard">' +
          '<div class="round-stage-chip" id="stageChip">Warm-up</div>' +
          '<div class="match-columns" id="matchColumns">' +
            '<div class="match-col">' +
              '<div class="match-col-header">Number</div>' +
              '<div class="match-tile-stack" id="leftStack"></div>' +
            '</div>' +
            '<div class="match-col">' +
              '<div class="match-col-header">Double</div>' +
              '<div class="match-tile-stack" id="rightStack"></div>' +
            '</div>' +
          '</div>' +
        '</div>';
    }

    /* ====== helper: stage label ====== */
    function stageLabel(stage) {
      if (stage === 1) return 'Warm-up';
      if (stage === 2) return 'Standard';
      if (stage === 3) return 'Confusability';
      return 'Round';
    }

    /* ====== 15. renderRound (loadRound) ====== */
    function renderRound() {
      gameState.isProcessing = false;
      gameState.isActive = true;
      gameState.phase = 'playing';

      /* Reset per-round transient state (NOT timer, NOT lives, NOT pairsMatchedTotal) */
      gameState.selectedLeftIndex = null;
      gameState.selectedRightIndex = null;
      gameState.lockedLeft = {};
      gameState.lockedRight = {};
      gameState.pairsMatchedRound = 0;
      gameState.wrongMatchesRound = 0;

      var rounds = getRounds();
      var round = rounds[gameState.currentRound];
      if (!round) return;

      gameState.stage = round.stage || 1;
      /* correctAnswer: surface the first unmatched pair's correct right-value for exposure */
      gameState.correctAnswer = round.pairs[String(round.left[0])];
      gameState.roundStartTime = Date.now();

      /* Clear any lingering sticker/subtitle */
      try {
        if (FeedbackManager && FeedbackManager.feedback) {
          FeedbackManager.feedback.hideAll();
        }
      } catch (e) {}

      /* Ensure gameContent is visible after transition screen */
      var gc = document.getElementById('gameContent');
      if (gc) gc.style.display = '';

      /* Make sure the board is injected (post-transition) */
      if (!document.getElementById('matchBoard')) {
        injectGameHTML();
      }

      var stageChip = document.getElementById('stageChip');
      if (stageChip) stageChip.textContent = 'Round ' + (gameState.currentRound + 1) + ' \u00B7 ' + stageLabel(gameState.stage);

      /* Render left tiles (by index) */
      var leftStack = document.getElementById('leftStack');
      if (leftStack) {
        leftStack.innerHTML = '';
        for (var i = 0; i < round.left.length; i++) {
          var lv = round.left[i];
          var t = document.createElement('div');
          t.className = 'match-tile fade-in';
          t.setAttribute('role', 'button');
          t.setAttribute('tabindex', '0');
          t.setAttribute('data-col', 'left');
          t.setAttribute('data-index', String(i));
          t.setAttribute('data-value', String(lv));
          t.setAttribute('data-testid', 'left-' + i);
          t.textContent = String(lv);
          t.addEventListener('click', handleTileTap);
          leftStack.appendChild(t);
        }
      }

      /* Render right tiles (by index — NEVER by value, to handle R4's 22 collision) */
      var rightStack = document.getElementById('rightStack');
      if (rightStack) {
        rightStack.innerHTML = '';
        for (var j = 0; j < round.right.length; j++) {
          var rv = round.right[j];
          var rt = document.createElement('div');
          rt.className = 'match-tile fade-in';
          rt.setAttribute('role', 'button');
          rt.setAttribute('tabindex', '0');
          rt.setAttribute('data-col', 'right');
          rt.setAttribute('data-index', String(j));
          rt.setAttribute('data-value', String(rv));
          rt.setAttribute('data-testid', 'right-' + j);
          rt.textContent = String(rv);
          rt.addEventListener('click', handleTileTap);
          rightStack.appendChild(rt);
        }
      }

      if (progressBar) {
        progressBar.update(gameState.currentRound + 1, Math.max(0, gameState.lives));
      }

      if (signalCollector) {
        try {
          signalCollector.recordViewEvent('content_render', {
            screen: 'gameplay',
            content_snapshot: {
              round: gameState.currentRound + 1,
              stage: gameState.stage,
              left: round.left,
              right: round.right
            }
          });
        } catch (e) {}
      }

      /* Soft "new cards" SFX — fire-and-forget ambient (CASE 17) */
      try {
        if (FeedbackManager && FeedbackManager.sound) {
          var p = FeedbackManager.sound.play('new_cards');
          if (p && p.catch) p.catch(function() {});
        }
      } catch (e) {}

      syncDOM();
    }

    /* ====== 16. Answer handler (tile tap) ====== */
    function handleTileTap(e) {
      /* Guard */
      if (gameState.gameEnded || !gameState.isActive) return;
      if (gameState.isProcessing) return; /* wait for round-complete audio */

      var tile = e.currentTarget;
      var col = tile.getAttribute('data-col');
      var idx = parseInt(tile.getAttribute('data-index'), 10);

      if (isNaN(idx) || (col !== 'left' && col !== 'right')) return;

      /* Ignore taps on locked tiles */
      if (col === 'left' && gameState.lockedLeft[idx]) return;
      if (col === 'right' && gameState.lockedRight[idx]) return;

      if (col === 'left') {
        if (gameState.selectedLeftIndex === idx) {
          /* Deselect (CASE 9) */
          gameState.selectedLeftIndex = null;
          setTileSelected(col, idx, false);
          playBubble('sound_bubble_deselect');
          syncDOM();
          return;
        }
        /* Select left (clears any previously selected left) */
        if (gameState.selectedLeftIndex !== null) {
          setTileSelected('left', gameState.selectedLeftIndex, false);
        }
        gameState.selectedLeftIndex = idx;
        setTileSelected(col, idx, true);
        playBubble('sound_bubble_select');

        /* If a right was already selected, attempt match */
        if (gameState.selectedRightIndex !== null) {
          attemptMatch();
        } else {
          syncDOM();
        }
        return;
      }

      /* col === 'right' */
      if (gameState.selectedRightIndex === idx) {
        /* Deselect */
        gameState.selectedRightIndex = null;
        setTileSelected(col, idx, false);
        playBubble('sound_bubble_deselect');
        syncDOM();
        return;
      }
      if (gameState.selectedRightIndex !== null) {
        setTileSelected('right', gameState.selectedRightIndex, false);
      }
      gameState.selectedRightIndex = idx;
      setTileSelected(col, idx, true);
      playBubble('sound_bubble_select');

      if (gameState.selectedLeftIndex !== null) {
        attemptMatch();
      } else {
        syncDOM();
      }
    }

    function setTileSelected(col, idx, selected) {
      var sel = '.match-tile[data-col="' + col + '"][data-index="' + idx + '"]';
      var el = document.querySelector(sel);
      if (!el) return;
      if (selected) el.classList.add('selected');
      else el.classList.remove('selected');
    }

    function getTile(col, idx) {
      var sel = '.match-tile[data-col="' + col + '"][data-index="' + idx + '"]';
      return document.querySelector(sel);
    }

    function playBubble(id) {
      try {
        if (FeedbackManager && FeedbackManager.sound) {
          var p = FeedbackManager.sound.play(id);
          if (p && p.catch) p.catch(function() {});
        }
      } catch (e) {}
    }

    /* ====== Attempt match (two-tap cycle complete) ====== */
    function attemptMatch() {
      var rounds = getRounds();
      var round = rounds[gameState.currentRound];
      if (!round) return;

      var lIdx = gameState.selectedLeftIndex;
      var rIdx = gameState.selectedRightIndex;
      var leftValue = round.left[lIdx];
      var rightValue = round.right[rIdx];
      var expectedRight = round.pairs[String(leftValue)];
      var isCorrect = (rightValue === expectedRight);

      /* Misconception tag: keyed off RIGHT-tile value (per spec) */
      var misconceptionTag = null;
      if (!isCorrect && round.misconception_tags) {
        misconceptionTag = round.misconception_tags[String(rightValue)] || null;
      }

      /* recordAttempt (all 12 fields) — BEFORE audio */
      recordAttempt(gameState.currentRound, rightValue, isCorrect, {
        left_index: lIdx,
        right_index: rIdx,
        left_value: leftValue,
        right_value: rightValue,
        stage: round.stage,
        misconception_tag: misconceptionTag,
        is_retry: false
      });

      /* trackEvent */
      trackEvent('answer_submitted', {
        round: gameState.currentRound + 1,
        leftIndex: lIdx,
        rightIndex: rIdx,
        leftValue: leftValue,
        rightValue: rightValue,
        correct: isCorrect
      });

      if (isCorrect) {
        handleCorrectMatch(lIdx, rIdx, leftValue, rightValue);
      } else {
        handleWrongMatch(lIdx, rIdx, leftValue, rightValue, misconceptionTag);
      }
    }

    /* ====== Correct match (CASE 5 — fire-and-forget) ====== */
    function handleCorrectMatch(lIdx, rIdx, leftValue, rightValue) {
      /* Lock both tiles by index identity */
      gameState.lockedLeft[lIdx] = true;
      gameState.lockedRight[rIdx] = true;

      gameState.selectedLeftIndex = null;
      gameState.selectedRightIndex = null;
      gameState.pairsMatchedRound = gameState.pairsMatchedRound + 1;
      gameState.pairsMatchedTotal = gameState.pairsMatchedTotal + 1;
      gameState.score = gameState.score + 1;
      gameState.streak = gameState.streak + 1;
      gameState.consecutiveWrongs = 0;
      syncDOM();

      /* Visual: turn both tiles green + pulse */
      var leftTile = getTile('left', lIdx);
      var rightTile = getTile('right', rIdx);
      [leftTile, rightTile].forEach(function(t) {
        if (!t) return;
        t.classList.remove('selected');
        t.classList.add('selected-correct', 'locked', 'locked-pulse');
        setTimeout(function() { try { t.classList.remove('locked-pulse'); } catch(e) {} }, 320);
      });

      /* Fire-and-forget SFX + sticker (CASE 5, no TTS, no subtitle) */
      try {
        if (FeedbackManager && FeedbackManager.sound) {
          var p = FeedbackManager.sound.play('correct_sound_effect', { sticker: STICKER_CORRECT });
          if (p && p.catch) p.catch(function() {});
        }
      } catch (e) {}

      /* Check round-complete */
      var rounds = getRounds();
      var round = rounds[gameState.currentRound];
      if (gameState.pairsMatchedRound >= round.left.length) {
        /* All pairs matched — await round-complete (CASE 6) */
        finishRoundAwaited();
      }
    }

    /* ====== Wrong match (CASE 7 — fire-and-forget multi-step) ====== */
    function handleWrongMatch(lIdx, rIdx, leftValue, rightValue, misconceptionTag) {
      gameState.lives = gameState.lives - 1;
      gameState.streak = 0;
      gameState.consecutiveWrongs = gameState.consecutiveWrongs + 1;
      gameState.wrongMatchesRound = gameState.wrongMatchesRound + 1;
      gameState.wrongMatchesTotal = gameState.wrongMatchesTotal + 1;
      syncDOM();

      var leftTile = getTile('left', lIdx);
      var rightTile = getTile('right', rIdx);
      [leftTile, rightTile].forEach(function(t) {
        if (!t) return;
        t.classList.remove('selected');
        t.classList.add('selected-wrong', 'shake-wrong');
      });

      /* Progress bar: hearts decrement only */
      if (progressBar) {
        progressBar.update(gameState.currentRound + 1, Math.max(0, gameState.lives));
      }

      /* Clear selection indices immediately so further taps work once shake is done */
      gameState.selectedLeftIndex = null;
      gameState.selectedRightIndex = null;
      syncDOM();

      /* Block tile taps briefly so shake can play */
      gameState.isProcessing = true;

      /* Check last-life first — CASE 8: skip wrong SFX, go straight to game over */
      if (gameState.lives <= 0) {
        /* Keep the red flash momentarily so the student sees what happened, then end */
        setTimeout(function() {
          gameState.isProcessing = false;
          endGame(false);
        }, 650);
        return;
      }

      /* CASE 7 multi-step: wrong SFX + sad sticker (PART-017 min-duration wrapper), NO TTS, NO subtitle */
      try {
        if (FeedbackManager && FeedbackManager.sound) {
          var p = Promise.all([
            FeedbackManager.sound.play('sound_life_lost', { sticker: STICKER_INCORRECT }),
            new Promise(function(r) { setTimeout(r, 1500); })
          ]);
          if (p && p.catch) p.catch(function() {});
        }
      } catch (e) {}

      /* After shake (~600ms), reset the two tiles to neutral so round continues */
      setTimeout(function() {
        [leftTile, rightTile].forEach(function(t) {
          if (!t) return;
          t.classList.remove('selected-wrong', 'shake-wrong');
        });
        gameState.isProcessing = false;
        syncDOM();
      }, 650);
    }

    /* ====== Round complete (CASE 6, awaited) ====== */
    async function finishRoundAwaited() {
      gameState.isProcessing = true;
      syncDOM();

      /* Progress bar: bump rounds completed */
      if (progressBar) {
        progressBar.update(gameState.currentRound + 1, Math.max(0, gameState.lives));
      }

      trackEvent('round_complete', {
        round: gameState.currentRound + 1,
        pairsMatched: gameState.pairsMatchedRound,
        wrongMatches: gameState.wrongMatchesRound
      });

      /* CASE 6 awaited round-complete SFX + sticker + subtitle (PART-017 min-duration wrapper) */
      try {
        await Promise.all([
          FeedbackManager.sound.play('all_correct', {
            sticker: STICKER_CORRECT,
            subtitle: 'Round complete!'
          }),
          new Promise(function(r) { setTimeout(r, 1500); })
        ]);
      } catch (e) {
        console.error('[audio] round-complete SFX error:', e.message);
      }

      try {
        if (FeedbackManager && FeedbackManager.feedback) FeedbackManager.feedback.hideAll();
      } catch (e) {}

      /* Advance */
      gameState.isProcessing = false;
      nextRound();
    }

    /* ====== 17. nextRound ====== */
    function nextRound() {
      gameState.currentRound = gameState.currentRound + 1;
      syncDOM();

      if (gameState.currentRound >= gameState.totalRounds) {
        endGame(true);
        return;
      }

      if (gameState.lives <= 0) {
        endGame(false);
        return;
      }

      showRoundIntro();
    }
    window.nextRound = nextRound;

    /* ====== Round intro transition ====== */
    async function showRoundIntro() {
      var roundNum = gameState.currentRound + 1;
      var rounds = getRounds();
      var round = rounds[gameState.currentRound];
      var stageTxt = round ? stageLabel(round.stage) : '';

      try {
        await transitionScreen.show({
          title: 'Round ' + roundNum,
          subtitle: stageTxt,
          icons: ['\uD83C\uDFAF'],
          onMounted: function() {
            (async function() {
              try {
                await FeedbackManager.sound.play('rounds_sound_effect', { sticker: STICKER_ROUND });
              } catch (e) {}
              try { transitionScreen.hide(); } catch (e) {}
              renderRound();
            })();
          }
        });
      } catch (e) {
        console.error('[transition] round intro error:', e.message);
        /* Fallback: skip the transition and render directly */
        renderRound();
      }
    }

    /* ====== 18. endGame ====== */
    function endGame(won) {
      if (gameState.gameEnded) return;
      gameState.gameEnded = true;
      gameState.isActive = false;

      /* Pause the timer (CASE 11 / 12) */
      try { if (timer && timer.pause) timer.pause(); } catch (e) {}

      gameState.phase = won ? 'results' : 'game_over';
      syncDOM();

      trackEvent('game_end', { won: won, score: gameState.score, stars: getStars() });

      /* Calculate metrics */
      var totalTimeMs = gameState.startTime ? Date.now() - gameState.startTime : 0;
      var elapsedSec = 0;
      try {
        if (timer && timer.getTimeTaken) elapsedSec = timer.getTimeTaken();
      } catch (e) {}
      if (!elapsedSec || elapsedSec < 0) elapsedSec = Math.round(totalTimeMs / 1000);

      /* accuracy = correct / total attempts (as percentage 0-100 integer) */
      var totalAttempts = gameState.attempts.length;
      var correctAttempts = 0;
      for (var i = 0; i < gameState.attempts.length; i++) {
        if (gameState.attempts[i].correct) correctAttempts++;
      }
      var accuracy = totalAttempts > 0 ? Math.round((correctAttempts / totalAttempts) * 100) : 0;

      gameState.stars = getStars();

      /* Compute tries per round */
      var tries = [];
      for (var r = 0; r < gameState.totalRounds; r++) {
        var count = 0;
        for (var a = 0; a < gameState.attempts.length; a++) {
          if (gameState.attempts[a].round_number === r + 1) count++;
        }
        if (count > 0) tries.push({ round: r + 1, tries: count });
      }

      /* Seal signal collector (before postMessage) */
      var sealResult = null;
      if (signalCollector) {
        try {
          if (signalCollector.seal) sealResult = signalCollector.seal();
        } catch (e) {}
      }

      /* game_complete postMessage BEFORE audio (dual-path: fires on both won + lost) */
      try {
        window.parent.postMessage({
          type: 'game_complete',
          data: {
            metrics: {
              accuracy: accuracy,
              time: elapsedSec,
              stars: gameState.stars,
              attempts: gameState.attempts,
              duration_data: gameState.duration_data,
              totalLives: gameState.totalLives,
              tries: tries
            },
            completedAt: Date.now(),
            previewResult: gameState.previewResult || null,
            signal_event_count: sealResult && typeof sealResult.signal_event_count === 'number'
              ? sealResult.signal_event_count
              : (signalCollector && signalCollector.getEventCount ? signalCollector.getEventCount() : 0),
            signal_metadata: sealResult && sealResult.signal_metadata ? sealResult.signal_metadata : null
          }
        }, '*');
      } catch (e) {
        console.error('[postMessage] game_complete error:', e.message);
      }

      /* Destroy preview screen (session-final cleanup, exactly once) */
      if (previewScreen) {
        try { previewScreen.destroy(); } catch (e) {}
      }

      /* Show end screen */
      if (won) {
        showVictory();
      } else {
        showGameOver();
      }
    }
    window.endGame = endGame;

    /* ====== Victory screen ====== */
    async function showVictory() {
      var stars = gameState.stars;
      var audioStopped = false;
      var elapsedSec = 0;
      try { if (timer && timer.getTimeTaken) elapsedSec = timer.getTimeTaken(); } catch (e) {}
      if (!elapsedSec) elapsedSec = gameState.startTime ? Math.round((Date.now() - gameState.startTime) / 1000) : 0;

      var mm = Math.floor(elapsedSec / 60);
      var ss = elapsedSec % 60;
      var timeStr = mm + ':' + (ss < 10 ? '0' + ss : String(ss));
      var subtitle = 'Time: ' + timeStr + ' \u00B7 Pairs matched: ' + gameState.pairsMatchedTotal;

      var buttons = [];
      if (stars < 3) {
        buttons.push({
          text: 'Play Again',
          action: function() {
            audioStopped = true;
            try { FeedbackManager.sound.pause(); FeedbackManager._stopCurrentDynamic(); } catch (e) {}
            try { FeedbackManager.feedback.hideAll(); } catch (e) {}
            try { transitionScreen.hide(); } catch (e) {}
            restartGame();
          }
        });
      }
      buttons.push({
        text: 'Claim Stars',
        primary: true,
        action: function() {
          audioStopped = true;
          try { FeedbackManager.sound.pause(); FeedbackManager._stopCurrentDynamic(); } catch (e) {}
          try { FeedbackManager.feedback.hideAll(); } catch (e) {}
          try { transitionScreen.hide(); } catch (e) {}
          showStarsCollected();
        }
      });

      try {
        await transitionScreen.show({
          title: 'Victory \uD83C\uDF89',
          subtitle: subtitle,
          stars: stars,
          buttons: buttons,
          persist: true,
          onMounted: function() {
            (async function() {
              var sfxId = stars === 3 ? 'victory_sound_effect' : 'game_complete_sound_effect';
              var sticker = stars === 3 ? STICKER_VICTORY : (stars === 2 ? STICKER_COMPLETE_2 : STICKER_COMPLETE_1);
              try {
                await FeedbackManager.sound.play(sfxId, { sticker: sticker });
                if (audioStopped) return;
                var voText;
                if (stars === 3) voText = 'Lightning fast doubling! Amazing work!';
                else if (stars === 2) voText = 'Nice work! You matched them all.';
                else voText = 'You finished! Let\u2019s get faster next time.';
                await FeedbackManager.playDynamicFeedback({
                  audio_content: voText,
                  subtitle: voText.length > 60 ? voText.substring(0, 57) + '...' : voText,
                  sticker: sticker
                });
              } catch (e) {}
            })();
          }
        });
      } catch (e) {
        console.error('[transition] victory error:', e.message);
      }
    }

    /* ====== Game over screen ====== */
    async function showGameOver() {
      var audioStopped = false;
      var pairsTotal = gameState.pairsMatchedTotal;
      var pairsPossibleSoFar = 0;
      var rounds = getRounds();
      for (var r = 0; r <= gameState.currentRound && r < rounds.length; r++) {
        if (rounds[r] && rounds[r].left) pairsPossibleSoFar += rounds[r].left.length;
      }
      var subtitle = 'You matched ' + pairsTotal + ' of ' + pairsPossibleSoFar + ' pairs';

      try {
        await transitionScreen.show({
          title: 'Game Over',
          subtitle: subtitle,
          icons: ['\uD83D\uDE14'],
          buttons: [{
            text: 'Try Again',
            primary: true,
            action: function() {
              audioStopped = true;
              try { FeedbackManager.sound.pause(); FeedbackManager._stopCurrentDynamic(); } catch (e) {}
              try { FeedbackManager.feedback.hideAll(); } catch (e) {}
              try { transitionScreen.hide(); } catch (e) {}
              restartGame();
            }
          }],
          persist: true,
          onMounted: function() {
            (async function() {
              try {
                await FeedbackManager.sound.play('game_over_sound_effect', { sticker: STICKER_GAMEOVER });
                if (audioStopped) return;
                var voText = 'Good try \u2014 let\u2019s practice those doubles again!';
                await FeedbackManager.playDynamicFeedback({
                  audio_content: voText,
                  subtitle: voText,
                  sticker: STICKER_GAMEOVER
                });
              } catch (e) {}
            })();
          }
        });
      } catch (e) {
        console.error('[transition] game over error:', e.message);
      }
    }

    /* ====== Stars collected screen ====== */
    async function showStarsCollected() {
      var stars = gameState.stars;
      try {
        await transitionScreen.show({
          title: 'Yay!\n' + stars + ' Star' + (stars > 1 ? 's' : '') + ' Collected!',
          styles: { title: { whiteSpace: 'pre-line' } },
          duration: 2500,
          onMounted: function() {
            try {
              FeedbackManager.sound.play('victory_sound_effect', { sticker: STICKER_VICTORY });
            } catch (e) {}
          }
        });
      } catch (e) {}
    }

    /* ====== 19. setupGame ====== */
    function setupGame() {
      var content = gameState.content || fallbackContent;

      /* 1. Render initial round UI into #gameContent FIRST (preview overlay sits on top) */
      injectGameHTML();

      /* Populate initial round display (round 0) */
      var rounds = getRounds();
      if (rounds && rounds.length > 0) {
        var round = rounds[0];
        gameState.stage = round.stage || 1;
        gameState.correctAnswer = round.pairs[String(round.left[0])];

        var stageChip = document.getElementById('stageChip');
        if (stageChip) stageChip.textContent = 'Round 1 \u00B7 ' + stageLabel(gameState.stage);

        var leftStack = document.getElementById('leftStack');
        if (leftStack) {
          leftStack.innerHTML = '';
          for (var i = 0; i < round.left.length; i++) {
            var t = document.createElement('div');
            t.className = 'match-tile';
            t.setAttribute('role', 'button');
            t.setAttribute('tabindex', '0');
            t.setAttribute('data-col', 'left');
            t.setAttribute('data-index', String(i));
            t.setAttribute('data-value', String(round.left[i]));
            t.setAttribute('data-testid', 'left-' + i);
            t.textContent = String(round.left[i]);
            leftStack.appendChild(t);
          }
        }
        var rightStack = document.getElementById('rightStack');
        if (rightStack) {
          rightStack.innerHTML = '';
          for (var j = 0; j < round.right.length; j++) {
            var rt = document.createElement('div');
            rt.className = 'match-tile';
            rt.setAttribute('role', 'button');
            rt.setAttribute('tabindex', '0');
            rt.setAttribute('data-col', 'right');
            rt.setAttribute('data-index', String(j));
            rt.setAttribute('data-value', String(round.right[j]));
            rt.setAttribute('data-testid', 'right-' + j);
            rt.textContent = String(round.right[j]);
            rightStack.appendChild(rt);
          }
        }
      }

      syncDOM();

      /* 2. Show preview LAST */
      if (previewScreen) {
        previewScreen.show({
          instruction: content.previewInstruction || fallbackContent.previewInstruction,
          audioUrl: content.previewAudio || fallbackContent.previewAudio || null,
          showGameOnPreview: content.showGameOnPreview === true,
          timerConfig: timer ? { type: 'increase', startTime: 0, endTime: 100000 } : null,
          timerInstance: timer || null,
          onComplete: function(previewData) {
            startGameAfterPreview(previewData);
          }
        });
      }
    }

    /* ====== 20. startGameAfterPreview ====== */
    async function startGameAfterPreview(previewData) {
      if (gameState.isActive) return;
      gameState.previewResult = previewData || null;
      gameState.duration_data.preview = gameState.duration_data.preview || [];
      gameState.duration_data.preview.push({ duration: previewData ? previewData.duration : 0 });

      gameState.startTime = Date.now();
      gameState.isActive = true;
      gameState.duration_data.startTime = new Date().toISOString();
      gameState.phase = 'playing';
      syncDOM();

      /* Hide the preview instruction block — CDN keeps it rendered alongside game-container */
      try {
        var _pi = document.getElementById('previewInstruction');
        if (_pi) _pi.style.display = 'none';
      } catch (e) {}

      /* Start the count-up timer — runs continuously across all rounds */
      try { if (timer && timer.start) timer.start(); } catch (e) {}

      trackEvent('game_start', { totalRounds: gameState.totalRounds });

      if (signalCollector) {
        try {
          signalCollector.recordViewEvent('screen_transition', { from: 'preview', to: 'game' });
        } catch (e) {}
      }

      if (progressBar) {
        progressBar.show();
        progressBar.update(0, gameState.totalLives);
      }

      /* Go straight to Round 1 intro — no separate welcome screen (preview already played) */
      voGameStartPlayed = true;
      await showRoundIntro();
    }

    /* ====== startGame (standalone/fallback only) ====== */
    function startGame() {
      if (gameState.isActive) return;
      gameState.isActive = true;
      gameState.startTime = Date.now();
      gameState.duration_data.startTime = new Date().toISOString();
      gameState.currentRound = 0;
      gameState.score = 0;
      gameState.lives = gameState.totalLives;
      gameState.attempts = [];
      gameState.events = [];
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState.phase = 'playing';
      gameState.streak = 0;
      gameState.consecutiveWrongs = 0;
      gameState.pairsMatchedTotal = 0;
      gameState.wrongMatchesTotal = 0;

      trackEvent('game_start', { totalRounds: gameState.totalRounds });
      syncDOM();

      try { if (timer && timer.start) timer.start(); } catch (e) {}

      if (progressBar) {
        progressBar.show();
        progressBar.update(0, gameState.totalLives);
      }

      renderRound();
    }
    window.startGame = startGame;

    /* ====== 21. restartGame (skips Preview per PART-039) ====== */
    function restartGame() {
      /* Pause all audio (stopAll destroys internal state — use pause per PART-017) */
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { FeedbackManager.stream.pauseAll(); } catch (e) {}
      try { FeedbackManager._stopCurrentDynamic(); } catch (e) {}

      /* Reset the timer (destroy + recreate so count-up starts from 0) */
      try {
        if (timer && timer.destroy) timer.destroy();
      } catch (e) {}
      try {
        timer = new TimerComponent('timer-container', {
          timerType: 'increase',
          format: 'min',
          startTime: 0,
          endTime: 100000,
          autoStart: false,
          onEnd: function() { /* count-up has no natural end */ }
        });
      } catch (e) {
        console.error('[restart] Timer recreate error:', e.message);
      }

      /* Reset all mutable state */
      gameState.phase = 'playing';
      gameState.currentRound = 0;
      gameState.score = 0;
      gameState.lives = gameState.totalLives;
      gameState.attempts = [];
      gameState.events = [];
      gameState.startTime = Date.now();
      gameState.isActive = true;
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState.roundStartTime = null;
      gameState.correctAnswer = null;
      gameState.streak = 0;
      gameState.consecutiveWrongs = 0;
      gameState.stars = 0;
      gameState.selectedLeftIndex = null;
      gameState.selectedRightIndex = null;
      gameState.lockedLeft = {};
      gameState.lockedRight = {};
      gameState.pairsMatchedRound = 0;
      gameState.pairsMatchedTotal = 0;
      gameState.wrongMatchesRound = 0;
      gameState.wrongMatchesTotal = 0;
      gameState.stage = 1;
      gameState.duration_data = {
        startTime: new Date().toISOString(),
        preview: gameState.duration_data && gameState.duration_data.preview ? gameState.duration_data.preview : [],
        attempts: [],
        evaluations: [],
        inActiveTime: [],
        totalInactiveTime: 0
      };

      /* Reset signal collector (do NOT seal+reinstantiate per GEN-SIGNAL-RESET) */
      if (signalCollector) {
        try { signalCollector.reset(); } catch (e) {}
      }

      /* Recreate progress bar */
      createProgressBar();

      trackEvent('game_start', { totalRounds: gameState.totalRounds });
      syncDOM();

      /* Ensure the board is present */
      if (!document.getElementById('matchBoard')) {
        injectGameHTML();
      }

      /* Keep preview instruction hidden on restart (PART-039: preview not re-shown) */
      try {
        var _pi2 = document.getElementById('previewInstruction');
        if (_pi2) _pi2.style.display = 'none';
      } catch (e) {}

      /* Start timer fresh */
      try { if (timer && timer.start) timer.start(); } catch (e) {}

      /* Skip Preview per PART-039 — go directly to Round 1 intro */
      showRoundIntro();
    }
    window.restartGame = restartGame;

    /* ====== Fallback layout builder ====== */
    function buildFallbackLayout() {
      var app = document.getElementById('app');
      if (!app) return;
      app.innerHTML =
        '<div class="mathai-layout-root" style="width:100%;min-height:100dvh;display:flex;flex-direction:column;">' +
          '<div id="mathai-progress-slot"></div>' +
          '<div id="timer-container"></div>' +
          '<div id="gameContent"></div>' +
          '<div id="mathai-transition-slot"></div>' +
        '</div>';
    }

    /* ====== DOMContentLoaded — init sequence ====== */
    document.addEventListener('DOMContentLoaded', async function() {
      var packagesLoaded = false;
      try {
        /* 1. await waitForPackages() — throws new Error() on timeout */
        packagesLoaded = await waitForPackages();
      } catch (e) {
        console.error('[init] ' + e.message);
        packagesLoaded = false;
      }

      try {
        if (packagesLoaded) {
          /* 2. await FeedbackManager.init() */
          try { await FeedbackManager.init(); } catch (e) {
            console.error('[init] FeedbackManager.init error:', e.message);
          }

          /* 3. SignalCollector creation */
          try {
            signalCollector = new SignalCollector({ gameId: 'matching-doubles' });
          } catch (e) {
            console.error('[init] SignalCollector error:', e.message);
          }

          /* 4. ScreenLayout.inject — slots API, previewScreen MANDATORY per PART-039 */
          try {
            ScreenLayout.inject('app', {
              slots: {
                previewScreen: true,
                progressBar: true,
                transitionScreen: true
              }
            });
          } catch (e) {
            console.error('[init] ScreenLayout.inject error:', e.message);
          }

          /* 5. Inject timer container (for TimerComponent to mount into) */
          try {
            var headerHost = document.getElementById('mathai-preview-slot')
              || document.getElementById('app');
            if (headerHost && !document.getElementById('timer-container')) {
              var tc = document.createElement('div');
              tc.id = 'timer-container';
              tc.style.display = 'none';
              headerHost.appendChild(tc);
            }
          } catch (e) {}

          /* 6. gameContent is created by ScreenLayout (slots mode) — no manual injection */

          /* 7. TimerComponent creation (count-up, no time limit) */
          try {
            timer = new TimerComponent('timer-container', {
              timerType: 'increase',
              format: 'min',
              startTime: 0,
              endTime: 100000,
              autoStart: false,
              onEnd: function() { /* count-up has no natural end */ }
            });
          } catch (e) {
            console.error('[init] TimerComponent error:', e.message);
          }

          /* 8. InteractionManager creation */
          try {
            interactionManager = new InteractionManager({
              selector: '#gameContent',
              disableOnAudioFeedback: false,
              disableOnEvaluation: false
            });
            window.interactionManager = interactionManager;
          } catch (e) {
            console.error('[init] InteractionManager error:', e.message);
          }

          /* 9. VisibilityTracker (CASE 14/15) — also wire preview pause/resume */
          try {
            visibilityTracker = new VisibilityTracker({
              onInactive: function() {
                try { FeedbackManager.sound.pause(); FeedbackManager.stream.pauseAll(); } catch (e) {}
                try { if (previewScreen) previewScreen.pause(); } catch (e) {}
                try {
                  if (timer && timer.isRunning && timer.pause) {
                    timer.pause({ fromVisibilityTracker: true });
                  }
                } catch (e) {}
                gameState.duration_data.inActiveTime.push({ start: Date.now() });
              },
              onResume: function() {
                try { FeedbackManager.sound.resume(); FeedbackManager.stream.resumeAll(); } catch (e) {}
                try { if (previewScreen) previewScreen.resume(); } catch (e) {}
                try {
                  if (timer && timer.isPaused && timer.resume) {
                    timer.resume({ fromVisibilityTracker: true });
                  }
                } catch (e) {}
                var last = gameState.duration_data.inActiveTime[gameState.duration_data.inActiveTime.length - 1];
                if (last && !last.end) {
                  last.end = Date.now();
                  gameState.duration_data.totalInactiveTime += (last.end - last.start);
                }
              },
              autoShowPopup: true
            });
          } catch (e) {
            console.error('[init] VisibilityTracker error:', e.message);
          }

          /* 10. createProgressBar */
          createProgressBar();

          /* 11. TransitionScreenComponent */
          try {
            transitionScreen = new TransitionScreenComponent({
              autoInject: true,
              slotId: 'mathai-transition-slot',
              gameContentId: 'gameContent'
            });
          } catch (e) {
            console.error('[init] TransitionScreen error:', e.message);
          }

          /* 12. PreviewScreenComponent */
          try {
            previewScreen = new PreviewScreenComponent({
              slotId: 'mathai-preview-slot'
            });
          } catch (e) {
            console.error('[init] PreviewScreen error:', e.message);
          }

          /* 13. Audio preloading */
          preloadAudio();

          /* 14. Register handlePostMessage listener BEFORE game_ready */
          window.addEventListener('message', handlePostMessage);

          /* 15. Send game_ready postMessage */
          try { window.parent.postMessage({ type: 'game_ready' }, '*'); } catch (e) {}

          /* 16. setupGame — renders game DOM, then calls previewScreen.show() last */
          setupGame();
        } else {
          /* Packages failed — build fallback layout */
          buildFallbackLayout();
          window.addEventListener('message', handlePostMessage);
          try { window.parent.postMessage({ type: 'game_ready' }, '*'); } catch (e) {}
        }
      } catch (e) {
        console.error('[init] ' + e.message);
      }

      /* Standalone fallback — runs INDEPENDENTLY (not nested in waitForPackages) */
      setTimeout(function() {
        /* Standalone-fallback gate: abort if a live preview is mounted */
        if (previewScreen && previewScreen.isActive && previewScreen.isActive()) return;
        if (!gameState.isActive && !gameState.gameEnded) {
          if (!document.getElementById('gameContent')) {
            buildFallbackLayout();
          }
          gameState.content = fallbackContent;
          gameState.totalRounds = fallbackContent.rounds.length;
          injectGameHTML();
          startGame();
        }
      }, 2000);

      /* Window exposures (MUST be here, at bottom of DOMContentLoaded) */
      window.gameState = gameState;
      window.endGame = endGame;
      window.restartGame = restartGame;
      window.nextRound = nextRound;
      window.startGame = startGame;
      window.loadRound = renderRound;
      window.signalCollector = signalCollector;
      window.calcStars = calcStars;

      /* Debug / test harness functions */
      window.debugGame = function() {
        return JSON.parse(JSON.stringify({
          phase: gameState.phase,
          currentRound: gameState.currentRound,
          totalRounds: gameState.totalRounds,
          score: gameState.score,
          lives: gameState.lives,
          totalLives: gameState.totalLives,
          isActive: gameState.isActive,
          isProcessing: gameState.isProcessing,
          gameEnded: gameState.gameEnded,
          attempts: gameState.attempts.length,
          events: gameState.events.length,
          pairsMatchedTotal: gameState.pairsMatchedTotal,
          wrongMatchesTotal: gameState.wrongMatchesTotal,
          selectedLeftIndex: gameState.selectedLeftIndex,
          selectedRightIndex: gameState.selectedRightIndex,
          stars: getStars()
        }));
      };
      window.debugAudio = function() {
        try {
          return {
            feedbackManagerReady: typeof FeedbackManager !== 'undefined',
            initCalled: true
          };
        } catch (e) {
          return { error: e.message };
        }
      };
      window.testAudio = function() {
        try { FeedbackManager.sound.play('tap_sound'); return true; } catch (e) { return false; }
      };
      window.testPause = function() {
        try { FeedbackManager.sound.pause(); return true; } catch (e) { return false; }
      };
      window.testResume = function() {
        try { FeedbackManager.sound.resume(); return true; } catch (e) { return false; }
      };
    });
  </script>
</body>
</html>
