<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Friendly Pairs</title>

  <!-- ====== Game CDN packages (mandatory order: feedback-manager, components, helpers) ====== -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

  <style>
    :root {
      --mathai-game-max-width: 480px;
      --mathai-stack-gap: 10px;
      --mathai-game-padding-top: 20px;
      --mathai-primary: #270f36;
      --mathai-level-text: #270F63;
      --mathai-purple: #9B51E0;
      --mathai-purple-soft: #F2E8FB;
      --mathai-blue: #667eea;
      --mathai-red: #E35757;
      --mathai-orange: #F2994A;
      --mathai-amber: #E8A317;
      --mathai-yellow: #FFDE49;
      --mathai-soft-grey: #7A8088;
      --mathai-white: #ffffff;
      --mathai-gray: #666666;
      --mathai-light-gray: #f5f5f5;
      --mathai-card-bg: #FFF8EC;
      --mathai-disabled-gray: #E0E0E0;
      --mathai-text-primary: #2A2438;
      --mathai-text-muted: #5A5666;
      --mathai-border-gray: #e0e0e0;
      --mathai-cell-bg-green: #E5F8EE;
      --mathai-cell-bg-amber: #FFF1D6;
      --mathai-cell-bg-grey: #ECEEF1;
      --mathai-cell-bg-red: #FFE3E3;
      --mathai-cell-border-green: #22A06B;
      --mathai-cell-border-amber: #E8A317;
      --mathai-cell-border-grey: #7A8088;
      --mathai-cell-border-red: #E35757;
      --mathai-accent-blue: #4A6FFF;
      --mathai-tile-bg: #FFFFFF;
      --mathai-tile-border: #D9DCE3;
      --mathai-tile-selected-bg: #E8EEFF;
      --mathai-tile-selected-border: #4A6FFF;
      --mathai-font-family: 'Epilogue', -apple-system, 'Segoe UI', Roboto, sans-serif;
      --mathai-font-size-title: 26px;
      --mathai-font-size-subtitle: 18px;
      --mathai-font-size-button: 16px;
      --mathai-font-size-body: 16px;
      --mathai-font-size-small: 14px;
      --mathai-font-size-large: 22px;
      --mathai-font-size-tile: 22px;
      --mathai-padding-large: 28px 20px;
      --mathai-padding-medium: 16px 20px;
      --mathai-padding-small: 10px;
      --mathai-border-radius: 20px;
      --mathai-border-radius-small: 8px;
      --mathai-border-radius-button: 12px;
      --mathai-border-radius-card: 16px;
      --mathai-success: #22A06B;
      --mathai-error: #E35757;
      --mathai-warning: #E8A317;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      overflow-x: hidden;
      margin: 0;
      padding: 0;
      overscroll-behavior: none;
    }

    body {
      font-family: var(--mathai-font-family);
      background: var(--mathai-white);
      color: var(--mathai-text-primary);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.5;
    }

    #app {
      width: 100%;
      max-width: var(--mathai-game-max-width);
      min-height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: clip;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    @supports not (min-height: 100dvh) {
      #app { min-height: 100vh; }
    }

    /* Preview wrapper: single vertical scroll owner + positioning context for timer */
    #mathai-preview-slot {
      height: 100dvh;
      overflow: hidden;
      position: relative;
    }
    #mathai-preview-slot .mathai-preview-body {
      height: 100dvh;
      box-sizing: border-box;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }
    /* Hide preview instruction once the game advances past the preview phase.
       The CDN's switchToGame() only removes the overlay + skip button — the
       instruction area remains visible otherwise, leaving preview text behind
       every subsequent screen (welcome, round_intro, gameplay, victory,
       game_over). Keyed on #app[data-phase] which syncDOM keeps in sync. */
    #app:not([data-phase="preview"]) #mathai-preview-slot .mathai-preview-instruction {
      display: none !important;
      padding: 0 !important;
      margin: 0 !important;
      height: 0 !important;
      min-height: 0 !important;
      overflow: hidden !important;
    }
    /* Reclaim vertical space the instruction previously used so the gameplay
       surface sits at the top of the preview body after the switch. */
    #app:not([data-phase="preview"]) #mathai-preview-slot .mathai-preview-body {
      padding-top: 72px !important;
    }

    .hidden { display: none !important; }

    /* ====== Timer styling — mounted inside .mathai-preview-header-center visibly ====== */
    #timer-container {
      position: absolute;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      pointer-events: none;
    }
    #timer-container > * { pointer-events: auto; }
    /* Override TimerComponent's 320x41 inline styles */
    #timer-container .timer-wrapper {
      padding: 0 !important;
      margin: 0 !important;
      width: auto !important;
      height: auto !important;
    }
    #timer-container .timer-display {
      width: auto !important;
      height: auto !important;
      padding: 0 !important;
      font-size: 16px !important;
      font-weight: 700 !important;
      color: var(--mathai-primary) !important;
      font-family: var(--mathai-font-family) !important;
    }
    /* Hide CDN's empty preview-timer-text span to avoid visual duplication */
    #previewTimerText { display: none !important; }

    /* ====== Friendly-Pairs game styles ====== */
    .fp-stack {
      width: 100%;
      padding: 8px 14px 24px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    .fp-target-bar {
      background: var(--mathai-card-bg);
      border: 2px solid #F0E1C0;
      border-radius: var(--mathai-border-radius-card);
      padding: 10px 14px;
      text-align: center;
      margin-bottom: 10px;
    }

    .fp-target-label {
      display: block;
      font-size: var(--mathai-font-size-small);
      font-weight: 700;
      color: var(--mathai-text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .fp-target-text {
      display: block;
      font-size: var(--mathai-font-size-title);
      font-weight: 800;
      color: var(--mathai-primary);
      line-height: 1.2;
    }

    .fp-board {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-row-gap: 12px;
      grid-column-gap: 12px;
      margin-top: 6px;
      margin-bottom: 12px;
      position: relative;
    }

    .fp-pill {
      min-height: 64px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 10px;
      border: 2px solid var(--mathai-tile-border);
      background: var(--mathai-tile-bg);
      color: var(--mathai-text-primary);
      border-radius: 999px;
      font-family: var(--mathai-font-family);
      font-size: var(--mathai-font-size-tile);
      font-weight: 800;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-appearance: none;
      appearance: none;
      -webkit-user-select: none;
      user-select: none;
      transition: background-color 0.15s ease, border-color 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease, color 0.15s ease;
    }

    /* Staggered offset on odd-indexed rows — grid-layout + row-offset margins (NOT flex gap) */
    .fp-pill[data-row="1"],
    .fp-pill[data-row="3"],
    .fp-pill[data-row="5"] {
      margin-left: 18px;
    }
    .fp-pill[data-row="0"],
    .fp-pill[data-row="2"],
    .fp-pill[data-row="4"] {
      margin-right: 10px;
    }

    .fp-pill:active {
      transform: scale(0.97);
    }

    .fp-pill-num {
      min-width: 22px;
      text-align: center;
      color: inherit;
    }

    .fp-pill-dot {
      margin: 0 10px;
      color: var(--mathai-text-muted);
      font-weight: 700;
    }

    .fp-pill.fp-correct {
      background: var(--mathai-purple-soft);
      border-color: var(--mathai-purple);
      color: var(--mathai-purple);
      cursor: default;
      animation: fpPulse 0.32s ease;
    }
    .fp-pill.fp-correct:active { transform: none; }

    .fp-pill.fp-wrong {
      background: var(--mathai-cell-bg-red);
      border-color: var(--mathai-cell-border-red);
      color: var(--mathai-error);
      animation: fpShake 0.55s ease;
    }

    .fp-pill[disabled],
    .fp-pill.fp-disabled {
      pointer-events: none;
    }

    .fp-pill.fp-fresh {
      animation: fpFadeIn 0.22s ease;
    }

    @keyframes fpPulse {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    @keyframes fpShake {
      0%, 100% { transform: translateX(0); }
      15%      { transform: translateX(-6px); }
      30%      { transform: translateX(6px); }
      45%      { transform: translateX(-5px); }
      60%      { transform: translateX(5px); }
      75%      { transform: translateX(-3px); }
      90%      { transform: translateX(3px); }
    }

    @keyframes fpFadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fpBoardClear {
      0%   { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.96); }
    }

    .fp-board.fp-clearing {
      animation: fpBoardClear 0.4s ease forwards;
    }

    /* Pair counter ✓ N/M */
    .fp-pair-counter {
      text-align: center;
      font-size: var(--mathai-font-size-body);
      font-weight: 800;
      color: var(--mathai-success);
      background: var(--mathai-cell-bg-green);
      border: 1px solid var(--mathai-cell-border-green);
      border-radius: 999px;
      padding: 6px 16px;
      margin: 0 auto 10px;
      display: inline-block;
      align-self: center;
      letter-spacing: 0.04em;
    }

    .fp-counter-row {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 6px;
    }

    /* Wrong ✗ flash badge */
    .fp-x-badge {
      position: fixed;
      left: 50%;
      bottom: 20%;
      transform: translate(-50%, 10px);
      background: var(--mathai-error);
      color: var(--mathai-white);
      font-size: 34px;
      font-weight: 900;
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
      z-index: 120;
      box-shadow: 0 6px 18px rgba(227, 87, 87, 0.35);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .fp-x-badge.fp-x-visible {
      opacity: 1;
      transform: translate(-50%, 0);
      animation: fpXFlash 0.6s ease;
    }
    @keyframes fpXFlash {
      0%   { opacity: 0; transform: translate(-50%, 14px) scale(0.7); }
      35%  { opacity: 1; transform: translate(-50%, -6px) scale(1.12); }
      70%  { opacity: 1; transform: translate(-50%, 0) scale(1.0); }
      100% { opacity: 0; transform: translate(-50%, -2px) scale(0.98); }
    }

    /* Touch targets */
    button,
    [role="button"],
    input[type="submit"] {
      min-height: 44px;
      min-width: 44px;
      touch-action: manipulation;
    }

    /* Landscape lock */
    .fp-landscape-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--mathai-white);
      color: var(--mathai-primary);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      font-size: var(--mathai-font-size-subtitle);
      font-weight: 600;
    }
    @media screen and (max-height: 500px) and (orientation: landscape) {
      .fp-landscape-overlay { display: flex; }
    }

    @media (max-width: 360px) {
      .fp-pill { font-size: 18px; min-height: 56px; padding: 10px 8px; }
      .fp-pill-dot { margin: 0 6px; }
      .fp-pill[data-row="1"], .fp-pill[data-row="3"], .fp-pill[data-row="5"] { margin-left: 12px; }
      .fp-pill[data-row="0"], .fp-pill[data-row="2"], .fp-pill[data-row="4"] { margin-right: 6px; }
    }

    @media (max-height: 620px) {
      .fp-pill { min-height: 56px; }
      .fp-target-bar { padding: 8px 12px; margin-bottom: 8px; }
      .fp-target-text { font-size: 22px; }
      .fp-board { grid-row-gap: 10px; grid-column-gap: 10px; }
    }
  </style>
</head>

    /* ====== syncDOM ====== */
    function syncDOM() {
      var app = document.getElementById('app');
      if (!app) return;
      app.setAttribute('data-phase', gameState.phase);
      app.setAttribute('data-score', gameState.score);
      app.setAttribute('data-round', gameState.currentRound);
      app.setAttribute('data-stage', getCurrentStage());
      app.setAttribute('data-lives', gameState.lives);
      try {
        document.body.setAttribute('data-phase', gameState.phase);
        document.body.setAttribute('data-lives', gameState.lives);
      } catch (e) {}
    }

    function getCurrentStage() {
      var rounds = getRounds();
      var idx = Math.max(0, Math.min(gameState.currentRound - 1, rounds.length - 1));
      return rounds[idx] && rounds[idx].stage ? rounds[idx].stage : 1;
    }

    /* ====== trackEvent ====== */
    function trackEvent(type, data) {
      var evt = { event: type, timestamp: Date.now() };
      if (data && typeof data === 'object') {
        for (var k in data) if (Object.prototype.hasOwnProperty.call(data, k)) evt[k] = data[k];
      }
      gameState.events.push(evt);
    }

    /* ====== recordAttempt ====== */
    function recordAttempt(data) {
      var rIdx = gameState.currentRound;
      var round = gameState.currentRoundData || getRounds()[Math.max(0, rIdx - 1)];
      var targetSum = round ? round.targetSum : null;
      var attempt = {
        attempt_timestamp: Date.now(),
        time_since_start_of_game: gameState.startTime ? Date.now() - gameState.startTime : 0,
        input_of_user: data.userAnswer,
        correct: data.correct === true,
        round_number: rIdx,
        question_id: data.question_id || ('r' + rIdx + '_' + (data.pillId || 'pill')),
        correct_answer: data.correctAnswer,
        response_time_ms: gameState.roundStartTime ? Date.now() - gameState.roundStartTime : 0,
        misconception_tag: data.misconception_tag || null,
        difficulty_level: getCurrentStage(),
        is_retry: false,
        metadata: {
          pill_id: data.pillId,
          pill_a: data.a,
          pill_b: data.b,
          pill_sum: (typeof data.a === 'number' && typeof data.b === 'number') ? (data.a + data.b) : null,
          target_sum: targetSum,
          lives_remaining: gameState.lives,
          stage: getCurrentStage(),
          round_type: 'A',
          attempt_number_in_round: gameState.currentRoundAttempts,
          is_fast: data.is_fast === true,
          correct_pairs_found_this_round: gameState.correctPairsFoundThisRound
        }
      };
      gameState.attempts.push(attempt);
      gameState.duration_data.attempts.push({
        round: rIdx,
        timestamp: Date.now(),
        correct: attempt.correct
      });
    }

    /* ====== getRounds ====== */
    function getRounds() {
      if (gameState.content && gameState.content.rounds &&
          gameState.content.rounds.length >= gameState.totalRounds) {
        return gameState.content.rounds;
      }
      return fallbackContent.rounds;
    }

    /* ====== getStars — fast-pair ratio + lives ====== */
    function getStars() {
      if (gameState.lives <= 0) return 0;
      if (gameState.fastPairs >= 27 && gameState.lives > 0) return 3;
      if (gameState.fastPairs >= 17 && gameState.lives > 0) return 2;
      return 1;
    }
    function calcStars() { return getStars(); }
    window.calcStars = calcStars;

    /* ====== waitForPackages ====== */
    function waitForPackages() {
      return new Promise(function(resolve, reject) {
        var startT = Date.now();
        var maxWait = 180000;
        function check() {
          try {
            if (typeof FeedbackManager !== 'undefined' &&
                typeof VisibilityTracker !== 'undefined' &&
                typeof ScreenLayout !== 'undefined' &&
                typeof ProgressBarComponent !== 'undefined' &&
                typeof TransitionScreenComponent !== 'undefined' &&
                typeof PreviewScreenComponent !== 'undefined' &&
                typeof TimerComponent !== 'undefined') {
              resolve(true);
              return;
            }
            if (Date.now() - startT > maxWait) {
              throw new Error('waitForPackages() timeout after 180s — CDN packages failed to load');
            }
            setTimeout(check, 50);
          } catch (err) {
            reject(err);
          }
        }
        check();
      });
    }

    /* ====== handlePostMessage ====== */
    function handlePostMessage(event) {
      if (!event || !event.data || !event.data.type) return;
      if (event.data.type === 'game_init') {
        gameState.phase = 'playing';
        syncDOM();
        var d = event.data;
        if (d.content) {
          gameState.content = d.content;
          if (d.content.rounds && d.content.rounds.length > 0) {
            gameState.totalRounds = d.content.rounds.length;
          }
        }
        gameState.signalConfig = d.signalConfig || {};
        if (gameState.signalConfig && signalCollector) {
          try {
            signalCollector.flushUrl = gameState.signalConfig.flushUrl || signalCollector.flushUrl;
            signalCollector.playId = gameState.signalConfig.playId || signalCollector.playId;
            signalCollector.gameId = gameState.signalConfig.gameId || signalCollector.gameId || 'friendly-pairs';
            signalCollector.sessionId = gameState.signalConfig.sessionId || signalCollector.sessionId;
            signalCollector.contentSetId = gameState.signalConfig.contentSetId || signalCollector.contentSetId;
            signalCollector.studentId = gameState.signalConfig.studentId || signalCollector.studentId;
            if (gameState.signalConfig.gameSessionId) signalCollector.gameSessionId = gameState.signalConfig.gameSessionId;
            if (signalCollector.startFlushing) signalCollector.startFlushing();
          } catch (e) {
            console.error('[signalCollector] Config error:', e.message);
          }
        }
        if (progressBar) {
          createProgressBar();
        }
      }
    }

    /* ====== createProgressBar ====== */
    function createProgressBar() {
      try { if (progressBar) progressBar.destroy(); } catch (e) {}
      try {
        progressBar = new ProgressBarComponent({
          slotId: 'mathai-progress-slot',
          totalRounds: gameState.totalRounds,
          totalLives: gameState.totalLives,
          showLives: true
        });
        progressBar.show();
        progressBar.update(Math.max(0, gameState.currentRound - 1), Math.max(0, gameState.lives));
      } catch (e) {
        console.error('[progressBar] create error:', e.message);
      }
    }

    /* ====== injectGameHTML — renders the gameplay skeleton inside #gameContent ====== */
    function injectGameHTML() {
      var gc = document.getElementById('gameContent');
      if (!gc) return;
      gc.innerHTML =
        '<div class="fp-stack" id="fpStack">' +
          '<div class="fp-target-bar" id="fpTargetBanner">' +

          '</div>' +
        '</div>' +
        '<div class="fp-x-badge" id="fpXBadge">✗</div>';
    }

    function updateCounter() {
      var el = document.getElementById('fpPairCounter');
      if (!el) return;
      var total = gameState.currentRoundData ? gameState.currentRoundData.correctPills.length : 0;
      el.textContent = '✓ ' + gameState.correctPairsFoundThisRound + '/' + total;
    }

    function updateTargetBanner() {
      var el = document.getElementById('fpTargetText');
      if (!el || !gameState.currentRoundData) return;
      el.textContent = 'Make Sum ' + gameState.currentRoundData.targetSum;
    }

    function flashXBadge() {
      var el = document.getElementById('fpXBadge');
      if (!el) return;
      el.classList.remove('fp-x-visible');
      /* Reflow to restart animation */
      void el.offsetWidth;
      el.classList.add('fp-x-visible');
      setTimeout(function() {
        if (el) el.classList.remove('fp-x-visible');
      }, 620);
    }

    /* ====== renderBoard — build pills for current round ====== */
    function renderBoard() {
      gameState.isProcessing = false;
      gameState.isActive = true;
      gameState.phase = 'gameplay';
      gameState.roundStartTime = Date.now();
      gameState.lastCorrectTapAt = gameState.roundStartTime;
      gameState.lockedPills = {};
      gameState.correctPairsFoundThisRound = 0;
      gameState.currentRoundAttempts = 0;
      gameState.currentRoundWrong = 0;
      gameState.currentRoundMisconceptions = [];

      var rounds = getRounds();
      var round = rounds[Math.max(0, gameState.currentRound - 1)];
      if (!round) return;
      gameState.currentRoundData = round;
      gameState.correctAnswer = 'sum=' + round.targetSum;

      if (!document.getElementById('fpBoard')) {
        injectGameHTML();
      }

      updateTargetBanner();
      updateCounter();

      var boardEl = document.getElementById('fpBoard');
      if (boardEl) {
        boardEl.classList.remove('fp-clearing');
        boardEl.innerHTML = '';
        for (var i = 0; i < round.pills.length; i++) {
          var p = round.pills[i];
          var row = Math.floor(i / 2); /* staggered every other row */
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'fp-pill fp-fresh';
          btn.setAttribute('data-pill-id', p.id);
          btn.setAttribute('data-a', String(p.a));
          btn.setAttribute('data-b', String(p.b));
          btn.setAttribute('data-row', String(row));
          btn.setAttribute('data-index', String(i));
          btn.setAttribute('data-testid', 'fp-pill-' + p.id);
          btn.setAttribute('aria-label', 'Pair ' + p.a + ' and ' + p.b);
          btn.innerHTML =
            '<span class="fp-pill-num">' + p.a + '</span>' +
            '<span class="fp-pill-dot">·</span>' +
            '<span class="fp-pill-num">' + p.b + '</span>';
          btn.addEventListener('click', onPillTap);
          boardEl.appendChild(btn);
        }
      }

      /* Ambient new-cards SFX (fire-and-forget) — CASE 17 */
      try { FeedbackManager.sound.play('new_cards', {}).catch(function() {}); } catch (e) {}

      if (progressBar) {
        try {
          progressBar.update(Math.max(0, gameState.currentRound - 1), Math.max(0, gameState.lives));
        } catch (e) {}
      }

      syncDOM();
    }
    window.loadRound = renderBoard;
    window.renderRound = renderBoard;

    /* ====== onPillTap — central interaction handler ====== */
    function onPillTap(ev) {
      if (gameState.isProcessing) return;
      if (!gameState.isActive) return;
      if (gameState.gameEnded) return;
      if (gameState.phase !== 'gameplay') return;

      var el = ev.currentTarget;
      if (!el) return;
      var pillId = el.getAttribute('data-pill-id');
      if (!pillId) return;
      if (gameState.lockedPills[pillId]) return;
      if (el.classList.contains('fp-correct')) return;
      if (el.classList.contains('fp-wrong')) return;

      var round = gameState.currentRoundData;
      if (!round) return;

      var a = Number(el.getAttribute('data-a'));
      var b = Number(el.getAttribute('data-b'));
      var isCorrect = round.correctPills.indexOf(pillId) !== -1;

      gameState.currentRoundAttempts += 1;

      if (isCorrect) {
        handleCorrectPill(el, pillId, a, b);
      } else {
        handleWrongPill(el, pillId, a, b);
      }
    }

    /* ====== handleCorrectPill ====== */
    function handleCorrectPill(el, pillId, a, b) {
      var now = Date.now();
      var isFast = (now - gameState.lastCorrectTapAt) <= FAST_PAIR_WINDOW_MS;

      gameState.score += isFast ? 2 : 1;
      if (isFast) gameState.fastPairs += 1;
      gameState.pairsFoundTotal += 1;
      gameState.correctPairsFoundThisRound += 1;
      gameState.lastCorrectTapAt = now;
      gameState.lockedPills[pillId] = true;

      /* Visual: purple lock + scale-pulse (200ms) */
      el.classList.remove('fp-fresh');
      el.classList.add('fp-correct');
      el.setAttribute('aria-disabled', 'true');
      el.setAttribute('disabled', 'disabled');

      updateCounter();

      var targetSum = gameState.currentRoundData.targetSum;

      try {
        recordAttempt({
          userAnswer: a + '+' + b,
          correctAnswer: 'sum=' + targetSum,
          correct: true,
          pillId: pillId,
          a: a,
          b: b,
          misconception_tag: null,
          question_id: 'r' + gameState.currentRound + '_' + pillId,
          is_fast: isFast
        });
      } catch (e) { console.error('[recordAttempt] error:', e.message); }

      trackEvent('answer_submitted', {
        round: gameState.currentRound,
        correct: true,
        response_time_ms: gameState.roundStartTime ? Date.now() - gameState.roundStartTime : 0,
        pillId: pillId,
        a: a,
        b: b,
        is_fast: isFast
      });

      syncDOM();

      var M = gameState.currentRoundData.correctPills.length;
      var isFinalPair = gameState.correctPairsFoundThisRound === M;

      if (!isFinalPair) {
        /* CASE 5 multi-step: fire-and-forget, NO input blocking */
        try {
          FeedbackManager.sound.play('correct_sound_effect', { sticker: STICKER_CORRECT })
            .catch(function(e) { console.error('Audio error:', e && e.message); });
        } catch (e) {}
        return;
      }

      /* ====== Final correct pair of round — CASE 6 awaited ====== */
      onRoundComplete();
    }

    /* ====== onRoundComplete — progressBar FIRST, then awaited SFX ====== */
    async function onRoundComplete() {
      if (gameState.isProcessing) return;
      gameState.isProcessing = true;

      /* Progress bar: bump FIRST, before any awaited SFX / nextRound / endGame */
      if (progressBar) {
        try { progressBar.update(gameState.currentRound, Math.max(0, gameState.lives)); } catch (e) {}
      }

      /* Record round data */
      gameState.roundsData.push({
        round: gameState.currentRound,
        attempts: gameState.currentRoundAttempts,
        wrongAttempts: gameState.currentRoundWrong,
        misconceptions: gameState.currentRoundMisconceptions.slice()
      });

      trackEvent('round_complete', { round: gameState.currentRound });

      /* Board fade-out */
      var boardEl = document.getElementById('fpBoard');
      if (boardEl) boardEl.classList.add('fp-clearing');

      /* Awaited round-complete SFX + "Good job!" subtitle + sticker (CASE 6) */
      try {
        await Promise.all([
          FeedbackManager.sound.play('all_correct', {
            sticker: STICKER_CORRECT,
            subtitle: 'Good job!'
          }),
          new Promise(function(r) { setTimeout(r, 1500); })
        ]);
      } catch (e) { console.error('[round-complete audio] error:', e && e.message); }

      gameState.isProcessing = false;

      if (gameState.currentRound < gameState.totalRounds) {
        nextRound();
      } else {
        endGame('victory');
      }
    }

    /* ====== nextRound — cleanup FIRST, then state mutation, then renderBoard ====== */
    async function nextRound() {
      /* Cleanup FIRST (feedback cross-cutting rule 10) */
      try { FeedbackManager.sound.pause(); } catch (e) { try { FeedbackManager.sound.pause(); } catch (e2) {} }
      try { FeedbackManager.stream.stopAll(); } catch (e) {}

      gameState.currentRound += 1;
      gameState.correctPairsFoundThisRound = 0;
      gameState.lockedPills = {};
      gameState.isProcessing = false;
      gameState.phase = 'round_intro';
      syncDOM();

      if (progressBar) {
        try { progressBar.update(Math.max(0, gameState.currentRound - 1), Math.max(0, gameState.lives)); } catch (e) {}
      }

      await showRoundIntro();
      renderBoard();
    }

    /* ====== handleWrongPill ====== */
    function handleWrongPill(el, pillId, a, b) {
      gameState.lives = Math.max(0, gameState.lives - 1);
      gameState.currentRoundWrong += 1;

      var round = gameState.currentRoundData;
      var tag = (round && round.misconception_tags) ? (round.misconception_tags[pillId] || null) : null;
      if (tag) gameState.currentRoundMisconceptions.push(tag);

      var targetSum = round ? round.targetSum : null;

      try {
        recordAttempt({
          userAnswer: a + '+' + b,
          correctAnswer: 'sum=' + targetSum,
          correct: false,
          pillId: pillId,
          a: a,
          b: b,
          misconception_tag: tag,
          question_id: 'r' + gameState.currentRound + '_' + pillId,
          is_fast: false
        });
      } catch (e) { console.error('[recordAttempt] error:', e.message); }

      trackEvent('answer_submitted', {
        round: gameState.currentRound,
        correct: false,
        response_time_ms: gameState.roundStartTime ? Date.now() - gameState.roundStartTime : 0,
        pillId: pillId,
        a: a,
        b: b,
        misconception_tag: tag
      });

      /* Visual: red flash + shake (600ms), ✗ badge flash */
      el.classList.remove('fp-fresh');
      el.classList.add('fp-wrong');
      flashXBadge();

      syncDOM();
      if (progressBar) {
        try { progressBar.update(Math.max(0, gameState.currentRound - 1), Math.max(0, gameState.lives)); } catch (e) {}
      }

      /* CASE 7 multi-step variant: fire-and-forget wrong SFX + sad sticker, NO input block, NO subtitle */
      try {
        FeedbackManager.sound.play('incorrect_sound_effect', { sticker: STICKER_WRONG })
          .catch(function(e) { console.error('Audio error:', e && e.message); });
      } catch (e) {}

      if (gameState.lives === 0) {
        /* Lives-zero path: let wrong SFX + shake land ~1000ms, then game_over (CASE 8 + 12) */
        gameState.isProcessing = true;
        setTimeout(function() {
          if (el) { el.classList.remove('fp-wrong'); }
          endGame('game_over');
        }, 1000);
        return;
      }

      /* Pill re-enables after shake — student is not permanently locked out of the tile */
      setTimeout(function() {
        if (el) {
          el.classList.remove('fp-wrong');
        }
      }, 600);
    }

    /* ====== showRoundIntro — sequential awaited SFX -> dynamic TTS, auto-advance ====== */

    /* ====== endGame — screen first, game_complete BEFORE audio ====== */
    function endGame(reason) {
      if (gameState.gameEnded) return;
      gameState.gameEnded = true;

      /* Cleanup FIRST — before state mutation (feedback cross-cutting rule 10) */
      try { FeedbackManager.sound.pause(); } catch (e) { try { FeedbackManager.sound.pause(); } catch (e2) {} }
      try { FeedbackManager.stream.stopAll(); } catch (e) {}

      gameState.isActive = false;

      var outcome;
      if (reason === 'game_over') outcome = 'game_over';
      else if (reason === 'victory' || reason === true) outcome = 'victory';
      else outcome = 'victory';

      /* Pause + read final elapsed */
      try {
        if (timer) {
          timer.pause();
          gameState.finalTimeSeconds = Math.floor(timer.getTimeTaken ? timer.getTimeTaken() : ((Date.now() - (gameState.startTime || Date.now())) / 1000));
        } else if (gameState.startTime) {
          gameState.finalTimeSeconds = Math.floor((Date.now() - gameState.startTime) / 1000);
        } else {
          gameState.finalTimeSeconds = 0;
        }
      } catch (e) {
        gameState.finalTimeSeconds = gameState.startTime ? Math.floor((Date.now() - gameState.startTime) / 1000) : 0;
      }

      /* Stars: 0 on game_over, else fast-pair ratio + lives */
      if (outcome === 'game_over' || gameState.lives === 0) {
        gameState.stars = 0;
      } else {
        gameState.stars = getStars();
      }

      gameState.phase = outcome === 'game_over' ? 'game_over' : 'victory';
      syncDOM();

      trackEvent('game_end', {
        outcome: outcome,
        stars: gameState.stars,
        lives: gameState.lives,
        score: gameState.score,
        rounds_played: gameState.currentRound,
        pairs_found: gameState.pairsFoundTotal,
        fast_pairs: gameState.fastPairs,
        time: gameState.finalTimeSeconds
      });

      var totalAttempts = gameState.attempts.length;
      var correctAttempts = 0;
      for (var i = 0; i < gameState.attempts.length; i++) {
        if (gameState.attempts[i].correct) correctAttempts++;
      }
      var accuracy = totalAttempts > 0 ? Math.round((correctAttempts / totalAttempts) * 100) : 0;

      var tries = [];
      for (var r = 0; r < gameState.totalRounds; r++) {
        var count = 0;
        for (var a = 0; a < gameState.attempts.length; a++) {
          if (gameState.attempts[a].round_number === r + 1) count++;
        }
        if (count > 0) tries.push({ round: r + 1, tries: count });
      }

      var sealResult = null;
      if (signalCollector) {
        try { if (signalCollector.seal) sealResult = signalCollector.seal(); } catch (e) {}
      }

      /* game_complete postMessage BEFORE audio — NESTED data.metrics structure */
      try {
        window.parent.postMessage({
          type: 'game_complete',
          data: {
            outcome: outcome,
            metrics: {
              accuracy: accuracy,
              time: gameState.finalTimeSeconds,
              stars: gameState.stars,
              attempts: gameState.attempts,
              duration_data: gameState.duration_data,
              totalLives: gameState.totalLives,
              tries: tries
            },
            completedAt: Date.now(),
            previewResult: gameState.previewResult || null,
            /* Friendly-Pairs-specific analytics (forward-compat extras) */
            reason: outcome,
            finalTimeSeconds: gameState.finalTimeSeconds,
            totalRoundsCompleted: outcome === 'victory' ? gameState.totalRounds : Math.max(0, gameState.currentRound - 1),
            pairsFoundTotal: gameState.pairsFoundTotal,
            fastPairs: gameState.fastPairs,
            totalCorrectPairs: TOTAL_CORRECT_PAIRS,
            livesRemaining: gameState.lives,
            roundsData: gameState.roundsData.slice(),
            signal_event_count: sealResult && typeof sealResult.signal_event_count === 'number'
              ? sealResult.signal_event_count
              : (signalCollector && signalCollector.getEventCount ? signalCollector.getEventCount() : 0),
            signal_metadata: sealResult && sealResult.signal_metadata ? sealResult.signal_metadata : null
          }
        }, '*');
      } catch (e) {
        console.error('[postMessage] game_complete error:', e.message);
      }

      /* Top-level CustomEvent (parity with other shipped games) */
      try {
        window.dispatchEvent(new CustomEvent('game_complete', {
          detail: {
            outcome: outcome,
            stars: gameState.stars,
            rounds: outcome === 'game_over' ? Math.max(0, gameState.currentRound - 1) : gameState.totalRounds,
            time: gameState.finalTimeSeconds
          }
        }));
      } catch (e) {}

      /* Destroy preview screen (session-final cleanup, exactly once). Must NOT be reached on restart. */
      if (previewScreen) {
        try { previewScreen.destroy(); } catch (e) {}
        previewScreen = null;
      }

      /* Render screen FIRST, then play audio */
      if (outcome === 'game_over') {
        showGameOver();
      } else {
        showVictory();
      }
    }
    window.endGame = endGame;

    /* ====== DOMContentLoaded — init sequence ====== */
    document.addEventListener('DOMContentLoaded', async function() {
      var packagesLoaded = false;
      try {
        packagesLoaded = await waitForPackages();
      } catch (e) {
        console.error('[init] ' + e.message);
        packagesLoaded = false;
      }

      try {
        if (packagesLoaded) {
          /* 1. FeedbackManager.init */
          try { await FeedbackManager.init({ sound: { sounds: [] }, stream: { streams: [] } }); }
          catch (e) { console.error('[init] FeedbackManager.init error:', e.message); }

          /* 2. SignalCollector */

            if (typeof SignalCollector !== 'undefined') {
              signalCollector = new SignalCollector({ gameId: 'friendly-pairs' });
            } else if (typeof MathAIHelpers !== 'undefined' && MathAIHelpers.SignalCollector) {
              signalCollector = new MathAIHelpers.SignalCollector({ gameId: 'friendly-pairs' });
            }
            window.signalCollector = signalCollector;
          } catch (e) {
            console.error('[init] SignalCollector error:', e.message);
          }

          /* 3. ScreenLayout.inject — previewScreen MANDATORY per PART-039 */
          try {
            ScreenLayout.inject('app', {
              slots: {
                previewScreen: true,
                progressBar: true,
                transitionScreen: true
              }
            });
          } catch (e) {
            console.error('[init] ScreenLayout.inject error:', e.message);
          }

          /* 4. Timer container — mount inside the preview slot container (CDN-owned). */
          try {
            var timerRoot = document.getElementById('mathai-preview-slot') || document.getElementById('app');
            if (timerRoot && !document.getElementById('timer-container')) {
              var tc = document.createElement('div');
              tc.id = 'timer-container';
              timerRoot.appendChild(tc);
            }
          } catch (e) {}

          /* 5. TimerComponent (count-up, no effective limit) */
          try {
            timer = new TimerComponent('timer-container', {
              timerType: 'increase',
              format: 'min',
              startTime: 0,
              endTime: 100000,
              autoStart: false,
              onEnd: function() { /* never fires in count-up */ }
            });
            window.timer = timer;
          } catch (e) {
            console.error('[init] TimerComponent error:', e.message);
          }

          /* 6. VisibilityTracker — built-in PopupComponent renders the pause popup (CASE 14/15) */
          try {
            visibilityTracker = new VisibilityTracker({
              popupProps: {
                title: 'Game Paused',
                description: 'Tap Resume to continue.',
                primaryText: 'Resume'
              },
              onInactive: function() {
                try { FeedbackManager.sound.pause(); FeedbackManager.stream.pauseAll(); } catch (e) {}
                try { if (timer) timer.pause({ fromVisibilityTracker: true }); } catch (e) {}
                try { if (previewScreen) previewScreen.pause(); } catch (e) {}
                gameState.duration_data.inActiveTime.push({ start: Date.now() });
                gameState.isPaused = true;
              },
              onResume: function() {
                try { FeedbackManager.sound.resume(); FeedbackManager.stream.resumeAll(); } catch (e) {}
                try { if (timer) timer.resume({ fromVisibilityTracker: true }); } catch (e) {}
                try { if (previewScreen) previewScreen.resume(); } catch (e) {}
                var last = gameState.duration_data.inActiveTime[gameState.duration_data.inActiveTime.length - 1];
                if (last && !last.end) {
                  last.end = Date.now();
                  gameState.duration_data.totalInactiveTime += (last.end - last.start);
                }
                gameState.isPaused = false;
              }
            });
          } catch (e) {
            console.error('[init] VisibilityTracker error:', e.message);
          }

          /* 7. Progress bar */
          createProgressBar();

          /* 8. Transition screen */
          try {
            transitionScreen = new TransitionScreenComponent({
              autoInject: true,
              slotId: 'mathai-transition-slot',
              gameContentId: 'gameContent'
            });
          } catch (e) {
            console.error('[init] TransitionScreen error:', e.message);
          }

          /* 9. Preview screen — PART-039 mandatory, slotId only */
          try {
            previewScreen = new PreviewScreenComponent({
              slotId: 'mathai-preview-slot'
            });
          } catch (e) {
            console.error('[init] PreviewScreen error:', e.message);
          }

          /* 10. Preload SFX */
          preloadAudio();

          /* 11. Wait for audio permission (once) */
          try {
            await new Promise(function(resolve) {
              if (FeedbackManager.canPlayAudio && FeedbackManager.canPlayAudio()) return resolve();
              var tick = setInterval(function() {
                if (FeedbackManager.canPlayAudio && FeedbackManager.canPlayAudio()) {
                  clearInterval(tick);
                  resolve();
                }
              }, 200);
              setTimeout(function() { clearInterval(tick); resolve(); }, 15000);
            });
          } catch (e) {}

          /* 12. Register message listener BEFORE game_ready */
          window.addEventListener('message', handlePostMessage);

          /* 13. Send game_ready */
          try { window.parent.postMessage({ type: 'game_ready' }, '*'); } catch (e) {}

          /* 14. setupGame — renders DOM first, preview last */
          setupGame();
        } else {
          /* Packages failed — fallback */
          buildFallbackLayout();
          injectGameHTML();
          window.addEventListener('message', handlePostMessage);
          try { window.parent.postMessage({ type: 'game_ready' }, '*'); } catch (e) {}
        }
      } catch (e) {
        console.error('[init] outer error:', e && e.message);
      }

      /* ===== Standalone setTimeout fallback — runs independently of waitForPackages ===== */
      setTimeout(function() {
        /* PART-039 Standalone-fallback gate: abort if a live preview is mounted */
        if (previewScreen && previewScreen.isActive && previewScreen.isActive()) return;
        if (!gameState.isActive && !gameState.gameEnded) {
          if (!document.getElementById('gameContent')) {
            buildFallbackLayout();
          }
          gameState.content = fallbackContent;
          gameState.totalRounds = fallbackContent.rounds.length;
          injectGameHTML();
          startGame();
        }
      }, 2000);

      /* Window exposures (data-contract) */
      window.gameState = gameState;
      window.endGame = endGame;
      window.restartGame = restartToRound1;
      window.loadRound = renderBoard;
    });
  </script>
</body>
</html>
