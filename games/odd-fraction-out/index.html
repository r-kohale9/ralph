.fraction-card.disabled {

<body>

<div id="app" data-phase="start_screen" data-score="0" data-round="0"></div>

<script>
/* ================== GAME STATE (PART-007) ================== */
var gameState = {
  gameId: 'odd-fraction-out',
  contentSetId: null,
  signalConfig: null,
  currentRound: 0,
  totalRounds: 1,
  score: 0,
  attempts: [],
  events: [],
  startTime: null,
  roundStartTime: null,
  isActive: false,
  gameEnded: false,
  isProcessing: false,
  phase: 'start_screen',
  content: null,
  sessionHistory: [],
  duration_data: {
    startTime: null,
    preview: [],
    attempts: [],
    evaluations: [],
    inActiveTime: [],
    totalInactiveTime: 0,
    currentTime: null
  },
  previewResult: null,
  correctAnswer: null,
  correct: false,
  stars: 0,
  streak: 0,
  consecutiveWrongs: 0,
  lockTapped: false
};
window.gameState = gameState;

/* ================== FALLBACK CONTENT ================== */
var fallbackContent = {
  previewInstruction: '<p><strong>Find the fraction that isn&rsquo;t equal to the others.</strong></p>',
  previewAudioText: 'Three of these fractions are equal. One is not. Tap the odd one out.',
  previewAudio: null,
  showGameOnPreview: false,
  totalRounds: 1,
  rounds: [
    {
      id: 'r1_odd_fraction_2_over_3',
      round: 1,
      stage: 1,
      type: 'A',
      prompt: 'Tap the fraction that is NOT equal to the others.',
      cards: [
        { id: 'c1', numerator: 3, denominator: 4,  label: '3/4'  },
        { id: 'c2', numerator: 6, denominator: 8,  label: '6/8'  },
        { id: 'c3', numerator: 9, denominator: 12, label: '9/12' },
        { id: 'c4', numerator: 2, denominator: 3,  label: '2/3'  }
      ],
      correctCardId: 'c4',
      correctLabel: '2/3',
      correctFeedbackText: 'You got it!',
      incorrectFeedbackText: "3/4, 6/8, 9/12 are all 3/4; 2/3 isn't.",
      starsOnCorrect: 3,
      starsOnIncorrect: 0,
      difficulty: 1,
      misconception_tags: {
        '3/4':  'MISC-FRAC-EQ-01',
        '6/8':  'MISC-FRAC-EQ-02',
        '9/12': 'MISC-FRAC-EQ-03'
      },
      misconception_definitions: {
        'MISC-FRAC-EQ-01': {
          name: 'Treats the base/unscaled fraction as the odd one out',
          explanation: '3/4 is the base fraction; 6/8 and 9/12 are 3/4 scaled by 2 and 3. The unscaled form is still equal to the scaled forms.'
        },
        'MISC-FRAC-EQ-02': {
          name: 'Assumes a bigger-looking fraction has a different value',
          explanation: '6/8 looks bigger than 3/4 but it is the same value because numerator and denominator were both multiplied by 2.'
        },
        'MISC-FRAC-EQ-03': {
          name: 'Picks the fraction with the largest numbers as the odd one',
          explanation: '9/12 has the biggest numbers but is still equal to 3/4 because numerator and denominator were both multiplied by 3.'
        }
      }
    }
  ]
};

/* ================== MODULE SCOPE VARS ================== */
var timer = null;
var visibilityTracker = null;
var progressBar = null;
var transitionScreen = null;
var previewScreen = null;
var signalCollector = null;
var interactionManager = null;
var visibilityTrackerConfig = null;

/* ================== STICKERS (GIF URLs) ================== */
var STICKER_CELEBRATE = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif';
var STICKER_SAD = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-99.gif';
var STICKER_TEACHER = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-87.gif';

/* ================== HELPERS ================== */
function syncDOM() {
  var app = document.getElementById('app');
  if (!app) return;
  app.setAttribute('data-phase', gameState.phase);
  app.setAttribute('data-score', gameState.score);
  app.setAttribute('data-round', gameState.currentRound);
}

function trackEvent(type, target, data) {
  data = data || {};
  var event = { type: type, target: target || 'game', timestamp: Date.now(), data: data };
  gameState.events.push(event);
}

function getRounds() {
  if (gameState.content && gameState.content.rounds && gameState.content.rounds.length >= gameState.totalRounds) {
    return gameState.content.rounds;
  }
  return fallbackContent.rounds;
}

function recordAttempt(roundIndex, userInput, correct, metadata) {
  metadata = metadata || {};
  var round = getRounds()[roundIndex];
  if (!round) round = fallbackContent.rounds[0];
  var attempt = {
    attempt_timestamp: Date.now(),
    time_since_start_of_game: gameState.startTime ? Date.now() - gameState.startTime : 0,
    input_of_user: userInput,
    correct: correct,
    round_number: roundIndex + 1,
    question_id: round.id || ('r' + (roundIndex + 1)),
    correct_answer: round.correctLabel || round.correctCardId || '2/3',
    response_time_ms: gameState.roundStartTime ? Date.now() - gameState.roundStartTime : 0,
    misconception_tag: correct ? null : (metadata.misconception_tag || null),
    difficulty_level: round.difficulty || round.stage || 1,
    is_retry: metadata.is_retry || false,
    metadata: metadata
  };
  gameState.attempts.push(attempt);
  gameState.duration_data.attempts.push({ round: roundIndex + 1, timestamp: Date.now() });
  return attempt;
}

function getStars(score) {
  if (score == null) score = gameState.score;
  if (score >= 1) return 3;
  return 0;
}
window.getStars = getStars;
window.calcStars = getStars;

function computeTriesPerRound() {
  var triesMap = {};
  for (var i = 0; i < gameState.attempts.length; i++) {
    var a = gameState.attempts[i];
    var r = a.round_number || 1;
    triesMap[r] = (triesMap[r] || 0) + 1;
  }
  var out = [];
  var keys = Object.keys(triesMap);
  for (var k = 0; k < keys.length; k++) {
    out.push({ round: Number(keys[k]), triesCount: triesMap[keys[k]] });
  }
  return out;
}

async function waitForPackages() {
  var timeout = 180000;
  var interval = 50;
  var elapsed = 0;
  while (
    typeof ScreenLayout === 'undefined' ||
    typeof TransitionScreenComponent === 'undefined' ||
    typeof FeedbackManager === 'undefined' ||
    typeof VisibilityTracker === 'undefined' ||
    typeof SignalCollector === 'undefined' ||
    typeof PreviewScreenComponent === 'undefined'
  ) {
    if (elapsed >= timeout) throw new Error('Packages failed to load within 180s');
    await new Promise(function(r) { setTimeout(r, interval); });
    elapsed += interval;
  }
}

/* ================== postMessage HANDLER (PART-008) ================== */
function handlePostMessage(event) {
  if (!event || !event.data) return;
  if (event.data.type !== 'game_init') return;
  try {
    gameState.phase = 'playing';
    syncDOM();
    var d = event.data.data || {};
    if (d.gameId) gameState.gameId = d.gameId;
    if (d.content) gameState.content = d.content;
    if (d.contentSetId) gameState.contentSetId = d.contentSetId;
    if (d.signalConfig) {
      gameState.signalConfig = d.signalConfig;
      if (signalCollector) {
        try {
          signalCollector.flushUrl = d.signalConfig.flushUrl;
          signalCollector.playId = d.signalConfig.playId;
          signalCollector.gameId = d.signalConfig.gameId;
          signalCollector.sessionId = d.signalConfig.sessionId;
          signalCollector.contentSetId = d.signalConfig.contentSetId;
          signalCollector.studentId = d.signalConfig.studentId;
          if (typeof signalCollector.startFlushing === 'function') signalCollector.startFlushing();
        } catch (se) {
          console.error('signalCollector config error:', se.message);
        }
      }
    }
    syncDOM();
  } catch (e) {
    console.error('handlePostMessage error:', e.message);
    if (typeof Sentry !== 'undefined') {
      try { Sentry.captureException(e); } catch (se) {}
    }
  }
}

/* ================== RENDER GAME UI ================== */
function injectGameHTML() {
  var gc = document.getElementById('gameContent');
  if (!gc) return;
  // No per-round prompt banner — the how-to-play copy is delivered ONCE by PreviewScreen
  // per PART-039 single-source-of-instructions rule. The cards themselves are the task.
  gc.innerHTML =
    '<div id="game-screen" class="game-block">' +
      '<div class="fraction-grid" id="fraction-grid" role="group" aria-label="Fraction cards"></div>' +
    '</div>';
}

function renderRound() {
  var idx = Math.max(0, (gameState.currentRound || 1) - 1);
  var rounds = getRounds();
  var round = rounds[idx];
  if (!round) round = fallbackContent.rounds[0];

  gameState.correctAnswer = round.correctLabel || round.correctCardId;
  gameState.roundStartTime = Date.now();
  gameState.lockTapped = false;

  // No per-round prompt banner — PreviewScreen carried the instruction.
  var grid = document.getElementById('fraction-grid');
  if (!grid) return;
  grid.innerHTML = '';

  var cards = round.cards || [];
  for (var i = 0; i < cards.length; i++) {
    var card = cards[i];
    var el = document.createElement('div');
    el.className = 'fraction-card fade-in';
    el.setAttribute('role', 'button');
    el.setAttribute('tabindex', '0');
    el.setAttribute('data-card-id', card.id);
    el.setAttribute('data-label', card.label);
    el.setAttribute('data-testid', 'card-' + card.id);
    el.setAttribute('id', 'card-' + card.id);
    el.setAttribute('aria-label', 'Fraction ' + card.numerator + ' over ' + card.denominator);
    el.innerHTML =
      '<div class="fraction-stack">' +
        '<div class="fraction-numerator">' + card.numerator + '</div>' +
        '<div class="fraction-bar" aria-hidden="true"></div>' +
        '<div class="fraction-denominator">' + card.denominator + '</div>' +
      '</div>';

    (function(cardData, element) {
      element.addEventListener('click', function() { onCardTap(cardData, element); });
      element.addEventListener('keydown', function(ev) {
        if (ev.key === 'Enter' || ev.key === ' ') {
          ev.preventDefault();
          onCardTap(cardData, element);
        }
      });
    })(card, el);

    grid.appendChild(el);
  }

  gameState.isProcessing = false;
  syncDOM();

  try {
    if (signalCollector && typeof signalCollector.recordViewEvent === 'function') {
      signalCollector.recordViewEvent('round_rendered', { round: gameState.currentRound, cards: cards.length });
    }
  } catch (e) {}
}

function lockAllCards() {
  var grid = document.getElementById('fraction-grid');
  if (!grid) return;
  var cards = grid.querySelectorAll('.fraction-card');
  for (var i = 0; i < cards.length; i++) {
    cards[i].classList.add('locked');
  }
}

function revealCorrectCard(correctCardId) {
  var el = document.getElementById('card-' + correctCardId);
  if (el) el.classList.add('selected-correct');
}

function wait(ms) {
  return new Promise(function(resolve) { setTimeout(resolve, ms); });
}

/* ================== CARD INTERACTION ================== */
async function onCardTap(card, el) {
  if (!gameState.isActive) return;
  if (gameState.isProcessing) return;
  if (gameState.gameEnded) return;
  if (gameState.lockTapped) return;

  gameState.lockTapped = true;
  gameState.isProcessing = true;

  var round = getRounds()[Math.max(0, gameState.currentRound - 1)] || fallbackContent.rounds[0];
  var correct = (card.id === round.correctCardId);
  var roundIndex = Math.max(0, gameState.currentRound - 1);

  // Compute misconception tag for wrong answers
  var misconception = null;
  if (!correct) {
    if (round.misconception_tags && round.misconception_tags[card.label]) {
      misconception = round.misconception_tags[card.label];
    }
  }

  // Update score + stars + correct flag
  if (correct) {
    gameState.score = 1;
    gameState.stars = 3;
    gameState.correct = true;
    gameState.streak = 1;
    gameState.consecutiveWrongs = 0;
  } else {
    gameState.score = 0;
    gameState.stars = 0;
    gameState.correct = false;
    gameState.streak = 0;
    gameState.consecutiveWrongs = 1;
  }

  // Record attempt BEFORE audio
  recordAttempt(roundIndex, card.label, correct, {
    round: gameState.currentRound,
    selected_option: card.label,
    selected_card_id: card.id,
    correct_card_id: round.correctCardId,
    misconception_tag: misconception,
    is_retry: false
  });

  trackEvent('answer_submitted', 'card', {
    round: gameState.currentRound,
    selected: card.label,
    correct: correct,
    response_time_ms: gameState.roundStartTime ? Date.now() - gameState.roundStartTime : 0
  });

  try {
    if (signalCollector && typeof signalCollector.recordCustomEvent === 'function') {
      signalCollector.recordCustomEvent('answer_submitted', {
        round: gameState.currentRound,
        selected: card.label,
        correct: correct,
        misconception_tag: misconception
      });
    }
  } catch (e) {}

  // Visual feedback + lock board
  lockAllCards();
  if (correct) {
    el.classList.add('selected-correct');
  } else {
    el.classList.add('selected-wrong');
  }
  syncDOM();

  // Disable interaction globally via InteractionManager (if available)
  try {
    if (interactionManager && typeof interactionManager.disable === 'function') {
      interactionManager.disable('feedback');
    }
  } catch (e) {}

  // Play audio sequence (SFX awaited → TTS awaited)
  if (correct) {
    try {
      await FeedbackManager.sound.play('correct_sound_effect', { sticker: STICKER_CELEBRATE });
    } catch (e) { console.error('correct sfx error:', e.message); }
    try {
      await FeedbackManager.playDynamicFeedback({
        audio_content: round.correctFeedbackText || 'You got it!',
        subtitle: round.correctFeedbackText || 'You got it!',
        sticker: STICKER_CELEBRATE
      });
    } catch (e) { console.error('correct tts error:', e.message); }
  } else {
    try {
      await FeedbackManager.sound.play('incorrect_sound_effect', { sticker: STICKER_SAD });
    } catch (e) { console.error('incorrect sfx error:', e.message); }
    try {
      await FeedbackManager.playDynamicFeedback({
        audio_content: round.incorrectFeedbackText || "3/4, 6/8, 9/12 are all 3/4; 2/3 isn't.",
        subtitle: round.incorrectFeedbackText || "3/4, 6/8, 9/12 are all 3/4; 2/3 isn't.",
        sticker: STICKER_SAD
      });
    } catch (e) { console.error('incorrect tts error:', e.message); }
    // After TTS: reveal correct card (green) so student sees the right answer
    revealCorrectCard(round.correctCardId);
  }

  trackEvent('round_complete', 'game', { round: gameState.currentRound, correct: correct });

  gameState.isProcessing = false;

  // 2s dwell then game end
  await wait(2000);

  endGame(correct);
}

/* ================== postGameComplete (game_complete postMessage) ================== */
function postGameComplete(won, sealResult) {
  var accuracy = gameState.totalRounds > 0 ? Math.round((gameState.score / gameState.totalRounds) * 100) : 0;
  var timeSec = gameState.startTime ? Math.round((Date.now() - gameState.startTime) / 1000) : 0;
  var starsEarned = getStars(gameState.score);
  var tries = computeTriesPerRound();

  var metrics = {
    accuracy: accuracy,
    time: timeSec,
    stars: starsEarned,
    attempts: gameState.attempts,
    duration_data: Object.assign({}, gameState.duration_data, { currentTime: new Date().toISOString() }),
    totalLives: null,
    tries: tries,
    rounds_completed: gameState.currentRound,
    score: gameState.score,
    totalQuestions: gameState.totalRounds,
    correct: won === true,
    livesLeft: null,
    signal_event_count: (sealResult && sealResult.eventCount != null) ? sealResult.eventCount : ((sealResult && sealResult.signal_event_count) || 0),
    signal_metadata: (sealResult && sealResult.metadata) || (sealResult && sealResult.signal_metadata) || {}
  };

  try {
    window.parent.postMessage({
      type: 'game_complete',
      data: {
        metrics: metrics,
        attempts: gameState.attempts,
        previewResult: gameState.previewResult || null,
        completedAt: Date.now()
      }
    }, '*');
  } catch (e) {
    console.error('postGameComplete error:', e.message);
  }
}

/* ================== endGame ================== */
function endGame(won) {
  if (gameState.gameEnded) return;
  gameState.gameEnded = true;
  gameState.isActive = false;
  gameState.phase = 'complete';
  syncDOM();

  trackEvent('game_end', 'game', {
    won: won === true,
    score: gameState.score,
    stars: getStars(gameState.score)
  });

  var sealResult = null;
  try {
    if (signalCollector && typeof signalCollector.seal === 'function') {
      sealResult = signalCollector.seal();
    }
  } catch (e) {
    console.error('signalCollector.seal error:', e.message);
  }

  // Inline game_complete postMessage (dual-path: fires for both victory and game-over)
  var _accuracy = gameState.totalRounds > 0 ? Math.round((gameState.score / gameState.totalRounds) * 100) : 0;
  var _timeSec = gameState.startTime ? Math.round((Date.now() - gameState.startTime) / 1000) : 0;
  var _stars = getStars(gameState.score);
  var _tries = computeTriesPerRound();
  var _metrics = {
    accuracy: _accuracy,
    time: _timeSec,
    stars: _stars,
    attempts: gameState.attempts,
    duration_data: Object.assign({}, gameState.duration_data, { currentTime: new Date().toISOString() }),
    totalLives: null,
    tries: _tries,
    rounds_completed: gameState.currentRound,
    score: gameState.score,
    totalQuestions: gameState.totalRounds,
    correct: won === true,
    livesLeft: null,
    signal_event_count: (sealResult && sealResult.eventCount != null) ? sealResult.eventCount : ((sealResult && sealResult.signal_event_count) || 0),
    signal_metadata: (sealResult && sealResult.metadata) || (sealResult && sealResult.signal_metadata) || {}
  };
  try {
    window.parent.postMessage({
      type: 'game_complete',
      data: {
        metrics: _metrics,
        attempts: gameState.attempts,
        previewResult: gameState.previewResult || null,
        completedAt: Date.now()
      }
    }, '*');
  } catch (e) {
    console.error('game_complete postMessage error:', e.message);
  }

  try {
    if (previewScreen && typeof previewScreen.destroy === 'function') {
      previewScreen.destroy();
    }
  } catch (e) {
    console.error('previewScreen.destroy error:', e.message);
  }
}
window.endGame = endGame;

/* ================== PREVIEW + SETUP ================== */
function setupGame() {
  injectGameHTML();
  renderRound();

  var content = gameState.content || fallbackContent;
  try {
    if (previewScreen && typeof previewScreen.show === 'function') {
      previewScreen.show({
        instruction: content.previewInstruction || fallbackContent.previewInstruction,
        audioUrl: content.previewAudio || fallbackContent.previewAudio || null,
        showGameOnPreview: content.showGameOnPreview === true,
        timerConfig: null,
        timerInstance: null,
        onComplete: function(previewData) { startGameAfterPreview(previewData); }
      });
    } else {
      // No previewScreen available — proceed directly
      startGameAfterPreview({ duration: 0 });
    }
  } catch (e) {
    console.error('previewScreen.show error:', e.message);
    startGameAfterPreview({ duration: 0 });
  }
}

function startGameAfterPreview(previewData) {
  if (gameState.isActive || gameState.gameEnded) return;
  gameState.previewResult = previewData || null;
  if (previewData && previewData.duration != null) {
    gameState.duration_data.preview = gameState.duration_data.preview || [];
    gameState.duration_data.preview.push({ duration: previewData.duration });
  }
  startGame();
}

function startGame() {
  if (gameState.isActive) return;
  gameState.isActive = true;
  gameState.startTime = Date.now();
  gameState.duration_data.startTime = new Date().toISOString();
  gameState.currentRound = 1;
  gameState.score = 0;
  gameState.stars = 0;
  gameState.correct = false;
  gameState.attempts = [];
  gameState.events = [];
  gameState.isProcessing = false;
  gameState.gameEnded = false;
  gameState.phase = 'gameplay';
  gameState.lockTapped = false;
  trackEvent('game_start', 'game', { totalRounds: gameState.totalRounds });
  syncDOM();
  renderRound();

  try {
    if (signalCollector && typeof signalCollector.recordViewEvent === 'function') {
      signalCollector.recordViewEvent('screen_transition', { from: 'preview', to: 'gameplay' });
    }
  } catch (e) {}
}
window.startGame = startGame;

/* ================== RESTART ================== */
function restartGame() {
  try { FeedbackManager.sound.pause(); } catch (e) {}
  try { if (FeedbackManager && FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}

  var preservedContent = gameState.content;
  var preservedSignalConfig = gameState.signalConfig;
  var preservedContentSetId = gameState.contentSetId;
  var preservedSessionHistory = gameState.sessionHistory || [];
  var preservedPreview = gameState.duration_data && gameState.duration_data.preview ? gameState.duration_data.preview : [];

  gameState.currentRound = 0;
  gameState.score = 0;
  gameState.stars = 0;
  gameState.correct = false;
  gameState.attempts = [];
  gameState.events = [];
  gameState.streak = 0;
  gameState.consecutiveWrongs = 0;
  gameState.lockTapped = false;
  gameState.isActive = false;
  gameState.gameEnded = false;
  gameState.isProcessing = false;
  gameState.startTime = null;
  gameState.roundStartTime = null;
  gameState.phase = 'start_screen';
  gameState.correctAnswer = null;
  gameState.duration_data = {
    startTime: null,
    preview: preservedPreview,
    attempts: [],
    evaluations: [],
    inActiveTime: [],
    totalInactiveTime: 0,
    currentTime: null
  };
  gameState.content = preservedContent;
  gameState.contentSetId = preservedContentSetId;
  gameState.signalConfig = preservedSignalConfig;
  gameState.sessionHistory = preservedSessionHistory;

  try { if (signalCollector && signalCollector.reset) signalCollector.reset(); } catch (e) {}

  // Re-inject gameplay HTML (rebuild card grid)
  injectGameHTML();
  syncDOM();

  // Re-enable interaction after any previous feedback lock
  try {
    if (interactionManager && typeof interactionManager.enable === 'function') {
      interactionManager.enable('restart');
    }
  } catch (e) {}

  // Do NOT call previewScreen.show() or setupGame() — preview is once per session
  startGame();
}
window.restartGame = restartGame;

/* Test harness convenience */
window.nextRound = function() {
  // Shape 1 Standalone: only one round, no-op after round 1
  if (gameState.currentRound < gameState.totalRounds) {
    gameState.currentRound += 1;
    syncDOM();
    renderRound();
  }
};
window.loadRound = function(n) {
  if (typeof n !== 'number' || n < 1 || n > gameState.totalRounds) return;
  gameState.currentRound = n;
  syncDOM();
  renderRound();
};

/* ================== DEBUG FUNCTIONS (PART-012) ================== */
window.debugGame = function() {
  try {
    console.log('Game State:', JSON.stringify({
      gameId: gameState.gameId,
      currentRound: gameState.currentRound,
      totalRounds: gameState.totalRounds,
      score: gameState.score,
      stars: gameState.stars,
      phase: gameState.phase,
      isActive: gameState.isActive,
      gameEnded: gameState.gameEnded,
      isProcessing: gameState.isProcessing,
      correct: gameState.correct,
      attempts: gameState.attempts.length
    }, null, 2));
  } catch (e) { console.error('debugGame error:', e.message); }
};

window.debugAudio = function() {
  try {
    console.log('Audio State:', JSON.stringify({
      canPlayAudio: typeof FeedbackManager !== 'undefined' && FeedbackManager.canPlayAudio ? FeedbackManager.canPlayAudio() : null,
      hasFeedbackManager: typeof FeedbackManager !== 'undefined'
    }, null, 2));
  } catch (e) { console.error('debugAudio error:', e.message); }
};

window.testAudio = function(id) {
  try {
    if (typeof FeedbackManager === 'undefined') return;
    FeedbackManager.sound.play(id || 'correct_sound_effect', { sticker: STICKER_CELEBRATE }).catch(function() {});
  } catch (e) { console.error('testAudio error:', e.message); }
};

window.testPause = function() {
  try { if (visibilityTracker && visibilityTracker.triggerInactive) visibilityTracker.triggerInactive(); } catch (e) {}
};

window.testResume = function() {
  try { if (visibilityTracker && visibilityTracker.triggerResume) visibilityTracker.triggerResume(); } catch (e) {}
};

/* ================== DOMContentLoaded INIT ================== */
document.addEventListener('DOMContentLoaded', async function() {
  try {
    // Register listener BEFORE game_ready is sent
    window.addEventListener('message', handlePostMessage);

    await waitForPackages();

    try { await FeedbackManager.init(); } catch (e) { console.error('FeedbackManager.init error:', e.message); }

    // SignalCollector
    try {
      signalCollector = new SignalCollector({
        gameId: gameState.gameId,
        contentSetId: gameState.contentSetId,
        sessionId: null,
        studentId: null
      });
      window.signalCollector = signalCollector;
    } catch (e) { console.error('SignalCollector init error:', e.message); }

    // ScreenLayout — preview + transition slots (NO progressBar — Shape 1 Standalone)
    try {
      ScreenLayout.inject('app', {
        slots: {
          previewScreen: true,
          transitionScreen: true
        }
      });
    } catch (e) { console.error('ScreenLayout.inject error:', e.message); }

    // InteractionManager — suppresses taps during feedback
    try {
      if (typeof InteractionManager !== 'undefined') {
        interactionManager = new InteractionManager({
          selector: '#gameContent',
          disableOnAudioFeedback: true,
          disableOnEvaluation: true
        });
        window.interactionManager = interactionManager;
      }
    } catch (e) { console.error('InteractionManager init error:', e.message); }

    // VisibilityTracker
    visibilityTrackerConfig = {
      onInactive: function() {
        try { gameState.duration_data.inActiveTime.push({ start: Date.now() }); } catch (e) {}
        try { if (signalCollector && signalCollector.pause) signalCollector.pause(); } catch (e) {}
        try { if (previewScreen && previewScreen.pause) previewScreen.pause(); } catch (e) {}
        try { FeedbackManager.sound.pause(); } catch (e) {}
        try { FeedbackManager.stream.pauseAll(); } catch (e) {}
        trackEvent('game_paused', 'system', {});
      },
      onResume: function() {
        try {
          var arr = gameState.duration_data.inActiveTime;
          var last = arr[arr.length - 1];
          if (last && !last.end) {
            last.end = Date.now();
            gameState.duration_data.totalInactiveTime += (last.end - last.start);
          }
        } catch (e) {}
        try { if (signalCollector && signalCollector.resume) signalCollector.resume(); } catch (e) {}
        try { if (previewScreen && previewScreen.resume) previewScreen.resume(); } catch (e) {}
        try { FeedbackManager.sound.resume(); } catch (e) {}
        try { FeedbackManager.stream.resumeAll(); } catch (e) {}
        trackEvent('game_resumed', 'system', {});
      },
      popupProps: { title: 'Game Paused', description: 'Tap Resume to continue.', primaryText: 'Resume' }
    };
    try { visibilityTracker = new VisibilityTracker(visibilityTrackerConfig); } catch (e) { console.error('VisibilityTracker error:', e.message); }

    // TransitionScreen (instantiated but not used for welcome/victory/game_over in Shape 1 Standalone)
    try {
      if (typeof TransitionScreenComponent !== 'undefined') {
        transitionScreen = new TransitionScreenComponent({ autoInject: true });
      }
    } catch (e) { console.error('TransitionScreen error:', e.message); }

    // PreviewScreen — MANDATORY per PART-039
    try {
      previewScreen = new PreviewScreenComponent({ slotId: 'mathai-preview-slot' });
    } catch (e) { console.error('PreviewScreen error:', e.message); }

    // Preload audio — only the SFX this game plays
    try {
      await FeedbackManager.sound.preload([
        { id: 'correct_sound_effect',   url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757588479110.mp3' },
        { id: 'incorrect_sound_effect', url: 'https://cdn.mathai.ai/mathai-assets/dev/home-explore/document/1757432062452.mp3' }
      ]);
    } catch (e) { console.error('preload error:', e.message); }

    // Signal ready (AFTER listener is registered)
    try { window.parent.postMessage({ type: 'game_ready' }, '*'); } catch (e) {}

    // setupGame: render #gameContent first, then show preview
    if (!gameState.content) gameState.content = fallbackContent;
    setupGame();

  } catch (e) {
    console.error('[init] ' + e.message);
    if (typeof Sentry !== 'undefined') {
      try { Sentry.captureException(e); } catch (se) {}
    }
  }

  // Window exposures (at bottom of DOMContentLoaded)
  window.gameState = gameState;
  window.endGame = endGame;
  window.restartGame = restartGame;
  window.startGame = startGame;
});

/* ================== STANDALONE FALLBACK ================== */
/* Runs INDEPENDENT of waitForPackages — fires even if CDN never loads */
function buildFallbackLayout() {
  var app = document.getElementById('app');
  if (!app) return;
  if (document.getElementById('gameContent')) return;
  app.innerHTML =
    '<div id="mathai-preview-slot"></div>' +
    '<div class="mathai-layout-root">' +
      '<div class="game-stack">' +
        '<div id="gameContent"></div>' +
        '<div id="mathai-transition-slot"></div>' +
      '</div>' +
    '</div>';
}

setTimeout(function() {
  if (gameState.isActive || gameState.gameEnded) return;
  if (gameState.phase !== 'start_screen') return;
  try {
    if (!document.getElementById('gameContent')) buildFallbackLayout();
    if (!gameState.content) gameState.content = fallbackContent;
    gameState.totalRounds = fallbackContent.rounds.length;
    injectGameHTML();
    syncDOM();
    startGame();
  } catch (e) {
    console.error('standalone fallback error:', e.message);
  }
}, 2500);
</script>
