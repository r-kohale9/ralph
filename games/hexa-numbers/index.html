<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hexa Numbers</title>

  <!-- ====== 1. SentryConfig package ====== -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/sentry/index.js"></script>

  <!-- ====== 2. initSentry() definition ====== -->
  <script>
    function initSentry() {
      if (typeof SentryConfig === 'undefined' || !SentryConfig.enabled) return;
      if (typeof Sentry === 'undefined') return;
      Sentry.init(SentryConfig.getConfig({
        release: 'hexa-numbers@1.0.0'
      }));
    }
  </script>

  <!-- ====== 3. Sentry SDK ====== -->
  <script src="https://browser.sentry-cdn.com/10.23.0/bundle.tracing.replay.feedback.min.js" crossorigin="anonymous"></script>
  <script src="https://browser.sentry-cdn.com/10.23.0/captureconsole.min.js" crossorigin="anonymous"></script>
  <script src="https://browser.sentry-cdn.com/10.23.0/browserprofiling.min.js" crossorigin="anonymous"></script>

  <!-- ====== 4. Initialize Sentry on load ====== -->
  <script>window.addEventListener('load', initSentry);</script>

  <!-- ====== 5-7. Game CDN packages ====== -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

  <style>
    /* ====== :root variables ====== */
    :root {
      --mathai-game-max-width: 480px;
      --mathai-stack-gap: 10px;
      --mathai-game-padding-top: 54px;

      --mathai-primary: #270f36;
      --mathai-level-text: #270F63;
      --mathai-purple: #9B51E0;

      --mathai-green: #219653;
      --mathai-blue: #667eea;
      --mathai-red: #E35757;
      --mathai-orange: #F2994A;
      --mathai-yellow: #FFDE49;

      --mathai-white: #ffffff;
      --mathai-gray: #666666;
      --mathai-light-gray: #f5f5f5;
      --mathai-disabled-gray: #E0E0E0;
      --mathai-text-primary: #4a4a4a;
      --mathai-border-gray: #e0e0e0;

      --mathai-cell-bg-green: #D9F8D9;
      --mathai-cell-bg-yellow: #FCF6D7;
      --mathai-cell-bg-red: #FFD9D9;
      --mathai-cell-bg-grey: #E0E0E0;
      --mathai-cell-border-green: #27ae60;
      --mathai-cell-border-red: #e74c3c;

      --mathai-success: #219653;
      --mathai-error: #E35757;
      --mathai-warning: #F2994A;

      --mathai-font-family: 'Epilogue', -apple-system, 'Segoe UI', Roboto, sans-serif;
      --mathai-font-size-title: 32px;
      --mathai-font-size-subtitle: 18px;
      --mathai-font-size-button: 16px;
      --mathai-font-size-body: 16px;
      --mathai-font-size-small: 14px;
      --mathai-font-size-large: 24px;

      --mathai-padding-large: 56px 40px;
      --mathai-padding-medium: 16px 24px;
      --mathai-padding-small: 10px;
      --mathai-border-radius: 24px;
      --mathai-border-radius-small: 8px;
      --mathai-border-radius-button: 10px;
      --mathai-border-radius-card: 12px;

      /* Game-specific palette */
      --hex-blue-border: #3B82F6;
      --hex-blue-bg: #DBEAFE;
      --hex-blue-placed: #1D4ED8;
      --hex-white-border: #cbd5e1;
      --hex-white-bg: #F9FAFB;
      --hex-white-placed: #64748b;
      --hex-target-b1: #0F766E;
      --hex-target-b2: #15803D;
      --hex-target-b3: #15803D;
      --hex-fail: #DC2626;
      --hex-pass: #16A34A;
    }

    /* ====== Reset ====== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      overflow-x: hidden;
      margin: 0;
      padding: 0;
      overscroll-behavior: none;
    }

    body {
      font-family: var(--mathai-font-family);
      background: var(--mathai-white);
      color: var(--mathai-text-primary);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.5;
      min-height: 100dvh;
    }

    @supports not (min-height: 100dvh) {
      body { min-height: 100vh; }
    }

    #app {
      width: 100%;
      max-width: var(--mathai-game-max-width);
      min-height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: clip;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    @supports not (min-height: 100dvh) {
      #app { min-height: 100vh; }
    }

    /* Preview-wrapper scroll compatibility */
    #mathai-preview-slot {
      height: 100dvh;
      overflow: hidden;
      position: relative;
    }

    @supports not (height: 100dvh) {
      #mathai-preview-slot { height: 100vh; }
    }

    #mathai-preview-slot .mathai-preview-body {
      height: 100dvh;
      box-sizing: border-box;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    @supports not (height: 100dvh) {
      #mathai-preview-slot .mathai-preview-body { height: 100vh; }
    }

    .hidden { display: none !important; }

    /* ====== Touch targets ====== */
    button,
    [role="button"] {
      min-height: 44px;
      min-width: 44px;
      touch-action: manipulation;
    }

    /* Re-enable selection on inputs */
    input, textarea {
      -webkit-user-select: text;
      user-select: text;
    }

    /* ====== Landscape Lock Overlay ====== */
    @media screen and (orientation: landscape) and (max-height: 500px) {
      body::before {
        content: 'Please rotate your phone to portrait mode';
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--mathai-white);
        color: var(--mathai-primary);
        font-family: var(--mathai-font-family);
        font-size: var(--mathai-font-size-subtitle);
        text-align: center;
        padding: 24px;
      }
    }

    /* ====== Game-specific styles ====== */
    #gameContent {
      width: 100%;
      padding: 8px 12px 110px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-sizing: border-box;
    }

    .hexa-board-wrapper {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0 auto;
    }

    .hexa-board {
      position: relative;
      width: 280px;
      height: 290px;
      margin: 6px auto 18px auto;
    }

    /* Lock all board + pool interaction during awaited feedback / round-complete */
    .hexa-board-wrapper.locked .hexa-board,
    .hexa-board-wrapper.locked .pool-tray {
      pointer-events: none;
    }

    /* Targets — keep hexagonal clip-path */
    .hex.target {
      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      width: 60px;
      height: 52px;
      font-family: var(--mathai-font-family);
      font-weight: 800;
      font-size: 13px;
      color: var(--mathai-white);
      clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
      box-sizing: border-box;
      z-index: 3;
    }

    .hex.target.b1 { background: var(--hex-target-b1); }
    .hex.target.b2 { background: var(--hex-target-b2); }
    .hex.target.b3 { background: var(--hex-target-b3); }

    .hex.target .target-glyph {
      position: absolute;
      top: 6px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      opacity: 0.85;
      pointer-events: none;
    }

    .hex.target .target-value {
      font-size: 14px;
      font-weight: 800;
    }

    .hex.target .target-verdict {
      position: absolute;
      bottom: 6px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      font-weight: 800;
    }

    .hex.target.passed .target-verdict {
      color: var(--mathai-cell-bg-green);
    }

    .hex.target.failed .target-verdict {
      color: var(--mathai-cell-bg-red);
    }

    /* Slots — horizontal flat-top hexagons with outlined fill, tiling into a honeycomb
       around each target. Outer clip-path is the border color; ::before is the inner fill. */
    .hex.slot {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 60px;
      height: 52px;
      box-sizing: border-box;
      z-index: 1;
      clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
      transition: opacity 0.2s ease;
    }

    .hex.slot::before {
      content: '';
      position: absolute;
      inset: 2px;
      clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
      z-index: 0;
    }

    .hex.slot.blue { background: #67E8F9; }
    .hex.slot.blue::before { background: #ECFEFF; }

    .hex.slot.white { background: #CBD5E1; }
    .hex.slot.white::before { background: #FFFFFF; }

    .hex.slot .slot-value {
      position: relative;
      z-index: 1;
      color: var(--mathai-text-primary);
      font-weight: 800;
      font-size: 14px;
    }

    .hex.slot.glow-red { background: var(--hex-fail); }
    .hex.slot.glow-red::before {
      background: var(--mathai-cell-bg-red);
      animation: redPulse 1s ease-in-out infinite;
    }

    .hex.slot.flash-green { background: var(--hex-pass); }
    .hex.slot.flash-green::before { background: var(--mathai-cell-bg-green); }

    @keyframes redPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    /* Pool-tray hexagons (draggables) — single light card containing two colour rows */
    .pool-tray {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      margin: 16px auto 0 auto;
      padding: 14px 10px;
      background: #F1F5F9;
      border: 1px solid #E2E8F0;
      border-radius: 16px;
    }

    .pool-row {
      width: 100%;
      min-height: 60px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 4px 2px;
      border-radius: 12px;
      background: transparent;
    }

    .pool-row.blue-row,
    .pool-row.white-row {
      background: transparent;
    }

    /* Hexagonal pool tile with outlined look — outer clip-path acts as the border, the
       ::before pseudo-element provides the inner fill. Vertical (pointy-top) hex. */
    .pool-hex {
      position: relative;
      width: 54px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      touch-action: none;
      flex-shrink: 0;
      box-sizing: border-box;
      clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
    }

    .pool-hex::before {
      content: '';
      position: absolute;
      inset: 1.5px;
      clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
      z-index: 0;
    }

    .pool-hex .pool-hex-value {
      position: relative;
      z-index: 1;
      font-family: var(--mathai-font-family);
      font-weight: 700;
      font-size: 14px;
      color: #1F2937;
    }

    .pool-hex.blue { background: #67E8F9; }
    .pool-hex.blue::before { background: #ECFEFF; }

    .pool-hex.white { background: #CBD5E1; }
    .pool-hex.white::before { background: #FFFFFF; }

    .pool-slot {
      width: 54px;
      height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .pool-slot.empty {
      display: none;
    }

    /* When a pool tile is placed in a board slot, fit the hex inside the slot */
    .hex.slot .pool-hex.in-slot {
      position: absolute;
      top: 6%;
      left: 6%;
      right: 6%;
      bottom: 6%;
      width: auto;
      height: auto;
      z-index: 4;
      cursor: grab;
    }

    .pool-hex:active {
      cursor: grabbing;
    }

    /* When a pool hex is placed in a slot, the slot itself owns the value display via .slot-value */

    /* CHECK button area gets clearance from the bottom (FloatingButton) */

    /* Answer slide preview */
    .answer-slide {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 4px 12px 4px;
    }

    .answer-slide .answer-board-wrapper {
      transform: scale(0.85);
      transform-origin: top center;
    }

    .answer-slide .answer-caption {
      font-size: 13px;
      font-weight: 600;
      color: var(--mathai-text-primary);
      text-align: center;
      margin-top: -8px;
    }

    /* ====== Required micro-animations ====== */
    @keyframes scoreBounce {
      0% { transform: scale(1); }
      40% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes starPop {
      0% { transform: scale(0); }
      60% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    @keyframes heartBreak {
      0% { transform: scale(1); opacity: 1; }
      30% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(0.5); opacity: 0; color: var(--mathai-red); }
    }
    @keyframes streakGlow {
      0% { box-shadow: 0 0 0 rgba(255, 193, 7, 0); }
      50% { box-shadow: 0 0 16px rgba(255, 193, 7, 0.5); }
      100% { box-shadow: 0 0 0 rgba(255, 193, 7, 0); }
    }
    @keyframes confettiFall {
      0% { transform: translateY(-100%) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    .score-bounce { animation: scoreBounce 0.4s ease; }
    .shake-wrong { animation: shake 0.5s ease; }
    .heart-break { animation: heartBreak 0.6s ease forwards; }
    .star-earned { animation: starPop 0.4s ease forwards; }
    .streak-glow { animation: streakGlow 0.6s ease; }
    .fade-in { animation: fadeIn 0.35s ease; }

    .selected-wrong {
      background: var(--mathai-cell-bg-red);
      border-color: var(--mathai-red);
      color: var(--mathai-red);
    }
    .selected-correct {
      background: var(--mathai-cell-bg-green);
      border-color: var(--mathai-green);
      color: var(--mathai-green);
    }
    .correct-reveal {
      font-size: 15px;
      font-weight: 600;
      color: var(--mathai-green);
      text-align: center;
      margin-top: 8px;
      animation: fadeIn 0.35s ease;
    }
    .correct-reveal.hidden { display: none; }
  </style>
</head>
<body>
  <div id="app" data-phase="start_screen" data-score="0"></div>

  <script>
    /* ============================================================
       Constants & Stickers
       ============================================================ */
    var STICKER_CELEBRATE = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif';
    var STICKER_SAD = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-99.gif';
    var STICKER_ROUND = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-87.gif';
    var STICKER_VICTORY = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-230.gif';
    var STICKER_VICTORY_2 = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-113.gif';
    var STICKER_VICTORY_1 = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-110.gif';
    var STICKER_VICTORY_GENERIC = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-107.gif';
    var STICKER_RESTART = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1757430772002-102.gif';

    var SETS = ['A', 'B', 'C'];

    var GLYPH_MAP = {
      'sun-burst': '☀',
      'leaf': '🍃',
      'star': '★'
    };

    var TARGET_VARIANT_CLASS = {
      'B1': 'b1',
      'B2': 'b2',
      'B3': 'b3'
    };

    /* ============================================================
       Geometry — slot positions in the 320x320 board
       ============================================================ */
    // Grid layout — 5 columns × 6 rows. Targets are hexagons; slots are rounded squares.
    // Inner slots (blue) are tinted to mark "between targets"; outer slots (white) are plain.
    // Honeycomb pixel positions (board 280x290). Hex tile 60w x 52h, flat-top orientation.
    // Hex pitch: 45px horizontal between adjacent diagonal neighbours (3w/4),
    //            26px vertical offset (h/2), 52px vertical between same-column hexes.
    // Targets at T1 (90, 90), T2 (180, 90), T3 (135, 168) — symmetric triangle.
    // Each target has 6 hex-edge-sharing neighbours forming a complete ring.
    var TARGET_POSITIONS = {
      'T1': { left: 60, top: 64 },    // center (90, 90)
      'T2': { left: 150, top: 64 },   // center (180, 90)
      'T3': { left: 105, top: 142 }   // center (135, 168)
    };

    var SLOT_POSITIONS = {
      // T1 ring (6 ring members directly adjacent)
      'inner-1': { left: 60, top: 12, colour: 'blue' },     // N of T1 (90, 38)
      'outer-1': { left: 15, top: 38, colour: 'white' },    // NW of T1 (45, 64)
      'outer-2': { left: 15, top: 90, colour: 'white' },    // SW of T1 (45, 116)

      // Shared T1+T2 (both adjacent to T1 NE/SE and T2 NW/SW)
      'inner-2': { left: 105, top: 38, colour: 'blue' },    // NE of T1 = NW of T2 (135, 64)
      'outer-3': { left: 105, top: 90, colour: 'white' },   // SE of T1 = SW of T2 = N of T3 visible (135, 116, centroid)

      // T2 ring extras (T2-only)
      'outer-4': { left: 150, top: 12, colour: 'white' },   // N of T2 (180, 38)
      'outer-5': { left: 195, top: 38, colour: 'white' },   // NE of T2 (225, 64)
      'inner-3': { left: 195, top: 90, colour: 'blue' },    // SE of T2 (225, 116)

      // Shared T1+T3 (T1's S = T3's NW)
      'inner-6': { left: 60, top: 116, colour: 'blue' },    // S of T1 = NW of T3 (90, 142)

      // Shared T2+T3 (T2's S = T3's NE)
      'inner-4': { left: 150, top: 116, colour: 'blue' },   // S of T2 = NE of T3 (180, 142)

      // T3 ring extras (T3-only)
      'outer-6': { left: 60, top: 168, colour: 'white' },   // SW of T3 (90, 194)
      'outer-7': { left: 150, top: 168, colour: 'white' },  // SE of T3 (180, 194)
      'inner-5': { left: 105, top: 194, colour: 'blue' }    // S of T3 (135, 220)
    };

    var ALL_SLOT_IDS = [
      'inner-1','inner-2','inner-3','inner-4','inner-5','inner-6',
      'outer-1','outer-2','outer-3','outer-4','outer-5','outer-6','outer-7'
    ];

    // RINGS reflects the 6 hex-edge-sharing neighbours visible around each target in the
    // honeycomb layout, so what the player sees == what the sum-check uses.
    // outer-3 sits at the centroid and is therefore visible to all three targets.
    // outer-5 sits at T2's NE only, visible to T2 alone.
    var RINGS = {
      T1: ['inner-1','inner-2','outer-3','inner-6','outer-2','outer-1'],
      T2: ['outer-4','outer-5','inner-3','inner-4','outer-3','inner-2'],
      T3: ['outer-3','inner-4','outer-7','inner-5','outer-6','inner-6']
    };

    /* ============================================================
       gameState
       ============================================================ */
    var gameState = {
      gameId: 'hexa-numbers',
      phase: 'start_screen',
      currentRound: 1,
      totalRounds: 3,
      totalLives: (0),
      lives: (0),
      score: 0,
      stars: 0,
      progress: 0,
      attempts: [],
      events: [],
      isActive: false,
      isProcessing: false,
      gameEnded: false,
      startTime: null,
      roundStartTime: null,
      duration_data: { startTime: null, preview: [] },
      content: null,
      previewResult: null,
      setIndex: 0,
      activeRounds: [],
      placement: {},
      wrongColourDrops: 0,
      correctAnswer: null
    };

    window.gameState = gameState;

    /* ============================================================
       fallbackContent — 9 rounds (3 sets x 3 cosmetic variants)
       ============================================================ */
    var fallbackContent = {
      previewInstruction: '<p><strong>Hexa Numbers</strong></p><p>Drag the number tiles into the empty slots so the <strong>six tiles around each big number</strong> add up to it.</p><p><strong>Blue</strong> tiles go in <strong>blue</strong> slots. <strong>White</strong> tiles go in <strong>white</strong> slots. Tap <strong>CHECK</strong> when every slot is filled!</p>',
      previewAudioText: "Welcome to Hexa Numbers! Drag the number tiles into the slots so the six tiles around each big number add up to it. Blue tiles go in blue slots. White tiles go in white slots. Tap CHECK when every slot is full!",
      previewAudio: null,
      showGameOnPreview: false,
      totalRounds: 3,
      totalLives: (0),
      timer: false,
      geometry: {
        targets: ['T1', 'T2', 'T3'],
        innerSlots: ['inner-1','inner-2','inner-3','inner-4','inner-5','inner-6'],
        outerSlots: ['outer-1','outer-2','outer-3','outer-4','outer-5','outer-6','outer-7'],
        rings: {
          T1: ['inner-1','inner-2','inner-6','outer-1','outer-2','outer-3'],
          T2: ['inner-2','inner-3','inner-4','outer-3','outer-4','outer-5'],
          T3: ['inner-4','inner-5','inner-6','outer-5','outer-6','outer-7']
        }
      },
      rounds: [
        // ───────── Set A ─────────
        {

    /* ============================================================
       syncDOM
       ============================================================ */
    function syncDOM() {
      var app = document.getElementById('app');
      if (!app) return;
      app.setAttribute('data-phase', gameState.phase);
      app.setAttribute('data-score', gameState.score);
      app.setAttribute('data-round', gameState.currentRound);
    }

    /* ============================================================
       trackEvent
       ============================================================ */
    function trackEvent(eventName, payload) {
      try {
        var ev = {
          name: eventName,
          ts: Date.now(),
          payload: payload || {}
        };
        gameState.events.push(ev);
        if (signalCollector && typeof signalCollector.recordEvent === 'function') {
          try { signalCollector.recordEvent(eventName, payload || {}); } catch (e) {}
        }
      } catch (e) {
        console.error('[trackEvent]', e && e.message);
      }
    }

    /* ============================================================
       recordAttempt
       ============================================================ */
    function recordAttempt(round, computedSums, isCorrect, misconceptionTags) {
      try {
        var now = Date.now();
        var attempt = {
          attempt_number: gameState.attempts.length + 1,
          round_number: gameState.currentRound,
          question_id: round && round.id ? round.id : ('r' + gameState.currentRound),
          question_text: 'Hexa Numbers — set ' + (round && round.set ? round.set : '?') + ' round ' + gameState.currentRound,
          user_answer: JSON.stringify(gameState.placement),
          correct_answer: JSON.stringify(round && round.correctPlacement ? round.correctPlacement : {}),
          is_correct: !!isCorrect,
          response_time_ms: gameState.roundStartTime ? (now - gameState.roundStartTime) : 0,
          misconception_tag: (misconceptionTags && misconceptionTags.length > 0) ? misconceptionTags[0] : null,
          difficulty_level: round && round.stage ? round.stage : 1,
          hint_used: false,
          attempt_timestamp: now,
          // Game-specific extras
          target_sums: computedSums || null,
          target_targets: round && round.targets ? round.targets : null,
          set: round && round.set ? round.set : null,
          variant: round && round.variant ? round.variant : null,
          wrong_colour_drops: gameState.wrongColourDrops || 0,
          misconception_tags_all: misconceptionTags || []
        };
        gameState.attempts.push(attempt);
      } catch (e) {
        console.error('[recordAttempt]', e && e.message);
      }
    }

    /* ============================================================
       getStars (1:1 mapping with score per spec)
       ============================================================ */
    function getStars(score) {
      if (typeof score !== 'number') score = gameState.score || 0;
      if (score >= 3) return 3;
      if (score >= 2) return 2;
      if (score >= 1) return 1;
      return 0;
    }

    /* ============================================================
       getRounds — set-based filter
       ============================================================ */
    function getAvailableSets(rounds) {
      var seen = {};
      var i;
      for (i = 0; i < rounds.length; i++) {
        if (rounds[i].set) seen[rounds[i].set] = true;
      }
      var keys = Object.keys(seen).sort();
      return keys.length > 0 ? keys : ['A'];
    }

    function getRounds() {
      var source = (gameState.content && gameState.content.rounds) || fallbackContent.rounds;
      var sets = getAvailableSets(source);
      // Within a session, pick round i from set (setIndex+i) so each round has DIFFERENT
      // target values + pool AND a different cosmetic skin (B1 for round 1, B2 for round 2,
      // B3 for round 3). On Play Again, setIndex shifts so the order rotates.
      var rounds = [];
      var startIdx = gameState.setIndex % sets.length;
      for (var i = 0; i < gameState.totalRounds; i++) {
        var setId = sets[(startIdx + i) % sets.length];
        var setRounds = source.filter(function (r) { return r.set === setId; });
        var picked = setRounds[i] || setRounds[0];
        if (picked) rounds.push(picked);
      }
      if (rounds.length >= gameState.totalRounds) return rounds;
      // Fallback: same-set rounds (legacy behaviour) if cross-set picking failed.
      var currentSetId = sets[startIdx];
      var sameSet = source.filter(function (r) { return r.set === currentSetId; });
      if (sameSet.length >= gameState.totalRounds) return sameSet;
      return source.slice(0, gameState.totalRounds);
    }

    /* ============================================================
       waitForPackages
       ============================================================ */
    function waitForPackages() {
      return new Promise(function (resolve, reject) {
        var startedAt = Date.now();
        var TIMEOUT_MS = 180000;
        function check() {
          var ok =
            typeof FeedbackManager !== 'undefined' &&
            typeof TimerComponent !== 'undefined' &&
            typeof VisibilityTracker !== 'undefined' &&
            typeof SignalCollector !== 'undefined' &&
            typeof ScreenLayout !== 'undefined' &&
            typeof PreviewScreenComponent !== 'undefined' &&
            typeof TransitionScreenComponent !== 'undefined' &&
            typeof ProgressBarComponent !== 'undefined' &&
            typeof FloatingButtonComponent !== 'undefined' &&
            typeof AnswerComponentComponent !== 'undefined';
          if (ok) return resolve(true);
          if (Date.now() - startedAt > TIMEOUT_MS) {
            var err = new Error('waitForPackages timeout: ' + TIMEOUT_MS + 'ms');
            reject(err);
            throw new Error('waitForPackages timeout: ' + TIMEOUT_MS + 'ms');
          }
          setTimeout(check, 100);
        }
        check();
      });
    }

    /* ============================================================
       handlePostMessage
       ============================================================ */
    function handlePostMessage(event) {
      try {
        var msg = event && event.data;
        if (!msg || typeof msg !== 'object') return;
        if (msg.type === 'game_init') {
          gameState.phase = 'playing';
          gameState.content = msg.data && msg.data.content ? msg.data.content : null;
          if (msg.data && typeof msg.data.totalRounds === 'number') gameState.totalRounds = msg.data.totalRounds;
          // Configure SignalCollector from signalConfig (PART-010)
          try {
            var sc = msg.data && msg.data.signalConfig ? msg.data.signalConfig : {};
            gameState.signalConfig = msg.data && msg.data.signalConfig ? msg.data.signalConfig : {};
            if (signalCollector) {
              signalCollector.flushUrl = sc.flushUrl || signalCollector.flushUrl || '';
              signalCollector.playId = sc.playId || signalCollector.playId || ('hexa-numbers-' + Date.now());
              signalCollector.gameId = sc.gameId || 'hexa-numbers';
              signalCollector.sessionId = sc.sessionId || ('session-' + Date.now());
              signalCollector.contentSetId = sc.contentSetId || 'fallback';
              signalCollector.studentId = sc.studentId || 'anonymous';
              if (typeof signalCollector.startFlushing === 'function') {
                try { signalCollector.startFlushing(); } catch (e2) {}
              }
            }
          } catch (e1) {}
          syncDOM();
          setupGame();
        } else if (msg.type === 'game_pause') {
          try { FeedbackManager.sound.pause(); } catch (e) {}
        } else if (msg.type === 'game_resume') {
          try { FeedbackManager.sound.resume(); } catch (e) {}
        }
      } catch (e) {
        console.error('[handlePostMessage]', e && e.message);
      }
    }

    /* ============================================================
       endGame
       ============================================================ */
    function endGame(success) {
      if (gameState.gameEnded) return;
      // Round/phase cleanup — stop any leftover audio before end-screen renders
      try { FeedbackManager.sound['stopAll'](); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      gameState.gameEnded = true;
      gameState.isActive = false;
      gameState.phase = 'results';
      gameState.stars = getStars(gameState.score);
      syncDOM();
      trackEvent('game_end', { won: !!success, score: gameState.score, stars: gameState.stars });
      try {
        var elapsedMs = gameState.startTime ? (Date.now() - gameState.startTime) : 0;
        var elapsedSec = Math.round(elapsedMs / 1000);
        var accuracy = gameState.totalRounds > 0 ? Math.round((gameState.score / gameState.totalRounds) * 100) : 0;
        // Tries-per-round: 1 attempt per round (one-shot CHECK)
        var triesArr = [];
        var ai;
        for (ai = 0; ai < gameState.attempts.length; ai++) {
          triesArr.push(1);
        }
        // Seal SignalCollector for analytics meta
        var signalSealed = { event_count: gameState.events.length, metadata: {} };
        try {
          if (signalCollector && typeof signalCollector.seal === 'function') {
            var sealed = signalCollector.seal();
            if (sealed) {
              if (typeof sealed.event_count === 'number') signalSealed.event_count = sealed.event_count;
              if (sealed.metadata) signalSealed.metadata = sealed.metadata;
            }
          }
        } catch (e0) {}
        window.parent.postMessage({
          type: 'game_complete',
          data: {
            metrics: {
              score: gameState.score,
              totalQuestions: gameState.totalRounds,
              stars: gameState.stars,
              accuracy: accuracy,
              time: elapsedSec,
              timeSpent: elapsedMs,
              tries: triesArr,
              attempts: gameState.attempts
            },
            completedAt: Date.now(),
            previewResult: gameState.previewResult || null,
            signal_event_count: signalSealed.event_count,
            signal_metadata: signalSealed.metadata
          }
        }, '*');
      } catch (e) {
        console.error('[endGame postMessage]', e && e.message);
      }
      // Route to celebration
      try { showVictory(success); } catch (e) { console.error('[showVictory]', e && e.message); }
    }
    window.endGame = endGame;

    /* ============================================================
       Score + question label header refresh
       ============================================================ */
    function refreshHeader() {
      try {
        if (previewScreen && typeof previewScreen.setScore === 'function') {
          previewScreen.setScore(gameState.score + '/' + gameState.totalRounds);
        }
        if (previewScreen && typeof previewScreen.setQuestionLabel === 'function') {
          previewScreen.setQuestionLabel('Q' + gameState.currentRound);
        }
      } catch (e) {}
    }

    /* ============================================================
       getCurrentRound
       ============================================================ */
    function getCurrentRound() {
      var rounds = gameState.activeRounds && gameState.activeRounds.length > 0 ? gameState.activeRounds : getRounds();
      var idx = Math.max(0, Math.min(rounds.length - 1, gameState.currentRound - 1));
      return rounds[idx];
    }

       Board build / DOM helpers

    function paintTargets(round) {
      var variantClass = TARGET_VARIANT_CLASS[round.variant] || 'b1';
      var glyphChar = GLYPH_MAP[round.skin && round.skin.glyph ? round.skin.glyph : 'sun-burst'] || '☀';
      ['T1','T2','T3'].forEach(function (tid) {
        var el = targetEls[tid];
        if (!el) return;
        el.classList.remove('b1','b2','b3','passed','failed');
        el.classList.add(variantClass);
        var glyphSpan = el.querySelector('.target-glyph');
        if (glyphSpan) glyphSpan.textContent = glyphChar;
        var valSpan = el.querySelector('.target-value');
        if (valSpan) valSpan.textContent = String(round.targets[tid]);
        var verdictSpan = el.querySelector('.target-verdict');
        if (verdictSpan) verdictSpan.textContent = '';
      });
    }

    function clearSlots() {
      // Return any placed hexes to their bank slots before clearing visual state
      ALL_SLOT_IDS.forEach(function (sid) {
        var poolKey = gameState.placement && gameState.placement[sid];
        if (poolKey) returnPoolHexToBank(poolKey);
        var el = slotEls[sid];
        if (!el) return;
        // Defensive: drop any stray pool-hex DOM still parented to this slot, even if
        // gameState.placement didn't reference it (e.g., after reveal animation).
        var stray = el.querySelectorAll('.pool-hex');
        for (var i = 0; i < stray.length; i++) {
          try { stray[i].parentNode.removeChild(stray[i]); } catch (e) {}
        }
        el.classList.remove('filled','glow-red','flash-green');
        var val = el.querySelector('.slot-value');
        if (val) val.textContent = '';
      });
    }

    function paintSlotValue(slotId, value) {
      var el = slotEls[slotId];
      if (!el) return;
      var val = el.querySelector('.slot-value');
      if (val) val.textContent = value === null || value === undefined || value === '' ? '' : String(value);
      if (value === null || value === undefined || value === '') {
        el.classList.remove('filled');
      } else {
        el.classList.add('filled');
      }
    }

    function setTargetVerdict(tid, passed) {
      var el = targetEls[tid];
      if (!el) return;
      el.classList.remove('passed','failed');
      el.classList.add(passed ? 'passed' : 'failed');
      var verdict = el.querySelector('.target-verdict');
      if (verdict) verdict.textContent = passed ? '✓' : '✗';
    }

    function clearTargetVerdicts() {
      ['T1','T2','T3'].forEach(function (tid) {
        var el = targetEls[tid];
        if (!el) return;
        el.classList.remove('passed','failed');
        var v = el.querySelector('.target-verdict');
        if (v) v.textContent = '';
      });
    }

    function glowRingRed(tid) {
      var ring = RINGS[tid];
      if (!ring) return;
      ring.forEach(function (sid) {
        var el = slotEls[sid];
        if (el) el.classList.add('glow-red');
      });
    }

    function clearAllGlows() {
      ALL_SLOT_IDS.forEach(function (sid) {
        var el = slotEls[sid];
        if (el) el.classList.remove('glow-red','flash-green');
      });
    }

    function flashAllSlotsGreen() {
      ALL_SLOT_IDS.forEach(function (sid) {
        var el = slotEls[sid];
        if (el) el.classList.add('flash-green');
      });
    }

    /* ============================================================
       Pool hex creation
       ============================================================ */
    function buildPool(round) {
      poolHexEls = {};
      poolSlotEls = {};
      var blueRow = document.getElementById('pool-row-blue');
      var whiteRow = document.getElementById('pool-row-white');
      if (!blueRow || !whiteRow) return;
      blueRow.innerHTML = '';
      whiteRow.innerHTML = '';

      var blue = (round.pool && round.pool.blue) ? round.pool.blue.slice() : [];
      var white = (round.pool && round.pool.white) ? round.pool.white.slice() : [];

      blue.forEach(function (val, i) {
        var key = 'blue-' + i;
        var slot = document.createElement('div');
        slot.className = 'pool-slot';
        slot.id = 'pool-slot-' + key;
        slot.setAttribute('data-pool-key', key);
        var hex = makePoolHex('blue', val, i);
        slot.appendChild(hex);
        blueRow.appendChild(slot);
        poolHexEls[key] = hex;
        poolSlotEls[key] = slot;
      });

      white.forEach(function (val, i) {
        var key = 'white-' + i;
        var slot = document.createElement('div');
        slot.className = 'pool-slot';
        slot.id = 'pool-slot-' + key;
        slot.setAttribute('data-pool-key', key);
        var hex = makePoolHex('white', val, i);
        slot.appendChild(hex);
        whiteRow.appendChild(slot);
        poolHexEls[key] = hex;
        poolSlotEls[key] = slot;
      });
    }

    function makePoolHex(colour, value, idx) {
      var hex = document.createElement('div');
      hex.className = 'pool-hex ' + colour;
      hex.id = 'pool-' + colour + '-' + idx;
      hex.setAttribute('data-colour', colour);
      hex.setAttribute('data-value', String(value));
      hex.setAttribute('data-pool-id', colour + '-' + idx);
      var valueSpan = document.createElement('span');
      valueSpan.className = 'pool-hex-value';
      valueSpan.textContent = String(value);
      hex.appendChild(valueSpan);
      return hex;
    }

    /* ============================================================
       Submittable / CHECK gating
       ============================================================ */
    function allSlotsFilled() {
      for (var i = 0; i < ALL_SLOT_IDS.length; i++) {
        var sid = ALL_SLOT_IDS[i];
        if (gameState.placement[sid] === undefined || gameState.placement[sid] === null) return false;
      }
      return true;
    }

    function refreshSubmittable() {
      if (!floatingBtn) return;
      try {
        floatingBtn.setSubmittable(allSlotsFilled() && !gameState.isProcessing);
      } catch (e) {}
    }

    /* ============================================================
       Misconception resolver
       ============================================================ */
    function resolveMisconceptionTags(round, sums, verdict) {
      var tags = [];
      var failedTargets = ['T1','T2','T3'].filter(function (t) { return !verdict[t]; });
      var passedCount = 3 - failedTargets.length;

      // Place-value misread: any failing target is off by exactly a multiple of 9 (10-1) or 10
      var placeValueHit = false;
      failedTargets.forEach(function (t) {
        var diff = Math.abs(sums[t] - round.targets[t]);
        if (diff > 0 && diff % 9 === 0 || diff === 10 || diff === 20) placeValueHit = true;
      });
      if (placeValueHit) tags.push('place-value-misread');

      if (passedCount === 1 && failedTargets.length === 2) tags.push('single-target-tunnel-vision');

      if ((gameState.wrongColourDrops || 0) >= 3) tags.push('colour-rule-violated-then-corrected');

      // Shared-slot blindness: a shared inner blue is placed but the two adjacent targets
      // disagree on whether the local sum is correct
      var sharedSlots = ['inner-2','inner-4','inner-6'];
      var sharedRings = { 'inner-2': ['T1','T2'], 'inner-4': ['T2','T3'], 'inner-6': ['T1','T3'] };
      var sharedHit = false;
      sharedSlots.forEach(function (sid) {
        var rings = sharedRings[sid];
        if (!rings) return;
        var v0 = verdict[rings[0]];
        var v1 = verdict[rings[1]];
        if (v0 !== v1) sharedHit = true;
      });
      if (sharedHit) tags.push('additive-shared-blindness');

      if (failedTargets.length === 3 && tags.length === 0) tags.push('whole-board-mismatch');

      // Ensure tags are in spec list
      var spec = round.misconception_tags || [];
      var filtered = tags.filter(function (t) { return spec.indexOf(t) !== -1; });
      if (filtered.length === 0 && failedTargets.length > 0) filtered.push('whole-board-mismatch');
      return filtered;
    }

    /* ============================================================
       ringSum
       ============================================================ */
    function ringSum(placement, tid) {
      var ring = RINGS[tid];
      if (!ring) return 0;
      var s = 0;
      for (var i = 0; i < ring.length; i++) {
        var poolKey = placement[ring[i]];
        if (!poolKey) continue;
        var hex = poolHexEls[poolKey];
        if (!hex) continue;
        var v = parseInt(hex.getAttribute('data-value'), 10);
        if (typeof v === 'number' && !isNaN(v)) s += v;
      }
      return s;
    }

    /* ============================================================
       Reveal animation — show the canonical placement
       ============================================================ */
    function playRevealAnimation(correctPlacement) {
      // Step 1 — return every placed hex back to its bank slot
      ALL_SLOT_IDS.forEach(function (sid) {
        var poolKey = gameState.placement[sid];
        if (poolKey) returnPoolHexToBank(poolKey);
        var el = slotEls[sid];
        if (el) el.classList.remove('filled','glow-red','flash-green');
        gameState.placement[sid] = null;
      });
      // Step 2 — for each slot, move the matching pool hex into its canonical slot, staggered
      var step = 0;
      var keys = Object.keys(correctPlacement);
      return new Promise(function (resolve) {
        var totalDelay = 2500;
        var perStep = Math.max(80, Math.floor(totalDelay / keys.length));
        function tick() {
          if (step >= keys.length) { resolve(); return; }
          var sid = keys[step++];
          var val = correctPlacement[sid];
          var colour = SLOT_POSITIONS[sid] && SLOT_POSITIONS[sid].colour;
          if (colour) {
            var hexKey = null;
            Object.keys(poolHexEls).forEach(function (k) {
              if (hexKey) return;
              var hex = poolHexEls[k];
              if (!hex) return;
              if (hex.getAttribute('data-colour') !== colour) return;
              if (parseInt(hex.getAttribute('data-value'), 10) !== val) return;
              // skip if already in another slot (shouldn't happen after step 1 reset)
              if (gameState.placement && Object.keys(gameState.placement).some(function (s) { return gameState.placement[s] === k; })) return;
              hexKey = k;
            });
            if (hexKey) {
              placePoolHexInSlot(hexKey, sid);
            }
          }
          setTimeout(tick, perStep);
        }
        tick();
      });
    }

    /* ============================================================
       handleCheck — the round-complete handler
       ============================================================ */
    async function handleCheck() {
      if (gameState.isProcessing || gameState.gameEnded) return;
      if (!allSlotsFilled()) return;
      gameState.isProcessing = true;
      refreshSubmittable();
      // Disable board + pool interaction during the awaited feedback sequence.
      // The next renderRound() rebuilds the wrapper without this class, so the lock
      // is automatically cleared on round advance.
      try {
        var wrap = document.querySelector('.hexa-board-wrapper');
        if (wrap) wrap.classList.add('locked');
      } catch (e) {}

      var round = getCurrentRound();
      var sums = {
        T1: ringSum(gameState.placement, 'T1'),
        T2: ringSum(gameState.placement, 'T2'),
        T3: ringSum(gameState.placement, 'T3')
      };
      var verdict = {
        T1: sums.T1 === round.targets.T1,
        T2: sums.T2 === round.targets.T2,
        T3: sums.T3 === round.targets.T3
      };
      var allPass = verdict.T1 && verdict.T2 && verdict.T3;

      // Visual: tick / cross
      setTargetVerdict('T1', verdict.T1);
      setTargetVerdict('T2', verdict.T2);
      setTargetVerdict('T3', verdict.T3);

      // Score
      if (allPass) {
        gameState.score += 1;
      }
      refreshHeader();

      var misTags = resolveMisconceptionTags(round, sums, verdict);
      recordAttempt(round, sums, allPass, misTags);
      trackEvent('answer_submitted', {
        round: gameState.currentRound,
        set: round && round.set,
        is_correct: allPass,
        sums: sums,
        targets: round && round.targets,
        misconception_tags: misTags
      });

      // Progress bar bumps FIRST (memory rule)
      gameState.progress = (gameState.progress || 0) + 1;
      if (progressBar) {
        try { progressBar.update(gameState.progress, 0); } catch (e) {}
      }

      if (allPass) {
        flashAllSlotsGreen();
        try {
          await Promise.all([
            safePlaySound('correct_sound_effect', { sticker: STICKER_CELEBRATE }),
            new Promise(function (r) { setTimeout(r, 1500); })
          ]);
        } catch (e) {}
        try {
          await FeedbackManager.playDynamicFeedback({
            audio_content: 'Great! Every ring adds up to its target.',
            subtitle: 'Great! Every ring adds up to its target.',
            sticker: STICKER_CELEBRATE
          });
        } catch (e) {}
      } else {
        // Per-slot bg colour: red if any of its rings failed, green if all rings pass.
        // The placed pool hex stays in place (no auto-solve / reveal animation).
        ALL_SLOT_IDS.forEach(function (sid) {
          var el = slotEls[sid];
          if (!el) return;
          var inFailingRing = false;
          var inAnyRing = false;
          ['T1','T2','T3'].forEach(function (t) {
            if (RINGS[t].indexOf(sid) !== -1) {
              inAnyRing = true;
              if (!verdict[t]) inFailingRing = true;
            }
          });
          if (inFailingRing) el.classList.add('glow-red');
          else if (inAnyRing) el.classList.add('flash-green');
        });
        try {
          await Promise.all([
            safePlaySound('sound_life_lost', { sticker: STICKER_SAD }),
            new Promise(function (r) { setTimeout(r, 1500); })
          ]);
        } catch (e) {}
        try {
          await FeedbackManager.playDynamicFeedback({
            audio_content: "Almost! Some rings don't add up yet.",
            subtitle: "Almost! Some rings don't add up yet.",
            sticker: STICKER_SAD
          });
        } catch (e) {}
      }

      trackEvent('round_complete', {
        round: gameState.currentRound,
        is_correct: allPass,
        score: gameState.score
      });

      // Auto-advance
      if (gameState.currentRound < gameState.totalRounds) {
        gameState.currentRound += 1;
        await showRoundIntro(gameState.currentRound);
        renderRound();
      } else {
        endGame(allPass);
      }
    }

    /* ============================================================
       Round Intro (transition screen, auto-advance)
       ============================================================ */
    async function showRoundIntro(n) {
      // Round-boundary cleanup
      try { FeedbackManager.sound['stopAll'](); } catch (e) {}
      try { FeedbackManager.stream.stopAll(); } catch (e) {}
      try { FeedbackManager._stopCurrentDynamic && FeedbackManager._stopCurrentDynamic(); } catch (e) {}

      if (!transitionScreen) return;
      var title = 'Round ' + n;
      await transitionScreen.show({
        title: title,
        icons: ['🎯'],
        buttons: [],
        persist: true
      });
      try { await safePlaySound('rounds_sound_effect', { sticker: STICKER_ROUND }); } catch (e) {}
      try {
        await FeedbackManager.playDynamicFeedback({
          audio_content: title,
          subtitle: title,
          sticker: STICKER_ROUND
        });
      } catch (e) {}
      try { transitionScreen.hide(); } catch (e) {}
    }

    /* ============================================================
       renderRound — render the current round
       ============================================================ */
    function renderRound() {
      gameState.isProcessing = false;
      gameState.isActive = true;
      // NOTE: do NOT reset gameState.placement here — clearSlots() needs the prev-round
      // placement to know which pool hexes to return to the bank before they're rebuilt.
      gameState.wrongColourDrops = 0;
      gameState.roundStartTime = Date.now();
      gameState.phase = 'playing';
      syncDOM();

      var round = getCurrentRound();
      if (!round) return;

      gameState.correctAnswer = JSON.stringify(round.correctPlacement || {});

      paintTargets(round);
      clearSlots();             // returns prev-round pool hexes to bank using old placement
      gameState.placement = {};  // now safe to wipe placement state
      clearAllGlows();
      clearTargetVerdicts();
      buildPool(round);
      // Re-enable interaction on the new round (the lock was added by handleCheck).
      try {
        var wrap = document.querySelector('.hexa-board-wrapper');
        if (wrap) wrap.classList.remove('locked');
      } catch (e) {}

      // Initialize placement record
      ALL_SLOT_IDS.forEach(function (sid) { gameState.placement[sid] = null; });

      // (Re)build dnd-kit graph
      buildDndForRound();

      refreshHeader();
      refreshSubmittable();

      // Update progress bar to current state (idempotent)
      if (progressBar) {
        try { progressBar.update(gameState.progress, 0); } catch (e) {}
      }
    }

    /* ============================================================
       dnd-kit wiring — destroy + rebuild per round
       ============================================================ */
    function destroyDndRound() {
      try {
        for (var i = 0; i < dndDraggables.length; i++) {
          if (dndDraggables[i] && typeof dndDraggables[i].destroy === 'function') {
            try { dndDraggables[i].destroy(); } catch (e) {}
          }
        }
      } catch (e) {}
      try {
        for (var j = 0; j < dndDroppables.length; j++) {
          if (dndDroppables[j] && typeof dndDroppables[j].destroy === 'function') {
            try { dndDroppables[j].destroy(); } catch (e) {}
          }
        }
      } catch (e) {}
      dndDraggables = [];
      dndDroppables = [];
    }

    function buildDndForRound() {
      destroyDndRound();
      if (!dndManager) return;

      // Draggables: one per pool hex
      Object.keys(poolHexEls).forEach(function (k) {
        var hex = poolHexEls[k];
        if (!hex) return;
        var colour = hex.getAttribute('data-colour');
        var value = parseInt(hex.getAttribute('data-value'), 10);
        try {
          var draggable = new window.DnDKit.Draggable({
            id: 'pool-' + k,
            element: hex,
            type: colour,
            data: { value: value, colour: colour, poolKey: k }
          }, dndManager);
          dndDraggables.push(draggable);
        } catch (e) {
          console.error('[Draggable ctor]', e && e.message);
        }
      });

      // Droppables: each slot
      ALL_SLOT_IDS.forEach(function (sid) {
        var el = slotEls[sid];
        if (!el) return;
        var colour = SLOT_POSITIONS[sid].colour;
        try {
          var droppable = new window.DnDKit.Droppable({
            id: 'slot-' + sid,
            element: el,
            accepts: colour,
            data: { slotId: sid, colour: colour }
          }, dndManager);
          dndDroppables.push(droppable);
        } catch (e) {
          console.error('[Droppable ctor slot]', e && e.message);
        }
      });

      // Pool tray rows are also droppables (return-to-pool)
      ['blue','white'].forEach(function (col) {
        var rowEl = document.getElementById('pool-row-' + col);
        if (!rowEl) return;
        try {
          var droppable = new window.DnDKit.Droppable({
            id: 'pool-tray-' + col,
            element: rowEl,
            accepts: col,
            data: { slotId: 'pool', colour: col }
          }, dndManager);
          dndDroppables.push(droppable);
        } catch (e) {
          console.error('[Droppable ctor pool]', e && e.message);
        }
      });
    }

    function findSlotIdHoldingValue(value, colour) {
      // Find a slot currently holding this exact value with matching colour
      for (var i = 0; i < ALL_SLOT_IDS.length; i++) {
        var sid = ALL_SLOT_IDS[i];
        if (SLOT_POSITIONS[sid].colour !== colour) continue;
        if (gameState.placement[sid] === value) return sid;
      }
      return null;
    }

    function findPoolHexKeyForValue(colour, value, excludeKey) {
      var found = null;
      Object.keys(poolHexEls).forEach(function (k) {
        if (found) return;
        if (k === excludeKey) return;
        var hex = poolHexEls[k];
        if (!hex) return;
        if (hex.classList.contains('empty')) return;

          safePlaySound('tap_sound', {});
          return;
        }

        var tgtSlotId = tgt.data.slotId;
        var tgtColour = tgt.data.colour;

        // Wrong colour drop: also auto-snaps back via accepts; defensive guard
        if (tgtColour !== srcColour) {
          gameState.wrongColourDrops = (gameState.wrongColourDrops || 0) + 1;
          safePlaySound('tap_sound', {});
          return;
        }

        // V5 — drop on pool tray (return-to-bank)
        if (tgtSlotId === 'pool') {
          if (sourceSlotId) {
            // Was in a board slot → vacate slot, move hex back to its bank slot
            vacateSlot(sourceSlotId);
            returnPoolHexToBank(srcPoolKey);
            safePlaySound('sound_bubble_deselect', {});
          } else {
            // Bank → bank (already in bank). dnd-kit may have appended hex into the row's element;
            // re-anchor it back to its dedicated pool-slot wrapper for stable centering.
            returnPoolHexToBank(srcPoolKey);

          refreshSubmittable();
          return;

        // V7 — same slot (no-op). Re-anchor the hex into the slot DOM (defensive — library may have moved it).
        if (sourceSlotId === tgtSlotId) {

            vacateSlot(sourceSlotId);
          }
          // V1 — Bank → empty Zone: nothing to vacate

    setTimeout(function () {
      // Abort if a live preview is mounted
      if (previewScreen && previewScreen.isActive && previewScreen.isActive()) return;
      if (gameState.isActive || gameState.gameEnded) return;

      var missing = [];
      if (typeof FeedbackManager === 'undefined') missing.push('FeedbackManager');
      if (typeof TimerComponent === 'undefined') missing.push('TimerComponent');
      if (typeof VisibilityTracker === 'undefined') missing.push('VisibilityTracker');
      if (typeof SignalCollector === 'undefined') missing.push('SignalCollector');
      if (typeof ScreenLayout === 'undefined') missing.push('ScreenLayout');
      if (typeof PreviewScreenComponent === 'undefined') missing.push('PreviewScreenComponent');
      if (typeof TransitionScreenComponent === 'undefined') missing.push('TransitionScreenComponent');
      if (typeof ProgressBarComponent === 'undefined') missing.push('ProgressBarComponent');
      if (typeof FloatingButtonComponent === 'undefined') missing.push('FloatingButtonComponent');
      if (typeof AnswerComponentComponent === 'undefined') missing.push('AnswerComponentComponent');

      if (missing.length > 0) {
        var msg = 'standalone fallback: required class undefined: ' + missing.join(', ');
        console.error('[' + msg + ']');
        if (typeof Sentry !== 'undefined') {
          try { Sentry.captureMessage(msg); } catch (e) {}
        }
        var gc = document.getElementById('gameContent') || document.body;
        if (gc) {
          gc.innerHTML =
            '<div style="padding:24px;text-align:center;font-family:sans-serif;color:#a33;">' +
            'Game failed to load — please refresh.' +
            '</div>';
        }
        return;
      }

      // All classes defined → boot.
      if (!document.getElementById('gameContent')) {
        buildFallbackLayout();
      }
      gameState.content = fallbackContent;
      gameState.totalRounds = fallbackContent.rounds.length / 3;
      setupGame();
      startGame();
    }, 2000);
  </script>
</body>
</html>
