<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hexa Numbers</title>

  <!-- Sentry (error tracking) -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/sentry/index.js"></script>
  <script>
    function initSentry() {
      if (typeof SentryConfig === 'undefined' || !SentryConfig.enabled) return;
      if (typeof Sentry === 'undefined') return;
      try {
        Sentry.init(SentryConfig.getConfig({ release: 'hexa-numbers@1.0.0' }));
      } catch (e) { /* noop */ }
    }
  </script>
  <script src="https://browser.sentry-cdn.com/10.23.0/bundle.tracing.replay.feedback.min.js" crossorigin="anonymous"></script>
  <script src="https://browser.sentry-cdn.com/10.23.0/captureconsole.min.js" crossorigin="anonymous"></script>
  <script src="https://browser.sentry-cdn.com/10.23.0/browserprofiling.min.js" crossorigin="anonymous"></script>
  <script>window.addEventListener('load', initSentry);</script>

  <!-- Game CDN packages (exact order) -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

  <style>
    :root {
      --mathai-game-max-width: 480px;
      --mathai-stack-gap: 10px;
      --mathai-game-padding-top: 54px;

      --mathai-primary: #270f36;
      --mathai-level-text: #270F63;
      --mathai-purple: #9B51E0;

      --mathai-green: #219653;
      --mathai-blue: #667eea;
      --mathai-red: #E35757;
      --mathai-orange: #F2994A;
      --mathai-yellow: #FFDE49;

      --mathai-white: #ffffff;
      --mathai-gray: #666666;
      --mathai-light-gray: #f5f5f5;
      --mathai-disabled-gray: #E0E0E0;
      --mathai-text-primary: #4a4a4a;
      --mathai-border-gray: #e0e0e0;

      --mathai-cell-bg-green: #D9F8D9;
      --mathai-cell-bg-yellow: #FCF6D7;
      --mathai-cell-bg-red: #FFD9D9;
      --mathai-cell-bg-grey: #E0E0E0;
      --mathai-cell-border-green: #27ae60;
      --mathai-cell-border-red: #e74c3c;

      --mathai-success: #219653;
      --mathai-error: #E35757;
      --mathai-warning: #F2994A;

      --mathai-font-family: 'Epilogue', -apple-system, 'Segoe UI', Roboto, sans-serif;
      --mathai-font-size-title: 32px;
      --mathai-font-size-subtitle: 18px;
      --mathai-font-size-button: 16px;
      --mathai-font-size-body: 16px;
      --mathai-font-size-small: 14px;
      --mathai-font-size-large: 24px;

      --mathai-padding-large: 56px 40px;
      --mathai-padding-medium: 16px 24px;
      --mathai-padding-small: 10px;
      --mathai-border-radius: 24px;
      --mathai-border-radius-small: 8px;
      --mathai-border-radius-button: 10px;
      --mathai-border-radius-card: 12px;

      /* Hexa Numbers theme */
      --hx-blue-slot-bg: #CDEEF4;
      --hx-blue-slot-border: #78BFCF;
      --hx-white-slot-bg: #FFFFFF;
      --hx-white-slot-border: #BFC5CE;
      --hx-target-teal: #2F5F61;
      --hx-target-green: #27666D;
      --hx-pool-bg: #F3F3F3;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      overflow-x: hidden;
      margin: 0;
      padding: 0;
      overscroll-behavior: none;
    }

    body {
      font-family: var(--mathai-font-family);
      background: var(--mathai-white);
      color: var(--mathai-text-primary);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.5;
    }

    .hidden { display: none !important; }

    #app {
      width: 100%;
      max-width: var(--mathai-game-max-width);
      min-height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: clip;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    @supports not (min-height: 100dvh) {
      #app { min-height: 100vh; }
    }

    /* Preview-wrapper scroll compatibility */
    #mathai-preview-slot {
      height: 100dvh;
      overflow: hidden;
      position: relative;
    }
    #mathai-preview-slot .mathai-preview-body {
      height: 100dvh;
      box-sizing: border-box;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    input, textarea {
      -webkit-user-select: text;
      user-select: text;
    }

    button,
    .hx-hex,
    .hx-slot,
    [role="button"],
    input[type="submit"] {
      min-height: 44px;
      min-width: 44px;
      touch-action: manipulation;
    }

    /* ============================================================
       Gameplay layout
       ============================================================ */
    #gameContent {
      padding: 10px 12px 24px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    /* Instruction panel */
    .hx-instr {
      background: var(--mathai-light-gray);
      border: 1px solid var(--mathai-border-gray);
      border-radius: var(--mathai-border-radius-card);
      padding: 8px 10px;
      margin-bottom: 10px;
      font-size: 13px;
      color: var(--mathai-primary);
      line-height: 1.35;
    }
    .hx-instr b { font-weight: 700; }

    /* Honeycomb board */
    .hx-board-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 10px;
    }
    .hx-board {
      position: relative;
      width: 340px;
      height: 340px;
    }

    /* Hexagon cell base — flat-top hex via clip-path */
    .hx-cell {
      position: absolute;
      width: 72px;
      height: 82px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
      transition: filter 0.12s ease, transform 0.12s ease;
      -webkit-user-select: none;
      user-select: none;
    }

    /* Blue slot */
    .hx-slot[data-color="blue"] {
      background: var(--hx-blue-slot-bg);
    }
    .hx-slot[data-color="blue"]::before {
      content: '';
      position: absolute;
      inset: 2px;
      clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
      background: var(--hx-blue-slot-bg);
      border: 1px dashed var(--hx-blue-slot-border);
      z-index: 0;
    }

    /* White slot */
    .hx-slot[data-color="white"] {
      background: var(--hx-white-slot-border);
    }
    .hx-slot[data-color="white"]::before {
      content: '';
      position: absolute;
      inset: 2px;
      clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
      background: var(--hx-white-slot-bg);
      z-index: 0;
    }

    .hx-slot.hx-hover[data-color="blue"]::before {
      border: 2px solid var(--mathai-purple);
    }
    .hx-slot.hx-hover[data-color="white"]::before {
      border: 2px solid var(--mathai-purple);
      background: #FAF4FE;
    }
    .hx-slot.hx-reject::before {
      border: 2px solid var(--mathai-red) !important;
      background: var(--mathai-cell-bg-red) !important;
    }
    .hx-slot.hx-conflict {
      filter: drop-shadow(0 0 0 var(--mathai-red));
    }
    .hx-slot.hx-conflict::before {
      background: var(--mathai-cell-bg-red) !important;
      border: 2px solid var(--mathai-cell-border-red) !important;
    }
    .hx-slot.hx-success::before {
      background: var(--mathai-cell-bg-green) !important;
      border: 2px solid var(--mathai-cell-border-green) !important;
    }
    .hx-slot.hx-solution::before {
      background: #E8ECFB !important;
      border: 2px solid var(--mathai-blue) !important;
    }

    /* Target hexagon — display-only, never interactive */
    .hx-target {
      z-index: 2;
      pointer-events: none;
      color: #fff;
      font-weight: 800;
      font-size: 16px;
      letter-spacing: 0.3px;
    }
    .hx-target[data-variant="B1"] {
      background: var(--hx-target-teal);
    }
    .hx-target[data-variant="B2"],
    .hx-target[data-variant="B3"] {
      background: var(--hx-target-green);
    }
    .hx-target .hx-target-val {
      position: relative;
      z-index: 2;
    }
    .hx-target .hx-target-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--mathai-white);
      color: var(--mathai-primary);
      font-size: 11px;
      font-weight: 900;
      display: none;
      align-items: center;
      justify-content: center;
      line-height: 1;
      z-index: 3;
      border: 1.5px solid var(--mathai-gray);
    }
    .hx-target .hx-target-badge.show {
      display: flex;
    }
    .hx-target .hx-target-badge.pass {
      background: var(--mathai-cell-bg-green);
      color: var(--mathai-cell-border-green);
      border-color: var(--mathai-cell-border-green);
    }
    .hx-target .hx-target-badge.fail {
      background: var(--mathai-cell-bg-red);
      color: var(--mathai-cell-border-red);
      border-color: var(--mathai-cell-border-red);
    }

    /* Placed number hex (inside a slot) */
    .hx-placed {
      position: relative;
      z-index: 2;
      font-weight: 800;
      font-size: 14px;
      color: var(--mathai-primary);
      text-align: center;
      line-height: 1;
    }

    /* Pool hexagons */
    .hx-pool-wrap {
      background: var(--hx-pool-bg);
      border: 1px solid var(--mathai-border-gray);
      border-radius: var(--mathai-border-radius-card);
      padding: 10px 6px 8px;
      margin-bottom: 10px;
    }
    .hx-pool-label {
      font-size: var(--mathai-font-size-small);
      font-weight: 700;
      color: var(--mathai-gray);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      text-align: center;
      margin-bottom: 6px;
    }
    .hx-pool-row {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      justify-content: center;
      margin-bottom: 2px;
    }
    .hx-pool-slot {
      width: 56px;
      height: 64px;
      margin: 2px 3px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }
    .hx-pool-slot.collapsed {
      width: 0;
      height: 0;
      margin: 0;
      overflow: hidden;
    }
    .hx-hex {
      position: relative;
      width: 56px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--mathai-primary);
      font-weight: 800;
      font-size: 13px;
      clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
      touch-action: none;
      cursor: grab;
      -webkit-user-select: none;
      user-select: none;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    .hx-hex[data-color="blue"] {
      background: #CDEEF4;
    }
    .hx-hex[data-color="white"] {
      background: #FFFFFF;
      border: 1px solid var(--hx-white-slot-border);
    }
    .hx-hex .hx-hex-inner {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 4px;
      line-height: 1.05;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .hx-hex.hx-placed-in-slot {
      width: 60px;
      height: 68px;
      font-size: 13px;
      cursor: grab;
    }
    .hx-hex.hx-lift {
      transform: scale(1.08);
      box-shadow: 0 6px 16px rgba(39,15,54,0.28);
    }
    .hx-hex.hx-dragging {
      z-index: 10000;
      pointer-events: none;
      cursor: grabbing;
    }
    /* Tap-fallback selected state (mobile: tap chip, then tap slot) */
    .hx-hex.hx-tap-selected {
      outline: 3px solid #FFCD3C;
      outline-offset: 2px;
      transform: scale(1.06);
      box-shadow: 0 4px 12px rgba(255, 205, 60, 0.55);
    }

    /* Space below the gameplay body so the fixed FloatingButton doesn't cover pool/board */
    .hx-bottom-spacer {
      height: calc(96px + env(safe-area-inset-bottom, 0px));
    }

    /* Drag layer */
    #drag-layer {
      position: fixed;
      inset: 0;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 9999;
    }

    @keyframes hxFlashGreen {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
    @keyframes hxFlashRed {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-3px); }
      60% { transform: translateX(3px); }
    }
    .hx-slot.hx-success { animation: hxFlashGreen 400ms ease; }
    .hx-slot.hx-conflict { animation: hxFlashRed 400ms ease 2; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.35s ease; }

    /* Disable drag during processing */
    .dnd-disabled .hx-hex {
      pointer-events: none !important;
      cursor: not-allowed !important;
    }

    /* Landscape lock */
    @media screen and (orientation: landscape) and (max-height: 500px) {
      body::before {
        content: 'Please rotate your phone to portrait mode';
        position: fixed;
        inset: 0;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--mathai-white);
        color: var(--mathai-primary);
        font-family: var(--mathai-font-family);
        font-size: var(--mathai-font-size-subtitle);
        text-align: center;
        padding: 24px;
      }
    }
  </style>
</head>
