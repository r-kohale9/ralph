    /* ============================================================
       Safe FM wrappers
       ============================================================ */
    function safePlaySound(id, opts) {
      try {
        return FeedbackManager.sound.play(id, opts || {});
      } catch (e) {
        return Promise.resolve();
      }
    }
    function safeStopAllAudio() {
      try { if (FeedbackManager && FeedbackManager.sound && FeedbackManager.sound.pause) FeedbackManager.sound.pause(); } catch (e) {}
      try { if (FeedbackManager && FeedbackManager.stream && FeedbackManager.stream.pauseAll) FeedbackManager.stream.pauseAll(); } catch (e) {}
      try { if (FeedbackManager && FeedbackManager._stopCurrentDynamic) FeedbackManager._stopCurrentDynamic(); } catch (e) {}
    }

    /* ============================================================
       createProgressBar helper (PART-023)
       ============================================================ */
    function createProgressBar() {
      try { if (progressBar && progressBar.destroy) progressBar.destroy(); } catch (e) {}
      try {
        progressBar = new ProgressBarComponent({
          slotId: 'mathai-progress-slot',
          totalRounds: gameState.totalRounds,
          totalLives: gameState.totalRounds // no-lives game: match totalRounds to avoid RangeError (GEN-PROGRESSBAR-LIVES)
        });
        progressBar.show();
        progressBar.update(0, 0);
      } catch (e) {
        console.error('[progressBar] ' + e.message);
      }
    }

    /* ============================================================
       handlePostMessage (PART-008)
       ============================================================ */
    function handlePostMessage(event) {
      try {
        if (!event || !event.data || typeof event.data !== 'object') return;
        var msg = event.data;
        if (msg.type === 'game_init') {
          gameState.phase = 'playing';
          var d = msg.data || msg;
          if (d.content) gameState.content = d.content;
          else if (msg.content) gameState.content = msg.content;

          gameState.signalConfig = d.signalConfig || msg.signalConfig || {};
          var sc = gameState.signalConfig;
          if (signalCollector) {
            try { signalCollector.flushUrl = sc.flushUrl; } catch (e) {}
            try { signalCollector.playId = sc.playId; } catch (e) {}
            try { signalCollector.gameId = sc.gameId || gameState.gameId; } catch (e) {}
            try { signalCollector.sessionId = sc.sessionId; } catch (e) {}
            try { signalCollector.contentSetId = sc.contentSetId; } catch (e) {}
            try { signalCollector.studentId = sc.studentId; } catch (e) {}
            try { if (signalCollector.startFlushing) signalCollector.startFlushing(); } catch (e) {}
          }
          syncDOM();
          setupGame();
        }
      } catch (e) { /* noop */ }
    }

    /* ============================================================
       Game HTML injection (scaffold; rendered before preview)
       ============================================================ */
    function injectGameHTML() {
      var gc = document.getElementById('gameContent');
      if (!gc) return;
      gc.innerHTML =
        '<div id="cluePanel" class="clue-panel fade-in">' +
          '<div class="clue-panel-title">Clues</div>' +
          '<ol id="clueList" class="clue-list"></ol>' +
        '</div>' +
        '<div id="tableWrap" class="table-wrap fade-in">' +
          '<div id="tableBoard" class="table-board"></div>' +
        '</div>' +
        '<div class="pool-label">Characters</div>' +
        '<div id="poolWrap" class="pool-wrap fade-in">' +
          '<div id="poolRow" class="pool-row"></div>' +
        '</div>';
    }

    /* ============================================================
       renderInitialState — paint Round 1 behind preview
       ============================================================ */
    function renderInitialState() {
      // Pre-paint round 1 with no interactivity so preview overlay covers real content
      var rounds = getRounds();
      if (!rounds || !rounds[0]) return;
      buildRoundDOM(rounds[0], /* interactive */ false);
    }

    /* ============================================================
       buildRoundDOM — render clue panel, table, pool for a round
       ============================================================ */
    function buildRoundDOM(round, interactive) {
      gameState.currentRoundData = round;
      gameState.seatMap = {};
      gameState.chipLoc = {};

      // Populate clues
      var clueList = document.getElementById('clueList');
      if (clueList) {
        var ch = '';
        for (var ci = 0; ci < round.clues.length; ci++) {
          var c = round.clues[ci];
          ch += '<li data-testid="clue-' + c.id + '">' + escapeHTML(c.text) + '</li>';
        }
        clueList.innerHTML = ch;
      }

      // Build table diagram
      var tableBoard = document.getElementById('tableBoard');
      if (tableBoard) {
        tableBoard.innerHTML = renderTableHTML(round);
      }

      // Build pool (shuffle order, keep chipId stable for tests)
      var poolRow = document.getElementById('poolRow');
      var poolOrder = round.pool.slice();
      shuffleArray(poolOrder);
      if (poolRow) {
        var ph = '';
        for (var p = 0; p < poolOrder.length; p++) {
          var chip = poolOrder[p];
          ph +=
            '<div class="pool-slot" data-chip-slot="' + chip.id + '">' +
              buildChipHTML(chip, /* inSeat */ false) +
            '</div>';
          gameState.chipLoc[chip.id] = 'pool';
        }
        poolRow.innerHTML = ph;
      }

      gameState.isBoardFull = false;
      gameState.validationResult = null;

      if (interactive) {
        bindDragHandlers();
      }

      // Reset FloatingButton to predicate-driven hidden state for the new round.
      try { if (floatingBtn && floatingBtn.setMode) floatingBtn.setMode(null); } catch (e) {}
    }

    function escapeHTML(s) {
      if (s == null) return '';
      return String(s).replace(/[&<>"']/g, function(ch) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch];
      });
    }

    function buildChipHTML(chip, inSeat) {
      var clr = avatarColor(chip.id);
      var extra = inSeat ? ' in-seat' : '';
      return (
        '<div class="chip' + extra + '" data-testid="chip-' + chip.id + '" data-chip-id="' + chip.id + '">' +
          '<div class="chip-avatar" style="background:' + clr + ';">' + escapeHTML(chip.avatar || chip.name.charAt(0)) + '</div>' +
          '<div class="chip-name">' + escapeHTML(chip.name) + '</div>' +
        '</div>'
      );
    }

    /* ============================================================
       renderTableHTML — builds layout-specific seat DOM
       ============================================================ */
    function renderTableHTML(round) {
      var seats = round.seats;
      var seatMap = {};
      for (var i = 0; i < seats.length; i++) seatMap[seats[i].id] = seats[i];

      function seatHTML(seatId) {
        return (
          '<div class="seat" data-testid="seat-' + seatId + '" data-seat-id="' + seatId + '">' +
            '<div class="seat-num">' + seatId + '</div>' +
          '</div>'
        );
      }

      if (round.layout === 'rect-3') {
        return (
          '<div class="seat-row top">' + seatHTML(1) + seatHTML(2) + seatHTML(3) + '</div>' +
          '<div class="table-surface">TABLE</div>'
        );
      }
      if (round.layout === 'rect-4') {
        return (
          '<div class="seat-row top">' + seatHTML(1) + seatHTML(2) + '</div>' +
          '<div class="table-surface">TABLE</div>' +
          '<div class="seat-row bottom">' + seatHTML(3) + seatHTML(4) + '</div>'
        );
      }
      if (round.layout === 'rect-5-head') {
        return (
          '<div class="head-label">HEAD</div>' +
          '<div class="head-row">' + seatHTML(1) + '</div>' +
          '<div class="seat-row top">' + seatHTML(2) + seatHTML(3) + '</div>' +
          '<div class="table-surface">TABLE</div>' +
          '<div class="seat-row bottom">' + seatHTML(4) + seatHTML(5) + '</div>'
        );
      }
      if (round.layout === 'rect-6') {
        return (
          '<div class="seat-row top">' + seatHTML(1) + seatHTML(2) + seatHTML(3) + '</div>' +
          '<div class="table-surface">TABLE</div>' +
          '<div class="seat-row bottom">' + seatHTML(4) + seatHTML(5) + seatHTML(6) + '</div>'
        );
      }
      // Fallback: one row
      var out = '<div class="seat-row top">';
      for (var j = 0; j < seats.length; j++) out += seatHTML(seats[j].id);
      out += '</div>';
      return out;
    }

    /* ============================================================
       Render a round — called when entering gameplay
       ============================================================ */
    function renderRound() {
      var rounds = getRounds();
      var idx = gameState.currentRound - 1;
      if (idx < 0) idx = 0;
      if (idx >= rounds.length) idx = rounds.length - 1;
      var r = rounds[idx];
      if (!r) return;

      gameState.correctAnswer = r.solution; // solution map
      gameState.isActive = true;
      gameState.isProcessing = false;
      gameState.phase = 'gameplay';
      gameState.roundStartTime = Date.now();
      gameState.dropLog = [];

      buildRoundDOM(r, /* interactive */ true);

      // Remove dnd-disabled if present
      var gc = document.getElementById('gameContent');
      if (gc) gc.classList.remove('dnd-disabled');

      syncDOM();

      // FloatingButton is predicate-driven; evaluateBoardFull will call setSubmittable.
      // Ensure it starts hidden at round entry.
      try { if (floatingBtn && floatingBtn.setMode) floatingBtn.setMode(null); } catch (e) {}

      // Fire-and-forget "new cards"
      safePlaySound('new_cards', {});

      trackEvent('question_shown', { round: gameState.currentRound, clueCount: r.clues.length, stage: r.stage });
    }

    /* ============================================================
       Drag-and-drop handlers (Pointer Events)
       ============================================================ */
    function bindDragHandlers() {
      var gc = document.getElementById('gameContent');
      if (!gc) return;

      // Attach pointerdown listeners to every chip (delegated)
      var chips = gc.querySelectorAll('.chip');
      for (var i = 0; i < chips.length; i++) {
        chips[i].addEventListener('pointerdown', onChipPointerDown);
      }
    }

    function onChipPointerDown(ev) {
      if (!gameState.isActive || gameState.isProcessing || gameState.gameEnded) return;

      var chipEl = ev.currentTarget;
      if (!chipEl) return;
      var chipId = chipEl.getAttribute('data-chip-id');
      if (!chipId) return;

      // Determine source
      var sourceType = 'pool';
      var sourceSeatId = null;
      var parentSeat = chipEl.parentElement && chipEl.parentElement.closest('.seat');
      if (parentSeat) {
        sourceType = 'seat';
        sourceSeatId = parseInt(parentSeat.getAttribute('data-seat-id'), 10);
      }

      // Capture original rect
      var rect = chipEl.getBoundingClientRect();
      var offsetX = ev.clientX - rect.left;
      var offsetY = ev.clientY - rect.top;

      dragState = {
        chipId: chipId,
        sourceType: sourceType,
        sourceSeatId: sourceSeatId,
        chipEl: chipEl,
        originalParent: chipEl.parentElement,
        originalNextSibling: chipEl.nextSibling,
        pointerId: ev.pointerId,
        offsetX: offsetX,
        offsetY: offsetY,
        startRect: rect
      };

      // Move chip to drag layer with absolute positioning
      var dragLayer = document.getElementById('drag-layer');
      chipEl.style.position = 'fixed';
      chipEl.style.left = (rect.left) + 'px';
      chipEl.style.top = (rect.top) + 'px';
      chipEl.style.width = rect.width + 'px';
      chipEl.style.height = rect.height + 'px';
      chipEl.classList.add('chip-dragging', 'chip-lift');
      dragLayer.appendChild(chipEl);

      isDraggingFlag = true;

      try { chipEl.setPointerCapture(ev.pointerId); } catch (e) {}

      // Attach move/up listeners
      window.addEventListener('pointermove', onChipPointerMove, { passive: false });
      window.addEventListener('pointerup', onChipPointerUp, { passive: false });
      window.addEventListener('pointercancel', onChipPointerCancel, { passive: false });

      ev.preventDefault();
    }

    function onChipPointerMove(ev) {
      if (!dragState) return;
      if (ev.pointerId !== dragState.pointerId) return;

      var x = ev.clientX - dragState.offsetX;
      var y = ev.clientY - dragState.offsetY;
      dragState.chipEl.style.left = x + 'px';
      dragState.chipEl.style.top = y + 'px';

      // Update seat-hover
      clearSeatHover();
      var seatEl = findSeatUnder(ev.clientX, ev.clientY);
      if (seatEl) {
        seatEl.classList.add('seat-hover');
      }

      ev.preventDefault();
    }

    function clearSeatHover() {
      var hovered = document.querySelectorAll('.seat.seat-hover');
      for (var i = 0; i < hovered.length; i++) hovered[i].classList.remove('seat-hover');
    }

    function findSeatUnder(x, y) {
      // Temporarily hide the dragged chip to see what's under
      var dc = dragState && dragState.chipEl;
      var prevVis = null;
      if (dc) { prevVis = dc.style.visibility; dc.style.visibility = 'hidden'; }
      var el = document.elementFromPoint(x, y);
      if (dc) { dc.style.visibility = prevVis || ''; }
      if (!el) return null;
      var seat = el.closest ? el.closest('.seat') : null;
      return seat || null;
    }

    function findPoolUnder(x, y) {
      var dc = dragState && dragState.chipEl;
      var prevVis = null;
      if (dc) { prevVis = dc.style.visibility; dc.style.visibility = 'hidden'; }
      var el = document.elementFromPoint(x, y);
      if (dc) { dc.style.visibility = prevVis || ''; }
      if (!el) return null;
      var pool = el.closest ? el.closest('#poolWrap') : null;
      return pool || null;
    }

    function onChipPointerUp(ev) {
      if (!dragState) { cleanupDragListeners(); return; }
      if (ev.pointerId !== dragState.pointerId) return;

      try {
        var targetSeatEl = findSeatUnder(ev.clientX, ev.clientY);
        var targetPoolEl = findPoolUnder(ev.clientX, ev.clientY);

        clearSeatHover();

        if (targetSeatEl) {
          var targetSeatId = parseInt(targetSeatEl.getAttribute('data-seat-id'), 10);
          handleDropOnSeat(targetSeatId, targetSeatEl);
        } else if (targetPoolEl) {
          if (dragState.sourceType === 'seat') {
            handleDropOnPool();
          } else {
            // From pool back to pool — no-op
            cancelDrag();
          }
        } else {
          // Outside any valid target — cancel
          cancelDrag();
        }
      } catch (e) {
        cancelDrag();
      }

      cleanupDragListeners();
      isDraggingFlag = false;
      dragState = null;
      evaluateBoardFull();
    }

    function onChipPointerCancel(ev) {
      if (!dragState) { cleanupDragListeners(); return; }
      if (ev.pointerId !== dragState.pointerId) return;
      cancelDrag();
      cleanupDragListeners();
      isDraggingFlag = false;
      dragState = null;
      evaluateBoardFull();
    }

    function cleanupDragListeners() {
      window.removeEventListener('pointermove', onChipPointerMove);
      window.removeEventListener('pointerup', onChipPointerUp);
      window.removeEventListener('pointercancel', onChipPointerCancel);
    }

    function cancelDrag() {
      if (!dragState) return;
      var chipEl = dragState.chipEl;
      // Reset styling
      chipEl.style.position = '';
      chipEl.style.left = '';
      chipEl.style.top = '';
      chipEl.style.width = '';
      chipEl.style.height = '';
      chipEl.classList.remove('chip-dragging', 'chip-lift');

      // Return to origin
      if (dragState.sourceType === 'seat' && dragState.sourceSeatId != null) {
        var seatEl = document.querySelector('.seat[data-seat-id="' + dragState.sourceSeatId + '"]');
        if (seatEl) {
          if (!chipEl.classList.contains('in-seat')) chipEl.classList.add('in-seat');
          seatEl.appendChild(chipEl);
          gameState.chipLoc[dragState.chipId] = dragState.sourceSeatId;
          gameState.seatMap[dragState.sourceSeatId] = dragState.chipId;
        }
      } else {
        returnChipToPoolSlot(dragState.chipId, chipEl);
      }
    }

    function returnChipToPoolSlot(chipId, chipEl) {
      var slot = document.querySelector('.pool-slot[data-chip-slot="' + chipId + '"]');
      if (!slot) return;
      // Reset drag styling so the chip is pickable again (invariant: every drop
      // path that reparents the tag must clear the drag-state styling).
      chipEl.style.position = '';
      chipEl.style.left = '';
      chipEl.style.top = '';
      chipEl.style.width = '';
      chipEl.style.height = '';
      chipEl.classList.remove('chip-dragging', 'chip-lift');
      slot.classList.remove('collapsed');
      if (chipEl.classList.contains('in-seat')) chipEl.classList.remove('in-seat');
      slot.appendChild(chipEl);
      gameState.chipLoc[chipId] = 'pool';
    }

    function collapsePoolSlot(chipId) {
      var slot = document.querySelector('.pool-slot[data-chip-slot="' + chipId + '"]');
      if (slot) slot.classList.add('collapsed');
    }

    function restorePoolSlot(chipId) {
      var slot = document.querySelector('.pool-slot[data-chip-slot="' + chipId + '"]');
      if (slot) slot.classList.remove('collapsed');
    }

    function placeChipInSeat(chipId, chipEl, seatId) {
      var seatEl = document.querySelector('.seat[data-seat-id="' + seatId + '"]');
      if (!seatEl) return;
      // Reset any drag style
      chipEl.style.position = '';
      chipEl.style.left = '';
      chipEl.style.top = '';
      chipEl.style.width = '';
      chipEl.style.height = '';
      chipEl.classList.remove('chip-dragging', 'chip-lift');
      if (!chipEl.classList.contains('in-seat')) chipEl.classList.add('in-seat');
      seatEl.appendChild(chipEl);
      gameState.seatMap[seatId] = chipId;
      gameState.chipLoc[chipId] = seatId;
    }

    function handleDropOnSeat(targetSeatId, targetSeatEl) {
      if (!dragState) return;
      var chipId = dragState.chipId;
      var chipEl = dragState.chipEl;
      var sourceType = dragState.sourceType;
      var sourceSeatId = dragState.sourceSeatId;

      // Case: same seat (drop on own seat) — snap back no-op
      if (sourceType === 'seat' && sourceSeatId === targetSeatId) {
        placeChipInSeat(chipId, chipEl, targetSeatId);
        // leave seatMap/chipLoc as is (actually refreshed in placeChipInSeat)
        pushDropLog(chipId, sourceType, targetSeatId, 'noop');
        return;
      }

      // Check if target is occupied
      var existingChipId = gameState.seatMap[targetSeatId] || null;

      if (sourceType === 'pool') {
        if (existingChipId) {
          // Evict existing back to pool
          var evictedEl = document.querySelector('[data-chip-id="' + existingChipId + '"]');
          if (evictedEl) {
            returnChipToPoolSlot(existingChipId, evictedEl);
          }
          delete gameState.seatMap[targetSeatId];
          gameState.chipLoc[existingChipId] = 'pool';
        }
        // Collapse pool slot for new occupant
        collapsePoolSlot(chipId);
        placeChipInSeat(chipId, chipEl, targetSeatId);
        safePlaySound('sound_bubble_select', {});
        pushDropLog(chipId, sourceType, targetSeatId, existingChipId ? 'evict' : 'place');
      } else {
        // seat -> seat
        if (existingChipId) {
          // Swap: existing chip moves to sourceSeatId
          var swapEl = document.querySelector('[data-chip-id="' + existingChipId + '"]');
          var sourceSeatEl = document.querySelector('.seat[data-seat-id="' + sourceSeatId + '"]');
          if (swapEl && sourceSeatEl) {
            swapEl.style.position = '';
            swapEl.style.left = '';
            swapEl.style.top = '';
            swapEl.style.width = '';
            swapEl.style.height = '';
            if (!swapEl.classList.contains('in-seat')) swapEl.classList.add('in-seat');
            sourceSeatEl.appendChild(swapEl);
            gameState.seatMap[sourceSeatId] = existingChipId;
            gameState.chipLoc[existingChipId] = sourceSeatId;
          }
          // Place dragged chip in target seat
          placeChipInSeat(chipId, chipEl, targetSeatId);
          safePlaySound('sound_bubble_select', {});
          pushDropLog(chipId, sourceType, targetSeatId, 'swap');
        } else {
          // Empty target — transfer
          delete gameState.seatMap[sourceSeatId];
          placeChipInSeat(chipId, chipEl, targetSeatId);
          safePlaySound('sound_bubble_select', {});
          pushDropLog(chipId, sourceType, targetSeatId, 'transfer');
        }
      }
    }

    function handleDropOnPool() {
      if (!dragState) return;
      var chipId = dragState.chipId;
      var chipEl = dragState.chipEl;
      var sourceSeatId = dragState.sourceSeatId;

      if (sourceSeatId != null && gameState.seatMap[sourceSeatId] === chipId) {
        delete gameState.seatMap[sourceSeatId];
      }
      returnChipToPoolSlot(chipId, chipEl);
      safePlaySound('sound_bubble_deselect', {});
      pushDropLog(chipId, 'seat', null, 'to_pool');
    }

    function pushDropLog(chipId, src, dst, action) {
      try {
        gameState.dropLog.push({
          ts: Date.now(), chipId: chipId, src: src, dst: dst, action: action
        });
      } catch (e) { /* noop */ }
    }

    /* ============================================================
       isSubmittable — all seats filled (distractor characters may remain in pool)
       ============================================================ */
    function isSubmittable() {
      var r = gameState.currentRoundData;
      if (!r) return false;
      var seats = r.seats;
      for (var i = 0; i < seats.length; i++) {
        if (!gameState.seatMap[seats[i].id]) return false;
      }
      return true;
    }

    /* ============================================================
       Evaluate board-full → drive FloatingButton via setSubmittable
       ============================================================ */
    function evaluateBoardFull() {
      var r = gameState.currentRoundData;
      if (!r) return;
      var full = isSubmittable();
      gameState.isBoardFull = full;
      // setSubmittable is a no-op while in 'retry' or 'next' modes — safe during feedback.
      try { if (floatingBtn && floatingBtn.setSubmittable) floatingBtn.setSubmittable(full); } catch (e) {}
    }

    /* ============================================================
       Validator — per clue type
       ============================================================ */
    function seatOfChip(chipId) {
      for (var s in gameState.seatMap) {
        if (gameState.seatMap.hasOwnProperty(s) && gameState.seatMap[s] === chipId) return parseInt(s, 10);
      }
      return null;
    }

    function getLayoutRelations(layout) {
      if (layout === 'rect-3') {
        return {
          nextTo: [[1,2],[2,3]],
          across: [],
          sides: { row: [1,2,3] },
          leftOf: [[1,2],[2,3]]
        };
      }
      if (layout === 'rect-4') {
        return {
          nextTo: [[1,2],[3,4]],
          across: [[1,3],[2,4]],
          sides: { top: [1,2], bottom: [3,4] },
          leftOf: [[1,2],[3,4]] // X left of Y: pairs where X is immediately left of Y
        };
      }
      if (layout === 'rect-5-head') {
        return {
          nextTo: [[1,2],[1,4],[2,3],[4,5]],
          across: [[2,4],[3,5]],
          sides: { head: [1], top: [2,3], bottom: [4,5] },
          leftOf: [[2,1],[2,3],[4,5]] // screen-left: head (1) is right of 2 (head row - single seat; seat 2 is top-near (near head) on the left → seat 2 is left of 1 on screen). Top: 2 left of 3. Bottom: 4 left of 5.
        };
      }
      if (layout === 'rect-6') {
        return {
          nextTo: [[1,2],[2,3],[4,5],[5,6]],
          across: [[1,4],[2,5],[3,6]],
          sides: { top: [1,2,3], bottom: [4,5,6] },
          leftOf: [[1,2],[2,3],[4,5],[5,6]]
        };
      }
      return { nextTo: [], across: [], sides: {}, leftOf: [] };
    }

    function pairInList(list, a, b) {
      for (var i = 0; i < list.length; i++) {
        var p = list[i];
        if ((p[0] === a && p[1] === b) || (p[0] === b && p[1] === a)) return true;
      }
      return false;
    }
    function orderedPairInList(list, a, b) {
      for (var i = 0; i < list.length; i++) {
        var p = list[i];
        if (p[0] === a && p[1] === b) return true;
      }
      return false;
    }

    function sideOf(rels, seatId) {
      for (var k in rels.sides) {
        if (rels.sides.hasOwnProperty(k)) {
          var arr = rels.sides[k];
          for (var i = 0; i < arr.length; i++) if (arr[i] === seatId) return k;
        }
      }
      return null;
    }

    function clueSatisfied(clue, rels) {
      var t = clue.type;
      var a = clue.args;
      if (t === 'at_seat') {
        var charId = a[0], seatId = a[1];
        return gameState.seatMap[seatId] === charId;
      }
      if (t === 'next_to') {
        var sa = seatOfChip(a[0]); var sb = seatOfChip(a[1]);
        if (sa == null || sb == null) return false;
        return pairInList(rels.nextTo, sa, sb);
      }
      if (t === 'not_next_to') {
        var sa2 = seatOfChip(a[0]); var sb2 = seatOfChip(a[1]);
        if (sa2 == null || sb2 == null) return false;
        return !pairInList(rels.nextTo, sa2, sb2);
      }
      if (t === 'across_from') {
        var sc1 = seatOfChip(a[0]); var sc2 = seatOfChip(a[1]);
        if (sc1 == null || sc2 == null) return false;
        return pairInList(rels.across, sc1, sc2);
      }
      if (t === 'same_side') {
        var ss1 = seatOfChip(a[0]); var ss2 = seatOfChip(a[1]);
        if (ss1 == null || ss2 == null) return false;
        return sideOf(rels, ss1) === sideOf(rels, ss2);
      }
      if (t === 'left_of') {
        var sl1 = seatOfChip(a[0]); var sl2 = seatOfChip(a[1]);
        if (sl1 == null || sl2 == null) return false;
        return orderedPairInList(rels.leftOf, sl1, sl2);
      }
      if (t === 'between') {
        var sx = seatOfChip(a[0]); var sy = seatOfChip(a[1]); var sz = seatOfChip(a[2]);
        if (sx == null || sy == null || sz == null) return false;
        // X adjacent to BOTH Y and Z
        return pairInList(rels.nextTo, sx, sy) && pairInList(rels.nextTo, sx, sz);
      }
      return false;
    }

    function validateArrangement(round) {
      var rels = getLayoutRelations(round.layout);
      var conflictSeats = {};
      var violated = [];
      for (var i = 0; i < round.clues.length; i++) {
        var clue = round.clues[i];
        if (!clueSatisfied(clue, rels)) {
          violated.push(clue.id);
          // Add seats of every character named in args (skip number seatId in at_seat)
          for (var j = 0; j < clue.args.length; j++) {
            var a = clue.args[j];
            if (typeof a === 'string') {
              var s = seatOfChip(a);
              if (s != null) conflictSeats[s] = true;
            } else if (typeof a === 'number') {
              conflictSeats[a] = true;
            }
          }
        }
      }
      // Distractor special-case
      for (var s2 in gameState.seatMap) {
        if (gameState.seatMap.hasOwnProperty(s2)) {
          var ch = gameState.seatMap[s2];
          var chipDef = null;
          for (var p = 0; p < round.pool.length; p++) {
            if (round.pool[p].id === ch) { chipDef = round.pool[p]; break; }
          }
          if (chipDef && chipDef.distractor) {
            conflictSeats[s2] = true;
          }
        }
      }
      var conflictArr = [];
      for (var key in conflictSeats) {
        if (conflictSeats.hasOwnProperty(key)) conflictArr.push(parseInt(key, 10));
      }
      return { pass: violated.length === 0, violatedClueIds: violated, conflictSeats: conflictArr };
    }

    /* ============================================================
       Derive misconception tag
       ============================================================ */
    function deriveMisconception(round, result) {
      if (!result || result.pass) return null;
      // Distractor seated?
      for (var s in gameState.seatMap) {
        if (gameState.seatMap.hasOwnProperty(s)) {
          var ch = gameState.seatMap[s];
          var chipDef = null;
          for (var p = 0; p < round.pool.length; p++) {
            if (round.pool[p].id === ch) { chipDef = round.pool[p]; break; }
          }
          if (chipDef && chipDef.distractor) return 'seat-every-pool-char';
        }
      }
      // Analyze violated types
      var types = {};
      for (var i = 0; i < result.violatedClueIds.length; i++) {
        var id = result.violatedClueIds[i];
        for (var j = 0; j < round.clues.length; j++) {
          if (round.clues[j].id === id) {
            types[round.clues[j].type] = true; break;
          }
        }
      }
      if (types['not_next_to']) return 'negation-as-positive';
      if (types['between'] && !types['across_from'] && !types['next_to']) return 'between-as-adjacent-to-one';
      if (types['across_from'] && !types['next_to'] && !types['same_side']) return 'swap-across-for-next-to';
      if (types['same_side']) return 'same-side-as-next-to';
      if (types['left_of']) return 'mirror-left-right';
      // Fallback: first violated clue's type -> generic
      if (round.round === 1) return 'arbitrary-fill';
      // Return first key from misconception_tags
      if (round.misconception_tags) {
        for (var k in round.misconception_tags) {
          if (round.misconception_tags.hasOwnProperty(k)) return k;
        }
      }
      return null;
    }

    /* ============================================================
       handleCheck — invoked by floatingBtn.on('submit', ...)
       FloatingButton auto-hides on submit click, so no manual hide needed.
       ============================================================ */
    function handleCheck() {
      if (!gameState.isActive || gameState.isProcessing || gameState.gameEnded) return;
      if (!isSubmittable()) return;

      gameState.isProcessing = true;
      // Disable drag affordance
      var gc = document.getElementById('gameContent');
      if (gc) gc.classList.add('dnd-disabled');

      var round = gameState.currentRoundData;
      var result = validateArrangement(round);
      gameState.validationResult = result;

      var responseMs = Date.now() - gameState.roundStartTime;
      gameState.responseTimes.push(responseMs);

      var snapshot = {};
      for (var s in gameState.seatMap) {
        if (gameState.seatMap.hasOwnProperty(s)) snapshot[s] = gameState.seatMap[s];
      }

      if (result.pass) {
        handleCorrectOutcome(round, result, snapshot, responseMs);
      } else {
        handleWrongOutcome(round, result, snapshot, responseMs);
      }
    }

    /* ============================================================
       Correct outcome
       ============================================================ */
    function handleCorrectOutcome(round, result, snapshot, responseMs) {
      // recordAttempt BEFORE audio
      recordAttempt({
        input_of_user: JSON.stringify(snapshot),
        correct: true,
        round_number: gameState.currentRound,
        question_id: 'r' + gameState.currentRound + '_' + round.type + '_' + round.layout,
        correct_answer: round.solution,
        response_time_ms: responseMs,
        misconception_tag: null,
        difficulty_level: round.stage || 1,
        is_retry: false,
        metadata: {
          stage: round.stage,
          type: round.type,
          layout: round.layout,
          seats: snapshot,
          clueCount: round.clues.length,
          droppedCount: gameState.dropLog.length,
          firstCheck: true
        }
      });
      trackEvent('answer_submitted', { round: gameState.currentRound, correct: true });

      gameState.score += 1;
      gameState.firstCheckSolves += 1;
      gameState.roundsCompleted += 1;
      syncDOM();

      // Flash green on all seats
      var allSeats = document.querySelectorAll('.seat');
      for (var i = 0; i < allSeats.length; i++) allSeats[i].classList.add('seat-success');

      // PROGRESS BAR BUMPS FIRST — before any await
      try {
        if (progressBar && progressBar.update) {
          progressBar.update(gameState.roundsCompleted, 0);
        }
      } catch (e) {}

      (async function() {
        try {
          await Promise.all([
            safePlaySound('correct_sound_effect', { sticker: STICKER_CORRECT }),
            new Promise(function(res) { setTimeout(res, 1500); })
          ]);
        } catch (e) { /* noop */ }

        try {
          if (FeedbackManager && FeedbackManager.playDynamicFeedback) {
            await FeedbackManager.playDynamicFeedback({
              audio_content: 'Great thinking! Every clue matches.',
              subtitle: 'Great thinking! Every clue matches.',
              sticker: STICKER_CORRECT
            });
          }
        } catch (e) { /* noop */ }

        trackEvent('round_complete', { round: gameState.currentRound, correct: true });

        // Fire show_star per correct round-complete (firstCheckSolves++).
        try {
          window.postMessage({
            type: 'show_star',
            data: {
              count: 1,
              variant: 'yellow'
            }
          }, '*');
        } catch (e) { /* noop */ }

        // Final round → endGame (Victory transition); otherwise, brief delay then Next.
        if (gameState.currentRound >= gameState.totalRounds) {
          advanceAfterFeedback();
          return;
        }

        // Brief delay so the green flash is absorbed, then reveal Next.
        setTimeout(function() {
          try { if (floatingBtn && floatingBtn.setMode) floatingBtn.setMode('next'); } catch (e) {}
        }, 400);
      })();
    }

    /* ============================================================
       Wrong outcome
       ============================================================ */
    function handleWrongOutcome(round, result, snapshot, responseMs) {
      var misconceptionTag = deriveMisconception(round, result);
      var distractorSeated = false;
      for (var ss in gameState.seatMap) {
        if (gameState.seatMap.hasOwnProperty(ss)) {
          var ch = gameState.seatMap[ss];
          for (var p = 0; p < round.pool.length; p++) {
            if (round.pool[p].id === ch && round.pool[p].distractor) {
              distractorSeated = true; break;
            }
          }
        }
      }

      recordAttempt({
        input_of_user: JSON.stringify(snapshot),
        correct: false,
        round_number: gameState.currentRound,
        question_id: 'r' + gameState.currentRound + '_' + round.type + '_' + round.layout,
        correct_answer: round.solution,
        response_time_ms: responseMs,
        misconception_tag: misconceptionTag,
        difficulty_level: round.stage || 1,
        is_retry: false,
        metadata: {
          stage: round.stage,
          type: round.type,
          layout: round.layout,
          seats: snapshot,
          violatedClueIds: result.violatedClueIds,
          conflictSeats: result.conflictSeats,
          distractorSeated: distractorSeated,
          firstCheck: true
        }
      });
      trackEvent('answer_submitted', { round: gameState.currentRound, correct: false });

      gameState.roundsCompleted += 1;
      syncDOM();

      // Highlight conflict seats red
      for (var i = 0; i < result.conflictSeats.length; i++) {
        var seatEl = document.querySelector('.seat[data-seat-id="' + result.conflictSeats[i] + '"]');
        if (seatEl) seatEl.classList.add('seat-conflict');
      }

      // PROGRESS BAR BUMPS FIRST
      try {
        if (progressBar && progressBar.update) {
          progressBar.update(gameState.roundsCompleted, 0);
        }
      } catch (e) {}

      gameState.phase = 'feedback_wrong';
      syncDOM();

      (async function() {
        try {
          await Promise.all([
            safePlaySound('incorrect_sound_effect', { sticker: STICKER_WRONG }),
            new Promise(function(res) { setTimeout(res, 1500); })
          ]);
        } catch (e) { /* noop */ }

        try {
          if (FeedbackManager && FeedbackManager.playDynamicFeedback) {
            await FeedbackManager.playDynamicFeedback({
              audio_content: "Oh no! That's not right.",
              subtitle: "Oh no! That's not right!",
              sticker: STICKER_WRONG
            });
          }
        } catch (e) { /* noop */ }

        // Reveal the solution arrangement so the student learns from the miss.
        revealSolution(round);

        trackEvent('round_complete', { round: gameState.currentRound, correct: false });

        // Final round → endGame (Victory transition); otherwise, reveal Next via FloatingButton.
        if (gameState.currentRound >= gameState.totalRounds) {
          advanceAfterFeedback();
          return;
        }

        // Brief delay after solution reveal so the student absorbs it, then Next appears.
        setTimeout(function() {
          try { if (floatingBtn && floatingBtn.setMode) floatingBtn.setMode('next'); } catch (e) {}
        }, 600);
      })();
    }

    function revealSolution(round) {
      // Clear existing seat styling
      var allSeats = document.querySelectorAll('.seat');
      for (var i = 0; i < allSeats.length; i++) {
        allSeats[i].classList.remove('seat-conflict', 'seat-success');
        allSeats[i].classList.add('seat-solution');
      }

      // For each seatId in solution, place the correct chip there
      var sol = round.solution;
      // Build chipId → DOM element map (might be in pool or elsewhere)
      function getChipElement(chipId) {
        return document.querySelector('[data-chip-id="' + chipId + '"]');
      }

      // First remove all chips from seats/pool into a temporary holding
      var chipMap = {};
      for (var p = 0; p < round.pool.length; p++) {
        var cid = round.pool[p].id;
        var el = getChipElement(cid);
        if (el) chipMap[cid] = el;
      }

      // Place solution chips in their correct seats
      for (var seatIdStr in sol) {
        if (sol.hasOwnProperty(seatIdStr)) {
          var seatId = parseInt(seatIdStr, 10);
          var chipId = sol[seatIdStr];
          var seatEl = document.querySelector('.seat[data-seat-id="' + seatId + '"]');
          var chipEl = chipMap[chipId];
          if (seatEl && chipEl) {
            if (!chipEl.classList.contains('in-seat')) chipEl.classList.add('in-seat');
            seatEl.appendChild(chipEl);
          }
          restorePoolSlot(chipId); // ensure the pool slot is not collapsed if the chip leaves
        }
      }

      // For any chip NOT in solution (distractor), return to pool slot
      for (var pi = 0; pi < round.pool.length; pi++) {
        var chipDef = round.pool[pi];
        var inSol = false;
        for (var k in sol) {
          if (sol.hasOwnProperty(k) && sol[k] === chipDef.id) { inSol = true; break; }
        }
        if (!inSol) {
          var chEl = chipMap[chipDef.id];
          if (chEl) returnChipToPoolSlot(chipDef.id, chEl);
        }
      }
    }

    /* ============================================================
       advanceAfterFeedback — unified progression
       ============================================================ */
    function advanceAfterFeedback() {
      // Cleanup first — before gameState mutation
      safeStopAllAudio();

      if (gameState.gameEnded) return;
      // Guard: if phase is already transitioning, skip
      if (gameState.phase === 'round_intro' || gameState.phase === 'results') return;

      if (gameState.currentRound >= gameState.totalRounds) {
        showVictory();
        return;
      }
      gameState.currentRound += 1;
      showRoundIntro(gameState.currentRound);
    }

    /* ============================================================
       showRoundIntro — auto-advance transition
       ============================================================ */
    function showRoundIntro(n) {
      safeStopAllAudio();

      gameState.phase = 'round_intro';
      syncDOM();

      // Show the "Round N" intro. Progress bar reflects current roundsCompleted.
      try {
        if (progressBar && progressBar.update) {
          progressBar.update(gameState.roundsCompleted, 0);
        }
      } catch (e) {}

      (async function() {
        try {
          await waitForAudioPermission();
          if (transitionScreen && transitionScreen.show) {
            await transitionScreen.show({
              icons: ['🧠'],
              title: 'Round ' + n,
              onMounted: function() {
                (async function() {
                  try {
                    await safePlaySound('rounds_sound_effect', { sticker: STICKER_ROUND });
                  } catch (e) {}
                  try { if (transitionScreen && transitionScreen.hide) transitionScreen.hide(); } catch (e) {}
                  enterGameplay(n);
                })();
              }
            });
          }
        } catch (e) {
          // Fallback — just enter gameplay
          try { if (transitionScreen && transitionScreen.hide) transitionScreen.hide(); } catch (e) {}
          enterGameplay(n);
        }
      })();

      // Hard fallback: if something stalls, enter gameplay after 3s
      setTimeout(function() {
        if (gameState.phase === 'round_intro' && gameState.currentRound === n && !gameState.gameEnded) {
          try { if (transitionScreen && transitionScreen.hide) transitionScreen.hide(); } catch (e) {}
          enterGameplay(n);
        }
      }, 3500);
    }

    function enterGameplay(n) {
      if (gameState.gameEnded) return;
      if (gameState.phase === 'gameplay' && gameState.currentRound === n) return;
      gameState.currentRound = n;
      renderRound();
    }

    /* ============================================================
       showVictory (CASE 11) — multi-round FloatingButton variant
       buttons: [] + onDismiss → show_star → setMode('next')
       ============================================================ */
    function showVictory() {
      if (gameState.gameEnded) return;

      safeStopAllAudio();

      gameState.phase = 'results';
      gameState.isActive = false;
      gameState.stars = getStars();

      // PROGRESS BAR BUMPS FIRST — ensures 7/7 on victory render
      try {
        if (progressBar && progressBar.update) {
          var _finalRoundIdx = gameState.totalRounds;
          progressBar.update(_finalRoundIdx, 0);
        }
      } catch (e) {}

      syncDOM();

      // game_complete BEFORE audio
      postGameComplete(true);

      var stars = gameState.stars;
      var fcs = gameState.firstCheckSolves;
      var subtitle = 'You solved ' + fcs + ' of 7 on the first try!';

      (async function() {
        try {
          if (transitionScreen && transitionScreen.show) {
            var victorySticker = (stars === 3) ? STICKER_VICTORY : (stars === 2 ? STICKER_GAME_COMPLETE_2 : STICKER_GAME_COMPLETE_1);
            // Register dismiss handler BEFORE show so a fast tap is never missed.
            if (transitionScreen.onDismiss) {
              transitionScreen.onDismiss(function() {
                safeStopAllAudio();
                try { if (transitionScreen && transitionScreen.hide) transitionScreen.hide(); } catch (e) {}
                // Fire the end-of-game star celebration (intra-frame).
                try {
                  window.postMessage({
                    type: 'show_star',
                    data: {
                      count: Math.max(1, Math.min(3, stars || 1)),
                      variant: 'yellow',
                      score: gameState.firstCheckSolves + '/' + gameState.totalRounds
                    }
                  }, '*');
                } catch (e) {}
                // Reveal Next AFTER the 1 s flying-star animation completes.
                setTimeout(function() {
                  try { if (floatingBtn && floatingBtn.setMode) floatingBtn.setMode('next'); } catch (e) {}
                }, 1100);
              });
            }
            await transitionScreen.show({
              stars: stars,
              title: 'Victory 🎉',
              subtitle: subtitle,
              buttons: [],
              onMounted: function() {
                (async function() {
                  try {
                    var sfxId = (stars === 3) ? 'victory_sound_effect' : 'game_complete_sound_effect';
                    await safePlaySound(sfxId, { sticker: victorySticker });
                    try {
                      if (FeedbackManager && FeedbackManager.playDynamicFeedback) {
                        var voText = stars === 3
                          ? 'Amazing! Three stars! You solved every clue on the first try.'
                          : (stars === 2
                            ? 'Well done! You solved ' + fcs + ' of 7 on the first try.'
                            : (stars === 1
                              ? 'Good effort! You solved ' + fcs + ' of 7 on the first try.'
                              : 'Nice try — every round completed!'));
                        await FeedbackManager.playDynamicFeedback({
                          audio_content: voText,
                          subtitle: voText,
                          sticker: victorySticker
                        });
                      }
                    } catch (e) {}
                  } catch (e) {}
                })();
              }
            });
          }
        } catch (e) { /* noop */ }
      })();
    }

    /* ============================================================
       postGameComplete — fires BEFORE audio
       ============================================================ */
    function postGameComplete(won) {
      try {
        var completedAt = Date.now();
        var avgMs = 0;
        if (gameState.responseTimes.length > 0) {
          var sum = 0;
          for (var i = 0; i < gameState.responseTimes.length; i++) sum += gameState.responseTimes[i];
          avgMs = sum / gameState.responseTimes.length;
        }
        var accuracy = Math.round((gameState.firstCheckSolves / gameState.totalRounds) * 100);
        if (accuracy < 0) accuracy = 0;
        if (accuracy > 100) accuracy = 100;

        var sigEventCount = 0;
        var sigMetadata = {};
        try {
          if (signalCollector) {
            if (typeof signalCollector.getInputEvents === 'function') {
              var inputEvents = signalCollector.getInputEvents() || [];
              sigEventCount = inputEvents.length;
            }
            if (typeof signalCollector.getMetadata === 'function') {
              sigMetadata = signalCollector.getMetadata() || {};
            }
          }
        } catch (e) { /* noop */ }

        var metrics = {
          accuracy: accuracy,
          time: gameState.startTime ? Math.round((completedAt - gameState.startTime) / 1000) : 0,
          stars: gameState.stars,
          attempts: gameState.attempts,
          duration_data: gameState.duration_data,
          totalLives: (gameState.totalLives || 0),
          firstCheckSolves: gameState.firstCheckSolves,
          tries: computeTriesPerRound(),
          avgResponseTime: avgMs,
          livesRemaining: 0,
          signal_event_count: sigEventCount,
          signal_metadata: sigMetadata
        };

        window.parent.postMessage({
          type: 'game_complete',
          data: {
            metrics: metrics,
            completedAt: completedAt,
            previewResult: gameState.previewResult || null
          },
          payload: {
            score: gameState.firstCheckSolves,
            totalQuestions: gameState.totalRounds,
            stars: gameState.stars,
            accuracy: accuracy,
            timeSpent: gameState.startTime ? (completedAt - gameState.startTime) : 0,
            avgResponseTime: avgMs,
            livesRemaining: 0
          }
        }, '*');
      } catch (e) { /* noop */ }
    }

    function computeTriesPerRound() {
      var byRound = {};
      for (var i = 0; i < gameState.attempts.length; i++) {
        var a = gameState.attempts[i];
        var k = a.round_number;
        if (!byRound[k]) byRound[k] = { round: k, correct: false };
        if (a.correct) byRound[k].correct = true;
      }
      var out = [];
      for (var j = 1; j <= gameState.totalRounds; j++) {
        if (byRound[j]) out.push({ round: byRound[j].round, correct: !!byRound[j].correct });
      }
      return out;
    }

    /* ============================================================
       endGame — destroy() exactly once
       ============================================================ */
    function endGame(won) {
      if (gameState.gameEnded) return;
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { FeedbackManager.stream.pauseAll(); } catch (e) {}
      gameState.gameEnded = true;
      trackEvent('game_end', { won: !!won, score: gameState.firstCheckSolves, stars: gameState.stars });
      try {
        if (floatingBtn && floatingBtn.destroy) floatingBtn.destroy();
      } catch (e) { /* noop */ }
      try {
        if (previewScreen && previewScreen.destroy) previewScreen.destroy();
      } catch (e) { /* noop */ }
    }
    window.endGame = endGame;

    /* ============================================================
       restartGame — NO preview, NO welcome
       ============================================================ */
    function restartGame() {
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { FeedbackManager.stream.pauseAll(); } catch (e) {}
      safeStopAllAudio();

      gameState.phase = 'start_screen';
      gameState.currentRound = 0;
      gameState.score = 0;
      gameState.lives = 0;
      gameState.firstCheckSolves = 0;
      gameState.roundsCompleted = 0;
      gameState.attempts = [];
      gameState.events = [];
      gameState.responseTimes = [];
      gameState.isActive = false;
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState.stars = 0;
      gameState.correctAnswer = null;
      gameState.roundStartTime = null;
      gameState.seatMap = {};
      gameState.chipLoc = {};
      gameState.dropLog = [];
      gameState.validationResult = null;
      gameState.isBoardFull = false;
      gameState.currentRoundData = null;
      gameState.duration_data = {
        startTime: null,
        preview: gameState.duration_data.preview || [],
        attempts: [],
        evaluations: [],
        inActiveTime: [],
        totalInactiveTime: 0
      };

      try { if (signalCollector && signalCollector.reset) signalCollector.reset(); } catch (e) {}

      // Reset progress bar
      createProgressBar();

      gameState.startTime = Date.now();
      gameState.isActive = true;
      gameState.duration_data.startTime = new Date().toISOString();

      trackEvent('game_start', { totalRounds: gameState.totalRounds, restart: true });
      syncDOM();

      // Re-inject scaffold for clean slate
      injectGameHTML();

      showRoundIntro(1);
    }
    window.restartGame = restartGame;

    /* ============================================================
       startGame — test-harness entry
       ============================================================ */
    function startGame() {
      if (gameState.isActive) return;
      gameState.isActive = true;
      gameState.startTime = Date.now();
      gameState.duration_data.startTime = new Date().toISOString();
      gameState.currentRound = 0;
      gameState.score = 0;
      gameState.firstCheckSolves = 0;
      gameState.roundsCompleted = 0;
      gameState.attempts = [];
      gameState.events = [];
      gameState.isProcessing = false;
      gameState.gameEnded = false;
      gameState.phase = 'gameplay';
      trackEvent('game_start', { totalRounds: gameState.totalRounds });
      syncDOM();
      if (!document.getElementById('cluePanel')) injectGameHTML();
      showRoundIntro(1);
    }
    window.startGame = startGame;

    /* ============================================================
       nextRound — test-harness hook
       ============================================================ */
    function nextRound() {
      try { FeedbackManager.sound.pause(); } catch (e) {}
      try { FeedbackManager.stream.pauseAll(); } catch (e) {}
      safeStopAllAudio();

      if (gameState.currentRound >= gameState.totalRounds) {
        showVictory();
        return;
      }
      gameState.currentRound += 1;
      showRoundIntro(gameState.currentRound);
    }
    window.nextRound = nextRound;

    /* ============================================================
       startGameAfterPreview — called by PreviewScreen onComplete
       ============================================================ */
    function startGameAfterPreview(previewData) {
      gameState.previewResult = previewData || null;
      if (gameState.duration_data.preview == null) gameState.duration_data.preview = [];
      if (previewData && typeof previewData.duration === 'number') {
        gameState.duration_data.preview.push({ duration: previewData.duration });
      }

      gameState.startTime = Date.now();
      gameState.isActive = true;
      gameState.duration_data.startTime = new Date().toISOString();

      trackEvent('game_start', { totalRounds: gameState.totalRounds });
      try { if (signalCollector && signalCollector.recordViewEvent) signalCollector.recordViewEvent('screen_transition', { from: 'preview', to: 'game' }); } catch (e) {}

      showRoundIntro(1);
    }

    /* ============================================================
       setupGame — render content first, show preview LAST
       ============================================================ */
    function setupGame() {
      var content = gameState.content || fallbackContent;
      if (!gameState.content) gameState.content = fallbackContent;

      // 1. Inject game HTML into #gameContent
      injectGameHTML();
      // 2. Paint Round 1 scaffold (non-interactive) behind preview
      renderInitialState();

      // 3. Show preview LAST
      try {
        if (previewScreen && previewScreen.show) {
          previewScreen.show({
            instruction: content.previewInstruction || fallbackContent.previewInstruction,
            audioUrl: content.previewAudio || fallbackContent.previewAudio || null,
            showGameOnPreview: content.showGameOnPreview === true,
            onComplete: function(previewData) {
              startGameAfterPreview(previewData);
            }
          });
        } else {
          gameState.startTime = Date.now();
          gameState.isActive = true;
          gameState.duration_data.startTime = new Date().toISOString();
          trackEvent('game_start', { totalRounds: gameState.totalRounds });
          showRoundIntro(1);
        }
      } catch (e) {
        console.error('[setupGame] ' + e.message);
      }
    }

    /* ============================================================
       Debug functions
       ============================================================ */
    window.debugGame = function() {
      return {
        phase: gameState.phase,
        currentRound: gameState.currentRound,
        firstCheckSolves: gameState.firstCheckSolves,
        roundsCompleted: gameState.roundsCompleted,
        seatMap: gameState.seatMap,
        attempts: gameState.attempts.length,
        gameEnded: gameState.gameEnded
      };
    };
    window.loadRound = function(n) {
      if (typeof n === 'number' && n >= 1 && n <= gameState.totalRounds) {
        gameState.currentRound = n;
        renderRound();
      }
    };
    // Test helper: simulate CHECK with the correct solution placed
    window.solveCurrentRound = function() {
      var r = gameState.currentRoundData;
      if (!r) return false;
      // Move each chip in solution to its seat by DOM manipulation
      gameState.seatMap = {};
      for (var seatIdStr in r.solution) {
        if (r.solution.hasOwnProperty(seatIdStr)) {
          var seatId = parseInt(seatIdStr, 10);
          var chipId = r.solution[seatIdStr];
          var chipEl = document.querySelector('[data-chip-id="' + chipId + '"]');
          var seatEl = document.querySelector('.seat[data-seat-id="' + seatId + '"]');
          if (chipEl && seatEl) {
            if (!chipEl.classList.contains('in-seat')) chipEl.classList.add('in-seat');
            seatEl.appendChild(chipEl);
            collapsePoolSlot(chipId);
            gameState.seatMap[seatId] = chipId;
            gameState.chipLoc[chipId] = seatId;
          }
        }
      }
      evaluateBoardFull();
      return true;
    };

    /* ============================================================
       Prevent default drag on touch during active drag
       ============================================================ */
    document.addEventListener('touchmove', function(ev) {
      if (isDraggingFlag) {
        try { ev.preventDefault(); } catch (e) {}
      }
    }, { passive: false });

    /* ============================================================
       DOMContentLoaded — init sequence
       ============================================================ */
    document.addEventListener('DOMContentLoaded', function() {
      (async function() {
        try {
          // 1. Wait for CDN packages
          try {
            await waitForPackages();
          } catch (pkgErr) {
            console.error('[init] ' + pkgErr.message);
          }

          // 2. Initialize FeedbackManager
          try {
            if (typeof FeedbackManager !== 'undefined' && FeedbackManager.init) {
              await FeedbackManager.init();
            }
          } catch (e) { console.error('[init] FeedbackManager.init ' + e.message); }

          // 3. SignalCollector
          try {
            if (typeof SignalCollector !== 'undefined') {
              signalCollector = new SignalCollector({
                sessionId: null,
                studentId: null,
                gameId: gameState.gameId,
                contentSetId: null
              });
              window.signalCollector = signalCollector;
            }
          } catch (e) { /* noop */ }

          // 4. ScreenLayout.inject
          try {
            if (typeof ScreenLayout !== 'undefined' && ScreenLayout.inject) {
              ScreenLayout.inject('app', {
                slots: {
                  previewScreen: true,
                  progressBar: true,
                  transitionScreen: true,
                  floatingButton: true
                }
              });
            }
          } catch (e) { console.error('[init] ScreenLayout.inject ' + e.message); }

          // 5. VisibilityTracker
          try {
            if (typeof VisibilityTracker !== 'undefined') {
              visibilityTracker = new VisibilityTracker({
                popupProps: {
                  title: 'Paused',
                  description: 'Tap Resume to continue.',
                  primaryText: 'Resume'
                },
                onInactive: function() {
                  try { if (FeedbackManager && FeedbackManager.sound) FeedbackManager.sound.pause(); } catch (e) {}
                  try { if (FeedbackManager && FeedbackManager.stream) FeedbackManager.stream.pauseAll(); } catch (e) {}
                  try { if (previewScreen && previewScreen.pause) previewScreen.pause(); } catch (e) {}
                },
                onResume: function() {
                  try { if (FeedbackManager && FeedbackManager.sound) FeedbackManager.sound.resume(); } catch (e) {}
                  try { if (FeedbackManager && FeedbackManager.stream) FeedbackManager.stream.resumeAll(); } catch (e) {}
                  try { if (previewScreen && previewScreen.resume) previewScreen.resume(); } catch (e) {}
                }
              });
            }
          } catch (e) { console.error('[init] VisibilityTracker ' + e.message); }

          // 6. createProgressBar
          createProgressBar();

          // 7. TransitionScreenComponent
          try {
            if (typeof TransitionScreenComponent !== 'undefined') {
              transitionScreen = new TransitionScreenComponent({ autoInject: true });
            }
          } catch (e) { console.error('[init] TransitionScreen ' + e.message); }

          // 8. PreviewScreenComponent
          try {
            if (typeof PreviewScreenComponent !== 'undefined') {
              previewScreen = new PreviewScreenComponent({ slotId: 'mathai-preview-slot' });
            }
          } catch (e) { console.error('[init] PreviewScreen ' + e.message); }

          // 8b. FloatingButtonComponent (PART-050) — owns Submit / Next lifecycle
          try {
            if (typeof FloatingButtonComponent !== 'undefined') {
              floatingBtn = new FloatingButtonComponent({ slotId: 'mathai-floating-button-slot' });

              // Submit handler = handleCheck.
              // FloatingButton auto-hides on submit click BEFORE this handler runs,
              // so the student's focus shifts to the evaluation feedback.
              floatingBtn.on('submit', function() {
                try { handleCheck(); } catch (e) { /* noop */ }
              });

              // Next handler = advance to next round (mid-game) OR fire next_ended + destroy (end-of-game).
              floatingBtn.on('next', function() {
                if (gameState.gameEnded) return;
                // End-of-game Next: host harness teardown signal.
                if (gameState.phase === 'results') {
                  try { window.parent.postMessage({ type: 'next_ended' }, '*'); } catch (e) {}
                  endGame(gameState.stars > 0);
                  return;
                }
                // Mid-game Next: student acknowledged round result (correct or wrong); advance.
                try { if (floatingBtn && floatingBtn.setMode) floatingBtn.setMode(null); } catch (e) {}
                nextRound();
              });
            }
          } catch (e) { console.error('[init] FloatingButton ' + e.message); }

          // 9. Preload audio
          try {
            if (typeof FeedbackManager !== 'undefined' && FeedbackManager.sound && FeedbackManager.sound.preload) {
              await preloadAllAudio();
            }
          } catch (e) { console.error('[init] preload ' + e.message); }

          // 10. Register message listener BEFORE game_ready
          window.addEventListener('message', handlePostMessage);

          // 11. Send game_ready
          try {
            window.parent.postMessage({ type: 'game_ready' }, '*');
          } catch (e) { /* noop */ }

          // 12. setupGame — renders #gameContent then shows preview last
          setupGame();

        } catch (e) {
          console.error('[init] ' + e.message);
        }
      })();

      // Window exposures
      window.gameState = gameState;
      window.endGame = endGame;
      window.restartGame = restartGame;
      window.nextRound = nextRound;
      window.startGame = startGame;
    });

    /* ============================================================
       Standalone fallback — runs independently of waitForPackages
       ============================================================ */
    setTimeout(function() {
      try {
        if (previewScreen && previewScreen.isActive && previewScreen.isActive()) return;
        if (gameState.isActive || gameState.gameEnded) return;
        if (gameState.phase !== 'start_screen') return;

        var gc = document.getElementById('gameContent');
        if (!gc) {
          var app = document.getElementById('app');
          if (app && !document.getElementById('gameContent')) {
            var fallbackDiv = document.createElement('div');
            fallbackDiv.id = 'gameContent';
            app.appendChild(fallbackDiv);
          }
        }

        gameState.content = gameState.content || fallbackContent;
        gameState.totalRounds = fallbackContent.rounds.length;

        if (!gameState.isActive) {
          startGame();
        }
      } catch (e) { /* noop */ }
    }, 5000);
  </script>
</body>
</html>
