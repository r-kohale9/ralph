<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Logic Seating Puzzle</title>

  <!-- Sentry (error tracking) -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/sentry/index.js"></script>
  <script>
    function initSentry() {
      if (typeof SentryConfig === 'undefined' || !SentryConfig.enabled) return;
      if (typeof Sentry === 'undefined') return;
      try {
        Sentry.init(SentryConfig.getConfig({ release: 'logic-seat-puzzle@1.0.0' }));
      } catch (e) { /* noop */ }
    }
  </script>
  <script src="https://browser.sentry-cdn.com/10.23.0/bundle.tracing.replay.feedback.min.js" crossorigin="anonymous"></script>
  <script src="https://browser.sentry-cdn.com/10.23.0/captureconsole.min.js" crossorigin="anonymous"></script>
  <script src="https://browser.sentry-cdn.com/10.23.0/browserprofiling.min.js" crossorigin="anonymous"></script>
  <script>window.addEventListener('load', initSentry);</script>

  <!-- Game CDN packages (exact order) -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

  <style>
    :root {
      --mathai-game-max-width: 480px;
      --mathai-stack-gap: 10px;
      --mathai-game-padding-top: 54px;

      --mathai-primary: #270f36;
      --mathai-level-text: #270F63;
      --mathai-purple: #9B51E0;

      --mathai-green: #219653;
      --mathai-blue: #667eea;
      --mathai-red: #E35757;
      --mathai-orange: #F2994A;
      --mathai-yellow: #FFDE49;

      --mathai-white: #ffffff;
      --mathai-gray: #666666;
      --mathai-light-gray: #f5f5f5;
      --mathai-disabled-gray: #E0E0E0;
      --mathai-text-primary: #4a4a4a;
      --mathai-border-gray: #e0e0e0;

      --mathai-cell-bg-green: #D9F8D9;
      --mathai-cell-bg-yellow: #FCF6D7;
      --mathai-cell-bg-red: #FFD9D9;
      --mathai-cell-bg-grey: #E0E0E0;
      --mathai-cell-border-green: #27ae60;
      --mathai-cell-border-red: #e74c3c;

      --mathai-success: #219653;
      --mathai-error: #E35757;
      --mathai-warning: #F2994A;

      --mathai-font-family: 'Epilogue', -apple-system, 'Segoe UI', Roboto, sans-serif;
      --mathai-font-size-title: 32px;
      --mathai-font-size-subtitle: 18px;
      --mathai-font-size-button: 16px;
      --mathai-font-size-body: 16px;
      --mathai-font-size-small: 14px;
      --mathai-font-size-large: 24px;

      --mathai-padding-large: 56px 40px;
      --mathai-padding-medium: 16px 24px;
      --mathai-padding-small: 10px;
      --mathai-border-radius: 24px;
      --mathai-border-radius-small: 8px;
      --mathai-border-radius-button: 10px;
      --mathai-border-radius-card: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      overflow-x: hidden;
      margin: 0;
      padding: 0;
      overscroll-behavior: none;
    }

    body {
      font-family: var(--mathai-font-family);
      background: var(--mathai-white);
      color: var(--mathai-text-primary);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.5;
    }

    .hidden { display: none !important; }

    #app {
      width: 100%;
      max-width: var(--mathai-game-max-width);
      min-height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: clip;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    @supports not (min-height: 100dvh) {
      #app { min-height: 100vh; }
    }

    /* Preview-wrapper scroll compatibility — .mathai-preview-body is the single scroll owner */
    #mathai-preview-slot {
      height: 100dvh;
      overflow: hidden;
      position: relative;
    }
    #mathai-preview-slot .mathai-preview-body {
      height: 100dvh;
      box-sizing: border-box;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    input, textarea {
      -webkit-user-select: text;
      user-select: text;
    }

    button,
    .seat,
    .chip,
    [role="button"],
    input[type="submit"] {
      min-height: 44px;
      min-width: 44px;
      touch-action: manipulation;
    }

    /* ============================================================
       Gameplay layout
       ============================================================ */
    #gameContent {
      padding: 12px 14px 24px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    /* Clue panel */
    .clue-panel {
      background: var(--mathai-light-gray);
      border: 1px solid var(--mathai-border-gray);
      border-radius: var(--mathai-border-radius-card);
      padding: 10px 12px;
      margin-bottom: 14px;
    }
    .clue-panel-title {
      font-size: var(--mathai-font-size-small);
      font-weight: 700;
      color: var(--mathai-gray);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .clue-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .clue-list li {
      font-size: 15px;
      color: var(--mathai-primary);
      line-height: 1.4;
      padding: 4px 0;
      position: relative;
      padding-left: 20px;
    }
    .clue-list li::before {
      content: counter(clue-item) '.';
      counter-increment: clue-item;
      position: absolute;
      left: 0;
      top: 4px;
      font-weight: 700;
      color: var(--mathai-purple);
    }
    .clue-list { counter-reset: clue-item; }

    /* Table diagram container */
    .table-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 14px;
    }
    .table-board {
      position: relative;
      width: 100%;
      max-width: 340px;
    }

    /* Top row / bottom row containers for seats */
    .seat-row {
      display: flex;
      justify-content: center;
      align-items: stretch;
    }
    .seat-row.top {
      margin-bottom: 4px;
    }
    .seat-row.bottom {
      margin-top: 4px;
    }
    .seat-row .seat {
      margin: 0 4px;
    }

    /* The table surface between the two rows */
    .table-surface {
      background: linear-gradient(180deg, #F7ECD9 0%, #E9D4B0 100%);
      border: 2px solid #B48A4A;
      border-radius: 10px;
      height: 40px;
      margin: 0 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: #7A5A2E;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* Head-of-table seat (single seat above the table) */
    .head-row {
      display: flex;
      justify-content: center;
      margin-bottom: 4px;
    }
    .head-row .seat {
      margin: 0 4px;
    }
    .head-label {
      font-size: 10px;
      color: var(--mathai-gray);
      font-weight: 700;
      letter-spacing: 0.5px;
      text-align: center;
      margin-bottom: 2px;
    }

    /* Seat */
    .seat {
      position: relative;
      width: 68px;
      height: 76px;
      border: 2px dashed var(--mathai-border-gray);
      border-radius: 10px;
      background: var(--mathai-white);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      transition: border-color 0.12s ease, background 0.12s ease, transform 0.12s ease;
    }
    .seat .seat-num {
      position: absolute;
      top: 3px;
      left: 5px;
      font-size: 11px;
      font-weight: 700;
      color: var(--mathai-gray);
      background: var(--mathai-light-gray);
      border-radius: 10px;
      padding: 1px 6px;
      line-height: 1.1;
    }
    .seat.seat-hover {
      border-color: var(--mathai-purple);
      background: #F3ECFB;
    }
    .seat.seat-success {
      border-style: solid;
      border-color: var(--mathai-cell-border-green);
      background: var(--mathai-cell-bg-green);
      animation: seatFlashGreen 400ms ease;
    }
    .seat.seat-conflict {
      border-style: solid;
      border-color: var(--mathai-cell-border-red);
      background: var(--mathai-cell-bg-red);
      animation: seatFlashRed 400ms ease 2;
    }
    .seat.seat-solution {
      border-style: solid;
      border-color: var(--mathai-blue);
      background: #E8ECFB;
    }

    /* Chip (character) */
    .chip {
      width: 58px;
      height: 62px;
      border-radius: 10px;
      background: var(--mathai-white);
      border: 2px solid var(--mathai-border-gray);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: var(--mathai-font-family);
      color: var(--mathai-primary);
      font-weight: 700;
      font-size: 12px;
      padding: 4px;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
      cursor: grab;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      position: relative;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    .chip .chip-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      color: var(--mathai-white);
      font-weight: 800;
      margin-bottom: 2px;
    }
    .chip .chip-name {
      font-size: 11px;
      line-height: 1.1;
      text-align: center;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .chip.chip-lift {
      transform: scale(1.06);
      box-shadow: 0 6px 14px rgba(39,15,54,0.22);
    }
    .chip.chip-dragging {
      z-index: 1000;
      pointer-events: none;
      cursor: grabbing;
    }
    .chip.in-seat {
      width: 54px;
      height: 58px;
    }

    /* Pool area */
    .pool-label {
      font-size: var(--mathai-font-size-small);
      font-weight: 700;
      color: var(--mathai-gray);
      margin: 2px 0 6px 0;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      text-align: center;
    }
    .pool-wrap {
      background: var(--mathai-light-gray);
      border: 1px solid var(--mathai-border-gray);
      border-radius: var(--mathai-border-radius-card);
      padding: 10px 8px;
      margin-bottom: 14px;
      min-height: 82px;
    }
    .pool-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
    }
    .pool-slot {
      margin: 4px 5px;
      width: 58px;
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pool-slot.collapsed {
      width: 0;
      height: 0;
      margin: 0;
      overflow: hidden;
    }

    /* CHECK / NEXT button */
    .action-row {
      display: flex;
      justify-content: center;
      margin-top: 4px;
      padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
    }
    .action-btn {
      background: var(--mathai-purple);
      color: var(--mathai-white);
      border: none;
      border-radius: var(--mathai-border-radius-button);
      font-family: var(--mathai-font-family);
      font-size: var(--mathai-font-size-subtitle);
      font-weight: 700;
      padding: 14px 36px;
      cursor: pointer;
      letter-spacing: 0.5px;
      -webkit-appearance: none;
      appearance: none;
      min-height: 48px;
      transition: background 0.25s ease, color 0.25s ease;
    }
    .action-btn:disabled,
    .action-btn.disabled {
      background: var(--mathai-disabled-gray);
      color: var(--mathai-gray);
      cursor: not-allowed;
      pointer-events: none;
    }
    .action-btn.next-mode {
      background: var(--mathai-blue);
    }

    /* Drag layer — absolute placement for chips while dragging */
    #drag-layer {
      position: fixed;
      inset: 0;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 9999;
    }

    /* Animations */
    @keyframes seatFlashGreen {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.07); background: var(--mathai-cell-bg-green); }
      100% { transform: scale(1); }
    }
    @keyframes seatFlashRed {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-3px); }
      60% { transform: translateX(3px); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.35s ease; }

    /* Disable interactions when processing */
    .dnd-disabled .chip {
      pointer-events: none !important;
      cursor: not-allowed !important;
    }

    /* Landscape lock */
    @media screen and (orientation: landscape) and (max-height: 500px) {
      body::before {
        content: 'Please rotate your phone to portrait mode';
        position: fixed;
        inset: 0;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--mathai-white);
        color: var(--mathai-primary);
        font-family: var(--mathai-font-family);
        font-size: var(--mathai-font-size-subtitle);
        text-align: center;
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <div id="app" data-phase="start_screen" data-score="0" data-round="0"></div>
  <div id="drag-layer"></div>

  <script>
    /* ============================================================
       Sticker URLs (standard set)
       ============================================================ */
    var STICKER_CORRECT = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-95.gif';
    var STICKER_WRONG = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-99.gif';
    var STICKER_ROUND = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-87.gif';
    var STICKER_LEVEL = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-234.gif';
    var STICKER_VICTORY = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1759297084426-230.gif';
    var STICKER_GAME_COMPLETE_2 = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-113.gif';
    var STICKER_GAME_COMPLETE_1 = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-110.gif';
    var STICKER_SAD = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1758375013588-103.gif';
    var STICKER_RESTART = 'https://cdn.mathai.ai/mathai-assets/dev/figma/assets/rc-upload-1757430772002-102.gif';

    /* ============================================================
       gameState (PART-007) — gameId MUST be first field
       ============================================================ */
    var gameState = {
      gameId: 'logic-seat-puzzle',
      phase: 'start_screen',
      currentRound: 0,
      totalRounds: 3,
      score: 0,
      correctAnswer: null,
      attempts: [],
      events: [],
      startTime: null,
      isActive: false,
      isProcessing: false,
      gameEnded: false,
      content: null,
      stars: 0,
      firstCheckSolves: 0,
      roundsCompleted: 0,
      roundStartTime: null,
      responseTimes: [],
      previewResult: null,
      seatMap: {},
      chipLoc: {},   // chipId -> 'pool' | seatId
      dropLog: [],
      validationResult: null,
      isBoardFull: false,
      currentRoundData: null,
      duration_data: {
        startTime: null,
        preview: [],
        attempts: [],
        evaluations: [],
        inActiveTime: [],
        totalInactiveTime: 0
      }
    };
    window.gameState = gameState;

    /* ============================================================
       fallbackContent — 3 rounds (simplified for fast iteration)
       3 seats in a single row, 3 characters, 1-2 simple clues each.
       ============================================================ */
    var fallbackContent = {
      previewInstruction: '<p><b>Seat everyone at the table!</b><br>Drag each character into a seat so every clue is true. Tap <b>CHECK</b> when you are done.</p>',
      previewAudioText: 'Drag each character into a seat so every clue is true. Then tap CHECK.',
      previewAudio: null,
      showGameOnPreview: false,
      rounds: [
        {
          round: 1, stage: 1, type: 'A', layout: 'rect-3',
          seats: [
            { id: 1, side: 'row', col: 'left'   },
            { id: 2, side: 'row', col: 'middle' },
            { id: 3, side: 'row', col: 'right'  }
          ],
          pool: [
            { id: 'alice', name: 'Alice', avatar: 'A' },
            { id: 'bob',   name: 'Bob',   avatar: 'B' },
            { id: 'cara',  name: 'Cara',  avatar: 'C' }
          ],
          clues: [
            { id: 'c1', text: 'Alice sits on the left of Bob.', type: 'left_of', args: ['alice', 'bob'] },
            { id: 'c2', text: 'Cara sits on the right end.',    type: 'at_seat', args: ['cara', 3] }
          ],
          solution: { 1: 'alice', 2: 'bob', 3: 'cara' },
          misconception_tags: {
            'mirror-left-right': "Reads 'left of' opposite to screen-left.",
            'arbitrary-fill':    'Fills seats without reading clues.'
          }
        },
        {
          round: 2, stage: 1, type: 'A', layout: 'rect-3',
          seats: [
            { id: 1, side: 'row', col: 'left'   },
            { id: 2, side: 'row', col: 'middle' },
            { id: 3, side: 'row', col: 'right'  }
          ],
          pool: [
            { id: 'kiran', name: 'Kiran', avatar: 'K' },
            { id: 'neha',  name: 'Neha',  avatar: 'N' },
            { id: 'dev',   name: 'Dev',   avatar: 'D' }
          ],
          clues: [
            { id: 'c1', text: 'Kiran sits in the middle.',    type: 'at_seat', args: ['kiran', 2] },
            { id: 'c2', text: 'Neha sits on the left of Dev.', type: 'left_of', args: ['neha', 'dev'] }
          ],
          solution: { 1: 'neha', 2: 'kiran', 3: 'dev' },
          misconception_tags: {
            'mirror-left-right': "Reads 'left of' opposite to screen-left.",
            'middle-seat-skipped': "Misses the 'middle' positional clue."
          }
        },
        {
          round: 3, stage: 1, type: 'A', layout: 'rect-3',
          seats: [
            { id: 1, side: 'row', col: 'left'   },
            { id: 2, side: 'row', col: 'middle' },
            { id: 3, side: 'row', col: 'right'  }
          ],
          pool: [
            { id: 'tara',  name: 'Tara',  avatar: 'T' },
            { id: 'veer',  name: 'Veer',  avatar: 'V' },
            { id: 'ishan', name: 'Ishan', avatar: 'I' }
          ],
          clues: [
            { id: 'c1', text: 'Tara sits on the left end.',    type: 'at_seat', args: ['tara', 1] },
            { id: 'c2', text: 'Veer sits next to Ishan.',      type: 'next_to', args: ['veer', 'ishan'] }
          ],
          solution: { 1: 'tara', 2: 'veer', 3: 'ishan' },
          misconception_tags: {
            'next-to-as-anywhere': "Treats 'next to' as anywhere on the row.",
            'arbitrary-fill':      'Fills seats without reading clues.'
          }
        }
      ]
    };

    /* ============================================================
       Module-scope runtime references
       ============================================================ */
    var timer = null;
    var visibilityTracker = null;
    var signalCollector = null;
    var progressBar = null;
    var transitionScreen = null;
    var previewScreen = null;
    var floatingBtn = null;
    var audioPermissionChecked = false;

    // Drag state
    var dragState = null; // { chipId, sourceType: 'pool'|'seat', sourceSeatId, chipEl, offsetX, offsetY, pointerId, originRect }
    var isDraggingFlag = false;

    // Avatar color palette — keyed by first character of chipId (stable per round)
    var AVATAR_COLORS = [
      '#E35757', '#F2994A', '#FFDE49', '#9B51E0', '#667eea',
      '#219653', '#27AE60', '#2F80ED', '#BB6BD9', '#EB5757',
      '#F2C94C', '#56CCF2', '#6FCF97', '#F2994A'
    ];
    function avatarColor(chipId) {
      var hash = 0;
      for (var i = 0; i < chipId.length; i++) {
        hash = (hash * 31 + chipId.charCodeAt(i)) >>> 0;
      }
      return AVATAR_COLORS[hash % AVATAR_COLORS.length];
    }

    /* ============================================================
       Utility: shuffle array in place (Fisher-Yates)
       ============================================================ */
    function shuffleArray(arr) {
      for (var i = arr.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
      }
      return arr;
    }

    /* ============================================================
       syncDOM — writes #app data-* attrs
       ============================================================ */
    function syncDOM() {
      var app = document.getElementById('app');
      if (!app) return;
      app.setAttribute('data-phase', gameState.phase);
      app.setAttribute('data-score', gameState.score);
      app.setAttribute('data-round', gameState.currentRound);
    }

    /* ============================================================
       trackEvent
       ============================================================ */
    function trackEvent(type, data) {
      try {
        var evt = { event: type, timestamp: Date.now() };
        if (data && typeof data === 'object') {
          for (var k in data) { if (data.hasOwnProperty(k)) evt[k] = data[k]; }
        }
        gameState.events.push(evt);
      } catch (e) { /* noop */ }
    }

    /* ============================================================
       recordAttempt (12 fields per PART-009 / data-contract)
       ============================================================ */
    function recordAttempt(params) {
      try {
        var now = Date.now();
        var sinceStart = gameState.startTime ? (now - gameState.startTime) : 0;
        var responseMs = gameState.roundStartTime ? (now - gameState.roundStartTime) : 0;
        if (params && typeof params.response_time_ms === 'number') {
          responseMs = params.response_time_ms;
        }
        var attempt = {
          attempt_timestamp: now,
          time_since_start_of_game: sinceStart,
          input_of_user: params.input_of_user,
          correct: !!params.correct,
          round_number: params.round_number,
          question_id: params.question_id,
          correct_answer: params.correct_answer,
          response_time_ms: responseMs,
          misconception_tag: params.misconception_tag == null ? null : params.misconception_tag,
          difficulty_level: params.difficulty_level || 1,
          is_retry: !!params.is_retry,
          metadata: params.metadata || {}
        };
        gameState.attempts.push(attempt);
        gameState.duration_data.attempts.push({
          round: params.round_number,
          timestamp: now,
          response_time_ms: responseMs
        });
      } catch (e) { /* noop */ }
    }

    /* ============================================================
       getRounds — with fallback
       ============================================================ */
    function getRounds() {
      if (gameState.content && gameState.content.rounds &&
          gameState.content.rounds.length >= gameState.totalRounds) {
        return gameState.content.rounds;
      }
      return fallbackContent.rounds;
    }

    /* ============================================================
       getStars — by firstCheckSolves
       ============================================================ */
    function getStars() {
      var s = gameState.firstCheckSolves || 0;
      if (s >= 6) return 3;
      if (s >= 4) return 2;
      if (s >= 1) return 1;
      return 0;
    }

    /* ============================================================
       waitForPackages (PART-003)
       ============================================================ */
    function waitForPackages() {
      return new Promise(function(resolve, reject) {
        var startT = Date.now();
        var timeout = 120000;
        var interval = setInterval(function() {
          var ok = (typeof FeedbackManager !== 'undefined') &&
                   (typeof VisibilityTracker !== 'undefined') &&
                   (typeof ScreenLayout !== 'undefined') &&
                   (typeof ProgressBarComponent !== 'undefined') &&
                   (typeof TransitionScreenComponent !== 'undefined') &&
                   (typeof PreviewScreenComponent !== 'undefined');
          if (ok) { clearInterval(interval); resolve(true); return; }
          if (Date.now() - startT > timeout) {
            clearInterval(interval);
            try {
              throw new Error('Packages failed to load within ' + timeout + 'ms');
            } catch (err) {
              reject(err);
            }
          }
        }, 50);
      });
    }

    /* ============================================================
       Audio readiness check
       ============================================================ */
    function waitForAudioPermission() {
      return new Promise(function(resolve) {
        if (audioPermissionChecked) return resolve();
        if (typeof FeedbackManager === 'undefined' || !FeedbackManager.canPlayAudio) {
          audioPermissionChecked = true;
          return resolve();
        }
        try {
          if (FeedbackManager.canPlayAudio()) {
            audioPermissionChecked = true;
            return resolve();
          }
        } catch (e) { /* noop */ }
        var check = setInterval(function() {
          try {
            if (FeedbackManager.canPlayAudio && FeedbackManager.canPlayAudio()) {
              clearInterval(check);
              audioPermissionChecked = true;
              resolve();
            }
          } catch (e) { /* noop */ }
        }, 200);
        setTimeout(function() { clearInterval(check); audioPermissionChecked = true; resolve(); }, 15000);
      });
    }

       FeedbackManager preload

    function preloadAllAudio() {
