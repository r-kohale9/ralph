<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adjust to Add</title>

  <!-- PART-002: Package Scripts — order is critical -->
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/feedback-manager/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/components/index.js"></script>
  <script src="https://storage.googleapis.com/test-dynamic-assets/packages/helpers/index.js"></script>

  <style>
    /* PART-020: CSS Variables & Colors */
    :root {
      --primary:    #4A90D9;
      --success:    #27AE60;
      --error:      #E74C3C;
      --neutral:    #F5F5F5;
      --adjust-btn: #7B68EE;
      --text:       #2C3E50;
      --bg:         #F7F9FC;
    }

    /* PART-021: Screen Layout CSS */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); }
    #app  { min-height: 100vh; display: flex; flex-direction: column; }

    /* PART-027: Play Area */
    #gameArea {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 20px 32px;
    }

    .game-card {
      background: #fff;
      border-radius: 18px;
      padding: 28px 24px 32px;
      max-width: 460px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.09);
    }

    /* Difficulty badge */
    .difficulty-badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.03em;
      padding: 4px 12px;
      border-radius: 14px;
      margin-bottom: 14px;
    }
    .d1 { background: #E3F2FD; color: #1565C0; }
    .d2 { background: #FFF3E0; color: #E65100; }
    .d3 { background: #FCE4EC; color: #880E4F; }

    /* Prompt */
    .original-label {
      font-size: 13px;
      color: #888;
      text-align: center;
      margin-bottom: 4px;
    }
    .round-prompt {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      color: var(--text);
      margin-bottom: 28px;
    }

    /* Numbers row */
    .numbers-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 28px;
    }
    .plus-sign {
      font-size: 36px;
      font-weight: 700;
      color: var(--primary);
      line-height: 1;
      padding-bottom: 28px; /* visually align with number, not buttons */
    }
    .number-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .number-display {
      font-size: 52px;
      font-weight: 800;
      color: var(--primary);
      min-width: 110px;
      text-align: center;
      line-height: 1;
      transition: color 0.25s;
    }
    .number-display.adjusted { color: var(--adjust-btn); }

    /* PART-022: Adjustment buttons */
    .adj-buttons { display: flex; gap: 10px; }
    .adj-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: none;
      background: var(--adjust-btn);
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .adj-btn:hover  { background: #6A5ACD; transform: scale(1.06); }
    .adj-btn:active { transform: scale(0.94); }

    /* Answer section */
    .answer-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .answer-label {
      font-size: 15px;
      color: var(--text);
      font-weight: 500;
    }
    .answer-input {
      width: 160px;
      height: 54px;
      font-size: 26px;
      font-weight: 700;
      text-align: center;
      border: 2px solid #D0D7E2;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      color: var(--text);
      background: #fff;
      /* hide browser spinners */
      -moz-appearance: textfield;
    }
    .answer-input::-webkit-inner-spin-button,
    .answer-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .answer-input:focus  { border-color: var(--primary); }
    .answer-input.correct { border-color: var(--success); background: #F0FFF4; }
    .answer-input.wrong   { border-color: var(--error);   background: #FFF5F5; }

    .submit-btn {
      width: 160px;
      height: 50px;
      background: var(--primary);
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .submit-btn:hover:not(:disabled)  { background: #3A7CC9; transform: translateY(-1px); }
    .submit-btn:active:not(:disabled) { transform: translateY(0); }
    .submit-btn:disabled { background: #B0BEC5; cursor: not-allowed; }

    /* Feedback message */
    .feedback-msg {
      min-height: 36px;
      width: 100%;
      font-size: 14px;
      text-align: center;
      padding: 8px 14px;
      border-radius: 10px;
      line-height: 1.4;
      transition: opacity 0.25s;
    }
    .feedback-msg:empty { opacity: 0; }
    .correct-msg { background: #EAFAF1; color: #1E8449; }
    .wrong-msg   { background: #FDEDEC; color: #C0392B; }
    .hint-msg    { background: #FFFDE7; color: #7B6000; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- PART-001: HTML Shell — ScreenLayout injects progress + transition slots here -->
<div id="app" data-phase="start_screen" data-lives="3" data-score="0"></div>

<!-- PART-027: Game template (cloned into #gameContent by ScreenLayout) -->
<template id="game-template">
  <div id="gameArea">
    <div class="game-card">
      <div id="difficultyBadge" class="difficulty-badge d1">Level 1 — Easy</div>
      <p class="original-label">Make this addition easier to solve:</p>
      <p class="round-prompt" id="roundPrompt">47 + 33</p>

      <div class="numbers-row">
        <div class="number-card">
          <div class="number-display" id="num1Display">47</div>
          <div class="adj-buttons">
            <button class="adj-btn" id="num1Plus"  aria-label="Increase first number">+</button>
            <button class="adj-btn" id="num1Minus" aria-label="Decrease first number">−</button>
          </div>
        </div>

        <div class="plus-sign">+</div>

        <div class="number-card">
          <div class="number-display" id="num2Display">33</div>
          <div class="adj-buttons">
            <button class="adj-btn" id="num2Plus"  aria-label="Increase second number">+</button>
            <button class="adj-btn" id="num2Minus" aria-label="Decrease second number">−</button>
          </div>
        </div>
      </div>

      <div class="answer-section">
        <label class="answer-label" for="answerInput">What is the sum?</label>
        <input type="number" id="answerInput" class="answer-input"
               placeholder="?" autocomplete="off" inputmode="numeric" />
        <button id="submitBtn" class="submit-btn">Check ✓</button>
        <div id="feedbackMsg" class="feedback-msg" role="status" aria-live="polite"></div>
      </div>
    </div>
  </div>
</template>

<script>
// ============================================================
// PART-007: Game State
// ============================================================
const gameState = {
  gameId: 'adjust-to-add',         // MUST be first field
  phase: 'start_screen',
  currentRound: 0,
  totalRounds: 9,
  lives: 3,
  score: 0,
  attempts: [],
  events: [],
  startTime: null,
  isActive: false,
  content: null,
  duration_data: {
    startTime: null,
    preview: [],
    attempts: [],
    evaluations: [],
    inActiveTime: [],
    totalInactiveTime: 0,
    currentTime: null
  },
  // Game-specific fields
  originalNum1: 0,
  originalNum2: 0,
  adjustedNum1: 0,
  adjustedNum2: 0,
  attemptsThisRound: 0,
  wrongFirstAttempt: false,
  totalFirstAttemptCorrect: 0,
  isProcessing: false,
  gameEnded: false
};

window.gameState = gameState;

let visibilityTracker = null;
let progressBar      = null;
let transitionScreen = null;

// ============================================================
// PART-028: Fallback Content
// ============================================================
const fallbackContent = {
  rounds: [
    // Tier 1
    { num1: 47,  num2: 33,  difficulty: 1, hint: "Round 47 up to 50. If 47 goes up by 3, what must happen to 33?",           misconceptionTag: "sum-invariance" },
    { num1: 38,  num2: 22,  difficulty: 1, hint: "Round 38 up to 40. Does 22 go up or down to keep the total the same?",     misconceptionTag: "both-round-up"  },
    { num1: 29,  num2: 41,  difficulty: 1, hint: "29 is very close to 30. If 29 goes up to 30, what should 41 become?",      misconceptionTag: "M-none"         },
    // Tier 2
    { num1: 46,  num2: 54,  difficulty: 2, hint: "46 is 4 away from 50. If 46 goes up by 4, what must 54 do?",               misconceptionTag: "sum-invariance" },
    { num1: 57,  num2: 43,  difficulty: 2, hint: "Move 3 from 43 to 57. Now the addition is easy!",                           misconceptionTag: "no-strategy"    },
    { num1: 64,  num2: 36,  difficulty: 2, hint: "64 rounds DOWN to 60. Which way must 36 move to compensate?",               misconceptionTag: "both-round-up"  },
    // Tier 3
    { num1: 248, num2: 152, difficulty: 3, hint: "248 is 2 away from 250. If 248 goes up by 2, what must happen to 152?",    misconceptionTag: "sum-invariance" },
    { num1: 197, num2: 303, difficulty: 3, hint: "197 is 3 away from 200. If it goes up to 200, what must 303 become?",      misconceptionTag: "no-strategy"    },
    { num1: 396, num2: 104, difficulty: 3, hint: "396 is 4 away from 400. If it goes up to 400, what should 104 become?",    misconceptionTag: "M-none"         }
  ]
};

// ============================================================
// PART-009: Attempt Tracking
// ============================================================
function recordAttempt(roundIndex, userAnswer, correct) {
  const round = gameState.content.rounds[roundIndex];
  gameState.attempts.push({
    round: roundIndex + 1,
    num1: round.num1,
    num2: round.num2,
    adjustedNum1: gameState.adjustedNum1,
    adjustedNum2: gameState.adjustedNum2,
    userAnswer,
    correctAnswer: round.num1 + round.num2,
    correct,
    timestamp: Date.now()
  });
}

// ============================================================
// PART-010: Event Tracking
// ============================================================
function trackEvent(type, data) {
  gameState.events.push({ type, data, timestamp: Date.now() });
}

// ============================================================
// PART-008: PostMessage Protocol
// ============================================================
function handlePostMessage(event) {
  if (!event.data) return;
  if (event.data.rounds) {
    gameState.content = event.data;
  }
}

// ============================================================
// DOM sync helper
// ============================================================
function syncDOM() {
  const app = document.getElementById('app');
  if (!app) return;
  app.setAttribute('data-phase', gameState.phase);
  app.setAttribute('data-lives', gameState.lives);
  app.setAttribute('data-score', gameState.score);
}

// ============================================================
// Round management
// ============================================================
function loadRound(index) {
  const round = gameState.content.rounds[index];
  gameState.originalNum1       = round.num1;
  gameState.originalNum2       = round.num2;
  gameState.adjustedNum1       = round.num1;
  gameState.adjustedNum2       = round.num2;
  gameState.attemptsThisRound  = 0;
  gameState.wrongFirstAttempt  = false;

  // Render numbers
  const n1El = document.getElementById('num1Display');
  const n2El = document.getElementById('num2Display');
  n1El.textContent = gameState.adjustedNum1;
  n2El.textContent = gameState.adjustedNum2;
  n1El.classList.remove('adjusted');
  n2El.classList.remove('adjusted');

  // Prompt
  document.getElementById('roundPrompt').textContent =
    round.num1 + ' + ' + round.num2;

  // Difficulty badge
  const badge   = document.getElementById('difficultyBadge');
  const labels  = { 1: 'Level 1 — Easy', 2: 'Level 2 — Medium', 3: 'Level 3 — Hard' };
  const classes = { 1: 'd1', 2: 'd2', 3: 'd3' };
  badge.textContent = labels[round.difficulty] || 'Level 1 — Easy';
  badge.className   = 'difficulty-badge ' + (classes[round.difficulty] || 'd1');

  // Reset input + feedback
  const input = document.getElementById('answerInput');
  input.value     = '';
  input.className = 'answer-input';
  const msg = document.getElementById('feedbackMsg');
  msg.textContent = '';
  msg.className   = 'feedback-msg';
  document.getElementById('submitBtn').disabled = false;

  // Auto-focus
  setTimeout(() => input.focus(), 80);
}

function adjustNumber(which, direction) {
  if (gameState.isProcessing || gameState.gameEnded) return;
  const key       = which === 1 ? 'adjustedNum1'  : 'adjustedNum2';
  const displayId = which === 1 ? 'num1Display'   : 'num2Display';
  const origKey   = which === 1 ? 'originalNum1'  : 'originalNum2';
  const newVal    = gameState[key] + direction;
  if (newVal < 0) return;
  gameState[key] = newVal;
  const el = document.getElementById(displayId);
  el.textContent = newVal;
  el.classList.toggle('adjusted', newVal !== gameState[origKey]);
  trackEvent('adjustment_made', { which, direction, newValue: newVal });
}

function showFeedback(text, cssClass) {
  const msg = document.getElementById('feedbackMsg');
  msg.textContent = text;
  msg.className   = 'feedback-msg ' + cssClass;
}

function submitAnswer() {
  if (gameState.isProcessing || gameState.gameEnded) return;
  const input   = document.getElementById('answerInput');
  const rawVal  = input.value.trim();
  if (!rawVal) { input.focus(); return; }

  const userAnswer = parseInt(rawVal, 10);
  if (isNaN(userAnswer)) {
    showFeedback('Please enter a whole number.', 'wrong-msg');
    return;
  }

  gameState.isProcessing = true;
  document.getElementById('submitBtn').disabled = true;

  const round         = gameState.content.rounds[gameState.currentRound];
  const correctAnswer = gameState.originalNum1 + gameState.originalNum2;
  const isCorrect     = userAnswer === correctAnswer;

  gameState.attemptsThisRound++;
  recordAttempt(gameState.currentRound, userAnswer, isCorrect);
  trackEvent('answer_submitted', { userAnswer, correctAnswer, isCorrect });

  if (isCorrect) {
    if (gameState.attemptsThisRound === 1) gameState.totalFirstAttemptCorrect++;
    gameState.score++;
    input.classList.add('correct');
    showFeedback('✓ Correct! ' + round.num1 + ' + ' + round.num2 + ' = ' + correctAnswer, 'correct-msg');
    trackEvent('round_complete', {
      roundNumber: gameState.currentRound + 1,
      firstAttemptCorrect: gameState.attemptsThisRound === 1
    });
    if (progressBar) progressBar.recordCorrect();
    syncDOM();
    setTimeout(() => {
      gameState.isProcessing = false;
      advanceRound();
    }, 1200);

  } else {
    if (gameState.attemptsThisRound === 1) gameState.wrongFirstAttempt = true;
    gameState.lives--;
    if (progressBar) progressBar.recordWrong();
    syncDOM();

    if (gameState.lives <= 0) {
      input.classList.add('wrong');
      showFeedback('Game over! The answer was ' + correctAnswer + '.', 'wrong-msg');
      setTimeout(() => endGame(false), 1600);
    } else {
      input.classList.add('wrong');
      const hintText = round.hint
        ? '💡 ' + round.hint
        : 'Not quite. The answer is ' + correctAnswer + '. Try again!';
      showFeedback(hintText, 'hint-msg');
      // Allow retry — clear input after pause
      setTimeout(() => {
        if (gameState.gameEnded) return;
        gameState.isProcessing = false;
        input.className = 'answer-input';
        input.value     = '';
        document.getElementById('submitBtn').disabled = false;
        input.focus();
      }, 2200);
    }
  }
}

function advanceRound() {
  gameState.currentRound++;
  if (gameState.currentRound >= gameState.totalRounds) {
    endGame(true);
  } else {
    gameState.phase = 'playing';
    syncDOM();
    loadRound(gameState.currentRound);
  }
}

// ============================================================
// PART-011: Start / End Game
// ============================================================
function startGame() {
  gameState.phase                   = 'playing';
  gameState.currentRound            = 0;
  gameState.isActive                = true;
  gameState.startTime               = Date.now();
  gameState.duration_data.startTime = Date.now();
  syncDOM();
  if (visibilityTracker) visibilityTracker.start();
  const gameArea = document.getElementById('gameArea');
  if (gameArea) gameArea.style.display = 'flex';
  loadRound(0);
}

function endGame(won) {
  if (gameState.gameEnded) return;
  gameState.gameEnded = true;
  gameState.isActive  = false;
  gameState.phase     = 'results';
  syncDOM();
  if (visibilityTracker) visibilityTracker.stop();

  const stars = gameState.totalFirstAttemptCorrect >= 8 ? 3
              : gameState.totalFirstAttemptCorrect >= 6 ? 2 : 1;
  const starStr = ['', '⭐', '⭐⭐', '⭐⭐⭐'][stars];

  // PART-008: post metrics
  try {
    window.parent.postMessage({
      type: 'GAME_COMPLETE',
      gameId: gameState.gameId,
      metrics: {
        score: gameState.score,
        totalRounds: gameState.totalRounds,
        lives: gameState.lives,
        firstAttemptCorrect: gameState.totalFirstAttemptCorrect,
        stars,
        duration: Date.now() - gameState.startTime,
        completed: won
      }
    }, '*');
  } catch (e) { /* cross-origin guard */ }

  const gameArea = document.getElementById('gameArea');
  if (gameArea) gameArea.style.display = 'none';

  if (transitionScreen) {
    transitionScreen.show({
      icons: [won ? '🎉' : '💪'],
      iconSize: 'large',
      title: won ? 'Well done!' : 'Keep practising!',
      subtitle: won
        ? gameState.totalFirstAttemptCorrect + ' out of 9 first-try correct! ' + starStr
        : 'You ran out of lives. Try adjusting the numbers before you type!',
      buttons: [
        { text: 'Play Again', type: 'primary', action: function () { window.restartGame(); } }
      ]
    });
  }
}

function restartGame() {
  // Reset all state
  Object.assign(gameState, {
    phase: 'start_screen',
    currentRound: 0,
    lives: 3,
    score: 0,
    attempts: [],
    events: [],
    startTime: null,
    isActive: false,
    originalNum1: 0, originalNum2: 0,
    adjustedNum1: 0, adjustedNum2: 0,
    attemptsThisRound: 0,
    wrongFirstAttempt: false,
    totalFirstAttemptCorrect: 0,
    isProcessing: false,
    gameEnded: false,
    duration_data: {
      startTime: null, preview: [], attempts: [], evaluations: [],
      inActiveTime: [], totalInactiveTime: 0, currentTime: null
    }
  });
  syncDOM();
  if (progressBar) progressBar.reset();
  startGame();
}

function nextRound() {
  if (!gameState.gameEnded && gameState.currentRound < gameState.totalRounds) {
    advanceRound();
  }
}

// ============================================================
// PART-003: waitForPackages
// ============================================================
async function waitForPackages() {
  const timeout = 10000;
  const start   = Date.now();
  const poll    = (check, name) => new Promise((res, rej) => {
    const iv = setInterval(() => {
      if (check()) { clearInterval(iv); res(); return; }
      if (Date.now() - start > timeout) {
        clearInterval(iv);
        rej(new Error('Timeout waiting for ' + name));
      }
    }, 50);
  });
  await poll(() => typeof FeedbackManager         !== 'undefined', 'FeedbackManager');
  await poll(() => typeof VisibilityTracker        !== 'undefined', 'VisibilityTracker');
  await poll(() => typeof ProgressBarComponent     !== 'undefined', 'ProgressBarComponent');
  await poll(() => typeof TransitionScreenComponent !== 'undefined', 'TransitionScreenComponent');
  await poll(() => typeof ScreenLayout             !== 'undefined', 'ScreenLayout');
  console.log('[adjust-to-add] All packages loaded');
}

// ============================================================
// PART-004: Initialization Block
// ============================================================
window.addEventListener('DOMContentLoaded', async function () {
  try {
    await waitForPackages();
    // NOTE: FeedbackManager.init() intentionally omitted (PART-017 excluded)

    // PART-025: ScreenLayout
    ScreenLayout.inject('app', { slots: { progressBar: true, transitionScreen: true } });
    const gameContent = document.getElementById('gameContent');
    const template    = document.getElementById('game-template');
    if (gameContent && template) {
      gameContent.appendChild(template.content.cloneNode(true));
    }

    // PART-023: ProgressBarComponent
    progressBar = new ProgressBarComponent({
      autoInject: true,
      totalRounds: 9,
      totalLives: 3,
      slotId: 'mathai-progress-slot'
    });

    // PART-024: TransitionScreenComponent
    transitionScreen = new TransitionScreenComponent({ autoInject: true });

    // PART-005: VisibilityTracker
    visibilityTracker = new VisibilityTracker({
      onInactive: function () {
        gameState.duration_data.inActiveTime.push({ start: Date.now() });
      },
      onResume: function () {
        const arr  = gameState.duration_data.inActiveTime;
        const last = arr[arr.length - 1];
        if (last && !last.end) {
          last.end = Date.now();
          gameState.duration_data.totalInactiveTime += (last.end - last.start);
        }
      }
    });

    // PART-028: Content
    if (!gameState.content) gameState.content = fallbackContent;
    window.addEventListener('message', handlePostMessage);

    // Wire up adjustment + submit buttons
    document.getElementById('num1Plus').addEventListener('click',  () => adjustNumber(1,  1));
    document.getElementById('num1Minus').addEventListener('click', () => adjustNumber(1, -1));
    document.getElementById('num2Plus').addEventListener('click',  () => adjustNumber(2,  1));
    document.getElementById('num2Minus').addEventListener('click', () => adjustNumber(2, -1));
    document.getElementById('submitBtn').addEventListener('click', submitAnswer);
    document.getElementById('answerInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') submitAnswer();
    });

    // Expose functions required by test harness
    window.endGame     = endGame;
    window.restartGame = restartGame;
    window.nextRound   = nextRound;

    // Show start screen via TransitionScreen
    transitionScreen.show({
      icons: ['🧮'],
      iconSize: 'large',
      title: 'Adjust to Add',
      subtitle: 'Use +/− to reshape the numbers, then type the sum!',
      buttons: [{ text: "Let's go!", type: 'primary', action: function () { startGame(); } }]
    });

  } catch (e) {
    console.error('[adjust-to-add] Init error:', JSON.stringify({ error: e.message }, null, 2));
  }
});
</script>
</body>
</html>
